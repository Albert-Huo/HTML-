<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>初中物理实验41｜模拟近视眼和远视眼的矫正</title>
  <style>
    :root{--bg:#1a1a1a;--ink:#fff;--card-bg:rgba(255,255,255,.08);--panel-bg:rgba(15,15,15,.54);--line:rgba(255,255,255,.12);--accent:#3ddc97;--warn:#ffb74d;--danger:#ff5b6e;--dockShadow:0 14px 36px rgba(0,0,0,.42)}
    *{box-sizing:border-box}html,body{min-height:100%}body{margin:0;padding:10px;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;display:flex;flex-direction:column;align-items:center;letter-spacing:0}
    #app{width:100%;max-width:980px;margin:0 auto 34px}button{font:inherit;touch-action:manipulation}
    button.main,button.sub{border:none;border-radius:8px;padding:8px 12px;color:#fff;cursor:pointer;transition:background .2s,transform .05s,opacity .2s;user-select:none;-webkit-tap-highlight-color:transparent;font-size:13px;background:#444}
    button.main{background:#2e7d32}button.main:hover,button.sub:hover{background:#5a5a5a}button:active{transform:scale(.98)}button:disabled{opacity:.5;cursor:not-allowed}
    #spectrum{position:relative;width:100%;max-width:980px;height:40px;border-radius:10px;overflow:hidden;box-shadow:0 0 15px rgba(255,255,255,.15);margin:0 0 12px;background:#000;flex-shrink:0}
    #spectrum:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);background-size:200% 100%;animation:flowRainbow 6s linear infinite}@keyframes flowRainbow{0%{background-position:0 0}100%{background-position:-100% 0}}
    .task-card{width:100%;max-width:980px;background:var(--card-bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;backdrop-filter:blur(6px);display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px}
    .task-step{background:rgba(255,255,255,.16);border-radius:8px;padding:6px 10px;font-weight:700;white-space:nowrap}.task-text{min-width:0;line-height:1.55}#taskHint{color:#ffd54f;font-size:12px;opacity:.95;margin-top:2px}.progress-dots{display:flex;gap:6px;align-items:center}
    .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.26);outline:2px solid rgba(255,255,255,.12)}.dot.active{background:var(--warn)}.dot.done{background:var(--accent);outline-color:rgba(61,220,151,.45)}.dot.warn{background:var(--danger);box-shadow:0 0 10px rgba(255,91,110,.62)}
    #stage{width:100%;max-width:980px;height:66vh;max-height:660px;min-height:520px;margin-top:10px;border-radius:12px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#0b0f14;box-shadow:0 10px 26px rgba(0,0,0,.35);touch-action:pan-y pinch-zoom;background-image:radial-gradient(circle at 78% 18%,rgba(255,255,255,.05),transparent 38%),radial-gradient(circle at 22% 80%,rgba(0,255,255,.045),transparent 42%)}
    .lab-area{position:absolute;inset:54px 10px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(#071018,#0d141c);overflow:hidden}#labCanvas{width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}
    .hud{position:absolute;left:10px;top:10px;z-index:20;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:rgba(0,0,0,.48);border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-size:12px}.tag{border:1px solid rgba(255,255,255,.26);border-radius:999px;padding:2px 8px;font-weight:700;color:#dce9ff;background:rgba(255,255,255,.06)}
    .hint-lamp{position:absolute;left:10px;top:56px;z-index:22;width:34px;height:34px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#ffd54f;font-size:16px;cursor:pointer;padding:0}.hint-lamp.flash{animation:lampFlash .6s ease}@keyframes lampFlash{50%{box-shadow:0 0 22px rgba(255,91,110,.86);border-color:var(--danger);color:#ffb0b0}}
    .hint-pop{position:absolute;left:10px;top:96px;z-index:23;width:min(330px,calc(100% - 24px));display:none;padding:10px 12px;border:1px solid rgba(255,209,102,.36);border-radius:10px;background:rgba(16,18,20,.9);color:#f4efe2;font-size:13px;line-height:1.55}.hint-pop.open{display:block}
    .dock{position:absolute;width:min(94%,330px);border-radius:12px;border:1px solid var(--line);background:var(--panel-bg);backdrop-filter:blur(6px);box-shadow:var(--dockShadow);overflow:hidden;touch-action:none;z-index:30}.dock-header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);cursor:grab;user-select:none;touch-action:none}.dockTitle{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#e7f0ff;white-space:nowrap}.iconBtn{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#e8f1ff;border-radius:7px;padding:4px 8px;font-size:12px;cursor:pointer;white-space:nowrap}.dock-body{padding:10px;max-height:310px;overflow:auto;-webkit-overflow-scrolling:touch}.collapsed .dock-body{display:none}
    .readout{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);border-radius:8px;padding:8px;margin-bottom:8px;min-height:44px}.readout b{display:block;color:#cfe4ff;font-size:12px;margin-bottom:4px}.readout span{color:#fff;font-size:13px;line-height:1.42}.controls{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0}.controls button{flex:1 1 86px}.analysis{margin-top:8px;border:1px solid rgba(91,188,255,.28);background:rgba(91,188,255,.07);color:#d9ecff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.5}.analysis:not(.ok):empty{display:none}.analysis.ok{border-color:rgba(61,220,151,.55);background:rgba(61,220,151,.12);color:#e7fff3}
    .source-line{margin:0 0 8px;color:#bcd0e4;font-size:12px;line-height:1.4}.badge{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ef476f;color:#fff;font-size:12px;transform:scale(0);opacity:0;transition:.15s}.badge.show{transform:scale(1);opacity:1;animation:badgePulse .9s ease-in-out infinite}@keyframes badgePulse{50%{transform:scale(1.14)}}
    table.record{width:100%;border-collapse:collapse;font-size:12px;color:#e8f1ff}table.record th,table.record td{border:1px solid rgba(255,255,255,.1);padding:6px;vertical-align:top;line-height:1.45;text-align:left}table.record th{background:rgba(255,255,255,.08);color:#cfe4ff}.empty{margin:8px 2px;color:#aebbd0;font-size:12px}
    .toolbar{width:100%;max-width:980px;display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0}.toast{position:absolute;left:50%;bottom:24px;transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;padding:10px 16px;border-radius:999px;background:rgba(0,0,0,.72);border:1px solid rgba(255,255,255,.12);color:#fff;font-weight:800;transition:.18s ease;z-index:80}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .checkmark{position:absolute;left:50%;top:50%;width:64px;height:64px;border-radius:50%;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;background:rgba(37,194,119,.96);box-shadow:0 0 24px rgba(37,194,119,.55);z-index:82;transition:.18s ease}.checkmark:before{content:"";position:absolute;left:19px;top:16px;width:24px;height:13px;border-left:5px solid #fff;border-bottom:5px solid #fff;transform:rotate(-45deg)}.checkmark.active{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .modal-mask{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.58);z-index:90;padding:16px}.modal{width:min(430px,92vw);padding:18px 16px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:#101317;text-align:center;box-shadow:0 18px 44px rgba(0,0,0,.42)}.modal h3{margin:4px 0 8px;font-size:21px}.modal p{margin:0;color:#cdd7e0;line-height:1.55}.modal .ok{margin-top:14px;border:none;border-radius:8px;padding:8px 18px;background:var(--accent);color:#07170f;font-weight:800;cursor:pointer}.demo-cursor{position:absolute;left:0;top:0;width:20px;height:20px;border-radius:50%;border:2px solid #fff;background:rgba(91,188,255,.8);box-shadow:0 0 14px rgba(91,188,255,.8);opacity:0;z-index:72;pointer-events:none;transition:opacity .15s}.demo-cursor.click{animation:cursorClick .34s ease}@keyframes cursorClick{50%{opacity:.55;box-shadow:0 0 0 14px rgba(255,255,255,.18),0 0 14px rgba(91,188,255,.8)}}
    .explanation{width:100%;max-width:980px;margin:14px 0 22px;color:#e8f4ff;line-height:1.66;font-size:15px}.explanation h2{margin:0 0 8px;color:#9bd3ff;font-size:20px}.explanation p{margin:6px 0}
    @media(max-width:720px){body{padding:8px}#app,#spectrum,.task-card,#stage,.toolbar,.explanation{max-width:100%}.task-card{grid-template-columns:1fr;gap:7px}.task-step{width:fit-content}#stage{height:58vh;min-height:500px;max-height:560px}.lab-area{inset:96px 8px 10px}.dock{width:calc(100% - 24px)}.dock.collapsed{width:148px}.toolbar button{flex:1 1 132px}}
  </style>
</head>
<body>
  <div id="app">
    <div id="spectrum"></div>
    <section class="task-card"><div class="task-step" id="taskStep">步骤 1 / 5</div><div class="task-text"><div id="taskText"></div><div id="taskHint"></div></div><div class="progress-dots" id="dots"></div></section>
    <main id="stage" aria-label="模拟近视眼和远视眼的矫正实验台">
      <div class="hud"><span class="tag" id="modeTag">模式：引导</span><span class="tag" id="statusTag">状态：待操作</span></div>
      <button class="hint-lamp" id="hintLamp" type="button" aria-label="查看提示">💡</button><div class="hint-pop" id="hintPop"></div>
      <div class="lab-area" id="labArea"><canvas id="labCanvas"></canvas></div>
      <section class="dock drawer control collapsed" id="controlDock"><div class="dock-header" data-drag-handle><span class="dockTitle">实验面板</span><button class="iconBtn" id="controlToggleBtn" type="button">展开</button></div><div class="dock-body">
        <div class="controls"><button class="main" id="recordBtn" type="button">记录</button><button class="sub" id="analyzeBtn" type="button">分析</button></div>
        <div class="analysis" id="analysisText"></div>
      </div></section>
      <section class="dock drawer data collapsed" id="dataDock"><div class="dock-header" data-drag-handle><span class="dockTitle">数据面板 <span class="badge" id="dataNotice">0</span></span><button class="iconBtn" id="dataToggleBtn" type="button">展开</button></div><div class="dock-body"><table class="record"><thead><tr><th>次数</th><th>眼球模型</th><th>镜片</th><th>成像位置</th></tr></thead><tbody id="recordBody"></tbody></table><div class="empty" id="emptyRecords">暂无记录。</div></div></section>
      <div class="toast" id="toast">提示</div><div class="checkmark" id="checkmark"></div><div class="demo-cursor" id="demoCursor"></div><div class="modal-mask" id="doneMask"><div class="modal"><h3>实验完成</h3><p>近视眼用凹透镜矫正，远视眼用凸透镜矫正，使像重新落在视网膜上。</p><button class="ok" id="okBtn" type="button">OK</button></div></div>
    </main>
    <div class="toolbar"><button class="sub" id="resetBtn" type="button">步骤重置</button><button class="sub" id="autoDemoBtn" type="button">自动演示</button><button class="sub" id="freeBtn" type="button">自由模式</button></div>
    <section class="explanation"><h2>实验名：模拟近视眼和远视眼的矫正</h2><p><b>关键过程：</b>改变晶状体等效焦距，观察像落在视网膜前后，再加矫正透镜。</p><p><b>结论：</b>近视眼用凹透镜矫正，远视眼用凸透镜矫正，使像重新落在视网膜上。</p></section>
  </div>
  <script>
  (() => {
    "use strict";
    const SPEC = {"id":41,"title":"模拟近视眼和远视眼的矫正","scene":"eyeCorrection","family":"光学","textbook":"八年级上册 第五章 透镜及其应用；PDF 搜索命中“近视眼/远视眼”第134-136页","apparatus":"眼球模型、凸透镜、凹透镜、视网膜屏、平行光源、镜片插槽","keyPoint":"改变眼球模型等效焦距，观察像落在视网膜前后，再插入矫正透镜。","conclusion":"近视眼用凹透镜矫正，远视眼用凸透镜矫正，使像重新落在视网膜上。","scenarios":[{"key":"myopiaRaw","label":"近视眼成像","action":"把眼模型下方滑杆从正常拖到近视，保持镜片未插入。","note":"近视眼会聚能力偏强，像落在视网膜前。","defect":"myopia","correction":null,"image":"视网膜前"},{"key":"myopiaCorrect","label":"凹透镜矫正","action":"把凹透镜拖入眼前插槽。","note":"凹透镜先发散光线，使像后移到视网膜上。","defect":"myopia","correction":"concave","image":"视网膜上"},{"key":"hyperopiaRaw","label":"远视眼成像","action":"把眼模型下方滑杆从正常拖到远视，保持镜片未插入。","note":"远视眼会聚能力偏弱，像落在视网膜后。","defect":"hyperopia","correction":null,"image":"视网膜后"},{"key":"hyperopiaCorrect","label":"凸透镜矫正","action":"把凸透镜拖入眼前插槽。","note":"凸透镜增强会聚，使像提前回到视网膜上。","defect":"hyperopia","correction":"convex","image":"视网膜上"}]};
    const $ = s => document.querySelector(s);
    const stage = $("#stage"), labArea = $("#labArea"), canvas = $("#labCanvas"), ctx = canvas.getContext("2d");
    const taskStep = $("#taskStep"), taskText = $("#taskText"), taskHint = $("#taskHint"), dots = $("#dots"), modeTag = $("#modeTag"), statusTag = $("#statusTag");
    const hintLamp = $("#hintLamp"), hintPop = $("#hintPop"), controlDock = $("#controlDock"), dataDock = $("#dataDock"), controlToggleBtn = $("#controlToggleBtn"), dataToggleBtn = $("#dataToggleBtn");
    const recordBtn = $("#recordBtn"), analyzeBtn = $("#analyzeBtn"), analysisText = $("#analysisText"), recordBody = $("#recordBody"), emptyRecords = $("#emptyRecords"), dataNotice = $("#dataNotice");
    const resetBtn = $("#resetBtn"), autoDemoBtn = $("#autoDemoBtn"), freeBtn = $("#freeBtn"), toast = $("#toast"), checkmark = $("#checkmark"), doneMask = $("#doneMask"), okBtn = $("#okBtn"), demoCursor = $("#demoCursor");
    const state = { currentTask:0, completed:false, freeMode:false, autoPlaying:false, autoCancel:false, drawerDrag:null, stepWarning:false, successCooldown:false, timers:new Set(), scenarioIndex:0, operationCount:0, records:[], unseenRecords:0, analysisDone:false, width:0, height:0, stageWidth:0, stageHeight:0, drag:false, dragTarget:null, model:"normal", correction:null, modelTouched:false, lensTouched:false, phase:0, moved:false };
    const tasks = SPEC.scenarios.map((s) => ({ text:"调节并记录：" + s.label, hint:s.action, detail:s.note, expected:s.key, check:() => hasRecord(s.key) })).concat([{ text:"分析实验结论", hint:"四组记录完成后点击分析。", detail:SPEC.conclusion, check:() => state.analysisDone }]);
    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
    function schedule(fn, ms){ const id = setTimeout(() => { state.timers.delete(id); fn(); }, ms); state.timers.add(id); return id; }
    function clearTimers(){ for (const id of state.timers) clearTimeout(id); state.timers.clear(); }
    function currentScenario(){ return SPEC.scenarios[state.scenarioIndex]; }
    function hasRecord(key){ return state.records.some(r => r.key === key); }
    function initDots(){ dots.innerHTML = ""; tasks.forEach(() => { const d = document.createElement("span"); d.className = "dot"; dots.appendChild(d); }); }
    function updateDots(){ Array.from(dots.children).forEach((dot, i) => { dot.classList.toggle("done", state.completed || i < state.currentTask); dot.classList.toggle("active", !state.completed && i === state.currentTask && !state.stepWarning); dot.classList.toggle("warn", !state.completed && i === state.currentTask && state.stepWarning); }); }
    function setStepUI(i){ state.currentTask = clamp(i, 0, tasks.length - 1); if (state.currentTask < SPEC.scenarios.length) state.scenarioIndex = state.currentTask; state.stepWarning = false; const t = tasks[state.currentTask]; taskStep.textContent = "步骤 " + (state.currentTask + 1) + " / " + tasks.length; taskText.textContent = t.text; taskHint.textContent = t.hint; hintPop.textContent = t.detail; updateDots(); updateReadouts(); draw(); }
    function setModeLabel(){ modeTag.textContent = state.autoPlaying ? "模式：自动演示" : (state.freeMode ? "模式：自由" : "模式：引导"); }
    function updateStatus(text){ statusTag.textContent = "状态：" + (text || (state.completed ? "已完成" : state.autoPlaying ? "自动演示" : actualStateLabel())); }
    function showToast(msg){ toast.textContent = msg; toast.classList.add("show"); clearTimeout(showToast.t); showToast.t = setTimeout(() => toast.classList.remove("show"), 1500); }
    function showCheck(){ checkmark.classList.add("active"); clearTimeout(showCheck.t); showCheck.t = setTimeout(() => checkmark.classList.remove("active"), 560); }
    function warnStep(msg){ state.stepWarning = true; updateDots(); hintLamp.classList.remove("flash"); void hintLamp.offsetWidth; hintLamp.classList.add("flash"); showToast(msg); schedule(() => { state.stepWarning = false; updateDots(); }, 1200); }
    function markOperation(){ state.operationCount += 1; state.phase = 1; }
    function updateScenarioFromApparatus(){ if (state.model === "normal") return; if (state.model === "myopia") state.scenarioIndex = state.correction === "concave" ? 1 : 0; else state.scenarioIndex = state.correction === "convex" ? 3 : 2; }
    function setScenario(i, mark){ state.scenarioIndex = clamp(i, 0, SPEC.scenarios.length - 1); const s = currentScenario(); state.model = s.defect; state.correction = s.correction; if (mark) markOperation(); updateReadouts(); updateStatus(currentScenario().label); draw(); }
    function updateReadouts(){ currentScenario(); }
    function scenarioReady(key){ const s = SPEC.scenarios.find(item => item.key === key) || currentScenario(); const modelOk = state.model === s.defect; const correctionOk = state.correction === s.correction; const operated = s.correction ? state.lensTouched : state.modelTouched; return modelOk && correctionOk && operated; }
    function lensName(type){ return type === "concave" ? "凹透镜" : type === "convex" ? "凸透镜" : "未加镜片"; }
    function modelName(type){ return type === "myopia" ? "近视眼" : type === "hyperopia" ? "远视眼" : "正常眼"; }
    function recordForScenario(s){ return { key:s.key, model:modelName(s.defect), lens:lensName(s.correction), image:s.image }; }
    function passStepIfReady(opts){ if (state.freeMode || state.completed || state.successCooldown) return false; if (!tasks[state.currentTask].check()) { if (!opts || !opts.quiet) warnStep("当前步骤证据还不完整。"); return false; } state.successCooldown = true; schedule(() => { state.successCooldown = false; }, 400); showCheck(); if (state.currentTask >= tasks.length - 1) { state.completed = true; setDrawerCollapsed(controlDock, true); setDrawerCollapsed(dataDock, false); doneMask.style.display = "flex"; updateStatus(); updateDots(); } else setStepUI(state.currentTask + 1); return true; }
    function recordObservation(opts){ if (!state.operationCount && !(opts && opts.auto)) { warnStep("先把眼球模型从正常调到近视或远视。"); return false; } if (state.model === "normal") { warnStep("当前是正常眼，请先调到近视眼或远视眼。"); return false; } updateScenarioFromApparatus(); const s = currentScenario(); const task = tasks[state.currentTask]; if (!state.freeMode && task.expected && task.expected !== s.key) { warnStep("当前步骤应记录：" + task.text.replace("调节并记录：","")); return false; } if (!scenarioReady(s.key)) { warnStep("请先把模型和镜片调到当前步骤要求。"); return false; } if (!hasRecord(s.key)) { state.records.push(recordForScenario(s)); if (dataDock.classList.contains("collapsed")) { state.unseenRecords += 1; updateBadge(); } renderRecords(); showToast("已记录"); } else if (!opts || !opts.auto) showToast("这组已记录"); passStepIfReady({ quiet:true }); return true; }
    function analyzeConclusion(){ if (!SPEC.scenarios.every(s => hasRecord(s.key))) { warnStep("请先补齐四组记录。"); return false; } state.analysisDone = true; analysisText.classList.add("ok"); analysisText.textContent = SPEC.conclusion; showToast("已分析"); passStepIfReady({ quiet:true }); return true; }
    function renderRecords(){ recordBody.innerHTML = ""; state.records.forEach((r, index) => { const tr = document.createElement("tr"); [String(index + 1), r.model, r.lens, r.image].forEach(v => { const td = document.createElement("td"); td.textContent = v; tr.appendChild(td); }); recordBody.appendChild(tr); }); emptyRecords.style.display = state.records.length ? "none" : "block"; }
    function updateBadge(){ dataNotice.textContent = String(state.unseenRecords); dataNotice.classList.toggle("show", state.unseenRecords > 0 && dataDock.classList.contains("collapsed")); }
    function resizeCanvas(){ const sr = stage.getBoundingClientRect(), r = labArea.getBoundingClientRect(), dpr = window.devicePixelRatio || 1; const lw = r.width || labArea.clientWidth || Math.max(1, sr.width - 20); const lh = r.height || labArea.clientHeight || Math.max(1, sr.height - 64); state.width = lw; state.height = lh; state.stageWidth = sr.width; state.stageHeight = sr.height; canvas.width = Math.round(lw * dpr); canvas.height = Math.round(lh * dpr); canvas.style.width = lw + "px"; canvas.style.height = lh + "px"; ctx.setTransform(dpr,0,0,dpr,0,0); fitDrawers(); draw(); }
    function setDrawerCollapsed(drawer, collapsed){ bringDrawerToFront(drawer); drawer.classList.toggle("collapsed", collapsed); (drawer === controlDock ? controlToggleBtn : dataToggleBtn).textContent = collapsed ? "展开" : "收起"; if (drawer === dataDock && !collapsed) { state.unseenRecords = 0; updateBadge(); } fitDrawers(); if (state.width && state.height) draw(); }
    function bringDrawerToFront(drawer){ const other = drawer === controlDock ? dataDock : controlDock; drawer.style.zIndex = "36"; other.style.zIndex = "30"; }
    function fitDrawers(){
      const sw = state.stageWidth || stage.clientWidth, sh = state.stageHeight || stage.clientHeight, mobile = sw <= 720;
      [controlDock, dataDock].forEach(d => { if (!d.dataset.moved) d.style.width = ""; });

    function onPointerDown(e){

    async function clickPanelButton(btn){setDrawerCollapsed(controlDock,false);bringDrawerToFront(controlDock);await sleep(180);moveCursorToElement(btn);clickCursor();await sleep(360);}

    async function animateModel(target){
      const r = benchArea(state.width,state.height), g = eyeGeom(r);
      const from = modelStopX(g,state.model);
      const to = modelStopX(g,target);
      markOperation();
      moveCursorTo(from,g.trackY);
      clickCursor();
      await sleep(260);
      for(let k=0;k<=12;k++){
        if(state.autoCancel) throw new Error("AUTO_CANCELLED");
        const t=k/12, ease=.5-Math.cos(Math.PI*t)/2;
        moveCursorTo(from+(to-from)*ease,g.trackY+Math.sin(t*Math.PI)*18*g.s);
        if(t>.45) state.model = target;
        state.modelTouched = true;
        if(t>.55) state.correction = null;
        updateScenarioFromApparatus();
        draw();
        await sleep(320);
      }
      state.model = target;
      state.correction = null;
      state.modelTouched = true;
      updateScenarioFromApparatus();
      draw();
    }

        const t=k/14, ease=.5-Math.cos(Math.PI*t)/2;

        state.lensTouched = true;
        updateScenarioFromApparatus();
        draw();
        await sleep(320);
      }
      state.correction = type;
      state.lensTouched = true;
      updateScenarioFromApparatus();
      draw();
