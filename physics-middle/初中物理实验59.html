<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>初中物理实验59｜观察热机的工作过程</title>
  <style>
    :root {
      --bg:#1a1a1a; --ink:#fff; --card-bg:rgba(255,255,255,.08);
      --panel-bg:rgba(14,20,25,.72); --line:rgba(255,255,255,.13);
      --accent:#39d8ad; --blue:#5bbcff; --warn:#ffd166; --danger:#ff6478;
      --shadow:0 14px 36px rgba(0,0,0,.42);
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{margin:0;padding:10px;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;display:flex;flex-direction:column;align-items:center}
    #app{width:100%;max-width:980px;margin:0 auto 34px}
    button{font:inherit}
    button.main,button.sub{border:0;border-radius:8px;padding:8px 12px;color:#fff;background:#444;cursor:pointer;font-size:13px;font-weight:800;transition:.16s;touch-action:manipulation}
    button.main{background:#278a49}
    button:hover:not(:disabled){filter:brightness(1.13)}
    button:active:not(:disabled){transform:scale(.98)}
    button:disabled{opacity:.38;cursor:not-allowed}
    #spectrum{position:relative;width:100%;height:24px;border-radius:10px;overflow:hidden;box-shadow:0 0 15px rgba(255,255,255,.12);margin:0 0 12px;background:#050505}
    #spectrum::before{content:"";position:absolute;inset:0;background-image:linear-gradient(90deg,#ff4c4c 0%,#ff9a3d 5.5%,#f7e94c 11%,#54e86d 17%,#40e0d0 24%,#4aa3ff 31%,#8757ff 38%,#ec5cff 44%,#ff4c4c 50%,#ff9a3d 55.5%,#f7e94c 61%,#54e86d 67%,#40e0d0 74%,#4aa3ff 81%,#8757ff 88%,#ec5cff 94%,#ff4c4c 100%);background-size:200% 100%;background-repeat:repeat;filter:saturate(1.18) brightness(1.04);opacity:.96;animation:flowRainbow 8s linear infinite}
    @keyframes flowRainbow{from{background-position:0 0}to{background-position:-100% 0}}
    .task-card{width:100%;min-height:68px;background:var(--card-bg);border:1px solid var(--line);border-radius:12px;padding:11px 14px;display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;backdrop-filter:blur(6px)}
    .task-step{background:rgba(255,255,255,.16);border-radius:8px;padding:7px 10px;font-weight:900;white-space:nowrap}
    .task-text{min-width:0;line-height:1.35;font-weight:800}
    #taskHint{color:#ffd54f;font-size:12px;margin-top:3px;font-weight:700}
    .progress-dots{display:flex;gap:6px;align-items:center}
    .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.26);outline:2px solid rgba(255,255,255,.12)}
    .dot.active{background:var(--warn)}
    .dot.done{background:var(--accent);outline-color:rgba(57,216,173,.45)}
    .dot.warn{background:var(--danger);box-shadow:0 0 10px rgba(255,100,120,.62)}
    #stage{width:100%;height:590px;margin-top:10px;border-radius:12px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#081018;box-shadow:0 10px 26px rgba(0,0,0,.35);touch-action:pan-y pinch-zoom}
    .lab-area{position:absolute;inset:54px 10px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.08);background:#061018;overflow:hidden}
    #labCanvas{width:100%;height:100%;display:block;touch-action:none;cursor:grab}
    #labCanvas.dragging{cursor:grabbing}
    .hud{position:absolute;left:10px;top:10px;z-index:20;display:flex;gap:8px;align-items:center;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.52);font-size:12px}
    .tag{border:1px solid rgba(255,255,255,.26);border-radius:999px;padding:3px 8px;font-weight:800;color:#dce9ff;background:rgba(255,255,255,.06)}
    #modeTag{border-color:rgba(61,220,151,.45)}
    .hint-lamp{position:absolute;left:10px;top:56px;z-index:22;width:34px;height:34px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#ffd54f;font-size:17px;cursor:pointer;padding:0}
    .hint-lamp.flash{animation:lampFlash .6s ease}
    @keyframes lampFlash{50%{box-shadow:0 0 22px rgba(255,100,120,.86);border-color:var(--danger)}}
    .hint-pop{position:absolute;left:10px;top:96px;z-index:23;width:min(340px,calc(100% - 24px));display:none;padding:10px 12px;border:1px solid rgba(255,209,102,.36);border-radius:10px;background:rgba(16,18,20,.92);color:#f4efe2;font-size:13px;line-height:1.55}
    .hint-pop.open{display:block}
    .dock{position:absolute;width:330px;border-radius:12px;border:1px solid var(--line);background:var(--panel-bg);backdrop-filter:blur(8px);box-shadow:var(--shadow);overflow:hidden;touch-action:none;z-index:30}
    .dock.collapsed{width:154px}
    .dock-header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.045);cursor:grab;user-select:none;touch-action:none}
    .dockTitle{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:900;color:#e7f0ff;white-space:nowrap}
    .iconBtn{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#e8f1ff;border-radius:7px;padding:4px 8px;font-size:12px;cursor:pointer;white-space:nowrap}
    .dock-body{padding:10px;max-height:330px;overflow:auto}
    .collapsed .dock-body{display:none}
    .controls{display:flex;gap:8px;margin:0}
    .controls button{flex:1}
    .analysis{display:none;border:1px solid rgba(91,188,255,.28);background:rgba(91,188,255,.07);color:#d9ecff;border-radius:8px;padding:8px 10px;font-size:13px;line-height:1.5}
    .analysis.ok{display:block;margin-top:8px;border-color:rgba(57,216,173,.55);background:rgba(57,216,173,.12);color:#e7fff6}
    .badge{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ef476f;color:#fff;font-size:11px;transform:scale(0);opacity:0;transition:.15s}
    .badge.show{transform:scale(1);opacity:1;animation:badgePulse .9s ease-in-out infinite}
    @keyframes badgePulse{50%{transform:scale(1.14)}}
    table.record{width:100%;border-collapse:collapse;font-size:11px;color:#e8f1ff}
    table.record th,table.record td{border:1px solid rgba(255,255,255,.1);padding:6px;vertical-align:top;line-height:1.4;text-align:left}
    table.record th{background:rgba(255,255,255,.08);color:#cfe4ff}
    .empty{margin:8px 2px;color:#aebbd0;font-size:12px}
    .toolbar{width:100%;display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 0}
    .toast{position:absolute;left:50%;bottom:24px;transform:translateX(-50%) translateY(18px);opacity:0;pointer-events:none;padding:10px 16px;border-radius:999px;background:rgba(0,0,0,.76);border:1px solid rgba(255,255,255,.12);color:#fff;font-weight:900;transition:.18s ease;z-index:80;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .checkmark{position:absolute;left:50%;top:50%;width:64px;height:64px;border-radius:50%;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;background:rgba(37,194,119,.96);box-shadow:0 0 24px rgba(37,194,119,.55);z-index:82;transition:.18s ease}
    .checkmark::before{content:"";position:absolute;left:19px;top:16px;width:24px;height:13px;border-left:5px solid #fff;border-bottom:5px solid #fff;transform:rotate(-45deg)}
    .checkmark.active{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .modal-mask{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.68);z-index:90;padding:16px}
    .modal{width:min(430px,92vw);padding:20px 18px;border-radius:14px;border:1px solid rgba(91,188,255,.36);background:linear-gradient(160deg,#17334a,#132639);text-align:center;box-shadow:0 18px 44px rgba(0,0,0,.5)}
    .modal h3{margin:2px 0 9px;font-size:21px;color:#e8f5ff}
    .modal p{margin:0;color:#cfe2f2;line-height:1.65}
    .modal .ok{margin-top:15px;border:0;border-radius:8px;padding:8px 20px;background:var(--accent);color:#052218;font-weight:900;cursor:pointer}
    .demo-cursor{position:absolute;left:0;top:0;width:22px;height:22px;border-radius:50%;border:2px solid #fff;background:rgba(91,188,255,.8);box-shadow:0 0 14px rgba(91,188,255,.8);opacity:0;z-index:72;pointer-events:none;transition:opacity .15s}
    .demo-cursor.click{animation:cursorClick .34s ease}
    @keyframes cursorClick{50%{transform:scale(1.85);opacity:.55}}
    .mobile-tabs,.sheet-close{display:none}
    .explanation{width:100%;margin:14px 0 22px;color:#e8f4ff;line-height:1.66;font-size:15px}
    .explanation h2{margin:0 0 8px;color:#9bd3ff;font-size:20px}
    .explanation p{margin:6px 0}
    .formula{display:inline-block;margin-right:10px;padding:4px 9px;border-radius:6px;background:rgba(255,255,255,.07);font-family:Georgia,serif}
    @media(max-width:720px){
      body{padding:8px}
      #spectrum{height:20px;margin-bottom:10px}
      .task-card{grid-template-columns:1fr;gap:6px}
      .task-step{width:max-content}
      .progress-dots{justify-content:flex-start}
      #stage{height:650px}
      .lab-area{inset:96px 8px 10px}
      .toolbar{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:8px;padding:6px;border:1px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.035)}
      .toolbar button{min-width:0;padding:8px 5px;font-size:12px}
      .mobile-tabs{position:absolute;left:12px;right:12px;bottom:8px;z-index:44;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:5px;border:1px solid rgba(91,188,255,.24);border-radius:11px;background:rgba(9,12,16,.92);backdrop-filter:blur(10px)}
      .mobile-tab{position:relative;border:0;border-radius:8px;padding:9px 10px;background:rgba(255,255,255,.04);color:#cfe4ff;font-weight:900}
      .mobile-tab.active{background:rgba(57,216,173,.16);color:#effff7;box-shadow:inset 0 0 0 1px rgba(57,216,173,.56)}
      .mobile-badge{position:absolute;top:-7px;right:14px;display:none;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ff3b30;color:#fff;font-size:11px}
      .mobile-badge.show{display:grid}
      .dock{width:calc(100% - 24px)}
      .dock.mobile-sheet{bottom:56px;border-color:rgba(91,188,255,.32);border-radius:12px 12px 0 0;background:linear-gradient(180deg,rgba(22,44,64,.97),rgba(9,21,33,.97));touch-action:auto}
      .dock.mobile-sheet .dock-header{display:none}
      .dock.mobile-sheet .dock-body{display:grid;max-height:190px;padding:8px;overflow:auto}
      .dock.mobile-sheet.collapsed{display:none}
      .sheet-close{display:inline-grid;place-items:center;width:36px;height:36px;border:1px solid rgba(255,255,255,.14);border-radius:50%;background:rgba(255,255,255,.06);color:#e3f0ff;font-weight:900}
      .control.mobile-sheet .dock-body{grid-template-columns:minmax(0,1fr) 36px;gap:8px}
      .control.mobile-sheet .controls{grid-column:1;grid-row:1;margin:0}
      .control.mobile-sheet .sheet-close{grid-column:2;grid-row:1}
      .control.mobile-sheet .analysis{grid-column:1/-1}
      .data.mobile-sheet .dock-body{grid-template-columns:minmax(0,1fr) 36px;gap:8px}
      .data.mobile-sheet .sheet-close{grid-column:2;grid-row:1}
      .data.mobile-sheet table.record{grid-column:1/-1;display:block}
      .data.mobile-sheet table.record thead{display:none}
      .data.mobile-sheet table.record tbody{display:grid;gap:8px}
      .data.mobile-sheet table.record tr{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px;border:1px solid rgba(255,255,255,.1);border-radius:9px;background:rgba(255,255,255,.045)}
      .data.mobile-sheet table.record td{display:grid;gap:2px;border:0;padding:0;font-size:11px}
      .data.mobile-sheet table.record td::before{content:attr(data-label);color:#8fb4d8;font-size:9px;font-weight:900}
      .data.mobile-sheet table.record td:first-child{grid-column:1/-1;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:5px}
      .explanation h2{font-size:19px}
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="spectrum" aria-hidden="true"></div>
    <section class="task-card">
      <div class="task-step" id="taskStep">关卡 1 / 5</div>
      <div class="task-text"><div id="taskText"></div><div id="taskHint"></div></div>
      <div class="progress-dots" id="dots"></div>
    </section>

    <main id="stage" aria-label="观察热机的工作过程互动实验台">
      <div class="hud"><span class="tag" id="modeTag">模式：闯关模式 · 关卡 1/5</span><span class="tag" id="statusTag">状态：等待转动飞轮</span></div>
      <button class="hint-lamp" id="hintLamp" type="button" aria-label="查看提示">💡</button>
      <div class="hint-pop" id="hintPop"></div>
      <div class="lab-area" id="labArea"><canvas id="labCanvas" aria-label="透明四冲程汽油机模型"></canvas></div>

      <section class="dock control collapsed" id="controlDock">
        <div class="dock-header" data-drag-handle><span class="dockTitle">实验面板</span><button class="iconBtn" id="controlToggleBtn" type="button">展开</button></div>
        <div class="dock-body">
          <div class="controls"><button class="main" id="recordBtn" type="button">记录本冲程</button><button class="sub" id="analyzeBtn" type="button">分析结论</button></div>
          <div class="analysis" id="analysisText">完成四个冲程后分析一个工作循环。</div>
          <button class="sheet-close" id="controlSheetCloseBtn" type="button" aria-label="关闭实验面板">×</button>
        </div>
      </section>

      <section class="dock data collapsed" id="dataDock">
        <div class="dock-header" data-drag-handle><span class="dockTitle">数据面板 <span class="badge" id="dataNotice">0</span></span><button class="iconBtn" id="dataToggleBtn" type="button">展开</button></div>
        <div class="dock-body">
          <table class="record"><thead><tr><th>冲程</th><th>活塞与气门</th><th>能量/作用</th></tr></thead><tbody id="recordBody"></tbody></table>
          <div class="empty" id="emptyRecords">尚未记录冲程。</div>
          <button class="sheet-close" id="dataSheetCloseBtn" type="button" aria-label="关闭数据面板">×</button>
        </div>
      </section>

      <div class="mobile-tabs" id="mobileTabs">
        <button class="mobile-tab" id="mobileControlTab" type="button">实验面板</button>
        <button class="mobile-tab" id="mobileDataTab" type="button">数据面板 <span class="mobile-badge" id="dataTabBadge">0</span></button>
      </div>
      <div class="toast" id="toast">提示</div>
      <div class="checkmark" id="checkmark"></div>
      <div class="demo-cursor" id="demoCursor"></div>
      <div class="modal-mask" id="doneMask">
        <div class="modal">
          <h3>实验完成</h3>
          <p>一个工作循环包含四个冲程，曲轴和飞轮转两圈，活塞往复两次，只有做功冲程对外做功。</p>
          <button class="ok" id="okBtn" type="button">OK</button>
        </div>
      </div>
    </main>

    <div class="toolbar">
      <button class="sub" id="resetBtn" type="button">重置关卡</button>
      <button class="sub" id="autoDemoBtn" type="button">演示模式</button>
      <button class="sub" id="freeBtn" type="button">自由模式</button>
    </div>

    <section class="explanation">
      <h2>实验名：观察热机的工作过程</h2>
      <p>顺时针拖动飞轮，观察活塞、进气门、排气门和缸内气体在吸气、压缩、做功、排气四个冲程中的变化。</p>
      <p><span class="formula">1 个循环 = 4 个冲程</span><span class="formula">飞轮转 2 圈</span><span class="formula">对外做功 1 次</span></p>
      <p>压缩冲程中机械能转化为内能；做功冲程中燃气的内能转化为机械能。</p>
    </section>
  </div>

  <script>
  (() => {
    "use strict";
    const $ = (selector) => document.querySelector(selector);
    const stage = $("#stage"), labArea = $("#labArea"), canvas = $("#labCanvas"), ctx = canvas.getContext("2d");
    const taskStep = $("#taskStep"), taskText = $("#taskText"), taskHint = $("#taskHint"), dots = $("#dots");
    const modeTag = $("#modeTag"), statusTag = $("#statusTag"), hintLamp = $("#hintLamp"), hintPop = $("#hintPop");
    const controlDock = $("#controlDock"), dataDock = $("#dataDock"), controlToggleBtn = $("#controlToggleBtn"), dataToggleBtn = $("#dataToggleBtn");
    const recordBtn = $("#recordBtn"), analyzeBtn = $("#analyzeBtn"), analysisText = $("#analysisText"), recordBody = $("#recordBody"), emptyRecords = $("#emptyRecords");
    const dataNotice = $("#dataNotice"), dataTabBadge = $("#dataTabBadge"), resetBtn = $("#resetBtn"), autoDemoBtn = $("#autoDemoBtn"), freeBtn = $("#freeBtn");
    const toast = $("#toast"), checkmark = $("#checkmark"), doneMask = $("#doneMask"), okBtn = $("#okBtn"), demoCursor = $("#demoCursor");
    const mobileControlTab = $("#mobileControlTab"), mobileDataTab = $("#mobileDataTab"), controlSheetCloseBtn = $("#controlSheetCloseBtn"), dataSheetCloseBtn = $("#dataSheetCloseBtn");

    const STROKES = [
      { key:"intake", name:"吸气冲程", piston:"向下", intake:true, exhaust:false, gas:"汽油和空气的混合物进入汽缸", energy:"飞轮带动活塞吸入混合气", color:"#64d8ff" },
      { key:"compression", name:"压缩冲程", piston:"向上", intake:false, exhaust:false, gas:"混合气被压缩，温度升高", energy:"机械能转化为内能", color:"#ffd166" },
      { key:"power", name:"做功冲程", piston:"向下", intake:false, exhaust:false, gas:"火花塞点火，高温燃气推动活塞", energy:"内能转化为机械能，对外做功", color:"#ff7657" },
      { key:"exhaust", name:"排气冲程", piston:"向上", intake:false, exhaust:true, gas:"燃烧后的废气排出汽缸", energy:"飞轮带动活塞排出废气", color:"#a9b5bf" }
    ];
    const TASKS = STROKES.map((stroke,index) => ({
      text:"观察"+stroke.name,
      hint:"顺时针拖动飞轮半圈，使活塞"+stroke.piston+"。",
      detail:index===0?"进气门打开，排气门关闭，汽油和空气的混合物进入汽缸。":index===1?"两个气门都关闭，活塞压缩混合气，机械能转化为内能。":index===2?"两个气门都关闭，火花塞点火，高温燃气推动活塞向下做功。":"进气门关闭、排气门打开，活塞向上排出废气。"
    })).concat([{ text:"归纳一个工作循环", hint:"打开实验面板并点击“分析结论”。", detail:"比较四个冲程，关注飞轮转数、活塞往复次数和做功次数。" }]);

    const state = {
      currentTask:0, completed:false, freeMode:false, autoPlaying:false, autoCancel:false, autoToken:0,
      crankDegrees:0, strokeReady:-1, dragging:false, lastPointerAngle:0, warning:false, successCooldown:false,
      records:[], freeRecords:[], unseenRecords:0, analysisDone:false, timers:new Set(), rafId:0, drawerDrag:null,
      width:0, height:0, mobile:false, lastError:null, sparkUntil:0
    };

    function clamp(value,min,max){ return Math.max(min,Math.min(max,value)); }
    function sleep(ms){ return new Promise((resolve)=>setTimeout(resolve,ms)); }
    function schedule(fn,ms){ const id=setTimeout(()=>{state.timers.delete(id);fn();},ms);state.timers.add(id);return id; }
    function clearTimers(){ for(const id of state.timers)clearTimeout(id);state.timers.clear(); }
    function sparkActive(){ return performance.now()<state.sparkUntil; }
    function triggerSpark(){
      state.sparkUntil=performance.now()+160;draw();
      schedule(()=>{if(!sparkActive())draw();},180);
    }
    function maybeTriggerSpark(previousDegrees,nextDegrees){
      if(nextDegrees<=previousDegrees)return;
      const crossing=360+Math.ceil((previousDegrees-360)/720)*720;
      if(previousDegrees<=crossing&&nextDegrees>crossing)triggerSpark();
    }
    function activeRecords(){ return state.freeMode?state.freeRecords:state.records; }
    function guidedStroke(){ return STROKES[Math.min(state.currentTask,3)]; }
    function strokeIndexForDegrees(degrees){
      if(!state.freeMode && state.strokeReady>=0)return state.strokeReady;
      const normalized=((degrees%720)+720)%720;
      return Math.min(3,Math.floor(normalized/180));
    }
    function currentStroke(){ return STROKES[strokeIndexForDegrees(state.crankDegrees)]; }
    function targetDegrees(){ return (Math.min(state.currentTask,3)+1)*180; }
    function hasRecord(key){ return state.records.some((record)=>record.key===key); }

    function initDots(){ dots.innerHTML="";TASKS.forEach(()=>{const dot=document.createElement("span");dot.className="dot";dots.appendChild(dot);}); }
    function updateDots(){
      Array.from(dots.children).forEach((dot,index)=>{
        dot.classList.toggle("done",state.completed||(!state.freeMode&&index<state.currentTask));
        dot.classList.toggle("active",!state.completed&&!state.freeMode&&index===state.currentTask&&!state.warning);
        dot.classList.toggle("warn",!state.completed&&!state.freeMode&&index===state.currentTask&&state.warning);
      });
    }
    function setTaskUI(index){
      state.currentTask=clamp(index,0,TASKS.length-1);
      if(state.freeMode)return;
      const task=TASKS[state.currentTask];
      taskStep.textContent="关卡 "+(state.currentTask+1)+" / "+TASKS.length;
      taskText.textContent=task.text;taskHint.textContent=task.hint;hintPop.textContent=task.detail;
      updateDots();updateStatus();updateReadouts();draw();
    }
    function setModeLabel(){

    function draw(){if(!state.width||!state.height)return;const g=geometry();ctx.clearRect(0,0,g.w,g.h);drawBackground(g);drawEngine(g);}
    function resizeCanvas(){
      const rect=labArea.getBoundingClientRect(),dpr=Math.min(window.devicePixelRatio||1,2);canvas.width=Math.max(1,Math.round(rect.width*dpr));canvas.height=Math.max(1,Math.round(rect.height*dpr));canvas.style.width=rect.width+"px";canvas.style.height=rect.height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);state.width=rect.width;state.height=rect.height;state.mobile=window.matchMedia("(max-width:720px)").matches;fitDrawers();draw();
    }
    function pointerPoint(event){const rect=canvas.getBoundingClientRect();return{x:event.clientX-rect.left,y:event.clientY-rect.top};}
    function angleAt(point,g){return Math.atan2(point.y-g.flyY,point.x-g.flyX);}
    function flywheelHit(point,g){return Math.hypot(point.x-g.flyX,point.y-g.flyY)<=g.flyR*1.34;}
    function pointerDown(event){
      if(state.autoPlaying||state.completed)return;const point=pointerPoint(event),g=geometry();
      if(!flywheelHit(point,g)){showToast("请拖动右侧飞轮");return;}
      state.dragging=true;state.lastPointerAngle=angleAt(point,g);canvas.classList.add("dragging");canvas.setPointerCapture(event.pointerId);event.preventDefault();
    }
    function pointerMove(event){
      if(!state.dragging||state.autoPlaying)return;const point=pointerPoint(event),g=geometry(),angle=angleAt(point,g);let delta=(angle-state.lastPointerAngle)*180/Math.PI;
      if(delta<-180)delta+=360;if(delta>180)delta-=360;state.lastPointerAngle=angle;
      if(!state.freeMode)delta=Math.max(0,delta);
      if(Math.abs(delta)<.2)return;
      const previousDegrees=state.crankDegrees;
      if(state.freeMode){state.crankDegrees+=delta;state.strokeReady=-1;}
      else if(state.currentTask<4&&state.strokeReady<0){
        state.crankDegrees=clamp(state.crankDegrees+delta,state.currentTask*180,targetDegrees());
        if(state.crankDegrees>=targetDegrees()-.2){state.crankDegrees=targetDegrees();state.strokeReady=state.currentTask;showCheck();showToast(guidedStroke().name+"完成，请记录");updateStatus();}
      }
      maybeTriggerSpark(previousDegrees,state.crankDegrees);
      updateReadouts();draw();event.preventDefault();
    }
    function pointerUp(event){
      if(!state.dragging)return;state.dragging=false;canvas.classList.remove("dragging");try{canvas.releasePointerCapture(event.pointerId);}catch(error){console.warn("释放飞轮拖动失败",error);}event.preventDefault();
    }

    function setDrawerCollapsed(drawer,collapsed,options){
      const opts=options||{};drawer.classList.toggle("collapsed",collapsed);(drawer===controlDock?controlToggleBtn:dataToggleBtn).textContent=collapsed?"展开":"收起";
      if(drawer===dataDock&&!collapsed){state.unseenRecords=0;updateBadge();}if(!opts.quiet)fitDrawers();updateMobileTabs();
    }
    function fitDrawers(){
      const sw=stage.clientWidth;[controlDock,dataDock].forEach((drawer)=>drawer.classList.toggle("mobile-sheet",state.mobile));
      if(state.mobile)return;
      if(!controlDock.dataset.moved){controlDock.style.left=Math.max(10,sw-controlDock.offsetWidth-10)+"px";controlDock.style.top="58px";}
      if(!dataDock.dataset.moved){dataDock.style.left=Math.max(10,sw-dataDock.offsetWidth-10)+"px";dataDock.style.top=(controlDock.offsetTop+controlDock.offsetHeight+8)+"px";}
    }
    function bindDrawer(drawer){
      const header=drawer.querySelector("[data-drag-handle]");
      header.addEventListener("pointerdown",(event)=>{if(state.mobile||event.target.closest("button"))return;const r=drawer.getBoundingClientRect();state.drawerDrag={drawer,dx:event.clientX-r.left,dy:event.clientY-r.top};drawer.dataset.moved="1";header.setPointerCapture(event.pointerId);});
      header.addEventListener("pointermove",(event)=>{if(!state.drawerDrag||state.drawerDrag.drawer!==drawer)return;const sr=stage.getBoundingClientRect();drawer.style.left=clamp(event.clientX-sr.left-state.drawerDrag.dx,6,sr.width-drawer.offsetWidth-6)+"px";drawer.style.top=clamp(event.clientY-sr.top-state.drawerDrag.dy,6,sr.height-drawer.offsetHeight-6)+"px";});
      const finish=()=>{state.drawerDrag=null;};header.addEventListener("pointerup",finish);header.addEventListener("pointercancel",finish);
    }
    function updateMobileTabs(){if(!state.mobile)return;mobileControlTab.classList.toggle("active",!controlDock.classList.contains("collapsed"));mobileDataTab.classList.toggle("active",!dataDock.classList.contains("collapsed"));}
    function toggleMobilePanel(drawer){const opening=drawer.classList.contains("collapsed");setDrawerCollapsed(controlDock,true,{quiet:true});setDrawerCollapsed(dataDock,true,{quiet:true});if(opening)setDrawerCollapsed(drawer,false,{quiet:true});updateMobileTabs();}

    function resetGuided(options){
      const opts=options||{};clearTimers();cancelAnimationFrame(state.rafId);state.rafId=0;state.completed=false;state.autoCancel=false;state.currentTask=0;state.crankDegrees=0;state.strokeReady=-1;state.records=[];state.unseenRecords=0;state.analysisDone=false;state.warning=false;state.lastError=null;state.sparkUntil=0;doneMask.style.display="none";analysisText.className="analysis";analysisText.textContent="完成四个冲程后分析一个工作循环。";renderRecords();updateBadge();setDrawerCollapsed(controlDock,true,{quiet:true});setDrawerCollapsed(dataDock,true,{quiet:true});setTaskUI(0);if(!opts.quiet)showToast("已回到关卡 1");
    }
    function resetCurrent(){state.crankDegrees=0;state.strokeReady=-1;state.freeRecords=[];state.unseenRecords=0;state.sparkUntil=0;analysisText.className="analysis";analysisText.textContent="自由转动飞轮，记录不同冲程。";renderRecords();updateBadge();updateStatus();updateReadouts();draw();showToast("自由探索已复位");}
    function setFreeMode(enabled){
      if(state.autoPlaying){state.autoCancel=true;return;}
      state.freeMode=Boolean(enabled);freeBtn.textContent=state.freeMode?"退出自由模式":"自由模式";autoDemoBtn.disabled=state.freeMode;state.completed=false;doneMask.style.display="none";
      if(state.freeMode){state.freeRecords=[];taskStep.textContent="自由探索";taskText.textContent="连续转动飞轮，观察四冲程循环";taskHint.textContent="可正向或反向拖动；记录不会写入闯关数据。";hintPop.textContent="自由模式可反复观察任意冲程，退出后恢复关卡 1。";analysisText.className="analysis";analysisText.textContent="自由转动飞轮，记录不同冲程。";state.crankDegrees=0;state.strokeReady=-1;state.sparkUntil=0;renderRecords();updateDots();updateStatus();updateReadouts();draw();}
      else{resetGuided({quiet:true});}
      showToast(state.freeMode?"自由模式已开启":"已回到闯关模式");
    }
    function demoCursorAt(x,y){
      const sr=stage.getBoundingClientRect(),lr=labArea.getBoundingClientRect();demoCursor.style.left=(lr.left-sr.left+x-11)+"px";demoCursor.style.top=(lr.top-sr.top+y-11)+"px";demoCursor.style.opacity="1";
    }
    async function animateStroke(target,token){
      const g=geometry(),start=state.crankDegrees,steps=30;
      for(let i=1;i<=steps;i++){if(token!==state.autoToken||state.autoCancel)throw new Error("AUTO_CANCELLED");const eased=1-Math.pow(1-i/steps,2),previousDegrees=state.crankDegrees;state.crankDegrees=start+(target-start)*eased;maybeTriggerSpark(previousDegrees,state.crankDegrees);const a=state.crankDegrees*Math.PI/180;demoCursorAt(g.flyX+Math.cos(a)*g.flyR*.95,g.flyY+Math.sin(a)*g.flyR*.95);updateReadouts();draw();await sleep(34);}
      state.crankDegrees=target;state.strokeReady=state.currentTask;updateStatus();updateReadouts();draw();demoCursor.classList.remove("click");void demoCursor.offsetWidth;demoCursor.classList.add("click");await sleep(330);
    }
    async function runAutoDemo(){
      if(state.autoPlaying){state.autoCancel=true;return;}
      resetGuided({quiet:true});state.autoPlaying=true;state.autoCancel=false;state.autoToken+=1;const token=state.autoToken;let canceled=false;autoDemoBtn.textContent="退出演示";freeBtn.disabled=true;setDrawerCollapsed(controlDock,false,{quiet:true});setDrawerCollapsed(dataDock,true,{quiet:true});updateStatus();
      try{
        for(let index=0;index<4;index++){
          setTaskUI(index);updateStatus("自动演示中");await animateStroke((index+1)*180,token);const before=state.records.length;
          if(!recordCurrent({auto:true})||state.records.length!==before+1)throw new Error("AUTO_RECORD_NOT_PERSISTED:"+STROKES[index].key);
          await sleep(420);
        }
        setTaskUI(4);await sleep(450);if(!analyze({auto:true}))throw new Error("AUTO_ANALYSIS_FAILED");await sleep(650);
      }catch(error){
        if(error.message!=="AUTO_CANCELLED"){state.lastError=error.message;console.error("[实验59自动演示失败]",error);showToast("演示中断："+error.message);}else{canceled=true;showToast("已退出演示");}
      }finally{
        if(token===state.autoToken){state.autoPlaying=false;state.autoCancel=false;autoDemoBtn.textContent="演示模式";freeBtn.disabled=false;demoCursor.style.opacity="0";if(canceled)resetGuided({quiet:true});else{updateStatus();updateReadouts();draw();}}
      }
    }

    function getSnapshot(){return{currentTask:state.currentTask,completed:state.completed,freeMode:state.freeMode,autoPlaying:state.autoPlaying,analysisDone:state.analysisDone,crankDegrees:Math.round(state.crankDegrees),strokeReady:state.strokeReady,currentStroke:currentStroke().key,records:state.records.map((record)=>record.key),freeRecords:state.freeRecords.map((record)=>record.key),sparkActive:sparkActive(),lastError:state.lastError,mobile:state.mobile};}
    async function performTestAction(action){
      if(action==="complete-stroke")return completeCurrentStroke({quiet:true});
      if(action==="record")return recordCurrent({auto:true});
      if(action==="analyze")return analyze({auto:true});
      if(action==="free"){setFreeMode(true);return true;}
      if(action==="reset"){resetGuided({quiet:true});return true;}
      return false;
    }
    function initEvents(){
      canvas.addEventListener("pointerdown",pointerDown);canvas.addEventListener("pointermove",pointerMove);canvas.addEventListener("pointerup",pointerUp);canvas.addEventListener("pointercancel",pointerUp);
      recordBtn.addEventListener("click",()=>recordCurrent());analyzeBtn.addEventListener("click",()=>analyze());resetBtn.addEventListener("click",()=>{if(state.autoPlaying){state.autoCancel=true;return;}state.freeMode?resetCurrent():resetGuided();});
      autoDemoBtn.addEventListener("click",runAutoDemo);freeBtn.addEventListener("click",()=>setFreeMode(!state.freeMode));hintLamp.addEventListener("click",()=>hintPop.classList.toggle("open"));okBtn.addEventListener("click",()=>{doneMask.style.display="none";});
      controlToggleBtn.addEventListener("click",()=>setDrawerCollapsed(controlDock,!controlDock.classList.contains("collapsed")));dataToggleBtn.addEventListener("click",()=>setDrawerCollapsed(dataDock,!dataDock.classList.contains("collapsed")));
      mobileControlTab.addEventListener("click",()=>toggleMobilePanel(controlDock));mobileDataTab.addEventListener("click",()=>toggleMobilePanel(dataDock));controlSheetCloseBtn.addEventListener("click",()=>setDrawerCollapsed(controlDock,true));dataSheetCloseBtn.addEventListener("click",()=>setDrawerCollapsed(dataDock,true));
      bindDrawer(controlDock);bindDrawer(dataDock);window.addEventListener("resize",()=>{clearTimeout(resizeCanvas.timer);resizeCanvas.timer=setTimeout(resizeCanvas,120);});window.addEventListener("error",(event)=>{state.lastError=event.message;console.error("[实验59页面错误]",event.error||event.message);});
    }
    function init(){initDots();initEvents();setDrawerCollapsed(controlDock,true,{quiet:true});setDrawerCollapsed(dataDock,true,{quiet:true});resizeCanvas();resetGuided({quiet:true});requestAnimationFrame(()=>{resizeCanvas();draw();});}
    init();
    Object.defineProperty(window,"__labTestApi",{value:Object.freeze({getSnapshot,performTestAction,runAutoDemo,reset:()=>resetGuided({quiet:true})}),configurable:false,writable:false});
  })();
  </script>
</body>
