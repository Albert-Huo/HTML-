    async function demoGesture(i){ const targets=[["red","green"],["blue","green"],["red","green","blue"]][i]||[]; const g=colorMixGeom(benchArea(state.width,state.height)); const firstLight=g.lights.find(v=>targets.includes(v.id))||g.lights[0]; if(firstLight) moveCursorTo(firstLight.x+70*g.s, firstLight.y-17*g.s); clickCursor(); await sleep(260); for(const id of COLOR_IDS){ const open=targets.includes(id); const l=g.lights.find(v=>v.id===id); if(!l) continue; const from=state.shutters[id]||0, to=open?1:0; for(let k=0;k<=10;k++){ if(state.autoCancel) throw new Error("AUTO_CANCELLED"); const t=k/10, v=from+(to-from)*t; state.shutters[id]=v; state.lights[id]=v>.78; const sy=l.y-29*g.s+v*58*g.s; moveCursorTo(l.x+70*g.s,sy+12*g.s); state.phase=t; updateLightFromShutter(id); updateStatus("演示中"); draw(); await sleep(260); } } const key=SPEC.scenarios[i].key; applyMixKey(key); state.operationCount += 1; state.phase=1; updateStatus(SPEC.scenarios[i].label); draw(); clickCursor(); await sleep(1400); }
    async function autoRecord(key){ const before=state.records.length; await clickPanelButton(recordBtn); const ok=recordObservation({auto:true}); await sleep(700); if(!ok || !hasRecord(key) || state.records.length<=before) throw new Error("AUTO_RECORD_NOT_PERSISTED:"+key); }
    async function runAutoDemo(){ if(state.autoPlaying){state.autoCancel=true;return;} stage.scrollIntoView({ block:"start", behavior:"smooth" }); await sleep(220); fitDrawers(); state.autoPlaying=true; state.autoCancel=false; autoDemoBtn.textContent="退出演示"; freeBtn.disabled=true; setDrawerCollapsed(controlDock,false); setDrawerCollapsed(dataDock,true); setModeLabel(); resetScene({keepMode:false,quiet:true}); state.autoPlaying=true; autoDemoBtn.textContent="退出演示"; setDrawerCollapsed(controlDock,false); setModeLabel(); try{ for(let i=0;i<SPEC.scenarios.length;i++){ if(state.autoCancel) throw new Error("AUTO_CANCELLED"); setStepUI(i); updateStatus("演示中"); await demoGesture(i); await autoRecord(SPEC.scenarios[i].key); await sleep(1200); } setStepUI(3); await sleep(1500); setDrawerCollapsed(dataDock,false); await sleep(1500); await autoAnalyze(); state.demoCompleted=true; state.autoPlaying=false; autoDemoBtn.textContent="演示模式"; freeBtn.disabled=false; setModeLabel(); updateStatus(); await sleep(1200); } catch(err){ if(String(err.message||err)!=="AUTO_CANCELLED") showToast("演示中断："+(err.message||err)); else showToast("已退出演示"); } finally{ state.autoPlaying=false; state.autoCancel=false; autoDemoBtn.textContent="演示模式"; freeBtn.disabled=false; demoCursor.style.opacity="0"; setModeLabel(); updateStatus(); draw(); } }
    function resetScene(opts){ clearTimers(); state.completed=false; state.demoCompleted=false; state.autoCancel=false; state.stepWarning=false; state.successCooldown=false; state.scenarioIndex=0; state.operationCount=0; state.records=[]; state.unseenRecords=0; state.analysisDone=false; state.phase=0; state.drag=false; state.dragTarget=null; state.dragStart=null; state.dragCommitted=false; state.screenOffsetX=0; COLOR_IDS.forEach(id=>{ state.lights[id]=false; state.shutters[id]=0; }); if(!opts || !opts.keepMode) state.freeMode=false; doneMask.style.display="none"; analysisText.classList.remove("ok"); analysisText.textContent=""; renderRecords(); updateBadge(); setModeLabel(); setStepUI(0); updateStatus("待调节"); if(!opts || !opts.quiet) showToast("已重置"); }
    function setFreeMode(on){ state.freeMode=!!on; freeBtn.textContent=state.freeMode?"退出自由模式":"自由模式"; autoDemoBtn.disabled=state.freeMode; setModeLabel(); updateStatus(); showToast(state.freeMode?"自由操作已开启":"已回到闯关模式"); draw(); }
    function bindCanvasPagePan(){ if(canvas.dataset.pagePanBound) return; canvas.dataset.pagePanBound="1"; let pan=null; const isTouch=e=>!e.pointerType||e.pointerType==="touch"; const isDragging=()=>!!(state&&(state.drag||state.dragTarget||state.draggingId||state.drawerDrag)); canvas.addEventListener("pointerdown",e=>{ if(!isTouch(e)) return; pan={id:e.pointerId,y:e.clientY,scrollY:window.scrollY}; },true); canvas.addEventListener("pointermove",e=>{ if(!pan||e.pointerId!==pan.id||isDragging()) return; const dy=pan.y-e.clientY; if(Math.abs(dy)>3){ window.scrollTo(0,pan.scrollY+dy); e.preventDefault(); } },true); ["pointerup","pointercancel","lostpointercapture"].forEach(type=>canvas.addEventListener(type,e=>{ if(!pan||e.pointerId===pan.id||type==="lostpointercapture") pan=null; },true)); }
    function initEvents(){ bindCanvasPagePan(); canvas.addEventListener("pointerdown",onPointerDown); canvas.addEventListener("pointermove",onPointerMove); canvas.addEventListener("pointerup",onPointerUp); canvas.addEventListener("pointercancel",onPointerUp); recordBtn.addEventListener("click",() => recordObservation()); analyzeBtn.addEventListener("click",analyzeConclusion); resetBtn.addEventListener("click",() => { const free=state.freeMode; resetScene({keepMode:true,quiet:true}); state.freeMode=free; setFreeMode(free); showToast("已重置"); }); autoDemoBtn.addEventListener("click",runAutoDemo); freeBtn.addEventListener("click",() => setFreeMode(!state.freeMode)); controlToggleBtn.addEventListener("click",() => setDrawerCollapsed(controlDock,!controlDock.classList.contains("collapsed"))); dataToggleBtn.addEventListener("click",() => setDrawerCollapsed(dataDock,!dataDock.classList.contains("collapsed"))); controlSheetCloseBtn.addEventListener("click",() => setDrawerCollapsed(controlDock,true)); dataSheetCloseBtn.addEventListener("click",() => setDrawerCollapsed(dataDock,true)); experimentTab.addEventListener("click",() => toggleMobilePanel(controlDock)); dataTab.addEventListener("click",() => toggleMobilePanel(dataDock)); hintLamp.addEventListener("click",() => hintPop.classList.toggle("open")); okBtn.addEventListener("click",() => { doneMask.style.display="none"; }); bindDrawer(controlDock); bindDrawer(dataDock); window.addEventListener("resize",() => { clearTimeout(resizeCanvas.t); resizeCanvas.t=setTimeout(resizeCanvas,120); }); }
    function init(){ initDots(); initEvents(); resizeCanvas(); setDrawerCollapsed(controlDock,true); setDrawerCollapsed(dataDock,true); resetScene({quiet:true}); requestAnimationFrame(() => { resizeCanvas(); draw(); }); setTimeout(() => { resizeCanvas(); draw(); },180); }
    init(); window.state = state; window.recordObservation = recordObservation; window.analyzeConclusion = analyzeConclusion;
  })();
  </script>
