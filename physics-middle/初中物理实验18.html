  <!-- 实验目录依据：中小学实验教学目录（初中物理 18. 测量物体运动的速度） -->
  <style>
    :root{
      --bg:#1a1a1a;
      --ink:#fff;
      --card-bg:rgba(255,255,255,.08);
      --panel-bg:rgba(15,15,15,.58);
      --line:rgba(255,255,255,.12);
      --accent:#3ddc97;
      --warn:#ffb74d;
      --dockShadow:0 14px 36px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:10px;
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    #spectrum{
      position:relative;
      width:100%;
      max-width:980px;
      height:40px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,255,255,.15);
      margin:0 0 12px;
      background:#000;
      flex-shrink:0;
    }
    #spectrum::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
      background-size:200% 100%;
      animation:flowRainbow 6s linear infinite;
    }
    @keyframes flowRainbow{ 0%{background-position:0 0;} 100%{background-position:-100% 0;} }

    .task-card{
      width:100%;
      max-width:980px;
      background:var(--card-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      backdrop-filter:blur(6px);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:10px;
      transition:opacity .2s, filter .2s;
    }
    .task-step{ background:rgba(255,255,255,.16); border-radius:8px; padding:6px 10px; font-weight:700; white-space:nowrap; }
    .task-text{ line-height:1.55; }
    .task-hint{ color:#ffd54f; font-size:12px; opacity:.95; margin-top:2px; }
    .progress-dots{ display:flex; gap:6px; }
    .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.26); outline:2px solid rgba(255,255,255,.12); }
    .dot.active{ background:var(--warn); }
    .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,.45); }
    .dot.warn{ background:#ff5f57; outline-color:rgba(255,95,87,.45); }

    #stage{
      width:100%;
      max-width:980px;
      height:66vh;
      max-height:660px;
      min-height:500px;
      margin-top:10px;
      border-radius:12px;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b0f14;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
      touch-action:none;
      background-image:
        radial-gradient(circle at 76% 25%, rgba(255,255,255,.06), transparent 42%),
        radial-gradient(circle at 22% 78%, rgba(0,255,255,.05), transparent 46%);
    }
    .hud{
      position:absolute;
      left:10px;
      top:10px;
      z-index:20;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      background:rgba(0,0,0,.48);
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
    }
    .tag{ border:1px solid rgba(255,255,255,.26); border-radius:999px; padding:2px 8px; font-weight:700; color:#dce9ff; background:rgba(255,255,255,.06); }

    .lab-area{
      position:absolute;
      inset:54px 10px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(5,10,16,.82);
      overflow:hidden;
    }
    #scene{ width:100%; height:100%; display:block; touch-action:none; }

    .dock{
      position:absolute;
      width:min(94%, 380px);
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-bg);
      backdrop-filter:blur(6px);
      box-shadow:var(--dockShadow);
      overflow:hidden;
      touch-action:none;
      z-index:30;
    }
    .dock.dragging{ box-shadow:0 20px 48px rgba(0,0,0,.55); }
    .dockHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    .dockHead:active{ cursor:grabbing; }
    .dockTitle{ font-size:13px; font-weight:700; color:#e7f0ff; }
    .dataNotice{
      display:none;
      min-width:18px;
      height:18px;
      padding:0 6px;
      margin-left:6px;
      border-radius:999px;
      background:#ff4d4f;
      color:#fff;
      font-size:11px;
      font-weight:800;
      line-height:18px;
      text-align:center;
      box-shadow:0 0 0 2px rgba(255,77,79,.18);
      animation:dataNoticeBlink .9s ease-in-out infinite;
    }
    .dataNotice.show{ display:inline-block; }
    @keyframes dataNoticeBlink{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(1.08); opacity:.78; }
    }
    .dockBtns{ display:flex; gap:6px; }
    .iconBtn{ border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#e8f1ff; border-radius:7px; padding:4px 8px; font-size:12px; cursor:pointer; }
    .dockBody{ padding:10px; max-height:360px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .dockBody.collapsed{ display:none; }

    .row{ margin-bottom:8px; font-size:12px; }
    .lab-hint{ color:#dce9ff; line-height:1.55; }
    .status-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
    .pill{ border:1px solid rgba(255,255,255,.2); border-radius:999px; padding:4px 8px; font-size:11px; color:#e8f1ff; background:rgba(0,0,0,.28); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .field{ border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.2); margin-bottom:8px; }
    .field .name{ display:flex; justify-content:space-between; font-size:12px; color:#dce9ff; margin-bottom:6px; gap:8px; }
    .field input[type="range"], .field select{ width:100%; }
    .field select{ border:1px solid rgba(255,255,255,.25); border-radius:8px; background:rgba(0,0,0,.4); color:#fff; padding:6px 8px; }

    .btnRow{ display:flex; gap:8px; flex-wrap:wrap; }
    button.main, button.sub{
      border:none;
      border-radius:8px;
      padding:8px 12px;
      color:#fff;
      cursor:pointer;
      transition:background .2s, transform .05s, opacity .2s;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      font-size:13px;
    }
    button.main{ background:#2e7d32; }
    button.sub{ background:#444; }
    button.main:hover, button.sub:hover{ background:#5a5a5a; }
    button.main:active, button.sub:active{ transform:scale(.98); }
    button.main:disabled, button.sub:disabled{ opacity:.5; cursor:not-allowed; }

    .analysis{ font-size:12px; line-height:1.6; color:#e3efff; border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.24); }
    .analysis.ok{ border-color:rgba(61,220,151,.4); }
    table.record{ width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
    table.record th, table.record td{ border:1px solid rgba(255,255,255,.12); padding:4px 5px; text-align:center; }
    table.record th{ background:rgba(255,255,255,.08); color:#dce9ff; font-weight:700; }
    .chartWrap{ margin-top:8px; border:1px solid rgba(255,255,255,.12); border-radius:10px; background:rgba(0,0,0,.25); overflow:hidden; }
    #chart{ width:100%; height:170px; display:block; }

    .checkmark{
      position:absolute;
      z-index:60;
      left:50%;
      top:18%;
      transform:translate(-50%,-50%) scale(.6);
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(61,220,151,.15);
      border:3px solid var(--accent);
      display:none;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25);
      animation:pop .55s ease-out;
      pointer-events:none;
    }
    .checkmark.active{ display:flex; }
    .checkmark > div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }
    @keyframes pop{ 0%{transform:translate(-50%,-50%) scale(.4);opacity:.2;} 60%{transform:translate(-50%,-50%) scale(1.08);opacity:1;} 100%{transform:translate(-50%,-50%) scale(1);} }
    .demoCursor{
      position:absolute;
      left:-200px;
      top:-200px;
      width:24px;
      height:24px;
      z-index:120;
      pointer-events:none;
      opacity:0;
      transform:translate(-2px,-2px);
      transition:left .25s ease, top .25s ease, opacity .16s ease, transform .12s ease;
    }
    .demoCursor.show{ opacity:1; }
    .demoCursor.clicking{ transform:translate(-2px,-2px) scale(.92); }
    .demoCursor svg{ display:block; width:100%; height:100%; }
    .demoCursorPulse{
      position:absolute;
      left:-200px;
      top:-200px;
      width:12px;
      height:12px;
      margin-left:-6px;
      margin-top:-6px;
      border-radius:999px;
      border:2px solid rgba(124,209,255,.9);
      pointer-events:none;
      z-index:119;
      opacity:0;
    }
    .demoCursorPulse.active{ animation:cursorPulse .45s ease-out; }
    @keyframes cursorPulse{
      0%{ transform:scale(.35); opacity:.95; }
      100%{ transform:scale(2.7); opacity:0; }
    }

    .toolbar{ width:100%; max-width:980px; margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-start; }
    .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.82); color:#fff; padding:10px 14px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    .modal-mask{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:300; background:rgba(0,0,0,.5); }
    .modal{ width:min(90vw, 380px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
    .modal h3{ margin:8px 0 6px; font-size:20px; }
    .modal p{ margin-top:0; line-height:1.55; color:#cfd8dc; }
    .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; }

    .explanation{ width:100%; max-width:980px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:#e9f2ff; }
    .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em; }

    @media (max-width:760px){
      .task-card{ grid-template-columns:1fr; }
      .task-step{ width:fit-content; }
      #stage{ height:76vh; max-height:920px; }
      .dock{ width:min(96%, 380px); }
      .hud{ left:8px; right:8px; }
    }

.drawer-title{ display:flex; align-items:center; gap:6px; }

    function get18Geometry(W, H){
      const top = { x: W*0.26, y: H-250 };
      const bottom = { x: W*0.78, y: H-145 };
      const dx = bottom.x - top.x;
      const dy = bottom.y - top.y;
      const len = Math.hypot(dx, dy);
      const ux = dx / len;
      const uy = dy / len;
      const nx = -uy;
      const ny = ux;
      return { top, bottom, dx, dy, len, ux, uy, nx, ny };
    }

    function get18MeasureMap(g){
      const cartHalfLenT = 30 / g.len;
      const markerHalfT = 8 / g.len;
      const measureStartT = cartHalfLenT;
      const measureFaceFullT = 0.92;
      const measureFaceHalfT = measureStartT + (measureFaceFullT - measureStartT) * 0.5;
      return {
        cartHalfLenT,
        markerHalfT,
        measureStartT,
        measureFaceFullT,
        measureFaceHalfT,
        markerCenterFullT: measureFaceFullT + markerHalfT,
        markerCenterHalfT: measureFaceHalfT + markerHalfT
      };
    }

    function get18MarkerCenterTForDistanceCm(cm, metric){
      const clampedCm = clamp(Math.round(cm), 10, 80);
      const ratio = clampedCm / 80;
      const faceT = metric.measureStartT + (metric.measureFaceFullT - metric.measureStartT) * ratio;
      return faceT + metric.markerHalfT;
    }

    function setExp18MarkerDistanceCm(cm){
      if(LAB_ID !== 18) return;
      const ap = state.apparatus;
      const stageRect = stageEl.getBoundingClientRect();
      const g = get18Geometry(stageRect.width || 1000, stageRect.height || 620);
      const metric = get18MeasureMap(g);
      const clampedCm = clamp(Math.round(cm / 10) * 10, 10, 80);
      ap.markerMode = 'custom';
      ap.customDistanceCm = clampedCm;
      ap.markerT = get18MarkerCenterTForDistanceCm(clampedCm, metric);
      ap.dragMarkerT = null;
      ap.dragHoverMode = null;
      ap.dragHoverCm = null;
      ap.activeDistanceM = round(clampedCm / 100, 2);
      ap.activeLabel = `${clampedCm}cm`;
      updatePills();
    }

    function setExp18MarkerMode(mode){
      if(LAB_ID !== 18) return;
      const ap = state.apparatus;
      const stageRect = stageEl.getBoundingClientRect();
      const g = get18Geometry(stageRect.width || 1000, stageRect.height || 620);
      const metric = get18MeasureMap(g);
      ap.markerMode = mode === 'half' ? 'half' : 'full';
      ap.markerT = ap.markerMode === 'half' ? metric.markerCenterHalfT : metric.markerCenterFullT;
      ap.dragMarkerT = null;
      ap.dragHoverMode = null;
      ap.dragHoverCm = null;
      ap.customDistanceCm = ap.markerMode === 'half' ? 40 : 80;
      ap.activeDistanceM = ap.markerMode === 'half' ? ap.segmentHalfM : ap.segmentFullM;
      ap.activeLabel = ap.markerMode === 'half' ? 's2' : 's1';
      updatePills();
    }

    function getScenePoint(e){

    function exp18MarkerCenter(){
      const r = scene.getBoundingClientRect();
      const g = get18Geometry(r.width, r.height);
      const displayT = state.apparatus.draggingMarker && typeof state.apparatus.dragMarkerT === 'number'
        ? state.apparatus.dragMarkerT
        : state.apparatus.markerT;
      return {
        x: g.top.x + g.dx * displayT,
        y: g.top.y + g.dy * displayT
      };
    }

    function exp18CartCenter(){
      const r = scene.getBoundingClientRect();
      const g = get18Geometry(r.width, r.height);
      return {
        x: g.top.x + g.dx * state.apparatus.cartT,
        y: g.top.y + g.dy * state.apparatus.cartT - 12
      };
    }

    function updateExp18MarkerDrag(pt){
      if(LAB_ID !== 18) return;
      const r = scene.getBoundingClientRect();
      const g = get18Geometry(r.width, r.height);
      const metric = get18MeasureMap(g);
      const vx = pt.x - g.top.x;
      const vy = pt.y - g.top.y;
      const proj = clamp((vx * g.dx + vy * g.dy) / (g.len * g.len), metric.measureStartT + metric.markerHalfT, metric.markerCenterFullT);
      if(state.freeMode){
        const cm = clamp(Math.round((((proj - metric.markerHalfT) - metric.measureStartT) / (metric.measureFaceFullT - metric.measureStartT)) * 80 / 10) * 10, 10, 80);
        state.apparatus.dragHoverMode = 'custom';
        state.apparatus.dragHoverCm = cm;
        state.apparatus.dragMarkerT = proj;
        return;
      }
      const halfDist = Math.abs(proj - metric.markerCenterHalfT);
      const fullDist = Math.abs(proj - metric.markerCenterFullT);
      const snapThreshold = 0.028;
      state.apparatus.dragHoverMode = halfDist <= fullDist ? 'half' : 'full';
      state.apparatus.dragHoverCm = state.apparatus.dragHoverMode === 'half' ? 40 : 80;
      if(halfDist < snapThreshold) state.apparatus.dragMarkerT = metric.markerCenterHalfT;
      else if(fullDist < snapThreshold) state.apparatus.dragMarkerT = metric.markerCenterFullT;
      else state.apparatus.dragMarkerT = proj;
    }

    function performAction(actionId, showStep=true){
      const ap = state.apparatus;
      let changed = false;

      switch(LAB_ID){
        case 14:{
          if(actionId === 'pourWater' && !ap.pouredWater){ ap.pouredWater = true; ap.waterMl = 0; ap.mixMl += 50; changed = true; setStatus('已倒入水'); }
          if(actionId === 'pourAlcohol' && !ap.pouredAlcohol){ ap.pouredAlcohol = true; ap.alcoholMl = 0; ap.mixMl += 50; changed = true; setStatus('已倒入酒精'); }
          if(actionId === 'shakeRead'){
            if(!(ap.pouredWater && ap.pouredAlcohol)){ showToast('需先倒入两种液体'); break; }
            ap.shaken = true;
            const shrink = 3 + (5 - state.vars.shakeLevel) * 0.5;
            ap.mixRead = round(100 - shrink, 1);
            ap.mixMl = ap.mixRead;
            changed = true;
            setStatus('已摇匀并读数');
          }
          break;
        }
        case 15:{
          if(actionId === 'scrape'){ ap.scraped = true; changed = true; setStatus('接触面已处理'); }
          if(actionId === 'press'){
            if(!ap.scraped){ showToast('建议先刮净接触面再压紧'); }
            ap.pressed = true;
            ap.adhered = ap.scraped;
            ap.separated = !ap.scraped;
            changed = true;
            setStatus(ap.adhered ? '压紧后已吸附' : '压紧但吸附弱');
          }
          if(actionId === 'pullTest'){
            ap.pullN = Number(state.vars.pullN);
            const threshold = ap.scraped && ap.pressed ? 5.8 : 2.2;
            ap.tested = true;
            if(ap.pullN >= threshold){ ap.separated = true; ap.adhered = false; }
            else { ap.separated = false; ap.adhered = true; }
            changed = true;
            setStatus(ap.separated ? '样件已分离' : '仍保持吸附');
          }
          break;
        }
        case 16:{
          const len = OBJECT_LENGTHS[state.vars.object];
          if(actionId === 'alignZero'){
            ap.object = state.vars.object;
            ap.startCm = 0;
            ap.aligned = true;
            ap.alignedCount += 1;
            changed = true;
            setStatus('已对齐零刻度');
          }
          if(actionId === 'measureLength'){
            if(!ap.aligned){ showToast('请先对齐零刻度'); break; }
            ap.lastRead = round(len + randIn(-0.08, 0.08), 2);
            ap.measureCount += 1;
            changed = true;
            setStatus(`读数完成：${ap.lastRead}cm`);
          }
          if(actionId === 'nextObject'){
            const order = ['pencil','eraser','key'];
            const idx = order.indexOf(state.vars.object);
            const next = order[(idx + 1) % order.length];
            setVar('object', next);
            ap.object = next;
            ap.startCm = round(randIn(1.4, 3.9), 2);
            ap.aligned = false;
            ap.lastRead = null;
            changed = true;
            setStatus(`已更换物体：${nameOfObject(next)}`);
          }
          break;
        }
        case 17:{
          if(actionId === 'startPendulum'){
            ap.pendulumOn = true;
            changed = true;
            setStatus('摆球已启动');
          }
          if(actionId === 'startWatch'){
            if(!ap.pendulumOn){ showToast('请先启动摆球'); break; }
            ap.stopwatchRunning = true;
            ap.stopwatchStart = performance.now();
            changed = true;
            setStatus('秒表计时中');
          }
          if(actionId === 'stopWatch'){
            if(!ap.stopwatchRunning){ showToast('秒表尚未开始'); break; }
            const p = state.vars.tempo === 'slow' ? 1.35 : state.vars.tempo === 'fast' ? 0.75 : 1.0;
            const ideal = state.vars.cycles * p;
            ap.elapsed = round(ideal + randIn(-0.15, 0.15), 2);
            ap.stopwatchRunning = false;
            ap.measured = true;
            ap.cyclesDone = state.vars.cycles;
            changed = true;
            setStatus(`计时完成：${ap.elapsed}s`);
          }
          break;
        }
        case 18:{
          if(actionId === 'resetCart'){
            changed = resetExp18Cart(true);
          }
          break;
        }
        case 19:{
          if(actionId === 'applyForce'){
            const f = Number(state.vars.force);
            const sample = state.vars.sample;
            let d = sample === 'spring' ? f * 3.4 : f * 5.2;
            if(sample === 'sponge') d = Math.min(d, 42);
            ap.lastDeform = round(d, 1);
            ap.applied = true;
            ap.recoverPct = sample === 'spring' ? 98 : 86;
            ap.applyCount += 1;
            changed = true;
            setStatus(`已施力：形变量${ap.lastDeform}mm`);
          }
          if(actionId === 'releaseForce'){
            ap.applied = false;
            ap.lastDeform = 0;
            changed = true;
            setStatus('已撤去力');
          }
          break;
        }
        case 20:{
          if(actionId === 'applyMotionForce'){
            const dir = state.vars.dir === 'forward' ? 1 : -1;
            const mag = Number(state.vars.mag);
            const dt = Number(state.vars.duration);
            ap.beforeV = round(ap.velocity, 2);
            const dv = dir * mag * dt * 0.45;
            ap.velocity = round(clamp(ap.velocity + dv, -6, 6), 2);
            ap.afterV = ap.velocity;
            ap.changed = true;
            const nx = clamp(ap.cartX + ap.velocity * 0.012, 0.08, 0.92);
            ap.targetX = nx;
            ap.animating = true;
            trackTimeout(()=>{ ap.cartX = ap.targetX; ap.animating = false; }, 800);
            changed = true;
            setStatus(`速度变化：${ap.beforeV}→${ap.afterV}m/s`);
          }
          if(actionId === 'stopCart'){
            ap.beforeV = ap.velocity;
            ap.velocity = 0;
            ap.afterV = 0;
            ap.changed = true;
            changed = true;
            setStatus('小车已停车');
          }
          break;
        }
      }

      if(changed){
        updatePills();
        scheduleChart();
      }
      return changed;
    }

    function nameOfObject(k){
      if(k==='pencil') return '铅笔';
      if(k==='eraser') return '橡皮';
      return '钥匙';
    }

    function buildRecord(){
      const ap = state.apparatus;
      switch(LAB_ID){
        case 14:{
          if(ap.mixRead === null){ showToast('请先摇匀并读数'); return null; }
          return { c1:'水50+酒精50', c2:'100.0', c3:String(ap.mixRead), c4:ap.mixRead < 100 ? '体积缩小' : '无明显变化', y:ap.mixRead };
        }
        case 15:{
          if(!ap.tested){ showToast('请先进行拉伸测力'); return null; }
          return { c1:`拉力${ap.pullN}N`, c2:String(ap.pullN), c3:ap.separated ? '已分离' : '未分离', c4:ap.scraped&&ap.pressed ? '处理后测试' : '未充分处理', y:ap.pullN };
        }
        case 16:{
          if(ap.lastRead === null){ showToast('请先读取长度'); return null; }
          const ref = OBJECT_LENGTHS[state.vars.object];
          return { c1:nameOfObject(state.vars.object), c2:String(ap.lastRead), c3:String(ref), c4:`误差${round(ap.lastRead-ref,2)}cm`, y:ap.lastRead };
        }
        case 17:{
          if(!ap.measured){ showToast('请先完成一次计时'); return null; }
          const single = round(ap.elapsed / ap.cyclesDone, 3);
          return { c1:`${ap.cyclesDone}次`, c2:String(ap.elapsed), c3:String(single), c4:`节奏:${state.vars.tempo}`, y:single };
        }
        case 18:{
          if(ap.lastTime===null || ap.lastSpeed===null){ showToast('请先发车并计时'); return null; }
          const isHalf = ap.lastMeasureMode === 'half';
          const isFull = ap.lastMeasureMode === 'full';
          const label = isFull ? '全程 s1' : (isHalf ? '上半段 s2' : '自定义');
          const distanceM = ap.lastDistanceM ?? (isHalf ? ap.segmentHalfM : ap.segmentFullM);
          const c1 = isFull || isHalf
            ? `${label}=${distanceM.toFixed(2)}m`
            : `${label} s=${distanceM.toFixed(2)}m`;
          const note = isFull || isHalf ? 'v=s/t' : '自由模式';
          return { c1, c2:String(ap.lastTime), c3:String(ap.lastSpeed), c4:note, y:ap.lastSpeed };
        }
        case 19:{
          if(!ap.applied){ showToast('请先施加力'); return null; }
          return { c1:`${state.vars.sample==='spring'?'弹簧':'海绵'} ${state.vars.force}N`, c2:String(ap.lastDeform), c3:`恢复${ap.recoverPct}%`, c4:ap.lastDeform>20 ? '形变明显' : '形变较小', y:ap.lastDeform };
        }
        case 20:{
          if(!ap.changed){ showToast('请先施加力或停车'); return null; }
          return { c1:`${state.vars.dir==='forward'?'向右':'向左'} ${state.vars.mag}N`, c2:String(ap.beforeV), c3:String(ap.afterV), c4:ap.afterV>ap.beforeV ? '加速/起动' : (ap.afterV<ap.beforeV ? '减速/反向' : '保持/停止'), y:Math.abs(ap.afterV) };
        }
      }
      return null;
    }

    function addRecord(){
      const rec = buildRecord();
      if(!rec) return false;
      if(LAB_ID === 18 && !state.freeMode){
        const guidedRecords = state.records.filter(r=>r.c1.includes('全程 s1') || r.c1.includes('上半段 s2'));
        if(!(state.currentTask===0 || state.currentTask===1)){
          showToast('请在需要记录的步骤中再记录数据');
          return false;
        }
        if(state.currentTask===0 && guidedRecords.length !== 0){
          showToast('步骤1只需要保留第一组测速记录');
          return false;
        }
        if(state.currentTask===1 && guidedRecords.length < 1){
          showToast('请先完成第一组记录');
          return false;
        }
        if(state.currentTask===0 && state.apparatus.lastMeasureMode !== 'full'){
          showToast('步骤1需要金属片放在斜面底端，记录全程 s1');
          return false;
        }
        if(state.currentTask===1 && state.apparatus.lastMeasureMode !== 'half'){
          showToast('步骤2需要金属片放在斜面中部，记录上半段 s2');
          return false;
        }
      }
      pushRecord(rec);
      setStatus(state.freeMode ? '自由探索' : '已记录，等待确认');
      return true;
    }

    function renderRecords(){
      recordBody.innerHTML = '';
      if(!state.records.length){
        recordBody.innerHTML = '<tr><td colspan="4" style="color:#9db4d6;">暂无记录</td></tr>';
        return;
      }
      for(const r of [...state.records].slice(-12).reverse()){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.c1}</td><td>${r.c2}</td><td>${r.c3}</td><td>${r.c4}</td>`;
        recordBody.appendChild(tr);
      }
    }

    function analyzeConclusion(showToastMsg=true){
      const rs = state.records;
      let ok = false;
      let msg = '';
      switch(LAB_ID){
        case 14:{
          const hit = rs.find(r=>Number(r.c3) < 100);
          ok = !!hit;
          msg = ok ? '结论：水和酒精混合后总体积小于100mL，说明分子之间存在间隙。' : '请至少获得一条“混合体积小于100mL”的记录。';
          break;
        }
        case 15:{
          const stuck = rs.find(r=>r.c3==='未分离' && Number(r.c2)>=2.5);
          ok = !!stuck;
          msg = ok ? '结论：接触面处理并压紧后，金属块需一定拉力才分开，说明分子间存在引力。' : '请完成一次“有明显拉力但仍未分离”的记录。';
          break;
        }
        case 16:{
          const objs = new Set(rs.map(r=>r.c1));
          const good = rs.filter(r=>Math.abs(Number(r.c2)-Number(r.c3)) <= 0.2).length;
          ok = objs.size >= 2 && good >= 2;
          msg = ok ? '结论：长度测量应先零刻度对齐，再读取另一端刻度；重复测量可提高准确性。' : '请至少测量2种物体，且读数与参考值偏差较小。';
          break;
        }
        case 17:{
          const set = new Set(rs.map(r=>r.c1));
          ok = rs.length>=2 && set.size>=2;
          msg = ok ? '结论：秒表可测总时长，通过“总时长/计次数”可求单次时间。' : '请至少记录两组不同计次数的时间数据。';
          break;
        }
        case 18:{
          if(state.freeMode){
            ok = rs.length >= 2;
            msg = ok
              ? '结论：在自由模式下，记录了至少两组不同路程与时间数据后，可以比较不同路程段对应的平均速度，并结合 v=s/t 继续分析小车在斜面上的运动变化。'
              : '请至少获得 2 组数据记录后再分析结论。';
          }else{
            const s1 = rs.find(r=>r.c1.includes('全程 s1'));
            const s2 = rs.find(r=>r.c1.includes('上半段 s2'));
            ok = !!(s1 && s2 && Number(s1.c3) > Number(s2.c3));
            msg = ok ? '结论：由 v=s/t 可知，全程平均速度 v1 大于上半段平均速度 v2，说明小车在斜面上运动时速度逐渐增大。' : '请先获得 s1、s2 两组记录，并比较 v1、v2 的大小。';
          }
          break;
        }
        case 19:{
          const spring = rs.filter(r=>r.c1.includes('弹簧')).map(r=>Number(r.c2));
          const sponge = rs.filter(r=>r.c1.includes('海绵')).map(r=>Number(r.c2));
          ok = (spring.length>=2 && Math.max(...spring)>Math.min(...spring)) || (sponge.length>=2 && Math.max(...sponge)>Math.min(...sponge));
          msg = ok ? '结论：力可使物体发生形变，且一般力越大形变越明显。' : '请补充同一样件在不同力下的对比记录。';
          break;
        }
        case 20:{
          const a = rs.find(r=>Number(r.c2)===0 && Number(r.c3)>0);
          const b = rs.find(r=>Number(r.c3) < Number(r.c2));
          ok = !!(a && b);
          msg = ok ? '结论：力可使静止物体运动，也可使运动物体减速、停止或改变方向。' : '请至少包含“由静止到运动”和“速度减小/反向”两类记录。';
          break;
        }
      }
      state.analysisOk = ok;
      analysisText.textContent = msg;
      analysisText.classList.toggle('ok', ok);
      if(showToastMsg) showToast(ok ? '分析完成：结论成立' : '分析未通过，请补充实验记录');
      setStatus(ok ? '分析完成，等待确认' : '分析未通过');
      return ok;
    }

    function checkStepPass(step){
      const ap = state.apparatus;
      const rs = state.records;
      switch(LAB_ID){
        case 14:
          if(step===0) return ap.pouredWater;
          if(step===1) return ap.pouredAlcohol;
          if(step===2) return ap.shaken && ap.mixRead !== null && ap.mixRead < 100;
          if(step===3) return state.analysisOk;
          return false;
        case 15:
          if(step===0) return ap.scraped;
          if(step===1) return ap.pressed;
          if(step===2) return rs.some(r=>r.c3==='未分离');
          if(step===3) return state.analysisOk;
          return false;
        case 16:
          if(step===0) return ap.alignedCount >= 1;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 17:
          if(step===0) return ap.pendulumOn;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 18:
          if(step===0) return rs.some(r=>r.c1.includes('全程 s1'));
          if(step===1) return rs.some(r=>r.c1.includes('全程 s1')) && rs.some(r=>r.c1.includes('上半段 s2'));
          if(step===2){
            const s1 = rs.find(r=>r.c1.includes('全程 s1'));
            const s2 = rs.find(r=>r.c1.includes('上半段 s2'));
            return !!(s1 && s2 && Number(s1.c3) > Number(s2.c3));
          }
          if(step===3) return state.analysisOk;
          return false;
        case 19:
          if(step===0) return rs.length>=1;
          if(step===1) return rs.length>=2;
          if(step===2) return rs.some(r=>r.c1.includes('海绵')) || rs.some(r=>r.c1.includes('弹簧'));
          if(step===3) return state.analysisOk;
          return false;
        case 20:
          if(step===0) return rs.some(r=>Number(r.c2)===0 && Number(r.c3)>0);
          if(step===1) return rs.some(r=>Number(r.c3) < Number(r.c2));
          if(step===2) return rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
      }
      return false;
    }

    function tryPassStep(showFailToast=true, fromAuto=false){
      if(state.freeMode || state.completed || state.successCooldown) return false;
      if(state.autoPlaying && !fromAuto) return false;
      const ok = checkStepPass(state.currentTask);
      if(!ok){
        if(showFailToast){
          if(LAB_ID === 18){
            const msg = state.currentTask===0
              ? '请先完成第一组测速并记录，再点击“确认观察”。'
              : state.currentTask===1
                ? '请先改变推力或测程，完成第二组测速并记录，再点击“确认观察”。'
                : state.currentTask===2
                  ? '请先比较两组速度差异并保留至少2条记录，再点击“确认观察”。'
                  : '请先分析出 v=s/t 的结论，再点击“确认观察”。';
            warnCurrentStep(msg);
          }else{
            warnCurrentStep('当前步骤条件还未满足');
          }
        }
        return false;
      }
      state.stepWarnIdx = -1;
      setStepUI(state.currentTask);
      if(fromAuto){
        showCheck();
        if(state.currentTask < LAB.tasks.length - 1){
          setStepUI(state.currentTask + 1);
          setStatus(`进入步骤 ${state.currentTask+1}/${LAB.tasks.length}`);
        }else finishLab();
        return true;
      }
      state.successCooldown = true;
      showCheck();
      trackTimeout(()=>{
        if(state.currentTask < LAB.tasks.length - 1){
          setStepUI(state.currentTask + 1);
          setStatus(`进入步骤 ${state.currentTask+1}/${LAB.tasks.length}`);
        }else finishLab();
        state.successCooldown = false;
      }, 420);
      return true;
    }

    function recalcProgress(){
      if(state.completed || state.freeMode) return;
      let idx = 0;
      while(idx < LAB.tasks.length && checkStepPass(idx)) idx += 1;
      if(idx >= LAB.tasks.length) finishLab();
      else setStepUI(idx);
    }

    function finishLab(){
      if(state.completed) return;
      state.completed = true;
      state.stepWarnIdx = -1;
      state.currentTask = LAB.tasks.length - 1;
      setStepUI(state.currentTask);
      setStatus('挑战完成');
      doneMaskEl.style.display = 'flex';
    }

    function drawScene(){
      const rect = scene.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width * dpr));
      const h = Math.max(1, Math.floor(rect.height * dpr));
      if(scene.width !== w || scene.height !== h){ scene.width = w; scene.height = h; }
      const ctx = scene.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width;
      const H = rect.height;

      ctx.fillStyle = '#2f343a';
      ctx.fillRect(0, H-70, W, 70);
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      ctx.fillRect(0, H-70, W, 2);

      switch(LAB_ID){
        case 14: draw14(ctx,W,H); break;
        case 15: draw15(ctx,W,H); break;
        case 16: draw16(ctx,W,H); break;
        case 17: draw17(ctx,W,H); break;
        case 18: draw18(ctx,W,H); break;
        case 19: draw19(ctx,W,H); break;
        case 20: draw20(ctx,W,H); break;
      }
    }

    function drawBeaker(ctx, x, y, w, h, fillRatio, color, label){
      ctx.save();
      ctx.strokeStyle = 'rgba(210,230,255,.72)';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);
      const fh = h * clamp(fillRatio,0,1);
      ctx.fillStyle = color;
      ctx.fillRect(x+3, y+h-fh-3, w-6, fh);
      ctx.fillStyle = '#d8e7ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(label, x+4, y-8);
      ctx.strokeStyle = 'rgba(255,255,255,.4)';
      for(let i=1;i<=5;i++){
        const ty = y + h - i*h/5;
        ctx.beginPath(); ctx.moveTo(x+2,ty); ctx.lineTo(x+16,ty); ctx.stroke();
      }
      ctx.restore();
    }

    function draw14(ctx,W,H){
      const ap = state.apparatus;

    function updateDynamic(dt){
      const ap = state.apparatus;
      if(LAB_ID === 14 && ap.shaken) ap.bubblePhase += dt*0.004;
      if(LAB_ID === 17 && ap.pendulumOn){ ap.angle = Math.sin(performance.now()*0.006) * 0.38; }
      if(LAB_ID === 18 && ap.running){
        const r = stageEl.getBoundingClientRect();
        const g = get18Geometry(r.width, r.height);
        const metric = get18MeasureMap(g);
        const targetT = Math.max(0, ap.markerT - metric.cartHalfLenT - metric.markerHalfT);
        ap.liveElapsed += dt/1000;
        const duration = Math.max(0.1, ap.runDuration || 1.4);
        const progress = clamp(ap.liveElapsed / duration, 0, 1);
        ap.cartT = targetT * progress * progress;
        if(progress >= 1){
          ap.running = false;
          ap.cartT = targetT;
          ap.runCount += 1;
          ap.hitFlash = 1;
          const t = round(duration, 2);
          const v = round(ap.activeDistanceM / t, 2);
          ap.lastTime = t;
          ap.lastSpeed = v;
          ap.lastMeasureMode = ap.markerMode;
          ap.lastDistanceM = ap.activeDistanceM;
          ap.lastMeasureLabel = ap.activeLabel;
          setStatus(`测速完成：${ap.activeLabel}, t=${t}s, v=${v}m/s`);
          updatePills();
        }
      }
      if(LAB_ID === 18 && ap.hitFlash > 0) ap.hitFlash = Math.max(0, ap.hitFlash - dt/240);
      if(LAB_ID === 20 && ap.animating){
        const dx = ap.targetX - ap.cartX;
        ap.cartX += dx * Math.min(1, dt*0.01);
      }
    }

    function loop(ts){
      const dt = state.lastTs ? (ts - state.lastTs) : 16;
      state.lastTs = ts;
      updateDynamic(dt);
      drawScene();
      state.rafId = requestAnimationFrame(loop);
    }

    function scheduleChart(){
      if(scheduleChart.t) return;
      scheduleChart.t = trackTimeout(()=>{
        scheduleChart.t = null;
        drawChart();
      }, 60);
    }

    function drawChart(){
      const rect = chart.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width*dpr));
      const h = Math.max(1, Math.floor(rect.height*dpr));
      if(chart.width!==w || chart.height!==h){ chart.width = w; chart.height = h; }
      const ctx = chart.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width, H = rect.height;

      ctx.fillStyle = 'rgba(6,10,16,.9)';
      ctx.fillRect(0,0,W,H);
      const left=38, right=W-10, top=12, bottom=H-24;
      const pw = right-left, ph = bottom-top;

      ctx.strokeStyle = 'rgba(255,255,255,.12)';
      for(let i=0;i<=4;i++){
        const y = top + ph*(i/4);
        ctx.beginPath(); ctx.moveTo(left,y); ctx.lineTo(right,y); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(left,bottom); ctx.lineTo(right,bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(left,top); ctx.lineTo(left,bottom); ctx.stroke();

      const ys = state.records.map(r=>Number(r.y));
      if(!ys.length) return;
      let maxY = Math.max(...ys);
      if(maxY <= 0) maxY = 1;
      maxY *= 1.2;

      const toX = (i)=> left + pw * (i/(Math.max(1, ys.length-1)));
      const toY = (v)=> bottom - (v/maxY)*ph;

      ctx.strokeStyle = 'rgba(61,220,151,.85)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
      ctx.stroke();

      ctx.fillStyle = '#7ed6ff';
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); ctx.beginPath(); ctx.arc(x,y,3.6,0,Math.PI*2); ctx.fill(); });

      ctx.fillStyle = '#dce9ff';
      ctx.font = '11px -apple-system,Segoe UI';
      ctx.fillText('记录序号', right-56, bottom+16);
      ctx.fillText('读数趋势', left+2, top+10);
    }

    function setDockPos(el, x, y){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const nx = clamp(x, 4, stage.width - r.width - 4);
      const ny = clamp(y, 4, stage.height - r.height - 4);
      el.style.left = `${nx}px`;
      el.style.top = `${ny}px`;
      el.style.right = 'auto';
      el.style.bottom = 'auto';
    }

    function isNarrowStage(){
      return stageEl.getBoundingClientRect().width <= 760;
    }

    function shouldStartControlCollapsed(){
      return true;
    }

    function bringToFront(kind){
      state.zTop += 1;
      if(kind==='control') controlDock.style.zIndex = String(state.zTop);
      if(kind==='data') dataDock.style.zIndex = String(state.zTop);
    }

    function snapDockToEdges(el){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const x = r.left - stage.left;
      const y = r.top - stage.top;
      const leftGap = x;
      const rightGap = stage.width - (x + r.width);
      const topGap = y;
      const bottomGap = stage.height - (y + r.height);
      const m = 14;
      let nx = x, ny = y;
      if(leftGap < m) nx = 4;
      else if(rightGap < m) nx = stage.width - r.width - 4;
      if(topGap < m) ny = 4;
      else if(bottomGap < m) ny = stage.height - r.height - 4;
      setDockPos(el, nx, ny);
    }

    function makeDockDraggable(el, head, kind){
      let dragging = false;
      let offX = 0, offY = 0;
      head.addEventListener('pointerdown', (e)=>{
        if(e.target.closest('button')) return;
        dragging = true;
        el.classList.add('dragging');
        bringToFront(kind);
        const r = el.getBoundingClientRect();
        offX = e.clientX - r.left;
        offY = e.clientY - r.top;
        state.dockMoved[kind] = true;
        head.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      head.addEventListener('pointermove', (e)=>{
        if(!dragging) return;
        const stage = stageEl.getBoundingClientRect();
        setDockPos(el, e.clientX - stage.left - offX, e.clientY - stage.top - offY);
        e.preventDefault();
      });
      const end = ()=>{
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        snapDockToEdges(el);
      };
      head.addEventListener('pointerup', end);
      head.addEventListener('pointercancel', end);
    }

    function setControlCollapsed(on){
      state.controlCollapsed = !!on;
      controlBody.classList.toggle('collapsed', state.controlCollapsed);
      controlToggleBtn.textContent = state.controlCollapsed ? '展开' : '收起';
      bringToFront('control');
      if(!state.controlCollapsed) initDockPositions(true);
    }

    function setDataCollapsed(on){
      state.dataCollapsed = !!on;
      dataBody.classList.toggle('collapsed', state.dataCollapsed);
      dataToggleBtn.textContent = state.dataCollapsed ? '展开' : '收起';
      bringToFront('data');
      if(!state.dataCollapsed){
        clearBadge();
        scheduleChart();
      }
      initDockPositions(true);
    }

    function initDockPositions(force=false){
      const stage = stageEl.getBoundingClientRect();
      const cr = controlDock.getBoundingClientRect();
      const dr = dataDock.getBoundingClientRect();
      const pad = 10;
      if(force || !state.dockMoved.control) setDockPos(controlDock, stage.width - cr.width - pad, pad);
      if(force || !state.dockMoved.data) setDockPos(dataDock, stage.width - dr.width - pad, Math.min(pad + cr.height + 12, stage.height - dr.height - pad));
    }

    function clearData(showTip=true){
      state.records = [];
      state.analysisOk = false;
      state.unseenRecordCount = 0;
      analysisText.classList.remove('ok');
      analysisText.textContent = '暂无。请按步骤操作器材并记录数据后分析。';
      updateBadge();
      renderRecords();
      scheduleChart();
      if(showTip) showToast('数据已清空');
    }

    function restoreAutoDemoUI(){
      state.autoPlaying = false;
      updateModeHud();
      updateAutoDemoBtn();
      recordBtn.disabled = false;
      checkBtn.disabled = false;
      analyzeBtn.disabled = false;
      resetBtn.disabled = false;
      freeBtn.disabled = false;
      setDemoCursorVisible(false);
    }

    function resetFlow(showTip=true){
      clearAllTimers();
      state.completed = false;
      state.successCooldown = false;
      state.stepWarnIdx = -1;
      doneMaskEl.style.display = 'none';
      setDemoCursorVisible(false);
      state.apparatus = makeInitialApparatus();
      if(LAB_ID === 16) state.apparatus.object = state.vars.object;
      if(LAB_ID === 18) setExp18MarkerMode(state.apparatus.markerMode);
      clearData(false);
      setStepUI(0);
      setStatus(state.freeMode ? '自由探索' : '待开始');
      updatePills();
      if(showTip) showToast('实验已重置');
    }

    function requestStopAutoDemo(){
      if(!state.autoPlaying) return;
      state.autoPlaying = false;
      state.autoRunId += 1;
      restoreAutoDemoUI();
      setStatus('已退出自动演示');
      showToast('已退出自动演示');
    }

    async function autoDemo(){
      if(state.autoPlaying){
        requestStopAutoDemo();
        return;
      }
      if(state.freeMode) return;
      const runId = ++state.autoRunId;
      state.autoPlaying = true;
      updateModeHud();
      updateAutoDemoBtn();
      recordBtn.disabled = true;
      checkBtn.disabled = true;
      analyzeBtn.disabled = true;
      resetBtn.disabled = true;
      freeBtn.disabled = true;

      const ensure = ()=>{ if(!state.autoPlaying || runId !== state.autoRunId) throw new Error('auto-cancelled'); };
      const wait = async (ms)=>{ await sleep(ms); ensure(); };
      const clickEl = async (el, ms=220, fire=true)=>{
        const {x,y} = centerOf(el);
        await moveDemoCursorTo(x, y, 240);
        await pulseDemoCursor();
        if(fire) el.click();
        await wait(ms);
      };
      const doA = async (id, ms=950, btnIndex=null)=>{
        if(typeof btnIndex === 'number' && actionBtns.children[btnIndex]){
          await clickEl(actionBtns.children[btnIndex], 120, false);
        }
        if(!performAction(id, false)) throw new Error(`AUTO_ACTION_FAILED:${id}`);
        updatePills();
        await wait(ms);
      };
      const doR = async (ms=320)=>{
        const beforeLen = state.records.length;
        await clickEl(recordBtn, 120, false);
        if(!addRecord()) throw new Error('AUTO_RECORD_FAILED');
        if(state.records.length <= beforeLen) throw new Error('AUTO_RECORD_NOT_PERSISTED');
        await wait(ms);
      };
      const dragExp18Marker = async (mode)=>{
        const from = exp18MarkerCenter();
        const r = scene.getBoundingClientRect();
        const g = get18Geometry(r.width, r.height);
        const metric = get18MeasureMap(g);
        const targetT = mode === 'half' ? metric.markerCenterHalfT : metric.markerCenterFullT;
        const tx = g.top.x + g.dx * targetT;
        const ty = g.top.y + g.dy * targetT;
        await moveDemoCursorTo(from.x, from.y, 180);
        await pulseDemoCursor(120);
        await moveDemoCursorTo(tx, ty, 260);
        setExp18MarkerMode(mode);
        await wait(160);
      };
      const releaseExp18CartDemo = async ()=>{
        const c = exp18CartCenter();
        await moveDemoCursorTo(c.x, c.y, 180);
        await pulseDemoCursor(120);
        if(!releaseExp18Cart()) throw new Error('AUTO_CART_RELEASE_FAILED');
        await wait(120);
      };

      try{
        resetFlow(false);
        setFreeMode(false);
        setControlCollapsed(false);
        setDataCollapsed(true);
        initDockPositions(true);
        setDemoCursorVisible(true);
        updateModeHud();
        updateAutoDemoBtn();

        if(LAB_ID===18){
          setStepUI(0);
          setStatus('自动演示：第一组测速');
          showToast('步骤1：第一组速度'); await wait(420);
          setExp18MarkerMode('full');
          await dragExp18Marker('full');
          await releaseExp18CartDemo();
          await wait(1800);
          await doR();
          await clickEl(checkBtn, 160, false);
          if(!tryPassStep(false, true)) throw new Error('AUTO_STEP1_NOT_PASSED');

          setStepUI(1);
          setStatus('自动演示：第二组测速');
          showToast('步骤2：第二组速度'); await wait(420);
          await doA('resetCart', 500, 0);
          await dragExp18Marker('half');
          await releaseExp18CartDemo();
          await wait(1500);
          await doR();
          await clickEl(checkBtn, 160, false);
          if(!tryPassStep(false, true)) throw new Error('AUTO_STEP2_NOT_PASSED');

          setStepUI(2);
          setStatus('自动演示：比较速度');
          showToast('步骤3：比较两组速度差异'); await wait(420);
          await clickEl(checkBtn, 160, false);
          if(!tryPassStep(false, true)) throw new Error('AUTO_STEP3_NOT_PASSED');

          setStepUI(3);
          setStatus('自动演示：分析结论');
          showToast('步骤4：分析结论'); await wait(420);
          await clickEl(analyzeBtn, 160, false);
          if(!analyzeConclusion(false)) throw new Error('AUTO_ANALYSIS_NOT_READY');
          await wait(220);
          await clickEl(checkBtn, 160, false);
          if(!tryPassStep(false, true)) throw new Error('AUTO_STEP4_NOT_PASSED');
        }
      }catch(err){
        if(err && err.message !== 'auto-cancelled'){
          console.error('[autoDemo] failed:', err);
          setStatus('自动演示失败');
          showToast('自动演示失败，请重试');
        }
      }finally{
        if(runId === state.autoRunId){
          restoreAutoDemoUI();
        }
      }
    }

    function bindEvents(){
      controlToggleBtn.addEventListener('click', ()=>setControlCollapsed(!state.controlCollapsed));
      dataToggleBtn.addEventListener('click', ()=>setDataCollapsed(!state.dataCollapsed));

      recordBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) addRecord(); });
      checkBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) tryPassStep(true); });
      analyzeBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) analyzeConclusion(true); });
      resetBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) resetFlow(true); });
      autoDemoBtn.addEventListener('click', autoDemo);
      freeBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) setFreeMode(!state.freeMode); });
      okBtn.addEventListener('click', ()=>{ doneMaskEl.style.display = 'none'; });

      const onResize = (()=>{
        let t = 0;
        return ()=>{
          clearTimeout(t);
          t = setTimeout(()=>{
            if(!state.dockMoved.control || !state.dockMoved.data) initDockPositions(false);
            snapDockToEdges(controlDock);
            snapDockToEdges(dataDock);
            scheduleChart();
          }, 130);
        };
      })();

      window.addEventListener('resize', onResize);
      window.addEventListener('orientationchange', onResize);
      document.addEventListener('gesturestart', e=>e.preventDefault(), {passive:false});

      controlDock.addEventListener('pointerdown', ()=>bringToFront('control'));
      dataDock.addEventListener('pointerdown', ()=>bringToFront('data'));

      scene.addEventListener('pointerdown', (e)=>{
        if(LAB_ID !== 18 || state.autoPlaying) return;
        const ap = state.apparatus;
        const pt = getScenePoint(e);
        const marker = exp18MarkerCenter();
        const cart = exp18CartCenter();
        if(!ap.running && Math.hypot(pt.x - marker.x, pt.y - marker.y) < 36){
          state.draggingId = 'exp18-marker';
          ap.draggingMarker = true;
          ap.dragHoverMode = ap.markerMode;
          ap.dragHoverCm = ap.customDistanceCm;
          ap.dragMarkerT = ap.markerT;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
          return;
        }
        if(!ap.running && ap.cartReady && Math.hypot(pt.x - cart.x, pt.y - cart.y) < 40){
          state.draggingId = 'exp18-cart';
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
        }
      });

      scene.addEventListener('pointermove', (e)=>{
        if(LAB_ID !== 18 || state.draggingId !== 'exp18-marker') return;
        updateExp18MarkerDrag(getScenePoint(e));
        e.preventDefault();
      });

      const endScenePointer = (e)=>{
        if(LAB_ID !== 18) return;
        const ap = state.apparatus;
        if(state.draggingId === 'exp18-marker'){
          if(state.freeMode){
            setExp18MarkerDistanceCm(ap.dragHoverCm || Math.max(10, Math.round(ap.activeDistanceM * 100)));
            setStatus(`金属片已吸附到 ${state.apparatus.customDistanceCm}cm 位置`);
          }else{
            const mode = ap.dragHoverMode || ap.markerMode;
            setExp18MarkerMode(mode);
            setStatus(mode === 'half' ? '金属片已吸附到斜面中部' : '金属片已吸附到斜面底端');
          }
          ap.draggingMarker = false;
          ap.dragHoverMode = null;
          ap.dragHoverCm = null;
        }else if(state.draggingId === 'exp18-cart'){
          releaseExp18Cart();
        }
        state.draggingId = null;
      };
      scene.addEventListener('pointerup', endScenePointer);
      scene.addEventListener('pointercancel', endScenePointer);
    }

    function init(){
      initUIStatic();
      initTaskUI();
      state.apparatus = makeInitialApparatus();
      if(LAB_ID === 18) setExp18MarkerMode(state.apparatus.markerMode);
      initControls();
      initActionButtons();
      updatePills();
      renderRecords();

      makeDockDraggable(controlDock, controlHead, 'control');
      makeDockDraggable(dataDock, dataHead, 'data');
      bindEvents();

      setControlCollapsed(shouldStartControlCollapsed());
      setDataCollapsed(true);
      initDockPositions(true);
      updateModeHud();
      updateAutoDemoBtn();
      updateBadge();
      setStatus('待开始');

      state.lastTs = 0;
      if(state.rafId) cancelAnimationFrame(state.rafId);
      state.rafId = requestAnimationFrame(loop);
      scheduleChart();
    }

    init();
  </script>

<script id="exp35-ui-normalize-runtime">
(function(){
  "use strict";
  var $ = function(selector){ return document.querySelector(selector); };
  var hintLamp = $("#hintLamp");
  var hintPop = $("#hintPop");
  var taskHint = $("#taskHint");
  var taskText = $("#taskText");
  var dataDock = $("#dataDock");
  var dataNotice = $("#dataNotice");
  var recordBody = $("#recordBody");
  var recordChart = $("#recordChart");
  var modalTitle = $("#doneMask .modal h3");

  try {
    if (typeof state !== "undefined") window.state = state;
  } catch (_) {}

  if (modalTitle && !/实验完成/.test(modalTitle.textContent || "")) {
    modalTitle.textContent = "实验完成";
  }

  function updateHintText(){
    if (!hintPop) return;
    var hint = taskHint ? taskHint.textContent.trim() : "";
    var text = taskText ? taskText.textContent.trim() : "";
    hintPop.textContent = hint || text || "按步骤操作器材，观察现象并记录数据。";
  }

  if (hintLamp && hintPop && !hintLamp.dataset.exp35Bound) {
    hintLamp.dataset.exp35Bound = "1";
    updateHintText();
    hintLamp.addEventListener("click", function(){
      updateHintText();
      hintPop.classList.toggle("open");
    });
  }

  function drawRecordChart(){
    if (!recordChart) return;
    var ctx = recordChart.getContext("2d");
    if (!ctx) return;
    var dpr = window.devicePixelRatio || 1;
    var w = recordChart.clientWidth || 320;
    var h = recordChart.clientHeight || 180;
    var nextW = Math.max(1, Math.round(w * dpr));
    var nextH = Math.max(1, Math.round(h * dpr));
    if (recordChart.width !== nextW || recordChart.height !== nextH) {
      recordChart.width = nextW;
      recordChart.height = nextH;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = "rgba(155,211,255,.22)";
    ctx.lineWidth = 1;
    for (var x = 24; x < w; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 14); ctx.lineTo(x, h - 18); ctx.stroke();
    }
    for (var y = 28; y < h - 8; y += 30) {
      ctx.beginPath(); ctx.moveTo(12, y); ctx.lineTo(w - 12, y); ctx.stroke();
    }
    var rows = recordBody ? Array.from(recordBody.querySelectorAll("tr")).filter(function(row){
      return row.querySelectorAll("td").length > 1 && !/当前无记录|暂无|还没有记录/.test(row.textContent);
    }) : [];
    ctx.font = "700 13px Arial";
    ctx.fillStyle = "#cfe4ff";
    ctx.fillText("记录概览", 16, 24);
    if (!rows.length) {
      ctx.font = "12px Arial";
      ctx.fillStyle = "rgba(235,245,255,.64)";
      ctx.fillText("完成步骤后，这里显示记录进度。", 16, 52);
      return;
    }
    var max = Math.max(3, rows.length);
    rows.slice(0, 8).forEach(function(row, index){
      var barW = (w - 96) * ((index + 1) / max);
      var y = 46 + index * 20;
      ctx.fillStyle = ["#ffd54f", "#3ddc97", "#5bbcff", "#ef476f"][index % 4];
      ctx.fillRect(72, y - 10, barW, 9);
      ctx.fillStyle = "rgba(235,245,255,.86)";
      ctx.font = "12px Arial";
      ctx.fillText("记录 " + (index + 1), 16, y);
    });
  }

  if (recordBody && recordChart && !recordChart.dataset.exp35Bound) {
    recordChart.dataset.exp35Bound = "1";
    new MutationObserver(drawRecordChart).observe(recordBody, { childList:true, subtree:true, characterData:true });
    window.addEventListener("resize", drawRecordChart);
    setTimeout(drawRecordChart, 60);
  }

  if (dataDock && dataNotice && !dataDock.dataset.exp35NoticeBound) {
    dataDock.dataset.exp35NoticeBound = "1";
    var clearNotice = function(){
      dataNotice.textContent = "0";
      dataNotice.classList.remove("show");
      dataNotice.classList.add("hidden");
    };
    dataDock.addEventListener("click", function(evt){
      if (evt.target && evt.target.id === "dataToggleBtn") setTimeout(clearNotice, 20);
    });
  }
})();
</script>


<script id="exp35-ui-completion-drawer-fit">
(function(){
  "use strict";
  var $ = function(selector, root){ return (root || document).querySelector(selector); };
  var stage = $("#stage");
  var controlDock = $("#controlDock");
  var dataDock = $("#dataDock");
  var controlBody = $("#controlBody") || $("#panelBody") || (controlDock && ($(".panelBody", controlDock) || $(".dockBody", controlDock) || $(".dock-body", controlDock) || $(".drawer-body", controlDock)));
  var dataBody = $("#dataBody") || $("#resultsBody") || (dataDock && ($(".resultsBody", dataDock) || $(".dockBody", dataDock) || $(".dock-body", dataDock) || $(".drawer-body", dataDock)));
  var controlToggle = $("#controlToggleBtn") || $('[data-toggle="controlDock"]');
  var dataToggle = $("#dataToggleBtn") || $('[data-toggle="dataDock"]');
  var doneMask = $("#doneMask");
  var mobileCompletionOpened = false;

  function isDone(){
    var modalDone = doneMask && getComputedStyle(doneMask).display !== "none";
    var stateDone = false;
    try { stateDone = !!window.state && !!window.state.completed; } catch (_) {}
    return modalDone || stateDone;
  }

  function isMobile(){
    return window.innerWidth <= 720 || (stage && stage.clientWidth <= 720);
  }

  function syncMobileShell(){
    if (typeof window.codexLabMobileSync === "function") window.codexLabMobileSync();
    if (typeof window.codexExp11MobileSync === "function") window.codexExp11MobileSync();
    if (typeof window.codexExp11GraphRelayout === "function") window.codexExp11GraphRelayout();
  }

  function setPanelCollapsed(dock, body, toggle, collapsed){
    if (dock) dock.classList.toggle("collapsed", collapsed);
    if (body) body.classList.toggle("collapsed", collapsed);
    if (toggle) toggle.textContent = collapsed ? "展开" : "收起";
  }

  function placeDock(dock, left, top){
    if (!dock || !stage) return;
    var sw = stage.clientWidth;
    var sh = stage.clientHeight;
    var w = dock.offsetWidth || 160;
    var h = dock.offsetHeight || 44;
    var x = Math.max(10, Math.min(left, sw - w - 10));
    var y = Math.max(10, Math.min(top, sh - h - 10));

})();
