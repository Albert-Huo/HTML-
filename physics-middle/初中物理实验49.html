    function drawSplitScrapedRod(x1,y,x2,width,upperColor,lowerColor){

    function drawHalfScrapeIcon(cx,cy,len,h,s,angle,prepared){

    function sampleCubic(p0,p1,p2,p3,steps){
      const pts=[];
      for(let i=0;i<=steps;i++){
        const t=i/steps, mt=1-t;
        pts.push([
          mt*mt*mt*p0[0]+3*mt*mt*t*p1[0]+3*mt*t*t*p2[0]+t*t*t*p3[0],
          mt*mt*mt*p0[1]+3*mt*mt*t*p1[1]+3*mt*t*t*p2[1]+t*t*t*p3[1]
        ]);
      }
      return pts;
    }
    function drawDotOnPolyline(points,t,r,color){
      let total=0;

        lengths.push(len);
        total+=len;
      }
      let target=t*total;
      for(let i=0;i<lengths.length;i++){
        if(target<=lengths[i]){
          const p=points[i], q=points[i+1], k=lengths[i] ? target/lengths[i] : 0;
          ctx.save();
          ctx.fillStyle=color;
          ctx.shadowColor="rgba(255,216,106,.7)";
          ctx.shadowBlur=8;
          ctx.beginPath();
          ctx.arc(p[0]+(q[0]-p[0])*k,p[1]+(q[1]-p[1])*k,r,0,Math.PI*2);
          ctx.fill();
          ctx.restore();
          return;
        }
        target-=lengths[i];
      }
    }
