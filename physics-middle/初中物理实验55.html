    function getSnapshot(){return structuredClone({schemaVersion:1,experimentId:55,mode:state.freeMode?"free":"guided",currentTask:state.currentTask,completed:state.completed,analysisDone:state.analysisDone,records:state.records,auto:{playing:state.autoPlaying,lastError:state.lastError},resources:{rafActive:state.rafId!==0,timerCount:state.delays.size+state.uiTimers.size+(state.resizeTimer?1:0)},physics:physicsSnapshot(),geometry:geometrySnapshot()});}
    async function performTestAction(action){if(!action||typeof action.type!=="string")throw new Error("实验55测试动作无效");switch(action.type){case"blank-click":return false;case"set-current-level":return setCurrentLevel(action.level,{quiet:true});case"close-switch":return toggleSwitch(true,{quiet:true});case"open-switch":return toggleSwitch(false,{quiet:true});case"wait-for-heating":simulate(Number(action.durationMs)||1200);return true;case"wait-for-settle":return simulateToSettle();case"record-observation":return recordObservation();case"record-comparison":return recordComparison();case"analyze-conclusion":return analyzeConclusion();case"set-mode":setFreeMode(action.mode==="free");return true;default:throw new Error(`实验55不支持测试动作：${action.type}`);}}
    function init(){dots.innerHTML=TASKS.map(()=>'<span class="dot"></span>').join("");installInputs();bindDrawer(controlDock);bindDrawer(dataDock);recordBtn.addEventListener("click",()=>recordObservation());analyzeBtn.addEventListener("click",()=>state.freeMode?recordComparison():analyzeConclusion());resetBtn.addEventListener("click",()=>resetState());autoDemoBtn.addEventListener("click",()=>state.autoPlaying?cancelAutoDemo():runAutoDemo());freeBtn.addEventListener("click",()=>setFreeMode(!state.freeMode));controlToggleBtn.addEventListener("click",()=>setDrawerCollapsed(controlDock,!controlDock.classList.contains("collapsed")));dataToggleBtn.addEventListener("click",()=>setDrawerCollapsed(dataDock,!dataDock.classList.contains("collapsed")));hintLamp.addEventListener("click",()=>hintPop.classList.toggle("open"));okBtn.addEventListener("click",()=>doneMask.style.display="none");window.addEventListener("resize",()=>{cancelResize();state.resizeTimer=setTimeout(()=>{state.resizeTimer=0;resizeCanvas();},100);});setDrawerCollapsed(controlDock,true);setDrawerCollapsed(dataDock,true);resetState({quiet:true});const facade={};Object.defineProperties(facade,{autoPlaying:{enumerable:true,get:()=>state.autoPlaying},freeMode:{enumerable:true,get:()=>state.freeMode},completed:{enumerable:true,get:()=>state.completed},unseenRecords:{enumerable:true,get:()=>state.unseenRecords,set:value=>{if(value===0){state.unseenRecords=0;updateBadge();}}}});Object.defineProperty(window,"state",{value:Object.freeze(facade),writable:false,configurable:false});Object.defineProperty(window,"__labTestApi",{value:Object.freeze({getSnapshot,reset:externalReset,runAutoDemo,cancelAutoDemo,performTestAction}),writable:false,configurable:false});}
    init();
  })();

  <script id="codex-exp51-55-ui-runtime">
  (() => {
    "use strict";
    const $ = s => document.querySelector(s);
    const stage = $("#stage"), controlDock = $("#controlDock"), dataDock = $("#dataDock");
    if (!stage || !controlDock || !dataDock) return;
    const taskStep = $("#taskStep"), modeTag = $("#modeTag"), recordBody = $("#recordBody"), dataNotice = $("#dataNotice");
    const controlToggleBtn = $("#controlToggleBtn"), dataToggleBtn = $("#dataToggleBtn"), analysisText = $("#analysisText");
    const resetBtn = $("#resetBtn"), autoDemoBtn = $("#autoDemoBtn"), freeBtn = $("#freeBtn"), hintLamp = $("#hintLamp"), hintPop = $("#hintPop");
    const isMobile = () => window.matchMedia("(max-width:720px)").matches || stage.clientWidth <= 720;
    let tabsEl = null, syncing = false, queued = false;
    function makeTab(id, label){
      const btn = document.createElement("button");
      btn.className = "mobile-tab";
      btn.id = id;
      btn.type = "button";
      btn.innerHTML = `<span class="tab-label">${label}<span class="mobile-badge" aria-hidden="true">0</span></span>`;
      return btn;
    }
    function ensureTabs(){
      if (tabsEl) return;
      tabsEl = document.createElement("div");
      tabsEl.className = "mobile-tabs";
      tabsEl.setAttribute("role", "group");
      tabsEl.setAttribute("aria-label", "实验数据面板切换");
      const exp = makeTab("experimentTab", "实验面板");
      const data = makeTab("dataTab", "数据面板");
      tabsEl.append(exp, data);
      stage.appendChild(tabsEl);
      exp.addEventListener("click", () => setMobilePanel("control"));
      data.addEventListener("click", () => setMobilePanel("data"));
      ensureClose(controlDock);
      ensureClose(dataDock);
    }
    function ensureClose(dock){
      const body = dock.querySelector(".dock-body");
      if (!body || body.querySelector(".sheet-close")) return;
      const btn = document.createElement("button");
      btn.className = "sheet-close";
      btn.type = "button";
      btn.textContent = "⌄";
      btn.title = "收起";
      btn.setAttribute("aria-label", "收起");
      btn.addEventListener("click", () => setMobilePanel(null));
      body.appendChild(btn);
    }
    function setCollapsed(dock, collapsed){
      dock.classList.toggle("collapsed", !!collapsed);
      const btn = dock === controlDock ? controlToggleBtn : dataToggleBtn;
      if (btn) btn.textContent = collapsed ? "展开" : "收起";
    }
    function clearDataNotice(){
      if (window.state && typeof window.state.unseenRecords === "number") window.state.unseenRecords = 0;
      if (dataNotice) {
        dataNotice.textContent = "0";
        dataNotice.classList.remove("show");
      }
    }
    function setMobilePanel(panel){
      ensureTabs();
      if (!isMobile()) return;
      if (panel === "control") {
        setCollapsed(controlDock, false);
        setCollapsed(dataDock, true);
      } else if (panel === "data") {
        setCollapsed(controlDock, true);
        setCollapsed(dataDock, false);
        clearDataNotice();
      } else {
        setCollapsed(controlDock, true);
        setCollapsed(dataDock, true);
      }
      syncTabs();
    }
    function syncTabs(){
      if (!tabsEl) return;
      const exp = tabsEl.querySelector("#experimentTab");
      const data = tabsEl.querySelector("#dataTab");
      const controlOpen = !controlDock.classList.contains("collapsed");
      const dataOpen = !dataDock.classList.contains("collapsed");
      tabsEl.classList.toggle("attached", controlOpen || dataOpen);
      exp.classList.toggle("active", controlOpen);
      data.classList.toggle("active", dataOpen);
      exp.setAttribute("aria-expanded", String(controlOpen));
      data.setAttribute("aria-expanded", String(dataOpen));
      syncBadge();
    }
    function syncBadge(){
      if (!tabsEl || !dataNotice) return;
      const badge = tabsEl.querySelector("#dataTab .mobile-badge");
      const count = parseInt(dataNotice.textContent || "0", 10) || 0;
      if (!badge) return;
      badge.textContent = count > 99 ? "99+" : String(count);
      badge.classList.toggle("show", count > 0 && dataDock.classList.contains("collapsed"));
    }
    function annotateRecords(){
      if (!recordBody) return;
      recordBody.querySelectorAll("tr").forEach(tr => {
        const cells = tr.querySelectorAll("td");
        const labels = ["阶段", "电路", "温度", "能量"];
        cells.forEach((cell, index) => cell.dataset.label = labels[index] || "记录");
      });
    }
    function syncAnalysis(){
      if (!analysisText) return;
      const placeholder = /完成三次记录后分析/.test(analysisText.textContent || "");
      analysisText.classList.toggle("codex-placeholder-hidden", placeholder && !analysisText.classList.contains("ok"));
    }
    function normalizeText(){
      if (taskStep) {
        const m = (taskStep.textContent || "").match(/(?:步骤|关卡)\s*(\d+)\s*\/\s*(\d+)/);
        if (m) {
          const next = "关卡 " + m[1] + "/" + m[2];
          if (taskStep.textContent !== next) taskStep.textContent = next;
        }
      }
      const st = window.state || {};
      if (modeTag) {
        const stepText = taskStep ? (taskStep.textContent || "").replace(/\s+/g, " ").trim() : "";
        const sm = stepText.match(/关卡\s*(\d+)\s*\/\s*(\d+)/); const stepMode = sm ? "关卡 " + sm[1] + "/" + sm[2] : stepText; let next = "模式：闯关模式" + (stepMode ? " · " + stepMode : "");
        if (st.autoPlaying) next = "模式：演示模式 · 自动运行";
        else if (st.freeMode) next = "模式：自由模式";
        else if (st.completed) next = "模式：闯关模式 · 已通关";
        if (modeTag.textContent !== next) modeTag.textContent = next;
      }
      if (resetBtn && resetBtn.textContent !== "重置关卡") resetBtn.textContent = "重置关卡";
      if (autoDemoBtn) {
        const next = st.autoPlaying || /退出/.test(autoDemoBtn.textContent || "") ? "退出演示模式" : "演示模式";
        if (autoDemoBtn.textContent !== next) autoDemoBtn.textContent = next;
      }
      if (freeBtn && !/退出/.test(freeBtn.textContent || "") && freeBtn.textContent !== "自由模式") freeBtn.textContent = "自由模式";
      if (hintLamp) hintLamp.setAttribute("aria-label", "查看实验提示");
      if (hintPop) hintPop.setAttribute("role", "note");
    }
    function syncMobile(){
      ensureTabs();
      const mobile = isMobile();
      controlDock.classList.toggle("mobile-sheet", mobile);
      dataDock.classList.toggle("mobile-sheet", mobile);
      if (mobile && stage.dataset.codexMobileReady !== "1") {
        stage.dataset.codexMobileReady = "1";
        setMobilePanel(null);
      }
      const controlOpen = !controlDock.classList.contains("collapsed");
      const dataOpen = !dataDock.classList.contains("collapsed");
      stage.classList.toggle("mobile-panel-open", mobile && (controlOpen || dataOpen));
      if (!mobile) { stage.dataset.codexMobileReady = "0"; stage.classList.remove("mobile-panel-open"); }
      syncTabs();
    }
    function syncAll(){
      if (syncing) return;
      syncing = true;
      annotateRecords();
      syncAnalysis();
      normalizeText();
      syncMobile();
      syncing = false;
    }
    function queueSync(){
      if (queued) return;
      queued = true;
      requestAnimationFrame(() => {
        queued = false;
        syncAll();
      });
    }
    new MutationObserver(queueSync).observe(stage, { childList:true, subtree:true, attributes:true, attributeFilter:["class", "style"] });
    window.addEventListener("resize", queueSync, { passive:true });
    syncAll();
  })();
  </script>
