<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <link rel="icon" href="data:,">
  <title>初中物理实验61｜用电流表测量电流</title>
  <style>
    :root{
      --bg:#1a1a1a;--ink:#fff;--card:rgba(255,255,255,.08);--panel:rgba(14,18,22,.7);
      --line:rgba(255,255,255,.13);--green:#3ddc97;--blue:#5bbcff;--yellow:#ffd166;
      --red:#ff5b6e;--shadow:0 14px 36px rgba(0,0,0,.42)
    }
    *{box-sizing:border-box}
    html,body{min-height:100%}
    body{margin:0;padding:10px;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;display:flex;justify-content:center}
    #app{width:100%;max-width:980px;margin:0 auto 34px}
    button{font:inherit;touch-action:manipulation}
    button.main,button.sub{border:0;border-radius:8px;padding:8px 12px;background:#444;color:#fff;font-size:13px;font-weight:800;cursor:pointer;transition:.18s}
    button.main{background:#278d4a}
    button:hover:not(:disabled){filter:brightness(1.15)}
    button:active:not(:disabled){transform:scale(.98)}
    button:disabled{opacity:.34;cursor:not-allowed;filter:grayscale(.7)}
    #spectrum{position:relative;height:24px;margin-bottom:12px;border-radius:10px;overflow:hidden;background:#050505;box-shadow:0 0 15px rgba(255,255,255,.12)}
    #spectrum::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,#ff4c4c 0%,#ff9a3d 6%,#f7e94c 12%,#54e86d 18%,#40e0d0 25%,#4aa3ff 32%,#8757ff 39%,#ec5cff 45%,#ff4c4c 50%,#ff9a3d 56%,#f7e94c 62%,#54e86d 68%,#40e0d0 75%,#4aa3ff 82%,#8757ff 89%,#ec5cff 95%,#ff4c4c 100%);background-size:200% 100%;animation:rainbow 8s linear infinite}
    @keyframes rainbow{to{background-position:-100% 0}}
    .task-card{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--card);backdrop-filter:blur(6px)}
    .task-step{padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.16);font-weight:900;white-space:nowrap}
    .task-text{min-width:0;line-height:1.5;font-weight:800}
    #taskHint{margin-top:2px;color:#ffd54f;font-size:12px;font-weight:700}
    .progress-dots{display:flex;gap:7px}
    .dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.24);outline:2px solid rgba(255,255,255,.1)}
    .dot.active{background:#ffb74d}.dot.done{background:var(--green);outline-color:rgba(61,220,151,.5)}.dot.warn{background:var(--red);box-shadow:0 0 10px rgba(255,91,110,.7)}
    #stage{position:relative;height:66vh;min-height:510px;max-height:660px;margin-top:10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:#081018;box-shadow:0 10px 28px rgba(0,0,0,.38);touch-action:pan-y pinch-zoom}
    .lab-area{position:absolute;inset:54px 10px 10px;overflow:hidden;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:#06101a}
    #labCanvas{display:block;width:100%;height:100%;cursor:crosshair;touch-action:none}
    .hud{position:absolute;left:10px;top:10px;z-index:20;display:flex;gap:8px;align-items:center;padding:7px 10px;border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.5);font-size:12px}
    .tag{padding:3px 8px;border:1px solid rgba(255,255,255,.24);border-radius:999px;background:rgba(255,255,255,.06);font-weight:800;color:#dce9ff;white-space:nowrap}
    #modeTag.mode-strip{position:relative;isolation:isolate;min-width:158px;overflow:hidden;border:2px solid transparent;padding:4px 12px;background:linear-gradient(rgba(6,10,14,.94),rgba(6,10,14,.94)) padding-box,linear-gradient(90deg,#35ff73,#4bd8ff,#6c5cff,#ff4fc3,#ffd166,#35ff73) border-box;background-size:100% 100%,260% 100%;animation:modeFlow 3.2s linear infinite}
    #modeTag.mode-strip::before{content:"";position:absolute;top:-2px;bottom:-2px;left:-45%;width:42%;background:linear-gradient(100deg,transparent,rgba(255,255,255,.9),transparent);transform:skewX(-18deg);animation:sweep 2.4s linear infinite;mix-blend-mode:screen}
    @keyframes modeFlow{to{background-position:0 0,-260% 0}}@keyframes sweep{from{transform:skewX(-18deg) translateX(-140%)}to{transform:skewX(-18deg) translateX(460%)}}
    .hint-lamp{position:absolute;left:10px;top:56px;z-index:22;width:34px;height:34px;padding:0;border:1px solid rgba(255,255,255,.2);border-radius:8px;background:rgba(255,255,255,.08);color:#ffd54f;cursor:pointer}
    .hint-lamp.flash{animation:lamp .6s ease}@keyframes lamp{50%{border-color:var(--red);box-shadow:0 0 22px rgba(255,91,110,.85)}}
    .hint-pop{position:absolute;left:10px;top:96px;z-index:23;display:none;width:min(350px,calc(100% - 24px));padding:10px 12px;border:1px solid rgba(255,209,102,.36);border-radius:10px;background:rgba(16,18,20,.92);font-size:13px;line-height:1.55;color:#f4efe2}
    .hint-pop.open{display:block}
    .dock{position:absolute;z-index:30;width:min(94%,360px);overflow:hidden;border:1px solid var(--line);border-radius:12px;background:var(--panel);backdrop-filter:blur(8px);box-shadow:var(--shadow);touch-action:none}
    .dock.collapsed{width:154px}
    .dock-header{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);cursor:grab;touch-action:none}
    .dockTitle{font-size:13px;font-weight:900;color:#e7f0ff;white-space:nowrap}
    .iconBtn{padding:4px 8px;border:1px solid rgba(255,255,255,.2);border-radius:7px;background:rgba(255,255,255,.08);color:#e8f1ff;font-size:12px;cursor:pointer}
    .dock-body{max-height:330px;overflow:auto;padding:10px}.collapsed .dock-body{display:none}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .analysis{margin-top:9px;padding:8px 10px;border:1px solid rgba(91,188,255,.3);border-radius:8px;background:rgba(91,188,255,.08);font-size:13px;line-height:1.5;color:#d9ecff}
    .analysis:empty{display:none}.analysis.ok{border-color:rgba(61,220,151,.55);background:rgba(61,220,151,.12);color:#e7fff3}
    .badge{display:inline-grid;place-items:center;min-width:18px;height:18px;padding:0 5px;border-radius:999px;background:#ef476f;font-size:12px;opacity:0;transform:scale(.5)}
    .badge.show{opacity:1;transform:scale(1);animation:pulse .9s ease-in-out infinite}@keyframes pulse{50%{transform:scale(1.14)}}
    table.record{width:100%;border-collapse:collapse;font-size:12px;color:#e8f1ff}
    table.record th,table.record td{padding:6px;border:1px solid rgba(255,255,255,.1);text-align:left;vertical-align:top}
    table.record th{background:rgba(255,255,255,.08);color:#cfe4ff}.empty{margin:8px 2px;color:#aebbd0;font-size:12px}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .toast{position:absolute;left:50%;bottom:24px;z-index:80;padding:10px 16px;border:1px solid rgba(255,255,255,.12);border-radius:999px;background:rgba(0,0,0,.76);font-weight:900;opacity:0;pointer-events:none;transform:translate(-50%,18px);transition:.18s}
    .toast.show{opacity:1;transform:translate(-50%,0)}
    .checkmark{position:absolute;left:50%;top:50%;z-index:82;width:64px;height:64px;border-radius:50%;background:rgba(37,194,119,.96);box-shadow:0 0 24px rgba(37,194,119,.55);opacity:0;pointer-events:none;transform:translate(-50%,-50%) scale(.7);transition:.18s}
    .checkmark::before{content:"";position:absolute;left:19px;top:16px;width:24px;height:13px;border-left:5px solid #fff;border-bottom:5px solid #fff;transform:rotate(-45deg)}
    .checkmark.active{opacity:1;transform:translate(-50%,-50%) scale(1)}
    .modal-mask{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(0,0,0,.66)}
    .modal{width:min(440px,92vw);padding:24px 22px;border:1px solid rgba(91,188,255,.38);border-radius:14px;background:linear-gradient(180deg,#17344f,#10283d);text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.58)}
    .modal h3{margin:4px 0 10px}.modal p{margin:0;line-height:1.65;color:#d5e4ef}.modal .ok{margin-top:16px;background:var(--green);color:#07170f}
    .demo-cursor{position:absolute;left:0;top:0;z-index:72;width:20px;height:20px;border:2px solid #fff;border-radius:50%;background:rgba(91,188,255,.82);box-shadow:0 0 14px rgba(91,188,255,.8);opacity:0;pointer-events:none}
    .demo-cursor.click{animation:click .3s ease}@keyframes click{50%{transform:scale(1.8);opacity:.55}}
    .explanation{margin:14px 0 22px;color:#e8f4ff;font-size:15px;line-height:1.66}.explanation h2{margin:0 0 8px;color:#9bd3ff;font-size:20px}.explanation p{margin:6px 0}
    .mobile-tabs,.sheet-close{display:none}
    @media(max-width:720px){
      body{padding:8px}#spectrum{height:20px;margin-bottom:10px}.task-card{grid-template-columns:1fr;gap:7px}.task-step{width:max-content}.progress-dots{justify-content:flex-start}
      #stage{height:75vh;min-height:610px;max-height:680px}.lab-area{inset:96px 8px 58px}.hud{max-width:calc(100% - 64px);flex-wrap:wrap}.hint-lamp{left:auto;right:10px;top:10px}.hint-pop{top:96px}
      .mobile-tabs{position:absolute;left:12px;right:12px;bottom:8px;z-index:44;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:5px;border:1px solid rgba(91,188,255,.24);border-radius:11px;background:rgba(9,12,16,.92)}
      .mobile-tab{position:relative;min-height:44px;padding:9px;border:0;border-radius:8px;background:rgba(255,255,255,.04);color:#cfe4ff;font-size:13px;font-weight:900}.mobile-tab.active{background:rgba(61,220,151,.16);box-shadow:inset 0 0 0 1px rgba(61,220,151,.56)}
      .mobile-badge{position:absolute;top:-6px;margin-left:3px;min-width:18px;height:18px;padding:0 4px;border-radius:999px;background:#ff3b30;color:#fff;font-size:11px;opacity:0}.mobile-badge.show{opacity:1}
      .dock.mobile-sheet{left:12px!important;right:12px!important;bottom:56px!important;top:auto!important;width:calc(100% - 24px)!important;border-radius:12px 12px 0 0;background:linear-gradient(180deg,rgba(22,44,64,.98),rgba(9,21,33,.98));touch-action:auto}
      .dock.mobile-sheet.collapsed{display:none}.dock.mobile-sheet .dock-header{display:none}.dock.mobile-sheet .dock-body{display:grid;max-height:210px;padding:8px}.sheet-close{display:block;width:44px;height:44px;border:1px solid rgba(255,255,255,.14);border-radius:50%;background:rgba(255,255,255,.06);color:#fff}
      .control.mobile-sheet .dock-body{grid-template-columns:1fr 36px;gap:8px;align-items:center}.control.mobile-sheet .controls{grid-column:1}.control.mobile-sheet .analysis{grid-column:1/-1}.data.mobile-sheet .dock-body{grid-template-columns:1fr 36px;gap:8px}.data.mobile-sheet table,.data.mobile-sheet .empty{grid-column:1/-1}
      .data.mobile-sheet table thead{display:none}.data.mobile-sheet table tbody{display:grid;gap:7px}.data.mobile-sheet table tr{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:8px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.04)}
      .data.mobile-sheet table td{display:grid;gap:2px;border:0;padding:0}.data.mobile-sheet table td::before{content:attr(data-label);color:#8fb4d8;font-size:10px;font-weight:900}
      .toolbar{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:6px;border:1px solid rgba(255,255,255,.08);border-radius:11px}.toolbar button,.controls button{min-width:0;min-height:44px;padding:8px 5px;font-size:12px}
    }
    @media(prefers-reduced-motion:reduce){#spectrum::before,#modeTag.mode-strip,#modeTag.mode-strip::before{animation:none}}
  </style>
</head>
<body>
  <div id="app">
    <div id="spectrum"></div>
    <section class="task-card">
      <div class="task-step" id="taskStep">关卡 1 / 5</div>
      <div class="task-text"><div id="taskText"></div><div id="taskHint"></div></div>
      <div class="progress-dots" id="dots"></div>
    </section>
    <main id="stage" aria-label="用电流表测量电流互动实验台">
      <div class="hud"><span class="tag mode-strip" id="modeTag">模式：闯关模式 · 关卡 1/5</span><span class="tag" id="statusTag">状态：待接线</span></div>
      <button class="hint-lamp" id="hintLamp" type="button" aria-label="查看提示">💡</button>
      <div class="hint-pop" id="hintPop"></div>
      <div class="lab-area" id="labArea"><canvas id="labCanvas"></canvas></div>
      <div class="mobile-tabs" id="mobileTabs">
        <button class="mobile-tab active" id="experimentTab" type="button">实验面板</button>
        <button class="mobile-tab" id="dataTab" type="button">数据面板 <span class="mobile-badge" id="dataTabBadge">0</span></button>
      </div>
      <section class="dock control collapsed" id="controlDock">
        <div class="dock-header" data-drag-handle><span class="dockTitle">实验面板</span><button class="iconBtn" id="controlToggleBtn" type="button">展开</button></div>
        <div class="dock-body">
          <div class="controls"><button class="main" id="recordBtn" type="button">记录本次</button><button class="sub" id="analyzeBtn" type="button">分析结论</button></div>
          <button class="sheet-close" id="controlSheetCloseBtn" type="button" aria-label="收起实验面板">⌄</button>
          <div class="analysis" id="analysisText"></div>
        </div>
      </section>
      <section class="dock data collapsed" id="dataDock">
        <div class="dock-header" data-drag-handle><span class="dockTitle">数据面板 <span class="badge" id="dataNotice">0</span></span><button class="iconBtn" id="dataToggleBtn" type="button">展开</button></div>
        <div class="dock-body">
          <button class="sheet-close" id="dataSheetCloseBtn" type="button" aria-label="收起数据面板">⌄</button>
          <table class="record"><thead><tr><th>位置</th><th>量程</th><th>分度值</th><th>示数</th></tr></thead><tbody id="recordBody"></tbody></table>
          <div class="empty" id="emptyRecords">还没有记录。按关卡完成接线和读数。</div>
        </div>
      </section>
      <div class="toast" id="toast">提示</div><div class="checkmark" id="checkmark"></div><div class="demo-cursor" id="demoCursor"></div>
    </main>
    <div class="toolbar"><button class="sub" id="resetBtn" type="button">重置关卡</button><button class="sub" id="autoDemoBtn" type="button">演示模式</button><button class="sub" id="freeBtn" type="button">自由模式</button></div>
    <div class="modal-mask" id="doneMask"><div class="modal"><h3>实验完成</h3><p>电流表要串联接入电路，使电流从正接线柱流入、负接线柱流出，并先看量程和分度值再读数。同一串联电路中，电流表放在甲、乙两处的示数相同。</p><button class="main ok" id="okBtn" type="button">OK</button></div></div>
    <section class="explanation">
      <h2>实验名：用电流表测量电流</h2>
      <p>断开开关完成串联接线，无法预估电流时先用 3 A 量程快速试触，再选择合适量程读数。</p>
      <p>读数前先确认量程和分度值；同一串联电路中，电流表放在不同位置测得的电流相同。</p>
    </section>
  </div>
  <script>
  (() => {
    "use strict";
    const $ = selector => document.querySelector(selector);
    const stage=$("#stage"),labArea=$("#labArea"),canvas=$("#labCanvas"),ctx=canvas.getContext("2d");
    const taskStep=$("#taskStep"),taskText=$("#taskText"),taskHint=$("#taskHint"),dots=$("#dots"),modeTag=$("#modeTag"),statusTag=$("#statusTag");
    const hintLamp=$("#hintLamp"),hintPop=$("#hintPop"),controlDock=$("#controlDock"),dataDock=$("#dataDock"),controlToggleBtn=$("#controlToggleBtn"),dataToggleBtn=$("#dataToggleBtn");
    const recordBtn=$("#recordBtn"),analyzeBtn=$("#analyzeBtn"),analysisText=$("#analysisText"),recordBody=$("#recordBody"),emptyRecords=$("#emptyRecords"),dataNotice=$("#dataNotice");
    const resetBtn=$("#resetBtn"),autoDemoBtn=$("#autoDemoBtn"),freeBtn=$("#freeBtn"),toast=$("#toast"),checkmark=$("#checkmark"),doneMask=$("#doneMask"),okBtn=$("#okBtn"),demoCursor=$("#demoCursor");
    const experimentTab=$("#experimentTab"),dataTab=$("#dataTab"),dataTabBadge=$("#dataTabBadge"),controlSheetCloseBtn=$("#controlSheetCloseBtn"),dataSheetCloseBtn=$("#dataSheetCloseBtn");
    const CURRENT=0.36, TASKS=[
      {text:"在位置甲串联接入电流表",hint:"保持开关断开，把红色线头接 3 A，蓝色线头接负接线柱。",detail:"拖动两个发光线头到电流表接线柱。无法预估电流时，先选较大的 3 A 量程。",check:()=>correctConnection("3")},
      {text:"用 3 A 量程快速试触",hint:"点击开关短暂通电，观察指针偏转后实验台会自动断开。",detail:"试触只需短暂闭合。若指针偏转较小，应断电后改用较小量程。",check:()=>state.trialObserved},
      {text:"改用 0.6 A 量程，测量位置甲",hint:"拖动红线改接 0.6 A，闭合开关并点击“记录本次”。",detail:"0.6 A 量程的分度值为 0.02 A。先看量程、再看分度值，最后读指针。",check:()=>hasRecord("甲")},
      {text:"把电流表移到位置乙再次测量",hint:"先断开开关，拖动电流表到乙，再闭合并记录。",detail:"保持同一串联电路不变，只改变电流表的位置，比较甲、乙两次示数。",check:()=>hasRecord("乙")&&state.meterMoved},
      {text:"比较两次示数并归纳规则",hint:"打开实验面板，点击“分析结论”。",detail:"比较甲、乙位置的示数，再归纳电流表的连接、量程和读数规则。",check:()=>state.analysisDone}
    ];
    const state={
      currentTask:0,completed:false,freeMode:false,autoPlaying:false,autoCancel:false,autoRunId:0,
      width:0,height:0,stageWidth:0,stageHeight:0,layout:null,drag:null,drawerDrag:null,
      wires:{red:{terminal:null,preview:null,touched:false},blue:{terminal:null,preview:null,touched:false}},
      switchClosed:false,trialObserved:false,meterPosition:"甲",meterMoved:false,records:[],unseenRecords:0,
      analysisDone:false,stepWarning:false,timers:new Set(),phase:0
    };
    const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));
    const sleep=ms=>new Promise(resolve=>setTimeout(resolve,ms));
    function schedule(fn,ms){const id=setTimeout(()=>{state.timers.delete(id);fn();},ms);state.timers.add(id);return id}
    function clearTimers(){for(const id of state.timers)clearTimeout(id);state.timers.clear()}
    function pointIn(p,b){return p&&b&&p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h}
    function distance(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}
    function currentRange(){const terminals=[state.wires.red.terminal,state.wires.blue.terminal];return terminals.includes("pos06")?"0.6":terminals.includes("pos3")?"3":null}
    function polarity(){if(state.wires.red.terminal==="neg"&&["pos06","pos3"].includes(state.wires.blue.terminal))return"reverse";if(state.wires.blue.terminal==="neg"&&["pos06","pos3"].includes(state.wires.red.terminal))return"correct";return"incomplete"}
    function correctConnection(range){return polarity()==="correct"&&currentRange()===range&&state.wires.red.touched&&state.wires.blue.touched}
    function hasRecord(position){return state.records.some(record=>record.position===position)}
    function reading(){if(!state.switchClosed||polarity()==="incomplete")return 0;return polarity()==="reverse"?-CURRENT:CURRENT}
    function division(){return currentRange()==="0.6"?0.02:0.1}
    function displayReading(){if(!state.switchClosed)return 0;return currentRange()==="0.6"?CURRENT:Math.round(CURRENT*10)/10}
    function setModeLabel(){modeTag.textContent="模式："+(state.autoPlaying?"演示模式 · 自动运行":state.freeMode?"自由模式 · 自主探索":state.completed?"闯关模式 · 已通关":"闯关模式 · 关卡 "+(state.currentTask+1)+"/"+TASKS.length)}
    function updateStatus(text){
      if(text){statusTag.textContent="状态："+text;return}
      if(state.completed)statusTag.textContent="状态：实验完成";
      else if(state.autoPlaying)statusTag.textContent="状态：自动演示中";
      else if(state.switchClosed&&polarity()==="correct")statusTag.textContent="状态：通电 · "+displayReading().toFixed(currentRange()==="0.6"?2:1)+" A";
      else if(state.switchClosed&&polarity()==="reverse")statusTag.textContent="状态：接线柱接反";
      else if(polarity()==="reverse")statusTag.textContent="状态：接线柱接反，开关已断开";
      else if(polarity()==="correct")statusTag.textContent="状态：接线完成，开关断开";
      else statusTag.textContent="状态：等待接线";
    }
    function initDots(){dots.innerHTML=TASKS.map(()=>'<span class="dot"></span>').join("")}
    function updateDots(){[...dots.children].forEach((dot,index)=>{dot.className="dot";if(state.completed||index<state.currentTask)dot.classList.add("done");else if(index===state.currentTask)dot.classList.add(state.stepWarning?"warn":"active")})}
    function setStep(index){state.currentTask=clamp(index,0,TASKS.length-1);state.stepWarning=false;const task=TASKS[state.currentTask];taskStep.textContent="关卡 "+(state.currentTask+1)+" / "+TASKS.length;taskText.textContent=task.text;taskHint.textContent=task.hint;hintPop.textContent=task.detail;setModeLabel();updateDots();updateStatus();draw()}

      const s=g.s,from=g.sources[name],redLane=g.y+(g.mobile?418:420)*s,blueLane=g.y+(g.mobile?444:446)*s;
      if(state.meterPosition==="甲"&&name==="red"){
        const laneX=g.x+(g.mobile?205:248)*s;return[from,{x:laneX,y:from.y},{x:laneX,y:redLane},{x:end.x,y:redLane},end]
      }
      if(state.meterPosition==="甲"){
        const laneX=g.x+(g.mobile?600:790)*s;return[from,{x:laneX,y:from.y},{x:laneX,y:blueLane},{x:end.x,y:blueLane},end]
      }
      if(name==="red"){
        const laneX=g.x+(g.mobile?606:812)*s;return[from,{x:laneX,y:from.y},{x:laneX,y:redLane},{x:end.x,y:redLane},end]
      }
      const laneX=g.x+(g.mobile?186:230)*s;return[from,{x:laneX,y:from.y},{x:laneX,y:blueLane},{x:end.x,y:blueLane},end]
    }
    function drawWirePath(name,g){
      const wire=state.wires[name],from=g.sources[name],end=wireEnd(name),color=name==="red"?"#ff6b73":"#5bbcff";
      if(wire.terminal)cable(connectedWireRoute(name,g,end),color,6*g.s,20*g.s);else if(wire.preview)curve(from,end,color,6*g.s,30*g.s)
    }
    function drawWirePlug(name,g){
      const wire=state.wires[name],end=wireEnd(name),color=name==="red"?"#ff6b73":"#5bbcff";
      ctx.save();ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=wire.terminal?2:13*g.s;ctx.beginPath();ctx.arc(end.x,end.y,11*g.s,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#edf7ff";ctx.lineWidth=2*g.s;ctx.stroke();ctx.restore()
    }
    function drawPositionRail(g){
      const s=g.s,y=g.slots.甲.y;line([{x:g.slots.甲.x-100*s,y},{x:g.slots.乙.x+100*s,y}],"#687985",5*s);
      for(const name of["甲","乙"]){const p=g.slots[name],active=state.meterPosition===name;box(p.x-44*s,p.y-17*s,88*s,34*s,17*s,active?"rgba(61,220,151,.2)":"rgba(255,255,255,.06)",active?"#3ddc97":"#6e7e89");text("位置"+name,p.x,p.y,12*s,active?"#8affca":"#b7c6d1")}
    }
    function drawReadout(g){
      const s=g.s,x=g.x+22*s,y=g.y+20*s;box(x,y,260*s,66*s,11*s,"rgba(3,10,16,.74)","#28506b");
      text("量程："+(currentRange()?currentRange()+" A":"未选择"),x+14*s,y+22*s,12*s,"#9bd3ff","left");
      text("示数："+(state.switchClosed&&polarity()==="correct"?displayReading().toFixed(currentRange()==="0.6"?2:1)+" A":"— A"),x+14*s,y+46*s,15*s,state.switchClosed?"#78f0b7":"#dce8f2","left")
    }
    function draw(){
      if(!state.width)return;state.layout=geometry();const g=state.layout,w=state.width,h=state.height,s=g.s;
      const bg=ctx.createLinearGradient(0,0,0,h);bg.addColorStop(0,"#06111b");bg.addColorStop(.68,"#091520");bg.addColorStop(1,"#111a22");ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
      ctx.save();ctx.strokeStyle="rgba(255,255,255,.035)";ctx.lineWidth=1;for(let x=0;x<w;x+=40*s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=40*s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}ctx.restore();
      box(g.x,g.y,g.bw,g.bh,18*s,"rgba(20,37,49,.86)","rgba(132,194,226,.24)");
      box(g.x+16*s,g.y+g.bh-18*s,g.bw-32*s,18*s,8*s,"#503223");
      drawFixedCircuit(g);drawWirePath("red",g);drawWirePath("blue",g);
      drawReadout(g);drawBattery(g);drawSwitch(g);drawBulb(g);drawPositionRail(g);drawMeter(g);drawWirePlug("red",g);drawWirePlug("blue",g);
    }
    function resizeCanvas(){
      const stageRect=stage.getBoundingClientRect(),rect=labArea.getBoundingClientRect(),dpr=window.devicePixelRatio||1;state.width=rect.width;state.height=rect.height;state.stageWidth=stageRect.width;state.stageHeight=stageRect.height;canvas.width=Math.round(rect.width*dpr);canvas.height=Math.round(rect.height*dpr);canvas.style.width=rect.width+"px";canvas.style.height=rect.height+"px";ctx.setTransform(dpr,0,0,dpr,0,0);syncPanels();draw()
    }
    function resetScene({keepMode=true,preserveAuto=false,quiet=false}={}){
      clearTimers();if(!preserveAuto){state.autoCancel=true;state.autoPlaying=false;state.autoRunId+=1;autoDemoBtn.textContent="演示模式";freeBtn.disabled=false;demoCursor.style.opacity="0"}
      state.currentTask=0;state.completed=false;state.stepWarning=false;freshWires();state.switchClosed=false;state.trialObserved=false;state.meterPosition="甲";state.meterMoved=false;state.records=[];state.unseenRecords=0;state.analysisDone=false;state.drag=null;state.phase=0;if(!keepMode)state.freeMode=false;doneMask.style.display="none";analysisText.classList.remove("ok");analysisText.textContent="";renderRecords();updateBadge();setModeLabel();setStep(0);resizeCanvas();if(!quiet)showToast("已回到关卡 1")
    }
    function setFreeMode(on){
      const next=!!on,changed=state.freeMode!==next;if(changed)resetScene({keepMode:false,quiet:true});state.freeMode=next;freeBtn.textContent=next?"退出自由模式":"自由模式";autoDemoBtn.disabled=next;
      if(next){taskStep.textContent="自由探索";taskText.textContent="自由练习接线、量程和两个测量位置";taskHint.textContent="危险接法会自动断电；换线和移表仍须先断开开关。";hintPop.textContent="可尝试正反接线、两种量程和甲乙位置，记录不会推进闯关关卡。"}else if(changed)setStep(0);
      setModeLabel();updateStatus();draw();showToast(next?"已进入自由模式，演示模式暂不可用。":"已回到闯关模式关卡 1。")
    }
    function moveCursor(point){
      const sr=stage.getBoundingClientRect(),lr=labArea.getBoundingClientRect();demoCursor.style.opacity="1";demoCursor.style.transform="translate("+(lr.left-sr.left+point.x-10)+"px,"+(lr.top-sr.top+point.y-10)+"px)"
    }
    function clickCursor(){demoCursor.classList.remove("click");void demoCursor.offsetWidth;demoCursor.classList.add("click")}
    async function autoWire(name,target,runId){
      const start=state.layout.sources[name],end=state.layout.terminals[target];state.drag={type:"wire",name};state.wires[name].terminal=null;
      for(let i=0;i<=10;i++){if(state.autoCancel||runId!==state.autoRunId)throw new Error("AUTO_CANCELLED");const t=i/10,point={x:start.x+(end.x-start.x)*t,y:start.y+(end.y-start.y)*t-Math.sin(t*Math.PI)*30*state.layout.s};state.wires[name].preview=point;moveCursor(point);draw();await sleep(45)}
      clickCursor();finishWire(name,end);await sleep(260)
    }
    async function autoClickSwitch(runId){
      const g=state.layout,point={x:g.switch.x+g.switch.w/2,y:g.switch.y+g.switch.h/2};moveCursor(point);await sleep(180);if(state.autoCancel||runId!==state.autoRunId)throw new Error("AUTO_CANCELLED");clickCursor();toggleSwitch();await sleep(360)
    }
    async function autoRecord(position){
      const before=state.records.length,ok=recordObservation({auto:true});await sleep(350);if(!ok||!hasRecord(position)||state.records.length<=before)throw new Error("AUTO_RECORD_NOT_PERSISTED:"+position)
    }
    async function autoMoveMeter(runId){
      const start=state.layout.slots.甲,end=state.layout.slots.乙;state.drag={type:"meter"};
      for(let i=1;i<=12;i++){if(state.autoCancel||runId!==state.autoRunId)throw new Error("AUTO_CANCELLED");const t=i/12,point={x:start.x+(end.x-start.x)*t,y:start.y};moveCursor(point);moveMeter(point);await sleep(45)}
      state.drag=null;clickCursor();passStepIfReady({quiet:true});await sleep(280)
    }
    async function runAutoDemo(){
      if(state.autoPlaying){state.autoCancel=true;return}
      const runId=state.autoRunId+1;state.autoRunId=runId;state.autoPlaying=true;state.autoCancel=false;autoDemoBtn.textContent="退出演示";freeBtn.disabled=true;resetScene({keepMode:false,preserveAuto:true,quiet:true});state.autoPlaying=true;state.autoCancel=false;autoDemoBtn.textContent="退出演示";setDrawerCollapsed(controlDock,false);setDrawerCollapsed(dataDock,true);setModeLabel();
      try{
        setStep(0);await autoWire("red","pos3",runId);await autoWire("blue","neg",runId);await sleep(300);
        setStep(1);await autoClickSwitch(runId);await sleep(1100);
        setStep(2);await autoWire("red","pos06",runId);await autoClickSwitch(runId);await autoRecord("甲");
        setStep(3);await autoClickSwitch(runId);await autoMoveMeter(runId);await autoClickSwitch(runId);await autoRecord("乙");
        setStep(4);setDrawerCollapsed(controlDock,false);await sleep(350);analyzeConclusion()
      }catch(error){showToast(String(error.message||error)==="AUTO_CANCELLED"?"已退出演示模式":"演示中断："+(error.message||error))}
      finally{if(runId!==state.autoRunId)return;state.switchClosed=false;state.autoPlaying=false;state.autoCancel=false;autoDemoBtn.textContent="演示模式";freeBtn.disabled=false;demoCursor.style.opacity="0";setModeLabel();updateStatus();draw()}
    }
    function initEvents(){
      canvas.addEventListener("pointerdown",onPointerDown);canvas.addEventListener("pointermove",onPointerMove);canvas.addEventListener("pointerup",onPointerUp);canvas.addEventListener("pointercancel",onPointerUp);
      recordBtn.addEventListener("click",()=>recordObservation());analyzeBtn.addEventListener("click",analyzeConclusion);
      resetBtn.addEventListener("click",()=>{const free=state.freeMode;resetScene({keepMode:true,quiet:true});state.freeMode=free;setFreeMode(free);showToast(free?"已重置自由探索。":"已回到关卡 1。")});
      autoDemoBtn.addEventListener("click",runAutoDemo);freeBtn.addEventListener("click",()=>setFreeMode(!state.freeMode));
      controlToggleBtn.addEventListener("click",()=>setDrawerCollapsed(controlDock,!controlDock.classList.contains("collapsed")));dataToggleBtn.addEventListener("click",()=>setDrawerCollapsed(dataDock,!dataDock.classList.contains("collapsed")));
      experimentTab.addEventListener("click",()=>{const open=controlDock.classList.contains("collapsed");setDrawerCollapsed(dataDock,true);setDrawerCollapsed(controlDock,!open)});
      dataTab.addEventListener("click",()=>{const open=dataDock.classList.contains("collapsed");setDrawerCollapsed(controlDock,true);setDrawerCollapsed(dataDock,!open)});
      controlSheetCloseBtn.addEventListener("click",()=>setDrawerCollapsed(controlDock,true));dataSheetCloseBtn.addEventListener("click",()=>setDrawerCollapsed(dataDock,true));
      hintLamp.addEventListener("click",()=>hintPop.classList.toggle("open"));okBtn.addEventListener("click",()=>doneMask.style.display="none");
      bindDrawer(controlDock);bindDrawer(dataDock);window.addEventListener("resize",()=>{clearTimeout(resizeCanvas.timer);resizeCanvas.timer=setTimeout(resizeCanvas,110)})
    }
    function init(){initDots();initEvents();setDrawerCollapsed(controlDock,true);setDrawerCollapsed(dataDock,true);resetScene({quiet:true});requestAnimationFrame(resizeCanvas)}
    init();
    window.state=state;
    window.recordObservation=recordObservation;
    window.analyzeConclusion=analyzeConclusion;
    window.__lab61={toggleSwitch,finishWire,moveMeter,recordObservation,analyzeConclusion,reset:resetScene,runAutoDemo};
  })();
  </script>
