    function draw26(ctx,W,H){
      const ap = state.apparatus;
      const cx = W*0.5, cy = H*0.54;
      const beamLen = W*0.52;
      const torqueDiff = (ap.leftTorque || 0) - (ap.rightTorque || 0);
      const ang = clamp(torqueDiff / 180, -0.24, 0.24);
      const armScale = beamLen / 40;

      ctx.fillStyle = '#8899ad';
      ctx.beginPath();
      ctx.moveTo(cx-28, cy+34);
      ctx.lineTo(cx+28, cy+34);
      ctx.lineTo(cx, cy-18);
      ctx.closePath();
      ctx.fill();

      const lx = cx - Math.cos(ang) * beamLen * 0.5;
      const ly = cy - Math.sin(ang) * beamLen * 0.5;
      const rx = cx + Math.cos(ang) * beamLen * 0.5;
      const ry = cy + Math.sin(ang) * beamLen * 0.5;
      ctx.strokeStyle = '#dbe7f6';
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(lx,ly);
      ctx.lineTo(rx,ry);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,.5)';
      ctx.lineWidth = 1.2;
      for(let i=-20;i<=20;i+=2){
        const px = cx + Math.cos(ang) * (i*armScale);
        const py = cy + Math.sin(ang) * (i*armScale);
        const nx = px - Math.sin(ang) * (i%10===0 ? 10 : 5);
        const ny = py + Math.cos(ang) * (i%10===0 ? 10 : 5);
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(nx, ny);
        ctx.stroke();
      }

      function pointOnBeam(offsetCm){
        const off = offsetCm * armScale;
        return {
          x: cx + Math.cos(ang) * off,
          y: cy + Math.sin(ang) * off
        };
      }
      const leftP = pointOnBeam(-Number(state.vars.leftArm));
      const rightP = pointOnBeam(Number(state.vars.rightArm));
      ctx.strokeStyle = '#f4f8ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(leftP.x, leftP.y);
      ctx.lineTo(leftP.x, leftP.y + 42);
      ctx.moveTo(rightP.x, rightP.y);
      ctx.lineTo(rightP.x, rightP.y + 42);
      ctx.stroke();

      const leftW = 20 + Number(state.vars.leftForce) * 2;
      const rightW = 20 + Number(state.vars.rightForce) * 2;
      ctx.fillStyle = '#ffd06b';
      ctx.fillRect(leftP.x - 14, leftP.y + 42, 28, leftW * 0.7);
      ctx.fillRect(rightP.x - 14, rightP.y + 42, 28, rightW * 0.7);
      ctx.strokeStyle = '#fff4d2';
      ctx.strokeRect(leftP.x - 14, leftP.y + 42, 28, leftW * 0.7);
      ctx.strokeRect(rightP.x - 14, rightP.y + 42, 28, rightW * 0.7);

      ctx.fillStyle = '#dfeaff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(`左力矩：${(ap.leftTorque || 0).toFixed(2)}`, W*0.14, H-92);
      ctx.fillText(`右力矩：${(ap.rightTorque || 0).toFixed(2)}`, W*0.14, H-70);
      ctx.fillStyle = ap.balanced ? '#7fe6b1' : '#ffcf6f';
      ctx.fillText(`状态：${ap.balanced ? '平衡' : '不平衡'}`, W*0.14, H-48);
    }

    function draw27(ctx,W,H){
      const ap = state.apparatus;
      const baseY = H-146;
      const areaSmall = state.vars.area === 'small';
      const tableW = areaSmall ? 74 : 142;
      const sink = ap.pressed ? ap.sinkDepth : 0;

      ctx.fillStyle = '#8ec5ff';
      ctx.fillRect(W*0.18, baseY, 286, 44);
      ctx.strokeStyle = '#cae5ff';
      ctx.strokeRect(W*0.18, baseY, 286, 44);

      const topX = W*0.26;
      const topY = baseY - 22 + sink;
      ctx.fillStyle = '#86d4b3';
      ctx.fillRect(topX, topY, tableW, 22);
      ctx.fillStyle = '#78c4a2';
      ctx.fillRect(topX + 8, topY + 22, 18, 24);
      ctx.fillRect(topX + tableW - 26, topY + 22, 18, 24);

      const weightCount = Math.max(1, Math.round(Number(state.vars.forceN) / 8));
      for(let i=0;i<weightCount;i++){
        const wx = topX + tableW*0.5 - 13;
        const wy = topY - 18 - i*13;
        ctx.fillStyle = i%2 ? '#ffd06b' : '#ebb95d';
        ctx.fillRect(wx, wy, 26, 12);
        ctx.strokeStyle = '#fff2d4';
        ctx.strokeRect(wx, wy, 26, 12);
      }

      const gx = W*0.62, gy = H-304;
      ctx.fillStyle = '#152131';
      ctx.fillRect(gx, gy, 208, 118);
      ctx.strokeStyle = '#95b7d8';
      ctx.strokeRect(gx, gy, 208, 118);
      ctx.fillStyle = '#7fd1ff';
      ctx.font = 'bold 26px Courier New';
      ctx.fillText(`${(ap.lastP || 0).toFixed(2)} kPa`, gx + 28, gy + 58);
      ctx.fillStyle = '#dfeaff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText(`受力面积：${areaSmall ? '小面积' : '大面积'} (${ap.lastArea || (areaSmall ? 8 : 20)}cm²)`, gx + 20, gy + 82);
      ctx.fillText(`凹陷深度：${sink.toFixed(1)} mm`, gx + 20, gy + 100);
    }

    function draw28(ctx,W,H){
      const ap = state.apparatus;
      const x = W*0.18, y = H*0.16, w = W*0.38, h = H*0.6;
      drawTankWithScale(ctx, x, y, w, h, 0.88, 'rgba(93,165,255,.35)', '透明容器');
      const holeY = y + h - (ap.lastDepth / 35) * (h*0.9) - 10;
      ctx.fillStyle = '#ffd06b';
      ctx.fillRect(x+w-2, holeY-4, 10, 10);
      ctx.fillStyle = '#dfeaff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText(`${ap.lastDepth}cm`, x - 52, holeY + 5);
      ctx.strokeStyle = 'rgba(255,255,255,.45)';
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(x-8, holeY+1);
      ctx.lineTo(x+w+14, holeY+1);
      ctx.stroke();
      ctx.setLineDash([]);

      if(ap.holeOpened){
        const t = performance.now() * 0.004;
        const jet = ap.lastJet || 6;
        const endX = x + w + 12 + jet * 0.92;
        const endY = holeY + 8 + jet * 0.18;
        ctx.strokeStyle = '#8fd8ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x+w+8, holeY+2);
        ctx.quadraticCurveTo((x+w+endX)*0.5, holeY - 10, endX, endY);
        ctx.stroke();
        for(let i=0;i<5;i++){
          const px = x+w+18 + i*jet*0.16;
          const py = holeY + 3 + i*3 + Math.sin(t + i) * 2;
          ctx.fillStyle = 'rgba(143,216,255,.75)';
          ctx.beginPath();
          ctx.arc(px, py, 1.8, 0, Math.PI*2);
          ctx.fill();
        }
      }

      ctx.fillStyle = '#56677a';
      ctx.fillRect(x+w+68, H-122, 84, 16);
      ctx.fillStyle = '#4a5e73';
      ctx.fillRect(x+w+76, H-142, 68, 22);
      ctx.fillStyle = '#dfeaff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText('接水槽', x+w+86, H-148);
    }

    function draw29(ctx,W,H){
      const ap = state.apparatus;
      const layout = getLab29Layout(W, H);
      ap.hitZones = {};

      const drawCard = (rect, title, accent='#74d6ff')=>{
        ctx.fillStyle = 'rgba(10,16,24,.68)';
        ctx.strokeStyle = 'rgba(139,198,255,.28)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.roundRect(rect.x, rect.y, rect.w, rect.h, 18);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#dfeaff';
        ctx.font = '600 14px -apple-system,Segoe UI';
        ctx.fillText(title, rect.x + 12, rect.y + 24);
        ctx.fillStyle = accent;
        ctx.fillRect(rect.x + 12, rect.y + 31, 42, 2);
      };

      const drawCup = (rect, accent='#6cc7ff', opts={})=>{
        const rot = opts.rot || 0;
        const fillLevel = opts.fillLevel == null ? 0.76 : opts.fillLevel;
        const pourSide = opts.pourSide || 'left';
        const pivotX = opts.pivotX == null ? rect.w * 0.78 : opts.pivotX;
        const pivotY = opts.pivotY == null ? rect.h * 0.68 : opts.pivotY;
        const originX = rect.x + pivotX;
        const originY = rect.y + pivotY;
        const cos = Math.cos(rot);
        const sin = Math.sin(rot);
        const toWorld = (lx, ly)=>({
          x: originX + (lx - pivotX) * cos - (ly - pivotY) * sin,
          y: originY + (lx - pivotX) * sin + (ly - pivotY) * cos
        });
        ctx.save();
        ctx.translate(originX, originY);
        ctx.rotate(rot);
        ctx.translate(-pivotX, -pivotY);

        const g = ctx.createLinearGradient(0, 0, 0, rect.h);
        g.addColorStop(0, 'rgba(241,247,255,.96)');
        g.addColorStop(1, 'rgba(193,214,237,.88)');
        ctx.fillStyle = g;
        ctx.strokeStyle = 'rgba(226,241,255,.94)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(6, 8);
        ctx.quadraticCurveTo(rect.w * 0.54, 3, rect.w - 6, 8);
        ctx.lineTo(rect.w - 10, rect.h - 4);
        ctx.quadraticCurveTo(rect.w * 0.55, rect.h + 2, 8, rect.h - 5);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,.62)';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(9, 10);
        ctx.quadraticCurveTo(rect.w * 0.54, 5, rect.w - 9, 10);
        ctx.stroke();

        const liquidTopL = rect.h * (1 - fillLevel) + (pourSide === 'left' ? rect.h * 0.11 : rect.h * 0.03);
        const liquidTopR = rect.h * (1 - fillLevel) + (pourSide === 'left' ? rect.h * 0.03 : rect.h * 0.11);
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(7, 9);
        ctx.quadraticCurveTo(rect.w * 0.54, 5, rect.w - 7, 9);
        ctx.lineTo(rect.w - 11, rect.h - 5);
        ctx.quadraticCurveTo(rect.w * 0.55, rect.h - 1, 9, rect.h - 6);
        ctx.closePath();
        ctx.clip();
        ctx.fillStyle = 'rgba(108,199,255,.46)';
        ctx.beginPath();
        ctx.moveTo(7, liquidTopL);
        ctx.lineTo(rect.w - 7, liquidTopR);
        ctx.lineTo(rect.w - 7, rect.h - 3);
        ctx.lineTo(7, rect.h - 3);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,.24)';
        ctx.beginPath();
        ctx.moveTo(9, liquidTopL + 2);
        ctx.lineTo(rect.w - 9, liquidTopR + 2);
        ctx.strokeStyle = 'rgba(255,255,255,.3)';
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.restore();

        ctx.strokeStyle = 'rgba(255,255,255,.22)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(rect.w * 0.18, 12);
        ctx.lineTo(rect.w * 0.18, rect.h - 8);
        ctx.stroke();

        ctx.strokeStyle = accent;
        ctx.lineWidth = 2.6;
        const handleY = rect.h * 0.48;
        ctx.beginPath();
        ctx.arc(rect.w + 2, handleY, rect.h * 0.22, -Math.PI/2, Math.PI/2);
        ctx.stroke();
        ctx.restore();

        const lipLocal = pourSide === 'left'
          ? { x: 7, y: 10 }
          : { x: rect.w - 7, y: 10 };
        return {
          lip: toWorld(lipLocal.x, lipLocal.y),
          bodyCenter: toWorld(rect.w * 0.46, rect.h * 0.52)
        };
      };

      const drawTargetHint = (target, active)=>{
        const y = target.y + target.h * 0.58;
        const centerX = target.x + target.w * 0.5;
        const halfLen = Math.min(target.w * 0.22, 28);
        const x1 = centerX - halfLen;
        const x2 = centerX + halfLen;
        ctx.strokeStyle = active ? 'rgba(124,225,255,.9)' : 'rgba(124,225,255,.36)';
        ctx.lineWidth = active ? 2.2 : 1.3;
        ctx.setLineDash(active ? [6,4] : [4,4]);
        ctx.beginPath();
        ctx.moveTo(x1, y);
        ctx.lineTo(x2, y);
        ctx.stroke();
        ctx.setLineDash([]);
      };

      const drawStatusPill = (x, y, text, color='#7fd1ff')=>{
        ctx.fillStyle = 'rgba(13,22,34,.88)';
        ctx.strokeStyle = 'rgba(123,183,255,.22)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x, y, Math.max(88, text.length * 12 + 18), 24, 12);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = color;
        ctx.font = '12px -apple-system,Segoe UI';
        ctx.fillText(text, x + 10, y + 16);
      };

      const drawMembraneTank = (rect, type)=>{
        drawCard(rect, type === 'side' ? '侧壁橡皮膜' : '底部橡皮膜');
        const tank = getLab29TankRect(rect);
        const cup = getLab29CupRect(rect);
        const target = getLab29TargetRect(rect, type);
        const fill = type === 'side' ? ap.sideFill : ap.bottomFill;
        const cupFill = type === 'side' ? ap.sideCupLevel : ap.bottomCupLevel;
        const bulge = (type === 'side' ? ap.sideBulge : ap.bottomBulge) * 12;
        const liquidH = tank.h * 0.76 * fill;
        const liquidY = tank.y + tank.h - liquidH - 4;
        const activeDrag = lab29Pointer.dragging && lab29Pointer.kind === type;
        const preview = getLab29PourPreview(type);
        const displayFill = preview ? fill + (1 - fill) * preview.progress : fill;
        const displayBulge = preview ? ((type === 'side' ? ap.sideBulge : ap.bottomBulge) + (1 - (type === 'side' ? ap.sideBulge : ap.bottomBulge)) * preview.progress) * 12 : bulge;
        const displayLiquidH = tank.h * 0.76 * displayFill;
        const displayLiquidY = tank.y + tank.h - displayLiquidH - 4;

        if(!activeDrag) drawCup(cup, '#6cc7ff', { fillLevel: cupFill });
        drawTargetHint(target, activeDrag || fill < 0.98);

        const glassFill = ctx.createLinearGradient(tank.x, tank.y, tank.x + tank.w, tank.y + tank.h);
        glassFill.addColorStop(0, 'rgba(230,242,255,.12)');
        glassFill.addColorStop(1, 'rgba(180,206,230,.06)');
        ctx.fillStyle = glassFill;
        ctx.fillRect(tank.x + 2, tank.y + 2, tank.w - 4, tank.h - 4);
        ctx.strokeStyle = '#d6e8f8';
        ctx.lineWidth = 3;
        ctx.strokeRect(tank.x, tank.y, tank.w, tank.h);
        ctx.fillStyle = 'rgba(255,255,255,.24)';
        ctx.fillRect(tank.x + 8, tank.y + 8, 10, tank.h - 16);

        ctx.strokeStyle = 'rgba(230,242,255,.5)';
        ctx.lineWidth = 1;
        for(let i=0;i<=5;i++){
          const yy = tank.y + tank.h - i*(tank.h/5);
          ctx.beginPath();
          ctx.moveTo(tank.x - 10, yy);
          ctx.lineTo(tank.x, yy);
          ctx.stroke();
        }

        if(displayFill > 0.01){
          const waterGrad = ctx.createLinearGradient(tank.x, displayLiquidY, tank.x, tank.y + tank.h);
          waterGrad.addColorStop(0, 'rgba(136,208,255,.62)');
          waterGrad.addColorStop(1, 'rgba(68,138,220,.5)');
          ctx.fillStyle = waterGrad;
          ctx.fillRect(tank.x + 3, displayLiquidY, tank.w - 6, tank.y + tank.h - displayLiquidY - 3);
          ctx.fillStyle = 'rgba(255,255,255,.28)';
          ctx.fillRect(tank.x + 4, displayLiquidY, tank.w - 8, 3);
        }

        if(type === 'side'){
          const cx = tank.x + tank.w;
          const cy = tank.y + tank.h * 0.52;
          ctx.fillStyle = '#f6f1d5';
          ctx.beginPath();
          ctx.moveTo(cx, cy - 18);
          ctx.quadraticCurveTo(cx + 8 + displayBulge, cy, cx, cy + 18);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#fff2c8';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          if(displayFill > 0.02){
            ctx.strokeStyle = 'rgba(126,205,255,.9)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx + 8 + displayBulge, cy);
            ctx.lineTo(cx + 28 + displayBulge, cy);
            ctx.stroke();
          }
        }else{
          const cx = tank.x + tank.w * 0.5;
          const by = tank.y + tank.h;
          ctx.fillStyle = '#f6f1d5';
          ctx.beginPath();
          ctx.moveTo(cx - 28, by);
          ctx.quadraticCurveTo(cx, by + 8 + displayBulge, cx + 28, by);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#fff2c8';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          if(displayFill > 0.02){
            ctx.strokeStyle = 'rgba(126,205,255,.9)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(cx, by + 8 + displayBulge);
            ctx.lineTo(cx, by + 28 + displayBulge);
            ctx.stroke();
          }
        }

        drawStatusPill(rect.x + 12, rect.y + rect.h - 30, displayFill > 0.05 ? (type === 'side' ? '侧膜外鼓' : '底膜下鼓') : '拖水杯加水');
        ap.hitZones[`${type}Source`] = { x: cup.x - 8, y: cup.y - 8, w: cup.w + 16, h: cup.h + 16 };
        ap.hitZones[`${type}Target`] = target;
      };

      const drawBag = (rect)=>{
        drawCard(rect, '装水塑料袋', '#86e9bc');
        const bag = getLab29BagRect(rect);
        const cup = getLab29CupRect(rect);
        const target = getLab29TargetRect(rect, 'bag');
        const fill = ap.bagFill;
        const cupFill = ap.bagCupLevel;
        const bulge = ap.bagBulge * 12;
        const activeDrag = lab29Pointer.dragging && lab29Pointer.kind === 'bag';
        const preview = getLab29PourPreview('bag');
        const displayFill = preview ? fill + (1 - fill) * preview.progress : fill;
        const displayBulge = preview ? (ap.bagBulge + (1 - ap.bagBulge) * preview.progress) * 12 : bulge;
        if(!activeDrag) drawCup(cup, '#7fe6b1', { fillLevel: cupFill });
        drawTargetHint(target, activeDrag || fill < 0.98);

        ctx.strokeStyle = '#d9ecff';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(bag.x + bag.w*0.18, bag.y);
        ctx.quadraticCurveTo(bag.x + bag.w*0.5, bag.y - 8, bag.x + bag.w*0.82, bag.y);
        ctx.lineTo(bag.x + bag.w, bag.y + bag.h*0.24);
        ctx.quadraticCurveTo(bag.x + bag.w + bulge, bag.y + bag.h*0.5, bag.x + bag.w*0.84, bag.y + bag.h);
        ctx.lineTo(bag.x + bag.w*0.16, bag.y + bag.h);
        ctx.quadraticCurveTo(bag.x - bulge, bag.y + bag.h*0.5, bag.x, bag.y + bag.h*0.24);
        ctx.closePath();
        ctx.stroke();

        ctx.save();
        ctx.beginPath();
        ctx.moveTo(bag.x + bag.w*0.18, bag.y + 2);
        ctx.quadraticCurveTo(bag.x + bag.w*0.5, bag.y - 6, bag.x + bag.w*0.82, bag.y + 2);
          ctx.lineTo(bag.x + bag.w - 2, bag.y + bag.h*0.24);
          ctx.quadraticCurveTo(bag.x + bag.w + displayBulge - 3, bag.y + bag.h*0.5, bag.x + bag.w*0.82, bag.y + bag.h - 2);
          ctx.lineTo(bag.x + bag.w*0.18, bag.y + bag.h - 2);
          ctx.quadraticCurveTo(bag.x - displayBulge + 3, bag.y + bag.h*0.5, bag.x + 2, bag.y + bag.h*0.24);
          ctx.closePath();
          ctx.clip();
        if(displayFill > 0.01){
          const waterH = bag.h * 0.78 * displayFill;
          const waterY = bag.y + bag.h - waterH;
          const waterGrad = ctx.createLinearGradient(bag.x, waterY, bag.x, bag.y + bag.h);
          waterGrad.addColorStop(0, 'rgba(136,208,255,.58)');
          waterGrad.addColorStop(1, 'rgba(68,138,220,.48)');
          ctx.fillStyle = waterGrad;
          ctx.fillRect(bag.x - 8, waterY, bag.w + 16, bag.y + bag.h - waterY);
          ctx.fillStyle = 'rgba(255,255,255,.14)';
          ctx.fillRect(bag.x + 10, bag.y + 16, 12, bag.h - 26);
        }
        ctx.restore();

        ctx.strokeStyle = 'rgba(120,225,180,.86)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(bag.x - displayBulge*0.8, bag.y + bag.h*0.44);
        ctx.lineTo(bag.x - 14 - displayBulge*0.8, bag.y + bag.h*0.44);
        ctx.moveTo(bag.x + bag.w + displayBulge*0.8, bag.y + bag.h*0.44);
        ctx.lineTo(bag.x + bag.w + 14 + displayBulge*0.8, bag.y + bag.h*0.44);
        ctx.moveTo(bag.x + bag.w*0.5, bag.y + bag.h + displayBulge*0.65);
        ctx.lineTo(bag.x + bag.w*0.5, bag.y + bag.h + 20 + displayBulge*0.55);
        ctx.stroke();

        drawStatusPill(rect.x + 12, rect.y + rect.h - 30, displayFill > 0.05 ? '袋壁四向鼓起' : '拖水杯加水', '#86e9bc');
        ap.hitZones.bagSource = { x: cup.x - 8, y: cup.y - 8, w: cup.w + 16, h: cup.h + 16 };
        ap.hitZones.bagTarget = target;
      };

      if(layout.showAll){
        drawMembraneTank(layout.side, 'side');
        drawMembraneTank(layout.bottom, 'bottom');
        drawBag(layout.bag);
      }else if(layout.active === 'side'){
        drawMembraneTank(layout.side, 'side');
      }else if(layout.active === 'bottom'){
        drawMembraneTank(layout.bottom, 'bottom');
      }else{
        drawBag(layout.bag);
      }

      if(lab29Pointer.dragging){
        const zone = layout[lab29Pointer.kind] || layout[layout.active];
        const sourceCup = zone ? getLab29CupRect(zone) : { w: 56, h: 42 };
        const baseRect = { x: lab29Pointer.x - sourceCup.w * 0.5, y: lab29Pointer.y - sourceCup.h * 0.55, w: sourceCup.w, h: sourceCup.h };
        let floatRect = { ...baseRect };
        let tilt = 0;
        let pivot = { x: floatRect.w * 0.78, y: floatRect.h * 0.68 };
        let cupPose = null;
        const preview = getLab29PourPreview(lab29Pointer.kind);
        if(lab29Pointer.overTarget){
          const target = ap.hitZones[`${lab29Pointer.kind}Target`];
          if(target){
            const anchor = {
              x: target.x + target.w * 0.5,
              y: target.y + target.h * 0.58
            };
            const snapped = getLab29PourCupRect(anchor, lab29Pointer.kind, sourceCup);
            floatRect = { x: snapped.x, y: snapped.y, w: snapped.w, h: snapped.h };
            tilt = snapped.rot;
            pivot = { x: snapped.pivotX, y: snapped.pivotY };
          }
        }
        cupPose = drawCup(floatRect, lab29Pointer.kind === 'bag' ? '#86e9bc' : '#6cc7ff', {
          rot: tilt,
          fillLevel: preview ? preview.cupFill : 0.82,
          pourSide: 'left',
          pivotX: pivot.x,
          pivotY: pivot.y
        });
        if(lab29Pointer.overTarget){
          const target = ap.hitZones[`${lab29Pointer.kind}Target`];
          if(target && cupPose){
            ctx.strokeStyle = 'rgba(143,216,255,.8)';
            ctx.lineWidth = 3.2;
            ctx.beginPath();
            const targetX = target.x + target.w * 0.5;
            const targetY = target.y + target.h * 0.52;
            ctx.moveTo(cupPose.lip.x, cupPose.lip.y);
            ctx.quadraticCurveTo((cupPose.lip.x + targetX) * 0.5, Math.min(cupPose.lip.y, targetY) - 14, targetX, targetY);
            ctx.stroke();
            for(let i=0;i<5;i++){
              const t = i / 4;
              const px = cupPose.lip.x + (targetX - cupPose.lip.x) * t;
              const py = cupPose.lip.y + (targetY - cupPose.lip.y) * t + Math.sin(performance.now() * 0.01 + i) * 1.4;
              ctx.fillStyle = 'rgba(143,216,255,.75)';
              ctx.beginPath();
              ctx.arc(px, py, 1.8 - t * 0.4, 0, Math.PI * 2);
              ctx.fill();
            }
          }
        }
      }

      if(ap.lastScene){
        ctx.fillStyle = 'rgba(15,22,31,.84)';
        ctx.strokeStyle = 'rgba(123,183,255,.28)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.roundRect(W*0.55, H-70, W*0.32, 34, 16);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#dfeaff';
        ctx.font = '13px -apple-system,Segoe UI';
        ctx.fillText(`现象：${ap.lastScene}${ap.lastPhenomenon ? '｜' + ap.lastPhenomenon : ''}`, W*0.57, H-48);
      }
    }

    function draw30(ctx,W,H){
      const ap = state.apparatus;
      const x = W*0.14, y = H*0.18, w = W*0.34, h = H*0.56;

      ctx.strokeRect(meterX, meterY, meterW, meterH);

      ctx.fillText(`测点深度：${ap.lastDepth}cm`, meterX + 16, meterY + 106);

      bottles.forEach((b, i)=>{

    function refreshLab15ScrapeState(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      ap.scrapeProgress = round((clamp(ap.leftPolish,0,100) + clamp(ap.rightPolish,0,100)) * 0.5, 1);
      if(!ap.scraped && ap.leftPolish >= 88 && ap.rightPolish >= 88){
        ap.scraped = true;
        setStatus('接触面打磨完成');
        showToast('打磨完成，可进行横向夹紧');
        updatePills();
        if(!state.autoPlaying) tryPassStep(false);
      }
    }

    function refreshLab15ClampState(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      const ready = ap.scraped && ap.clampLevel >= 0.82;
      if(ready && (!ap.pressed || ap.separated || !ap.adhered)){
        ap.pressed = true;
        ap.clampDone = true;
        ap.adhered = true;
        ap.separated = false;
        setStatus('夹具已压紧');
        showToast('压紧到位，可进行拉伸测力');
        updatePills();
        if(!state.autoPlaying) tryPassStep(false);
      }else if(!ready && ap.pressed){
        ap.pressed = false;
        ap.adhered = false;
        updatePills();
      }
    }

    function ensureLab15ToolReady(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      if(ap.toolReady) return;
      const g = getLab15Layout();
      ap.toolX = g.toolHomeX;
      ap.toolY = g.toolHomeY;
      ap.lastDragX = ap.toolX;
      ap.lastDragY = ap.toolY;
      ap.toolReady = true;
    }

    function applyLab15ToolAtStagePoint(stageX, stageY){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      ensureLab15ToolReady();
      const g = getLab15Layout();
      const p = stagePointToScene(stageX, stageY);
      const nx = clamp(p.x - g.toolW * 0.5, 6, g.W - g.toolW - 6);
      const ny = clamp(p.y - g.toolH * 0.56, g.baseY - 130, g.H - g.toolH - 80);
      const dx = nx - ap.lastDragX;
      const dy = ny - ap.lastDragY;
      const travel = Math.hypot(dx, dy);
      ap.toolX = nx;
      ap.toolY = ny;
      ap.lastDragX = nx;
      ap.lastDragY = ny;

      const toolRect = { x: ap.toolX, y: ap.toolY, w: g.toolW, h: g.toolH };
      const gain = clamp(travel * 0.75, 0, 4.6);
      if(rectOverlap(toolRect, g.scrubZoneA)) ap.leftPolish = clamp(ap.leftPolish + gain, 0, 100);
      if(rectOverlap(toolRect, g.scrubZoneB)) ap.rightPolish = clamp(ap.rightPolish + gain, 0, 100);
      refreshLab15ScrapeState();
      updatePills();
    }

    function applyLab15ClampAtStagePoint(stageX, stageY){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      const g = getLab15Layout();
      const p = stagePointToScene(stageX, stageY);
      ap.clampLevel = clamp((g.clampTrackX + g.clampTrackW - p.x) / g.clampTrackW, 0, 1);
      refreshLab15ClampState();
      updatePills();
    }

    function avoidControlDockOccludingLab15Meter(){
      if(LAB_ID !== 15) return;
      const stageRect = stageEl.getBoundingClientRect();
      const dockRect = controlDock.getBoundingClientRect();
      const g = getLab15Layout();
      const dockInStage = {
        x: dockRect.left - stageRect.left,
        y: dockRect.top - stageRect.top,
        w: dockRect.width,
        h: dockRect.height
      };
      const meterRect = { x: g.meterX, y: g.meterY, w: g.meterW, h: g.meterH };
      if(rectOverlap(dockInStage, meterRect)){
        setDockPos(controlDock, 10, 10);
      }
    }

    function bindLab15StageInteraction(){
      if(LAB_ID !== 15) return;

      const endDrag = (e)=>{
        if(lab15Pointer.id !== e.pointerId) return;
        lab15Pointer.id = null;
        lab15Pointer.mode = '';
      };

      scene.addEventListener('pointerdown', (e)=>{
        if(state.autoPlaying) return;
        const ap = state.apparatus;
        const p = scenePointFromEvent(e);
        const g = getLab15Layout();
        const toolRect = { x: ap.toolX, y: ap.toolY, w: g.toolW, h: g.toolH };
        const onClampHandle = Math.hypot(p.x - g.clampHandleX, p.y - g.clampHandleY) <= 14;
        const onTool = rectContainsPoint(toolRect, p.x, p.y)
          || rectContainsPoint(g.scrubZoneA, p.x, p.y)
          || rectContainsPoint(g.scrubZoneB, p.x, p.y);

        if(onTool){
          lab15Pointer.mode = 'tool';
          lab15Pointer.id = e.pointerId;
          lab15Pointer.offX = clamp(p.x - ap.toolX, 0, g.toolW);
          lab15Pointer.offY = clamp(p.y - ap.toolY, 0, g.toolH);
          ap.lastDragX = ap.toolX;
          ap.lastDragY = ap.toolY;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
          return;
        }

        if(onClampHandle){
          if(!ap.scraped){
            if(!state.freeMode && !state.autoPlaying){
              warnCurrentStep('步骤1未完成，请先把接触面打磨到100%');
              showToast('请先完成打磨，再旋紧夹具');
              return;
            }
          }
          lab15Pointer.mode = 'clamp';
          lab15Pointer.id = e.pointerId;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
        }
      });

      scene.addEventListener('pointermove', (e)=>{
        if(lab15Pointer.id !== e.pointerId || !lab15Pointer.mode) return;
        const p = scenePointFromEvent(e);
        const g = getLab15Layout();

        if(lab15Pointer.mode === 'tool'){
          const nx = clamp(p.x - lab15Pointer.offX, 6, g.W - g.toolW - 6);
          const ny = clamp(p.y - lab15Pointer.offY, g.baseY - 130, g.H - g.toolH - 80);
          const center = scenePointToStage(nx + g.toolW * 0.5, ny + g.toolH * 0.56);
          applyLab15ToolAtStagePoint(center.x, center.y);
          e.preventDefault();
          return;
        }

        if(lab15Pointer.mode === 'clamp'){
          const stageP = scenePointToStage(p.x, p.y);
          applyLab15ClampAtStagePoint(stageP.x, stageP.y);
          e.preventDefault();
        }
      });

      scene.addEventListener('pointerup', endDrag);
      scene.addEventListener('pointercancel', endDrag);
    }

    function bindLab29StageInteraction(){
      if(LAB_ID !== 29) return;
      const end = (e)=>{
        if(lab29Pointer.id !== e.pointerId) return;
        if(lab29Pointer.dragging){
          if(lab29Pointer.overTarget){
            performLab29Pour(lab29Pointer.kind, true);
          }else if(!state.autoPlaying){
            showToast('请把水杯拖到器材开口处再松手');
            setStatus('加水未完成：未对准器材开口');
          }
        }
        resetLab29Pointer();
      };
      scene.addEventListener('pointerdown', (e)=>{
        if(state.autoPlaying) return;
        const p = scenePointFromEvent(e);
        const ap = state.apparatus;
        const zones = ap.hitZones || {};
        const order = ['side','bottom','bag'];
        const hitKind = order.find(kind=>{
          const src = zones[`${kind}Source`];
          return src && rectContainsPoint(src, p.x, p.y);
        });
        if(!hitKind) return;
        if(!state.freeMode){
          const expected = order[state.currentTask];
          if(expected && expected !== hitKind){
            const hints = {
              side:'当前步骤请先向侧壁橡皮膜容器加水。',
              bottom:'当前步骤请先向底部橡皮膜容器加水。',
              bag:'当前步骤请先向塑料袋加水。'
            };
            warnCurrentStep(hints[expected] || '请先完成当前步骤加水操作');
            setStatus('越步加水已拦截');
            return;
          }
        }
        lab29Pointer.id = e.pointerId;
        lab29Pointer.kind = hitKind;
        lab29Pointer.dragging = true;
        lab29Pointer.x = p.x;
        lab29Pointer.y = p.y;
        lab29Pointer.overTarget = false;
        lab29Pointer.hoverStart = 0;
        scene.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      scene.addEventListener('pointermove', (e)=>{
        if(lab29Pointer.id !== e.pointerId || !lab29Pointer.dragging) return;
        const p = scenePointFromEvent(e);
        lab29Pointer.x = p.x;
        lab29Pointer.y = p.y;
        const layout = getLab29Layout(scene.clientWidth, scene.clientHeight);
        const zone = layout[lab29Pointer.kind] || layout[layout.active];
        const sourceCup = zone ? getLab29CupRect(zone) : { w: 56, h: 42 };
        const draggedRect = {
          x: p.x - sourceCup.w * 0.5,
          y: p.y - sourceCup.h * 0.55,
          w: sourceCup.w,
          h: sourceCup.h
        };
        const target = state.apparatus.hitZones[`${lab29Pointer.kind}Target`];
        const over = !!(target && rectOverlap(draggedRect, target));
        if(over && !lab29Pointer.overTarget) lab29Pointer.hoverStart = performance.now();
        if(!over) lab29Pointer.hoverStart = 0;
        lab29Pointer.overTarget = over;
        e.preventDefault();
      });
      scene.addEventListener('pointerup', end);
      scene.addEventListener('pointercancel', end);
    }

    function updateDynamic(dt){
      const ap = state.apparatus;
      if(LAB_ID === 14 && ap.shaken) ap.bubblePhase += dt*0.004;
      if(LAB_ID === 17 && ap.pendulumOn){ ap.angle = Math.sin(performance.now()*0.006) * 0.38; }
      if(LAB_ID === 18 && ap.running){ ap.progress = clamp(ap.progress + dt/1200, 0, 1); }
      if(LAB_ID === 20 && ap.animating){
        const dx = ap.targetX - ap.cartX;
        ap.cartX += dx * Math.min(1, dt*0.01);
      }
      if(LAB_ID === 21 && ap.pulling){
        ap.pullTrace = clamp(ap.pullTrace + dt/420, 0, 1);
        if(ap.pullTrace >= 1) ap.pulling = false;
      }
      if(LAB_ID === 23){
        const target = clamp(((ap.rightN || 0) - (ap.leftN || 0)) * 9, -56, 56);
        ap.ringOffset += (target - ap.ringOffset) * Math.min(1, dt*0.012);
      }
      if(LAB_ID === 24 && ap.moving){
        ap.cartX = clamp(ap.cartX + dt/1700, 0.14, 0.82);
      }
      if(LAB_ID === 25 && ap.running){
        ap.progress = clamp(ap.progress + dt/900, 0, 1);
      }
      if(LAB_ID === 29){
        const easeFill = Math.min(1, dt * 0.008);
        const easeBulge = Math.min(1, dt * 0.014);
        const easeCup = Math.min(1, dt * 0.012);
        ap.sideCupLevel += (ap.sideCupLevelTarget - ap.sideCupLevel) * easeCup;
        ap.bottomCupLevel += (ap.bottomCupLevelTarget - ap.bottomCupLevel) * easeCup;
        ap.bagCupLevel += (ap.bagCupLevelTarget - ap.bagCupLevel) * easeCup;
        ap.sideFill += (ap.sideFillTarget - ap.sideFill) * easeFill;
        ap.bottomFill += (ap.bottomFillTarget - ap.bottomFill) * easeFill;
        ap.bagFill += (ap.bagFillTarget - ap.bagFill) * easeFill;
        ap.sideBulge += (ap.sideTarget - ap.sideBulge) * easeBulge;
        ap.bottomBulge += (ap.bottomTarget - ap.bottomBulge) * easeBulge;
        ap.bagBulge += (ap.bagTarget - ap.bagBulge) * easeBulge;
      }
    }

    function loop(ts){
      const dt = state.lastTs ? (ts - state.lastTs) : 16;
      state.lastTs = ts;
      updateDynamic(dt);
      drawScene();
      state.rafId = requestAnimationFrame(loop);
    }

    function scheduleChart(){
      if(scheduleChart.t) return;
      scheduleChart.t = trackTimeout(()=>{
        scheduleChart.t = null;
        drawChart();
      }, 60);
    }

    function drawChart(){
      const rect = chart.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width*dpr));
      const h = Math.max(1, Math.floor(rect.height*dpr));
      if(chart.width!==w || chart.height!==h){ chart.width = w; chart.height = h; }
      const ctx = chart.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width, H = rect.height;

      ctx.fillStyle = 'rgba(6,10,16,.9)';
      ctx.fillRect(0,0,W,H);
      const left=38, right=W-10, top=12, bottom=H-24;
      const pw = right-left, ph = bottom-top;

      ctx.strokeStyle = 'rgba(255,255,255,.12)';
      for(let i=0;i<=4;i++){
        const y = top + ph*(i/4);
        ctx.beginPath(); ctx.moveTo(left,y); ctx.lineTo(right,y); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(left,bottom); ctx.lineTo(right,bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(left,top); ctx.lineTo(left,bottom); ctx.stroke();

      const ys = state.records.map(r=>Number(r.y));
      if(!ys.length) return;
      let maxY = Math.max(...ys);
      if(maxY <= 0) maxY = 1;
      maxY *= 1.2;

      const toX = (i)=> left + pw * (i/(Math.max(1, ys.length-1)));
      const toY = (v)=> bottom - (v/maxY)*ph;

      ctx.strokeStyle = 'rgba(61,220,151,.85)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
      ctx.stroke();

      ctx.fillStyle = '#7ed6ff';
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); ctx.beginPath(); ctx.arc(x,y,3.6,0,Math.PI*2); ctx.fill(); });

      ctx.fillStyle = '#dce9ff';
      ctx.font = '11px -apple-system,Segoe UI';
      ctx.fillText('记录序号', right-56, bottom+16);
      ctx.fillText('读数趋势', left+2, top+10);
    }

    function setDockPos(el, x, y){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const nx = clamp(x, 4, stage.width - r.width - 4);
      const ny = clamp(y, 4, stage.height - r.height - 4);
      el.style.left = `${nx}px`;
      el.style.top = `${ny}px`;
      el.style.right = 'auto';
      el.style.bottom = 'auto';
    }

    function isNarrowStage(){
      return stageEl.getBoundingClientRect().width <= 760;
    }

    function shouldStartControlCollapsed(){
      return true;
    }

    function bringToFront(kind){
      state.zTop += 1;
      if(kind==='control') controlDock.style.zIndex = String(state.zTop);
      if(kind==='data') dataDock.style.zIndex = String(state.zTop);
    }

    function snapDockToEdges(el){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const x = r.left - stage.left;
      const y = r.top - stage.top;
      const leftGap = x;
      const rightGap = stage.width - (x + r.width);
      const topGap = y;
      const bottomGap = stage.height - (y + r.height);
      const m = 14;
      let nx = x, ny = y;
      if(leftGap < m) nx = 4;
      else if(rightGap < m) nx = stage.width - r.width - 4;
      if(topGap < m) ny = 4;
      else if(bottomGap < m) ny = stage.height - r.height - 4;
      setDockPos(el, nx, ny);
    }

    function makeDockDraggable(el, head, kind){
      let dragging = false;
      let offX = 0, offY = 0;
      head.addEventListener('pointerdown', (e)=>{
        if(e.target.closest('button')) return;
        dragging = true;
        el.classList.add('dragging');
        bringToFront(kind);
        const r = el.getBoundingClientRect();
        offX = e.clientX - r.left;
        offY = e.clientY - r.top;
        state.dockMoved[kind] = true;
        head.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      head.addEventListener('pointermove', (e)=>{
        if(!dragging) return;
        const stage = stageEl.getBoundingClientRect();
        setDockPos(el, e.clientX - stage.left - offX, e.clientY - stage.top - offY);
        e.preventDefault();
      });
      const end = ()=>{
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        snapDockToEdges(el);
      };
      head.addEventListener('pointerup', end);
      head.addEventListener('pointercancel', end);
    }

    function setControlCollapsed(on){
      state.controlCollapsed = !!on;
      controlBody.classList.toggle('collapsed', state.controlCollapsed);
      controlToggleBtn.textContent = state.controlCollapsed ? '展开' : '收起';
      bringToFront('control');
      if(isNarrowStage() && !state.controlCollapsed && !state.dataCollapsed){
        setDataCollapsed(true);

    function setDataCollapsed(on){

        setControlCollapsed(true);

    async function autoDemo(){
      if(state.autoPlaying || state.freeMode) return;
      const runId = ++state.autoRunId;
      state.autoPlaying = true;
      state.autoStopRequested = false;
      refreshAutoDemoButton();
      recordBtn.disabled = true;
      analyzeBtn.disabled = true;
      resetBtn.disabled = true;
      freeBtn.disabled = true;

      const ensure = ()=>{ if(!state.autoPlaying || runId !== state.autoRunId || state.autoStopRequested) throw new Error('auto-cancelled'); };
      const wait = async (ms)=>{ await sleep(ms); ensure(); };
      const doA = async (id, ms=950)=>{ performAction(id, false); updatePills(); await wait(ms); };
      const doR = async (ms=850)=>{
        const before = state.records.length;
        addRecord();
        await wait(ms);
        ensure();
        if(state.records.length <= before) throw new Error('record-not-persisted');
      };
      const doStep = async (idx, msg, ms=700)=>{
        setStepUI(idx);
        if(msg) showToast(msg);
        await wait(ms);
      };
      const doAWithCursor = async (id, ms=950)=>{
        await clickElementWithCursor(getActionButtonById(id), 700);
        await doA(id, ms);
      };
      const demoSetPullN = async (nextValue)=>{
        const slider = controlFields.querySelector('input[type="range"]');
        if(slider){
          const min = Number(slider.min || '0');
          const max = Number(slider.max || '1');
          const ratio = max === min ? 0 : clamp((nextValue - min) / (max - min), 0, 1);
          const sr = slider.getBoundingClientRect();
          const p = stagePointFromClient(sr.left + sr.width * ratio, sr.top + sr.height * 0.5);
          await moveDemoCursorToStage(p.x, p.y, 760);
          await clickDemoCursor(210);
        }

<script id="exp35-ui-normalize-runtime">
(function(){

  var $ = function(selector){ return document.querySelector(selector); };
  var hintLamp = $("#hintLamp");

  var taskHint = $("#taskHint");
  var taskText = $("#taskText");

  } catch (_) {}

  }

  function updateHintText(){
    if (!hintPop) return;
    var hint = taskHint ? taskHint.textContent.trim() : "";
    var text = taskText ? taskText.textContent.trim() : "";
    hintPop.textContent = hint || text || "按步骤操作器材，观察现象并记录数据。";

  if (hintLamp && hintPop && !hintLamp.dataset.exp35Bound) {

    updateHintText();
    hintLamp.addEventListener("click", function(){
      updateHintText();
      hintPop.classList.toggle("open");
    });
  }

  function drawRecordChart(){
    if (!recordChart) return;
    var ctx = recordChart.getContext("2d");
    if (!ctx) return;
    var dpr = window.devicePixelRatio || 1;
    var w = recordChart.clientWidth || 320;
    var h = recordChart.clientHeight || 180;
    var nextW = Math.max(1, Math.round(w * dpr));
    var nextH = Math.max(1, Math.round(h * dpr));
    if (recordChart.width !== nextW || recordChart.height !== nextH) {
      recordChart.width = nextW;
      recordChart.height = nextH;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = "rgba(155,211,255,.22)";
    ctx.lineWidth = 1;
    for (var x = 24; x < w; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 14); ctx.lineTo(x, h - 18); ctx.stroke();
    }
    for (var y = 28; y < h - 8; y += 30) {
      ctx.beginPath(); ctx.moveTo(12, y); ctx.lineTo(w - 12, y); ctx.stroke();
    }
    var rows = recordBody ? Array.from(recordBody.querySelectorAll("tr")).filter(function(row){
      return row.querySelectorAll("td").length > 1 && !/当前无记录|暂无|还没有记录/.test(row.textContent);
    }) : [];
    ctx.font = "700 13px Arial";
    ctx.fillStyle = "#cfe4ff";
    ctx.fillText("记录概览", 16, 24);
    if (!rows.length) {
      ctx.font = "12px Arial";
      ctx.fillStyle = "rgba(235,245,255,.64)";
      ctx.fillText("完成步骤后，这里显示记录进度。", 16, 52);
      return;
    }
    var max = Math.max(3, rows.length);
    rows.slice(0, 8).forEach(function(row, index){
      var barW = (w - 96) * ((index + 1) / max);
      var y = 46 + index * 20;
      ctx.fillStyle = ["#ffd54f", "#3ddc97", "#5bbcff", "#ef476f"][index % 4];
      ctx.fillRect(72, y - 10, barW, 9);
      ctx.fillStyle = "rgba(235,245,255,.86)";
      ctx.font = "12px Arial";
      ctx.fillText("记录 " + (index + 1), 16, y);
    });
  }

  if (recordBody && recordChart && !recordChart.dataset.exp35Bound) {
    recordChart.dataset.exp35Bound = "1";
    new MutationObserver(drawRecordChart).observe(recordBody, { childList:true, subtree:true, characterData:true });
    window.addEventListener("resize", drawRecordChart);
    setTimeout(drawRecordChart, 60);
  }

  if (dataDock && dataNotice && !dataDock.dataset.exp35NoticeBound) {
    dataDock.dataset.exp35NoticeBound = "1";
    var clearNotice = function(){
      dataNotice.textContent = "0";
      dataNotice.classList.remove("show");
      dataNotice.classList.add("hidden");
    };
    dataDock.addEventListener("click", function(evt){
      if (evt.target && evt.target.id === "dataToggleBtn") setTimeout(clearNotice, 20);
    });
  }
})();
</script>


<script id="exp35-ui-completion-drawer-fit">
(function(){
  "use strict";
  var $ = function(selector){ return document.querySelector(selector); };
  var stage = $("#stage");
  var controlDock = $("#controlDock");
  var dataDock = $("#dataDock");
  var controlBody = $("#controlBody");
  var dataBody = $("#dataBody");
  var controlToggle = $("#controlToggleBtn");
  var dataToggle = $("#dataToggleBtn");
  var doneMask = $("#doneMask");
  var completionOpened = false;
  var userPanelOverride = false;
  var lastDone = false;

  function isDone(){
    var modalDone = doneMask && getComputedStyle(doneMask).display !== "none";
    var stateDone = false;
    try { stateDone = !!window.state && !!window.state.completed; } catch (_) {}
    return modalDone || stateDone;
  }

  function signalPanelState(){
    try { window.dispatchEvent(new CustomEvent("exp35:panel-state-changed")); } catch (_) {}
  }

  function setPanelCollapsed(dock, body, toggle, collapsed){
    if (dock) dock.classList.toggle("collapsed", collapsed);
    if (body) body.classList.toggle("collapsed", collapsed);
    if (toggle) toggle.textContent = collapsed ? "展开" : "收起";
  }

  function placeDock(dock, left, top){
    if (!dock || !stage) return;
    var sw = stage.clientWidth;
    var sh = stage.clientHeight;
    var w = dock.offsetWidth || 160;
    var h = dock.offsetHeight || 44;
    var x = Math.max(10, Math.min(left, sw - w - 10));
    var y = Math.max(10, Math.min(top, sh - h - 10));
    dock.style.left = x + "px";
    dock.style.top = y + "px";
    dock.style.right = "auto";
  }

  function updateDoneState(){
    var done = isDone();
    if (!done) {
      completionOpened = false;
      userPanelOverride = false;
      lastDone = false;
      return false;
    }
    if (!lastDone) {
      completionOpened = false;
      userPanelOverride = false;
    }
    lastDone = true;
    return true;
  }

  function fitCompletionDrawers(){
    if (!stage || !controlDock || !dataDock || !updateDoneState()) return;
    if (completionOpened || userPanelOverride) return;
    setPanelCollapsed(controlDock, controlBody, controlToggle, true);
    setPanelCollapsed(dataDock, dataBody, dataToggle, false);
    var sw = stage.clientWidth;
    var controlW = controlDock.offsetWidth || 160;
    var dataW = dataDock.offsetWidth || 260;
    var controlX = sw - controlW - 10;
    var dataX = sw - dataW - 10;
    placeDock(controlDock, controlX, 10);
    placeDock(dataDock, dataX, 10 + (controlDock.offsetHeight || 44) + 10);
    completionOpened = true;
    signalPanelState();
  }

  function markUserPanelOverride(evt){
    if (!isDone() || !evt || !evt.target || !evt.target.closest) return;
    if (evt.target.closest("#controlToggleBtn,#dataToggleBtn,#experimentTab,#dataTab,#controlSheetCloseBtn,#dataSheetCloseBtn")) {
      userPanelOverride = true;
      setTimeout(signalPanelState, 0);
    }
  }

  if (!stage || !controlDock || !dataDock) return;
  document.addEventListener("click", markUserPanelOverride, true);
  window.addEventListener("resize", function(){ requestAnimationFrame(fitCompletionDrawers); });
  setInterval(fitCompletionDrawers, 450);
})();
</script>

  const $ = (s, root = document) => root.querySelector(s);
  const stage = $('#stage');
  const controlDock = $('#controlDock');
  const dataDock = $('#dataDock');
  if (!stage || !controlDock || !dataDock) return;
  const controlBody = $('#controlBody') || $('#panelBody') || $('.panelBody', controlDock) || $('.dockBody', controlDock) || $('.dock-body', controlDock) || $('.drawer-body', controlDock);
  const dataBody = $('#dataBody') || $('#resultsBody') || $('.resultsBody', dataDock) || $('.dockBody', dataDock) || $('.dock-body', dataDock) || $('.drawer-body', dataDock);
  const controlToggle = $('#controlToggleBtn') || $('[data-toggle="controlDock"]');
  const dataToggle = $('#dataToggleBtn') || $('[data-toggle="dataDock"]');
  const modeTag = $('#modeTag');
  const statusTag = $('#statusTag');
  const taskStep = $('#taskStep');
  const dataNotice = $('#dataNotice');
  const resetBtn = $('#resetBtn');
  const autoDemoBtn = $('#autoDemoBtn');
  const freeBtn = $('#freeBtn');
  controlDock.classList.add('control');
  dataDock.classList.add('data');
  if (modeTag) modeTag.classList.add('mode-strip');
  if (resetBtn) resetBtn.textContent = '重置关卡';
  if (autoDemoBtn) autoDemoBtn.textContent = '演示模式';
  if (freeBtn) freeBtn.textContent = '自由模式';
  function isMobile(){ return window.innerWidth <= MOBILE_MAX || stage.clientWidth <= MOBILE_MAX; }
  function normalizePrefix(el, label){
    if (!el) return;
    let text = (el.textContent || '').trim();
    if (!text) return;
    text = text.replace(/^模式[:：]\s*/, '').replace(/^状态[:：]\s*/, '');
    el.textContent = label + '：' + text;
  }
  function taskProgress(){
    const text = (taskStep?.textContent || '').trim();
    const match = text.match(/(?:步骤|关卡)\s*(\d+)\s*\/\s*(\d+)/);
    return match ? { current: match[1], total: match[2] } : null;
  }
  function normalizeTaskStep(){
    const progress = taskProgress();
    if (taskStep && progress) taskStep.textContent = '关卡 ' + progress.current + ' / ' + progress.total;
  }
  function normalizeModeText(){
    if (!modeTag) return;
    const progress = taskProgress();
    let text = (modeTag.textContent || '').trim().replace(/^模式[:：]\s*/, '');
    if (/自动|演示/.test(text)) text = /完成/.test(text) ? '演示模式 · 演示完成' : '演示模式 · 自动运行';
    else if (/自由/.test(text)) text = '自由模式 · 自主探索';
    else if (/完成|通关|已完成/.test(text)) text = '闯关模式 · 已通关';
    else if (progress) text = '闯关模式 · 关卡 ' + progress.current + '/' + progress.total;
    else if (/引导|待开始|待操作|测量|观察|分析/.test(text)) text = '闯关模式';
    if (modeTag.textContent !== '模式：' + text) modeTag.textContent = '模式：' + text;
  }
  function normalizeLabels(){ normalizeTaskStep(); normalizeModeText(); normalizePrefix(statusTag, '状态'); }
  function makeButton(id, text, controls){
    let btn = $('#' + id);
    if (!btn) {
      btn = document.createElement('button');
      btn.id = id;
      btn.type = 'button';
      btn.className = 'mobile-tab';
      btn.setAttribute('aria-controls', controls);
      btn.innerHTML = '<span class="tab-label">' + text + '<span class="mobile-badge" aria-hidden="true">0</span></span>';
    }
    return btn;
  }
  function ensureTabs(){
    let tabs = $('#mobileTabs', stage);
    if (!tabs) {
      tabs = document.createElement('div');
      tabs.className = 'mobile-tabs';
      tabs.id = 'mobileTabs';
      tabs.setAttribute('role', 'group');
      tabs.setAttribute('aria-label', '实验数据面板切换');
      tabs.append(makeButton('experimentTab', '实验面板', 'controlDock'), makeButton('dataTab', '数据面板', 'dataDock'));
      stage.appendChild(tabs);
    }
    return tabs;
  }
  const tabs = ensureTabs();
  const experimentTab = $('#experimentTab', tabs) || $('#experimentTab');
  const dataTab = $('#dataTab', tabs) || $('#dataTab');
  const experimentBadge = $('#experimentTabBadge') || $('.mobile-badge', experimentTab);
  const dataBadge = $('#dataTabBadge') || $('.mobile-badge', dataTab);
  if (experimentBadge && !experimentBadge.id) experimentBadge.id = 'experimentTabBadge';
  if (dataBadge && !dataBadge.id) dataBadge.id = 'dataTabBadge';
  function ensureClose(body, id, label){
    if (!body) return null;
    let btn = $('#' + id, body);
    if (!btn) {
      btn = document.createElement('button');
      btn.id = id;
      btn.type = 'button';
      btn.className = 'sheet-close';
      btn.textContent = '⌄';
      btn.setAttribute('aria-label', label);
      btn.title = '收起';
      body.insertBefore(btn, body.firstChild);
    }
    return btn;
  }
  const controlClose = ensureClose(controlBody, 'controlSheetCloseBtn', '收起实验面板');
  const dataClose = ensureClose(dataBody, 'dataSheetCloseBtn', '收起数据面板');
  function isCollapsed(dock, body){ return dock.classList.contains('collapsed') || (body && body.classList.contains('collapsed')); }
  function mirrorCollapsed(dock, body){ const collapsed = isCollapsed(dock, body); dock.classList.toggle('collapsed', collapsed); if (body) body.classList.toggle('collapsed', collapsed); return collapsed; }
  function forceClassState(which, open){
    const dock = which === 'control' ? controlDock : dataDock;
    const body = which === 'control' ? controlBody : dataBody;
    const toggle = which === 'control' ? controlToggle : dataToggle;
    dock.classList.toggle('collapsed', !open);
    if (body) body.classList.toggle('collapsed', !open);
    if (toggle && /^(展开|收起)$/.test((toggle.textContent || '').trim())) toggle.textContent = open ? '收起' : '展开';
    if (which === 'data' && open) clearDataNotice();
  }
  function clickToOpen(which){
    const targetDock = which === 'control' ? controlDock : dataDock;
    const targetBody = which === 'control' ? controlBody : dataBody;
    const targetOpen = !isCollapsed(targetDock, targetBody);
    if (targetOpen) {
      forceClassState(which, false);
    } else {
      forceClassState(which === 'control' ? 'data' : 'control', false);
      forceClassState(which, true);
    }
    syncMobileShell();
    setTimeout(syncMobileShell, 80);
  }
  function clearDataNotice(){
    if (dataNotice) {
      dataNotice.textContent = '0';
      dataNotice.classList.remove('show');
      dataNotice.classList.add('hidden');
    }
    if (dataBadge) {
      dataBadge.textContent = '0';
      dataBadge.classList.remove('show');
    }
    try {
      if (window.state && typeof window.state === 'object' && 'unseenRecordCount' in window.state) window.state.unseenRecordCount = 0;
    } catch (_) {}
  }
  function dataNoticeCount(){
    const raw = (dataNotice?.textContent || dataBadge?.textContent || '').trim();
    if (!raw) return 0;
    if (raw === '99+') return 99;
    const n = Number.parseInt(raw, 10);
    return Number.isFinite(n) ? n : 0;
  }
  function syncBadge(){
    const count = dataNoticeCount();
    const dataClosed = isCollapsed(dataDock, dataBody);
    if (dataBadge) {
      dataBadge.textContent = count > 99 ? '99+' : String(count);
      dataBadge.classList.toggle('show', dataClosed && count > 0);
    }
  }
  function applyDataLabels(){
    if (!dataBody) return;
    dataBody.querySelectorAll('table').forEach(table => {
      table.classList.add('record');
      const labels = Array.from(table.querySelectorAll('thead th')).map(th => (th.textContent || '').trim());
      table.querySelectorAll('tbody tr').forEach(tr => {
        Array.from(tr.children).forEach((td, index) => {
          if (td.tagName && td.tagName.toLowerCase() === 'td' && !td.getAttribute('data-label') && labels[index]) td.setAttribute('data-label', labels[index]);
        });
      });
    });
  }
  function syncMobileShell(){
    normalizeLabels();
    applyDataLabels();
    const mobile = isMobile();
    controlDock.classList.toggle('mobile-sheet', mobile);
    dataDock.classList.toggle('mobile-sheet', mobile);
    if (!mobile) {
      tabs.classList.remove('attached', 'experiment-open', 'data-open');
      return;
    }
    const controlClosed = mirrorCollapsed(controlDock, controlBody);
    const dataClosed = mirrorCollapsed(dataDock, dataBody);
    const experimentOpen = !controlClosed;
    const dataOpen = !dataClosed;
    if (dataOpen) clearDataNotice();
    tabs.classList.toggle('attached', experimentOpen || dataOpen);
    tabs.classList.toggle('experiment-open', experimentOpen);
    tabs.classList.toggle('data-open', dataOpen);
    experimentTab?.classList.toggle('active', experimentOpen);
    dataTab?.classList.toggle('active', dataOpen);
    experimentTab?.setAttribute('aria-expanded', String(experimentOpen));
    dataTab?.setAttribute('aria-expanded', String(dataOpen));
    syncBadge();
  }
  function setInitialMobileState(){ if (isMobile()) { forceClassState('data', false); forceClassState('control', true); } syncMobileShell(); }
  experimentTab?.addEventListener('click', () => clickToOpen('control'));
  dataTab?.addEventListener('click', () => clickToOpen('data'));
  controlClose?.addEventListener('click', () => { forceClassState('control', false); syncMobileShell(); });
  dataClose?.addEventListener('click', () => { forceClassState('data', false); syncMobileShell(); });
  [controlToggle, dataToggle, resetBtn].forEach(btn => btn?.addEventListener('click', () => setTimeout(syncMobileShell, 80), true));
  window.addEventListener('exp35:panel-state-changed', syncMobileShell);
  setInterval(() => { normalizeLabels(); applyDataLabels(); syncBadge(); }, 700);
  window.addEventListener('resize', syncMobileShell);
  window.addEventListener('orientationchange', syncMobileShell);
  requestAnimationFrame(setInitialMobileState);
  setTimeout(setInitialMobileState, 160);
  setTimeout(syncMobileShell, 600);
})();
</script>
</body>
</html>
