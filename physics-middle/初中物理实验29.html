  <title>初中物理实验29｜观察或体验液体的内部压强（交互版）</title>
  <!-- 实验目录依据：中小学实验教学目录（初中物理 29. 观察或体验液体的内部压强） -->
  <style>
    :root{
      --bg:#1a1a1a;
      --ink:#fff;
      --card-bg:rgba(255,255,255,.08);
      --panel-bg:rgba(15,15,15,.58);
      --line:rgba(255,255,255,.12);
      --accent:#3ddc97;
      --warn:#ffb74d;
      --dockShadow:0 14px 36px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:10px;
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    #spectrum{
      position:relative;
      width:100%;
      max-width:980px;
      height:40px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,255,255,.15);
      margin:0 0 12px;
      background:#000;
      flex-shrink:0;
    }
    #spectrum::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
      background-size:200% 100%;
      animation:flowRainbow 6s linear infinite;
    }
    @keyframes flowRainbow{ 0%{background-position:0 0;} 100%{background-position:-100% 0;} }

    .task-card{
      width:100%;
      max-width:980px;
      background:var(--card-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      backdrop-filter:blur(6px);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:10px;
      transition:opacity .2s, filter .2s;
    }
    .task-step{ background:rgba(255,255,255,.16); border-radius:8px; padding:6px 10px; font-weight:700; white-space:nowrap; }
    .task-text{ line-height:1.55; }
    .task-hint{ color:#ffd54f; font-size:12px; opacity:.95; margin-top:2px; }
    .progress-dots{ display:flex; gap:6px; }
    .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.26); outline:2px solid rgba(255,255,255,.12); }
    .dot.active{ background:var(--warn); }
    .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,.45); }
    .dot.warn{ background:#ff4d4f; outline-color:rgba(255,77,79,.58); box-shadow:0 0 10px rgba(255,77,79,.62); }

    #stage{
      width:100%;
      max-width:980px;
      height:66vh;
      max-height:660px;
      min-height:500px;
      margin-top:10px;
      border-radius:12px;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b0f14;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
      touch-action:none;
      background-image:
        radial-gradient(circle at 76% 25%, rgba(255,255,255,.06), transparent 42%),
        radial-gradient(circle at 22% 78%, rgba(0,255,255,.05), transparent 46%);
    }
    .hud{
      position:absolute;
      left:10px;
      top:10px;
      z-index:20;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      background:rgba(0,0,0,.48);
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
    }
    .tag{ border:1px solid rgba(255,255,255,.26); border-radius:999px; padding:2px 8px; font-weight:700; color:#dce9ff; background:rgba(255,255,255,.06); }

    .lab-area{
      position:absolute;
      inset:54px 10px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(5,10,16,.82);
      overflow:hidden;
    }
    #scene{ width:100%; height:100%; display:block; touch-action:none; }

    .dock{
      position:absolute;
      width:min(94%, 380px);
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-bg);
      backdrop-filter:blur(6px);
      box-shadow:var(--dockShadow);
      overflow:hidden;
      touch-action:none;
      z-index:30;
    }
    .dock.dragging{ box-shadow:0 20px 48px rgba(0,0,0,.55); }
    .dockHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    .dockHead:active{ cursor:grabbing; }
    .dockTitle{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700; color:#e7f0ff; }
    .dataNotice{
      display:none;
      min-width:18px;
      height:18px;
      padding:0 4px;
      border-radius:999px;
      background:#ff3040;
      color:#fff;
      font-size:11px;
      line-height:18px;
      text-align:center;
      font-weight:800;
      box-shadow:0 0 0 2px rgba(255,48,64,.26);
      animation:dataNoticeBlink .9s ease-in-out infinite;
    }
    .dataNotice.show{ display:inline-block; }
    @keyframes dataNoticeBlink{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(1.18); opacity:.56; }
    }
    .dockBtns{ display:flex; gap:6px; }
    .iconBtn{ border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#e8f1ff; border-radius:7px; padding:4px 8px; font-size:12px; cursor:pointer; }
    .dockBody{ padding:10px; max-height:360px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .dockBody.collapsed{ display:none; }

    .row{ margin-bottom:8px; font-size:12px; }
    .lab-hint{ color:#dce9ff; line-height:1.55; }
    .status-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
    .pill{ border:1px solid rgba(255,255,255,.2); border-radius:999px; padding:4px 8px; font-size:11px; color:#e8f1ff; background:rgba(0,0,0,.28); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #controlDock .lab-hint,
    #controlDock .status-grid{ display:none; }

    .field{ border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.2); margin-bottom:8px; }
    .field .name{ display:flex; justify-content:space-between; font-size:12px; color:#dce9ff; margin-bottom:6px; gap:8px; }
    .field input[type="range"], .field select{ width:100%; }
    .field select{ border:1px solid rgba(255,255,255,.25); border-radius:8px; background:rgba(0,0,0,.4); color:#fff; padding:6px 8px; }

    .btnRow{ display:flex; gap:8px; flex-wrap:wrap; }
    button.main, button.sub{
      border:none;
      border-radius:8px;
      padding:8px 12px;
      color:#fff;
      cursor:pointer;
      transition:background .2s, transform .05s, opacity .2s;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      font-size:13px;
    }
    button.main{ background:#2e7d32; }
    button.sub{ background:#444; }
    button.main:hover, button.sub:hover{ background:#5a5a5a; }
    button.main:active, button.sub:active{ transform:scale(.98); }
    button.main:disabled, button.sub:disabled{ opacity:.5; cursor:not-allowed; }

    .analysis{ font-size:12px; line-height:1.6; color:#e3efff; border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.24); }
    .analysis.ok{ border-color:rgba(61,220,151,.4); }
    table.record{ width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
    table.record th, table.record td{ border:1px solid rgba(255,255,255,.12); padding:4px 5px; text-align:center; }
    table.record th{ background:rgba(255,255,255,.08); color:#dce9ff; font-weight:700; }
    .chartWrap{ margin-top:8px; border:1px solid rgba(255,255,255,.12); border-radius:10px; background:rgba(0,0,0,.25); overflow:hidden; }
    #chart{ width:100%; height:170px; display:block; }

    .checkmark{
      position:absolute;
      z-index:60;
      left:50%;
      top:18%;
      transform:translate(-50%,-50%) scale(.6);
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(61,220,151,.15);
      border:3px solid var(--accent);
      display:none;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25);
      animation:pop .55s ease-out;
      pointer-events:none;
    }
    .checkmark.active{ display:flex; }
    .checkmark > div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }
    @keyframes pop{ 0%{transform:translate(-50%,-50%) scale(.4);opacity:.2;} 60%{transform:translate(-50%,-50%) scale(1.08);opacity:1;} 100%{transform:translate(-50%,-50%) scale(1);} }

    .demoCursor{
      position:absolute;
      z-index:140;
      width:26px;
      height:26px;
      left:-200px;
      top:-200px;
      opacity:0;
      pointer-events:none;
      transition:left .48s cubic-bezier(.22,.61,.36,1), top .48s cubic-bezier(.22,.61,.36,1), opacity .2s ease, transform .12s ease;
      filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));
    }
    .demoCursor.show{ opacity:1; }
    .demoCursor.clicking{ transform:scale(.9); }
    .demoCursor.dragging{ filter:drop-shadow(0 2px 4px rgba(61,220,151,.7)); }
    .demoCursor svg{ display:block; width:100%; height:100%; }
    .demoCursorPulse{
      position:absolute;
      z-index:139;
      width:24px;
      height:24px;
      border-radius:50%;
      border:2px solid rgba(255,195,74,.95);
      left:-200px;
      top:-200px;
      opacity:0;
      pointer-events:none;
      transform:translate(-50%,-50%) scale(.35);
    }
    .demoCursorPulse.active{ animation:cursorPulse .45s ease-out; }
    @keyframes cursorPulse{
      0%{ opacity:.95; transform:translate(-50%,-50%) scale(.35); }
      100%{ opacity:0; transform:translate(-50%,-50%) scale(1.5); }
    }

    .toolbar{ width:100%; max-width:980px; margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-start; }
    .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.82); color:#fff; padding:10px 14px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    .modal-mask{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:300; background:rgba(0,0,0,.5); }
    .modal{ width:min(90vw, 380px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
    .modal h3{ margin:8px 0 6px; font-size:20px; }
    .modal p{ margin-top:0; line-height:1.55; color:#cfd8dc; }
    .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; }

    .explanation{ width:100%; max-width:980px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:#e9f2ff; }
    .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em; }

    @media (max-width:760px){
      .task-card{ grid-template-columns:1fr; }
      .task-step{ width:fit-content; }
      #stage{ height:76vh; max-height:920px; }
      .dock{ width:min(96%, 380px); }
      .hud{ left:8px; right:8px; }
    }

    function stagePointFromClient(clientX, clientY){
      const stage = stageEl.getBoundingClientRect();
      return {
        x: clamp(clientX - stage.left, 0, stage.width),
        y: clamp(clientY - stage.top, 0, stage.height)
      };
    }

    function scenePointToStage(x, y){
      const stage = stageEl.getBoundingClientRect();
      const sc = scene.getBoundingClientRect();
      return {
        x: clamp(sc.left - stage.left + x, 0, stage.width),
        y: clamp(sc.top - stage.top + y, 0, stage.height)
      };
    }

    function stagePointToScene(x, y){
      const stage = stageEl.getBoundingClientRect();
      const sc = scene.getBoundingClientRect();
      return {
        x: clamp(x - (sc.left - stage.left), 0, sc.width),
        y: clamp(y - (sc.top - stage.top), 0, sc.height)
      };
    }

    function getElementStageCenter(el){

      demoCursorPulseEl.classList.remove('active');
      void demoCursorPulseEl.offsetWidth;

    async function dragDemoCursorPath(points, segmentMs=520, onMove=null){
      if(!demoCursorEl || !Array.isArray(points) || !points.length) return;
      demoCursorEl.classList.add('dragging');
      await moveDemoCursorToStage(points[0].x, points[0].y, Math.max(180, segmentMs));
      if(typeof onMove === 'function') onMove(points[0], 0);
      await clickDemoCursor(160);
      for(let i=1;i<points.length;i++){
        const from = points[i-1];
        const to = points[i];
        const dur = Math.max(220, segmentMs);
        const steps = Math.max(10, Math.round(dur / 40));
        for(let s=1;s<=steps;s++){
          const t = s / steps;
          const x = from.x + (to.x - from.x) * t;
          const y = from.y + (to.y - from.y) * t;
          demoCursorEl.style.transitionDuration = '0ms';
          demoCursorEl.style.left = `${round(x, 1)}px`;
          demoCursorEl.style.top = `${round(y, 1)}px`;
          if(typeof onMove === 'function') onMove({x, y}, i);
          await sleep(Math.max(14, Math.round(dur / steps)));
        }
      }
      demoCursorEl.classList.remove('dragging');
      await clickDemoCursor(140);
    }

    function initControls(){
      state.vars = {};
      controlFields.innerHTML = '';
      for(const def of LAB.controls){
        state.vars[def.key] = def.def;
        const wrap = document.createElement('div');
        wrap.className = 'field';
        wrap.innerHTML = `<div class="name"><span>${def.label}</span><span id="pill_${def.key}"></span></div>`;
        if(def.type === 'range'){
          const input = document.createElement('input');
          input.type = 'range';
          input.min = String(def.min);
          input.max = String(def.max);
          input.step = String(def.step);
          input.value = String(def.def);
          input.addEventListener('input', ()=>{
            state.vars[def.key] = Number(input.value);
            refreshControlPill(def);
          });
          wrap.appendChild(input);
        }else if(def.type === 'select'){
          const sel = document.createElement('select');
          for(const [val,text] of def.options){
            const op = document.createElement('option');
            op.value = val;
            op.textContent = text;
            if(val === def.def) op.selected = true;
            sel.appendChild(op);
          }
          sel.addEventListener('change', ()=>{
            state.vars[def.key] = sel.value;
            refreshControlPill(def);
            if(LAB_ID === 16 && def.key === 'object'){
              state.apparatus.object = sel.value;
              state.apparatus.startCm = randIn(1.6, 3.8);
              state.apparatus.aligned = false;
              state.apparatus.lastRead = null;
              showToast('已切换物体，请先对齐零刻度');
            }
          });
          wrap.appendChild(sel);
        }
        controlFields.appendChild(wrap);
        refreshControlPill(def);
      }
    }

    function randIn(a,b){ return a + Math.random()*(b-a); }

    function refreshControlPill(def){
      const pill = $(`#pill_${def.key}`);
      if(!pill) return;
      const v = state.vars[def.key];
      if(def.type === 'range') pill.textContent = `${v}${def.unit || ''}`;
      else {
        const hit = def.options.find(x=>x[0]===v);
        pill.textContent = hit ? hit[1] : String(v);
      }
    }

    function setVar(key, value){
      state.vars[key] = value;
      const field = controlFields.querySelector(`#pill_${key}`)?.closest('.field');
      if(!field) return;
      const inp = field.querySelector('input[type="range"]');
      const sel = field.querySelector('select');
      if(inp) inp.value = String(value);
      if(sel) sel.value = String(value);
      const def = LAB.controls.find(d=>d.key===key);
      if(def) refreshControlPill(def);
    }

    function performAction(actionId, showStep=true){
      const ap = state.apparatus;
      let changed = false;
      if(!state.autoPlaying && !state.freeMode && LAB_ID >= 21 && LAB_ID <= 30){
        const gateMap = {
          21:[['placeBlock'], ['pullRead'], ['pullRead'], []],
          22:[['zeroScale'], ['hangWeight'], ['readForce'], []],
          23:[['applyLeft'], ['applyRight'], ['observeBalance'], []],
          24:[['launchCart','testInertia'], ['launchCart','testInertia'], ['launchCart','testInertia'], []],
          25:[['launchCar','observeStop'], ['launchCar','observeStop'], ['launchCar','observeStop'], []],
          26:[['setLever','observeLeverBalance'], ['setLever','observeLeverBalance'], ['setLever','observeLeverBalance'], []],
          27:[['applyPressure','readPressure'], ['applyPressure','readPressure'], ['applyPressure','readPressure'], []],
          28:[['openHole','observeJet'], ['openHole','observeJet'], ['openHole','observeJet'], []],
          29:[[], [], [], []],
          30:[['switchLiquid','probePressure'], ['switchLiquid','probePressure'], ['switchLiquid','probePressure'], []]
        };
        const allowed = (gateMap[LAB_ID] || [])[state.currentTask] || [];
        if(allowed.length && !allowed.includes(actionId)){
          warnCurrentStep(`请先完成当前步骤：${LAB.tasks[state.currentTask].hint}`);
          setStatus(`越步操作已拦截（当前应完成步骤${state.currentTask + 1}）`);
          return false;
        }
      }

      switch(LAB_ID){
        case 14:{
          if(actionId === 'pourWater' && !ap.pouredWater){ ap.pouredWater = true; ap.waterMl = 0; ap.mixMl += 50; changed = true; setStatus('已倒入水'); }
          if(actionId === 'pourAlcohol' && !ap.pouredAlcohol){ ap.pouredAlcohol = true; ap.alcoholMl = 0; ap.mixMl += 50; changed = true; setStatus('已倒入酒精'); }
          if(actionId === 'shakeRead'){
            if(!(ap.pouredWater && ap.pouredAlcohol)){ showToast('需先倒入两种液体'); break; }
            ap.shaken = true;
            const shrink = 3 + (5 - state.vars.shakeLevel) * 0.5;
            ap.mixRead = round(100 - shrink, 1);
            ap.mixMl = ap.mixRead;
            changed = true;
            setStatus('已摇匀并读数');
          }
          break;
        }
        case 15:{
          if(!state.autoPlaying && !state.freeMode){
            const needActionByStep = ['scrape', 'press', 'pullTest', null];
            const expected = needActionByStep[state.currentTask] || null;
            if(expected && actionId !== expected){
              warnCurrentStep(`请先完成当前步骤：${LAB.tasks[state.currentTask].hint}`);
              setStatus(`越步操作已拦截（当前应完成步骤${state.currentTask + 1}）`);
              return false;
            }
          }
          if(actionId === 'scrape'){
            if(state.autoPlaying){
              ap.leftPolish = 100;
              ap.rightPolish = 100;
              ap.scrapeProgress = 100;
              ap.scraped = true;
              changed = true;
              setStatus('接触面已完成打磨');
            }else{
              showToast('请在画布中拖动刮刀，往返打磨两侧接触面');
              setStatus('等待打磨操作');
            }
          }
          if(actionId === 'press'){
            if(state.autoPlaying){
              ap.clampLevel = 1;
              ap.pressed = true;
              ap.clampDone = true;
              ap.adhered = ap.scraped;
              ap.separated = false;
              changed = true;
              setStatus(ap.adhered ? '横向夹具已压紧' : '夹紧完成但接触面未充分处理');
            }else if(!ap.scraped){
              warnCurrentStep('步骤1未完成，不能进行压紧操作');
              showToast('请先完成打磨，再进行压紧');
            }else if(ap.clampLevel < 0.82){
              showToast('请继续拖动夹具手柄，压紧度需达到阈值');
            }else{
              ap.pressed = true;
              ap.clampDone = true;
              ap.adhered = true;
              ap.separated = false;
              changed = true;
              setStatus('横向夹具已压紧');
            }
          }
          if(actionId === 'pullTest'){
            ap.pullN = Number(state.vars.pullN);
            const polish = (clamp(ap.leftPolish,0,100) + clamp(ap.rightPolish,0,100)) / 200;
            const threshold = round(2.0 + 2.2 * polish + 2.0 * clamp(ap.clampLevel,0,1) + (ap.pressed ? 0.6 : 0), 1);
            ap.tested = true;
            if(ap.pullN >= threshold){
              ap.separated = true;
              ap.adhered = false;
              ap.pressed = false;
              ap.clampLevel = 0;
            }else{
              ap.separated = false;
              ap.adhered = ap.scraped && ap.pressed;
            }
            changed = true;
            setStatus(ap.separated ? '样件已分离（夹具已回松）' : `仍保持吸附（分离阈值约${threshold}N）`);
            addRecord();
            if(!state.autoPlaying){
              showToast('本次拉伸已自动记录');
            }
          }
          break;
        }
        case 16:{
          const len = OBJECT_LENGTHS[state.vars.object];
          if(actionId === 'alignZero'){
            ap.object = state.vars.object;
            ap.startCm = 0;
            ap.aligned = true;
            ap.alignedCount += 1;
            changed = true;
            setStatus('已对齐零刻度');
          }
          if(actionId === 'measureLength'){
            if(!ap.aligned){ showToast('请先对齐零刻度'); break; }
            ap.lastRead = round(len + randIn(-0.08, 0.08), 2);
            ap.measureCount += 1;
            changed = true;
            setStatus(`读数完成：${ap.lastRead}cm`);
          }
          if(actionId === 'nextObject'){
            const order = ['pencil','eraser','key'];
            const idx = order.indexOf(state.vars.object);
            const next = order[(idx + 1) % order.length];
            setVar('object', next);
            ap.object = next;
            ap.startCm = round(randIn(1.4, 3.9), 2);
            ap.aligned = false;
            ap.lastRead = null;
            changed = true;
            setStatus(`已更换物体：${nameOfObject(next)}`);
          }
          break;
        }
        case 17:{
          if(actionId === 'startPendulum'){
            ap.pendulumOn = true;
            changed = true;
            setStatus('摆球已启动');
          }
          if(actionId === 'startWatch'){
            if(!ap.pendulumOn){ showToast('请先启动摆球'); break; }
            ap.stopwatchRunning = true;
            ap.stopwatchStart = performance.now();
            changed = true;
            setStatus('秒表计时中');
          }
          if(actionId === 'stopWatch'){
            if(!ap.stopwatchRunning){ showToast('秒表尚未开始'); break; }
            const p = state.vars.tempo === 'slow' ? 1.35 : state.vars.tempo === 'fast' ? 0.75 : 1.0;
            const ideal = state.vars.cycles * p;
            ap.elapsed = round(ideal + randIn(-0.15, 0.15), 2);
            ap.stopwatchRunning = false;
            ap.measured = true;
            ap.cyclesDone = state.vars.cycles;
            changed = true;
            setStatus(`计时完成：${ap.elapsed}s`);
          }
          break;
        }
        case 18:{
          if(actionId === 'runCart'){
            if(ap.running){ showToast('小车正在运动'); break; }
            const s = Number(state.vars.distance);
            const force = Number(state.vars.push);
            const a = 0.7 + force * 0.55;
            const t = round(Math.sqrt((2*s)/a) + randIn(-0.08, 0.08), 2);
            const v = round(s / t, 2);
            ap.running = true;
            ap.progress = 0;
            ap.lastTime = t;
            ap.lastSpeed = v;
            ap.runCount += 1;
            ap.needsReset = true;
            trackTimeout(()=>{ ap.running = false; ap.progress = 1; }, 1200);
            changed = true;
            setStatus(`完成发车：t=${t}s, v=${v}m/s`);
          }
          if(actionId === 'resetCart'){
            ap.running = false;
            ap.progress = 0;
            ap.needsReset = false;
            changed = true;
            setStatus('小车已归位');
          }
          break;
        }
        case 19:{
          if(actionId === 'applyForce'){
            const f = Number(state.vars.force);
            const sample = state.vars.sample;
            let d = sample === 'spring' ? f * 3.4 : f * 5.2;
            if(sample === 'sponge') d = Math.min(d, 42);
            ap.lastDeform = round(d, 1);
            ap.applied = true;
            ap.recoverPct = sample === 'spring' ? 98 : 86;
            ap.applyCount += 1;
            changed = true;
            setStatus(`已施力：形变量${ap.lastDeform}mm`);
          }
          if(actionId === 'releaseForce'){
            ap.applied = false;
            ap.lastDeform = 0;
            changed = true;
            setStatus('已撤去力');
          }
          break;
        }
        case 20:{
          if(actionId === 'applyMotionForce'){
            const dir = state.vars.dir === 'forward' ? 1 : -1;
            const mag = Number(state.vars.mag);
            const dt = Number(state.vars.duration);
            ap.beforeV = round(ap.velocity, 2);
            const dv = dir * mag * dt * 0.45;
            ap.velocity = round(clamp(ap.velocity + dv, -6, 6), 2);
            ap.afterV = ap.velocity;
            ap.changed = true;
            const nx = clamp(ap.cartX + ap.velocity * 0.012, 0.08, 0.92);
            ap.targetX = nx;
            ap.animating = true;
            trackTimeout(()=>{ ap.cartX = ap.targetX; ap.animating = false; }, 800);
            changed = true;
            setStatus(`速度变化：${ap.beforeV}→${ap.afterV}m/s`);
          }
          if(actionId === 'stopCart'){
            ap.beforeV = ap.velocity;
            ap.velocity = 0;
            ap.afterV = 0;
            ap.changed = true;
            changed = true;
            setStatus('小车已停车');
          }
          break;
        }
        case 21:{
          if(actionId === 'placeBlock'){
            ap.placed = true;
            ap.pulling = false;
            ap.pullTrace = 0;
            changed = true;
            setStatus('木块与测力计连接完成');
          }
          if(actionId === 'pullRead'){
            if(!ap.placed){ showToast('请先放置木块'); break; }
            const surface = state.vars.surface;
            const normal = Number(state.vars.normalN);
            const mu = surface === 'rough' ? 0.55 : 0.28;
            ap.lastF = round(mu * normal + randIn(-0.12, 0.12), 2);
            ap.ropeTension = ap.lastF;
            ap.pulling = true;
            ap.pullTrace = 0;
            ap.lastSurface = surface;
            ap.lastNormal = normal;
            ap.tests.push({ surface, normal, f: ap.lastF });
            const sameSurf = ap.tests.filter(t=>t.surface===surface);
            if(sameSurf.length >= 2 && new Set(sameSurf.map(t=>t.normal)).size >= 2) ap.sameSurfaceCompared = true;
            if(new Set(ap.tests.map(t=>t.surface)).size >= 2) ap.crossSurfaceCompared = true;
            changed = true;
            setStatus(`木块匀速滑动，摩擦力读数：${ap.lastF}N`);
          }
          break;
        }
        case 22:{
          if(actionId === 'zeroScale'){
            ap.zeroed = true;
            ap.hung = false;
            ap.lastN = 0;
            ap.needRehang = false;
            changed = true;
            setStatus('测力计已调零');
          }
          if(actionId === 'hangWeight'){
            if(!ap.zeroed){ showToast('请先调零'); break; }
            ap.hung = true;
            ap.lastMass = Number(state.vars.mass);
            ap.hangMass = ap.lastMass;
            ap.needRehang = false;
            changed = true;
            setStatus('重物已悬挂');
          }
          if(actionId === 'readForce'){
            if(!ap.hung){ showToast('请先挂重物'); break; }
            if(Math.abs(Number(state.vars.mass) - ap.hangMass) > 0.001){
              ap.needRehang = true;
              ap.hung = false;
              showToast('质量已改变，请重新挂重物后再读数');
              setStatus('读数无效：需重新挂重物');
              break;
            }
            ap.lastMass = Number(state.vars.mass);
            ap.lastN = round(ap.lastMass * 9.8 + randIn(-0.06, 0.06), 2);
            ap.tests.push({ m:ap.lastMass, n:ap.lastN });
            changed = true;
            setStatus(`示数：${ap.lastN}N`);
          }
          break;
        }
        case 23:{
          if(actionId === 'applyLeft'){
            ap.leftApplied = true;
            ap.leftN = Number(state.vars.leftN);
            changed = true;
            setStatus(`左拉力已施加：${ap.leftN}N`);
          }
          if(actionId === 'applyRight'){
            if(!ap.leftApplied){ showToast('请先施加左拉力'); break; }
            ap.rightApplied = true;
            ap.rightN = Number(state.vars.rightN);
            changed = true;
            setStatus(`右拉力已施加：${ap.rightN}N`);
          }
          if(actionId === 'observeBalance'){
            if(!(ap.leftApplied && ap.rightApplied)){ showToast('请先施加两侧拉力'); break; }
            ap.balanced = Math.abs(ap.leftN - ap.rightN) <= 0.2;
            ap.ringOffset = clamp((ap.rightN - ap.leftN) * 9, -56, 56);
            ap.tests.push({ l:ap.leftN, r:ap.rightN, balanced:ap.balanced });
            changed = true;
            setStatus(ap.balanced ? '当前为平衡状态' : '当前不平衡');
          }
          break;
        }
        case 24:{
          if(actionId === 'launchCart'){
            ap.moving = true;
            ap.cartX = 0.14;
            ap.launchSpeed = Number(state.vars.speedLevel);
            ap.brakeProgress = 0;
            changed = true;
            setStatus(`小车发车，初速度等级${ap.launchSpeed}`);
          }
          if(actionId === 'testInertia'){
            if(!ap.moving){ showToast('请先发车'); break; }
            const mode = state.vars.stopMode;
            const speed = Number(ap.launchSpeed || state.vars.speedLevel);
            ap.blockSlip = Math.max(0, round((mode === 'quick' ? 4.4 : 1.8) * speed + randIn(-0.5, 0.5), 1));
            ap.lastMode = mode;
            ap.lastSpeedLevel = speed;
            ap.brakeProgress = mode === 'quick' ? 1 : 0.56;
            ap.tests.push({ mode, speed, slip:ap.blockSlip });
            if(mode === 'slow') ap.slowObserved = true;
            if(mode === 'quick') ap.quickObserved = true;
            ap.moving = false;
            ap.cartX = 0.82;
            changed = true;
            setStatus(`${mode === 'quick' ? '急停' : '慢停'}前冲位移 ${ap.blockSlip}cm`);
          }
          break;
        }
        case 25:{
          if(actionId === 'launchCar'){
            ap.running = true;
            ap.progress = 0;
            ap.launchTrack = state.vars.track;
            ap.launchPush = Number(state.vars.pushN);
            changed = true;
            setStatus(`小车已释放（${ap.launchTrack === 'low' ? '低阻跑道' : '高阻跑道'}）`);
          }
          if(actionId === 'observeStop'){
            if(!ap.running){ showToast('请先释放小车'); break; }
            const track = ap.launchTrack;
            const push = ap.launchPush;
            const k = track === 'low' ? 26 : 14;
            ap.lastDist = round(k + push * (track === 'low' ? 4.4 : 2.6) + randIn(-1.2, 1.2), 1);
            ap.lastTrack = track;
            ap.lastPush = push;
            ap.tests.push({ track, push, dist:ap.lastDist });
            ap.running = false;
            ap.progress = 1;
            changed = true;
            setStatus(`滑行距离：${ap.lastDist}cm`);
          }
          break;
        }
        case 26:{
          if(actionId === 'setLever'){
            ap.leftTorque = round(Number(state.vars.leftArm) * Number(state.vars.leftForce), 2);
            ap.rightTorque = round(Number(state.vars.rightArm) * Number(state.vars.rightForce), 2);
            changed = true;
            setStatus('杠杆参数已加载');
          }
          if(actionId === 'observeLeverBalance'){
            if(ap.leftTorque <= 0 || ap.rightTorque <= 0){ showToast('请先加载参数'); break; }
            ap.balanced = Math.abs(ap.leftTorque - ap.rightTorque) <= 2.0;
            ap.tests.push({ lt:ap.leftTorque, rt:ap.rightTorque, balanced:ap.balanced });
            changed = true;
            setStatus(ap.balanced ? '杠杆平衡' : '杠杆不平衡');
          }
          break;
        }
        case 27:{
          if(actionId === 'applyPressure'){
            ap.lastForce = Number(state.vars.forceN);
            ap.lastArea = state.vars.area === 'small' ? 8 : 20;
            ap.pressed = true;
            ap.sinkDepth = round(clamp((ap.lastForce / ap.lastArea) * 6.5, 1.2, 36), 1);
            changed = true;
            setStatus('已压放小桌');
          }
          if(actionId === 'readPressure'){
            if(!ap.pressed){ showToast('请先压放小桌'); break; }
            const f = Number(state.vars.forceN);
            const areaCm2 = state.vars.area === 'small' ? 8 : 20;
            ap.lastP = Math.max(0, round((f / (areaCm2 * 1e-4)) / 1000 + randIn(-0.6, 0.6), 2));
            ap.lastForce = f;
            ap.lastArea = areaCm2;
            ap.tests.push({ f, area:areaCm2, p:ap.lastP });
            changed = true;
            setStatus(`压强：${ap.lastP}kPa`);
          }
          break;
        }
        case 28:{
          if(actionId === 'openHole'){
            ap.holeOpened = true;
            ap.lastDepth = Number(state.vars.depth);
            ap.openDepth = ap.lastDepth;
            changed = true;
            setStatus(`已打开 ${ap.lastDepth}cm 深度侧孔`);
          }
          if(actionId === 'observeJet'){
            if(!ap.holeOpened){ showToast('请先打开侧孔'); break; }
            if(ap.openDepth === null || Math.abs(Number(state.vars.depth) - ap.openDepth) > 0.1){
              ap.holeOpened = false;
              showToast('孔深已变化，请重新打开对应侧孔');
              setStatus('读数无效：需重新打开侧孔');
              break;
            }
            const d = Number(ap.openDepth);
            ap.lastDepth = d;
            ap.lastJet = round(8 + d * 1.35 + randIn(-0.8, 0.8), 1);
            ap.tests.push({ d, jet:ap.lastJet });
            changed = true;
            setStatus(`喷射距离：${ap.lastJet}cm`);
          }
          break;
        }
        case 29:{
          showToast('请拖动水杯向容器或塑料袋加水，再观察鼓起现象');
          setStatus('等待拖动水杯向器材加水');
          break;
        }
        case 30:{
          if(actionId === 'switchLiquid'){
            ap.liquidChanged = true;
            ap.lastLiquid = state.vars.liquid;
            changed = true;
            setStatus(`已切换液体：${state.vars.liquid}`);
          }
          if(actionId === 'probePressure'){
            if(state.vars.liquid !== ap.lastLiquid){
              showToast('液体已改变，请先点击“更换液体”');
              setStatus('读数无效：液体未切换确认');
              break;
            }
            const rhoMap = { oil:0.82, water:1.0, brine:1.15 };
            const d = Number(state.vars.depth);
            const liq = ap.lastLiquid;
            const rho = rhoMap[liq] || 1;
            ap.lastDepth = d;
            ap.lastLiquid = liq;
            ap.lastP = round(rho * d * 0.98 + randIn(-0.35, 0.35), 2);
            ap.tests.push({ d, liq, p:ap.lastP });
            const sameLiquid = ap.tests.filter(t=>t.liq===liq);
            if(sameLiquid.length >= 2 && new Set(sameLiquid.map(t=>t.d)).size >= 2) ap.depthCompared = true;
            const sameDepth = ap.tests.filter(t=>Math.abs(t.d - d) < 0.1);
            if(sameDepth.length >= 2 && new Set(sameDepth.map(t=>t.liq)).size >= 2) ap.densityCompared = true;
            changed = true;
            setStatus(`压强读数：${ap.lastP}kPa`);
          }
          break;
        }
      }

      if(changed){
        updatePills();
        scheduleChart();
        if(showStep && !state.autoPlaying) tryPassStep(false);
      }
      return changed;
    }

    function nameOfObject(k){
      if(k==='pencil') return '铅笔';
      if(k==='eraser') return '橡皮';
      return '钥匙';
    }

    function buildRecord(){
      const ap = state.apparatus;
      switch(LAB_ID){
        case 14:{
          if(ap.mixRead === null){ showToast('请先摇匀并读数'); return null; }
          return { c1:'水50+酒精50', c2:'100.0', c3:String(ap.mixRead), c4:ap.mixRead < 100 ? '体积缩小' : '无明显变化', y:ap.mixRead };
        }
        case 15:{
          if(!ap.tested){ showToast('请先进行拉伸测力'); return null; }
          const polishPct = Math.round((ap.leftPolish + ap.rightPolish) * 0.5);
          const clampPct = Math.round(ap.clampLevel * 100);
          return { c1:`拉力${ap.pullN}N`, c2:String(ap.pullN), c3:ap.separated ? '已分离' : '未分离', c4:`打磨${polishPct}%/夹紧${clampPct}%`, y:ap.pullN };
        }
        case 16:{
          if(ap.lastRead === null){ showToast('请先读取长度'); return null; }
          const ref = OBJECT_LENGTHS[state.vars.object];
          return { c1:nameOfObject(state.vars.object), c2:String(ap.lastRead), c3:String(ref), c4:`误差${round(ap.lastRead-ref,2)}cm`, y:ap.lastRead };
        }
        case 17:{
          if(!ap.measured){ showToast('请先完成一次计时'); return null; }
          const single = round(ap.elapsed / ap.cyclesDone, 3);
          return { c1:`${ap.cyclesDone}次`, c2:String(ap.elapsed), c3:String(single), c4:`节奏:${state.vars.tempo}`, y:single };
        }
        case 18:{
          if(ap.lastTime===null || ap.lastSpeed===null){ showToast('请先发车并计时'); return null; }
          return { c1:`s=${state.vars.distance}m, 推力${state.vars.push}`, c2:String(ap.lastTime), c3:String(ap.lastSpeed), c4:'v=s/t', y:ap.lastSpeed };
        }
        case 19:{
          if(!ap.applied){ showToast('请先施加力'); return null; }
          return { c1:`${state.vars.sample==='spring'?'弹簧':'海绵'} ${state.vars.force}N`, c2:String(ap.lastDeform), c3:`恢复${ap.recoverPct}%`, c4:ap.lastDeform>20 ? '形变明显' : '形变较小', y:ap.lastDeform };
        }
        case 20:{
          if(!ap.changed){ showToast('请先施加力或停车'); return null; }
          return { c1:`${state.vars.dir==='forward'?'向右':'向左'} ${state.vars.mag}N`, c2:String(ap.beforeV), c3:String(ap.afterV), c4:ap.afterV>ap.beforeV ? '加速/起动' : (ap.afterV<ap.beforeV ? '减速/反向' : '保持/停止'), y:Math.abs(ap.afterV) };
        }
        case 21:{
          if(!ap.placed || ap.lastF <= 0){ showToast('请先完成一次摩擦力读数'); return null; }
          const surf = ap.lastSurface === 'rough' ? '粗糙木板' : '光滑木板';
          return { c1:`${surf} / ${ap.lastNormal}N`, c2:String(ap.lastNormal), c3:String(ap.lastF), c4:'匀速拉动读数', y:ap.lastF };
        }
        case 22:{
          if(!ap.hung || ap.lastN <= 0){ showToast('请先读取示数'); return null; }
          return { c1:String(ap.lastMass), c2:String(round(ap.lastMass*9.8,2)), c3:String(ap.lastN), c4:'调零后读取', y:ap.lastN };
        }
        case 23:{
          if(!(ap.leftApplied && ap.rightApplied)){ showToast('请先完成两侧施力'); return null; }
          const diff = round(Math.abs(ap.leftN - ap.rightN), 2);
          return { c1:`${ap.leftN}/${ap.rightN}`, c2:String(diff), c3:ap.balanced ? '平衡' : '不平衡', c4:'同一直线拉力比较', y:diff };
        }
        case 24:{
          if(ap.blockSlip <= 0){ showToast('请先完成一次制动观察'); return null; }
          const modeText = ap.lastMode === 'quick' ? '急停' : '慢停';
          return { c1:modeText, c2:String(ap.lastSpeedLevel || state.vars.speedLevel), c3:String(ap.blockSlip), c4:'木块前冲位移', y:ap.blockSlip };
        }
        case 25:{
          if(ap.lastDist <= 0){ showToast('请先读取滑行距离'); return null; }
          const trackText = ap.lastTrack === 'low' ? '低阻跑道' : '高阻跑道';
          return { c1:trackText, c2:String(ap.lastPush || state.vars.pushN), c3:String(ap.lastDist), c4:'同推力对比', y:ap.lastDist };
        }
        case 26:{
          if(ap.leftTorque <= 0 || ap.rightTorque <= 0){ showToast('请先判断平衡'); return null; }
          return { c1:`L${state.vars.leftForce}N×${state.vars.leftArm}cm / R${state.vars.rightForce}N×${state.vars.rightArm}cm`, c2:String(ap.leftTorque), c3:String(ap.rightTorque), c4:ap.balanced ? '平衡' : '不平衡', y:Math.abs(ap.leftTorque-ap.rightTorque) };
        }
        case 27:{
          if(ap.lastP <= 0){ showToast('请先读取压强'); return null; }
          const areaText = ap.lastArea === 8 ? '小面积' : '大面积';
          return { c1:`${areaText} / ${ap.lastForce}N`, c2:String(ap.lastForce), c3:String(ap.lastP), c4:`受力面积${ap.lastArea}cm²`, y:ap.lastP };
        }
        case 28:{
          if(ap.lastJet <= 0){ showToast('请先读取喷射距离'); return null; }
          return { c1:String(ap.lastDepth), c2:String(round(ap.lastDepth * 0.1, 2)), c3:String(ap.lastJet), c4:'侧壁压强表现', y:ap.lastJet };
        }
        case 29:{
          if(!ap.lastScene){ showToast('请先向器材加水并观察现象'); return null; }
          return {
            c1:ap.lastScene,
            c2:ap.lastPhenomenon,
            c3:ap.lastDirection,
            c4:state.freeMode ? '自由体验' : '引导体验',
            y:ap.lastStrength || 1
          };
        }
        case 30:{
          if(ap.lastP <= 0){ showToast('请先读取压强'); return null; }
          const rhoMap = { oil:0.82, water:1.0, brine:1.15 };
          const liqText = ap.lastLiquid === 'oil' ? '食用油' : ap.lastLiquid === 'water' ? '清水' : '盐水';
          return { c1:`${liqText}/${ap.lastDepth}cm`, c2:String(rhoMap[ap.lastLiquid] || 1), c3:String(ap.lastP), c4:'控制变量记录', y:ap.lastP };
        }
      }
      return null;
    }

    function addRecord(){
      if(!state.freeMode && !state.autoPlaying && LAB_ID >= 21 && LAB_ID <= 30 && LAB_ID !== 29 && state.currentTask < 2){
        warnCurrentStep('当前步骤不允许记录，请先完成本步骤操作链');
        showToast('请先完成当前步骤，再记录数据');
        return;
      }
      const rec = buildRecord();
      if(!rec) return;
      state.records.push(rec);
      if(state.records.length > 40) state.records.shift();
      renderRecords();
      scheduleChart();
      if(state.dataCollapsed){
        state.unseenRecordCount = Math.min(999, state.unseenRecordCount + 1);
      }else{
        state.unseenRecordCount = 0;
      }
      refreshDataNotice();
      tryPassStep(false);
    }

    function renderRecords(){
      recordBody.innerHTML = '';
      if(!state.records.length){
        recordBody.innerHTML = '<tr><td colspan="4" style="color:#9db4d6;">暂无记录</td></tr>';
        return;
      }
      for(const r of [...state.records].slice(-12).reverse()){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.c1}</td><td>${r.c2}</td><td>${r.c3}</td><td>${r.c4}</td>`;
        recordBody.appendChild(tr);
      }
    }

    function analyzeConclusion(showToastMsg=true){
      const rs = state.records;
      let ok = false;
      let msg = '';
      switch(LAB_ID){
        case 14:{
          const hit = rs.find(r=>Number(r.c3) < 100);
          ok = !!hit;
          msg = ok ? '结论：水和酒精混合后总体积小于100mL，说明分子之间存在间隙。' : '请至少获得一条“混合体积小于100mL”的记录。';
          break;
        }
        case 15:{
          const hasStuck = rs.some(r=>r.c3==='未分离' && Number(r.c2)>=2.5);
          const hasSeparated = rs.some(r=>r.c3==='已分离' && Number(r.c2)>=5.5);
          ok = hasStuck && hasSeparated;
          msg = ok ? '结论：接触面处理并压紧后，金属块在较小拉力下不易分离、在更大拉力下可分离，说明分子间存在引力。' : '请完成两次对比拉伸：约3N且未分离、约7N且已分离（系统会自动记录）。';
          break;
        }
        case 16:{
          const objs = new Set(rs.map(r=>r.c1));
          const good = rs.filter(r=>Math.abs(Number(r.c2)-Number(r.c3)) <= 0.2).length;
          ok = objs.size >= 2 && good >= 2;
          msg = ok ? '结论：长度测量应先零刻度对齐，再读取另一端刻度；重复测量可提高准确性。' : '请至少测量2种物体，且读数与参考值偏差较小。';
          break;
        }
        case 17:{
          const set = new Set(rs.map(r=>r.c1));
          ok = rs.length>=2 && set.size>=2;
          msg = ok ? '结论：秒表可测总时长，通过“总时长/计次数”可求单次时间。' : '请至少记录两组不同计次数的时间数据。';
          break;
        }
        case 18:{
          if(rs.length>=2){
            const ys = rs.map(r=>Number(r.c3));
            ok = Math.max(...ys) > Math.min(...ys);
          }
          msg = ok ? '结论：通过测程和用时可算速度 v=s/t；不同条件下速度会变化。' : '请记录至少2组速度数据并形成差异。';
          break;
        }
        case 19:{
          const spring = rs.filter(r=>r.c1.includes('弹簧')).map(r=>Number(r.c2));
          const sponge = rs.filter(r=>r.c1.includes('海绵')).map(r=>Number(r.c2));
          ok = (spring.length>=2 && Math.max(...spring)>Math.min(...spring)) || (sponge.length>=2 && Math.max(...sponge)>Math.min(...sponge));
          msg = ok ? '结论：力可使物体发生形变，且一般力越大形变越明显。' : '请补充同一样件在不同力下的对比记录。';
          break;
        }
        case 20:{
          const a = rs.find(r=>Number(r.c2)===0 && Number(r.c3)>0);
          const b = rs.find(r=>Number(r.c3) < Number(r.c2));
          ok = !!(a && b);
          msg = ok ? '结论：力可使静止物体运动，也可使运动物体减速、停止或改变方向。' : '请至少包含“由静止到运动”和“速度减小/反向”两类记录。';
          break;
        }
        case 21:{
          const smooth = rs.filter(r=>r.c1.includes('光滑'));
          const rough = rs.filter(r=>r.c1.includes('粗糙'));
          ok = (smooth.length >= 2 || rough.length >= 2) && smooth.length >= 1 && rough.length >= 1;
          msg = ok ? '结论：在接触面相同时，压力增大摩擦力增大；在压力接近时，粗糙面摩擦力更大。' : '请补充“同一接触面不同压力”与“不同接触面”两类对比记录。';
          break;
        }
        case 22:{
          ok = new Set(rs.map(r=>Number(r.c1))).size >= 2;
          msg = ok ? '结论：调零后，弹簧测力计示数可反映力的大小，且示数随重力增大而增大。' : '请至少记录两种不同质量重物的示数。';
          break;
        }
        case 23:{
          const hasBal = rs.some(r=>r.c3 === '平衡');
          const hasUnbal = rs.some(r=>r.c3 === '不平衡');
          ok = hasBal && hasUnbal;
          msg = ok ? '结论：同一直线上大小相等、方向相反的两个力可使物体平衡。' : '请至少记录一组平衡和一组不平衡数据。';
          break;
        }
        case 24:{
          const slow = rs.filter(r=>r.c1 === '慢停').map(r=>Number(r.c3));
          const quick = rs.filter(r=>r.c1 === '急停').map(r=>Number(r.c3));
          ok = slow.length >= 1 && quick.length >= 1 && Math.max(...quick) > Math.max(...slow);
          msg = ok ? '结论：急停时木块前冲位移更明显，说明物体具有惯性。' : '请补充慢停与急停对比，且急停前冲位移应更大。';
          break;
        }
        case 25:{
          const low = rs.filter(r=>r.c1 === '低阻跑道').map(r=>Number(r.c3));
          const high = rs.filter(r=>r.c1 === '高阻跑道').map(r=>Number(r.c3));
          ok = low.length >= 1 && high.length >= 1 && Math.max(...low) > Math.max(...high);
          msg = ok ? '结论：阻力越小，小车滑行距离越远，运动状态越不容易改变。' : '请补充低阻与高阻跑道各至少一条记录并比较距离。';
          break;
        }
        case 26:{
          ok = rs.filter(r=>r.c4 === '平衡').length >= 2;
          msg = ok ? '结论：杠杆平衡时左右力矩相等，即 F1×L1 = F2×L2。' : '请记录至少两组平衡数据。';
          break;
        }
        case 27:{
          const large = rs.filter(r=>r.c1.includes('大面积'));
          const small = rs.filter(r=>r.c1.includes('小面积'));
          ok = large.length >= 1 && small.length >= 1 && Math.max(...small.map(r=>Number(r.c3))) > Math.min(...large.map(r=>Number(r.c3)));
          msg = ok ? '结论：压力作用效果与压力和受力面积有关，压力越大或面积越小，压强越大。' : '请补充大/小面积压强对比数据。';
          break;
        }
        case 28:{
          if(rs.length >= 2){
            const sorted = [...rs].sort((a,b)=>Number(a.c1)-Number(b.c1));
            ok = Number(sorted[sorted.length - 1].c3) > Number(sorted[0].c3);
          }
          msg = ok ? '结论：液体对器壁存在压强，深度越大，侧孔喷射通常越远。' : '请补充浅孔与深孔的喷射距离对比。';
          break;
        }
        case 29:{
          const guidedRs = state.freeMode ? rs : rs.filter(r=>!String(r.c4).includes('自由'));
          const scenes = new Set(guidedRs.map(r=>r.c1));
          ok = scenes.has('侧壁橡皮膜') && scenes.has('底部橡皮膜') && scenes.has('装水塑料袋');
          msg = ok ? '结论：液体内部各个方向都有压强。' : '请补充侧壁、底部和塑料袋三种体验记录。';
          break;
        }
        case 30:{
          ok = state.apparatus.depthCompared && state.apparatus.densityCompared && rs.length >= 3;
          msg = ok ? '结论：液体压强随深度增大而增大，且液体密度越大压强越大。' : '请补充“同液体不同深度”和“同深度不同液体”两类记录。';
          break;
        }
      }
      state.analysisOk = ok;
      analysisText.textContent = msg;
      analysisText.classList.toggle('ok', ok);
      if(showToastMsg) showToast(ok ? '分析完成：结论成立' : '分析未通过，请补充实验记录');
      if(!state.autoPlaying) tryPassStep(false);
      return ok;
    }

    function checkStepPass(step){
      const ap = state.apparatus;
      const rs = state.records;
      switch(LAB_ID){
        case 14:
          if(step===0) return ap.pouredWater;
          if(step===1) return ap.pouredAlcohol;
          if(step===2) return ap.shaken && ap.mixRead !== null && ap.mixRead < 100;
          if(step===3) return state.analysisOk;
          return false;
        case 15:
          if(step===0) return ap.scraped;
          if(step===1) return !!(ap.clampDone || ap.pressed);
          if(step===2) return rs.some(r=>r.c3==='未分离') && rs.some(r=>r.c3==='已分离');
          if(step===3) return state.analysisOk;
          return false;
        case 16:
          if(step===0) return ap.alignedCount >= 1;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 17:
          if(step===0) return ap.pendulumOn;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 18:
          if(step===0) return ap.runCount >= 1;
          if(step===1) return ap.runCount >= 2;
          if(step===2) return rs.length >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 19:
          if(step===0) return rs.length>=1;
          if(step===1) return rs.length>=2;
          if(step===2) return rs.some(r=>r.c1.includes('海绵')) || rs.some(r=>r.c1.includes('弹簧'));
          if(step===3) return state.analysisOk;
          return false;
        case 20:
          if(step===0) return rs.some(r=>Number(r.c2)===0 && Number(r.c3)>0);
          if(step===1) return rs.some(r=>Number(r.c3) < Number(r.c2));
          if(step===2) return rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
        case 21:
          if(step===0) return ap.placed;
          if(step===1) return ap.sameSurfaceCompared;
          if(step===2) return ap.crossSurfaceCompared && rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
        case 22:
          if(step===0) return ap.zeroed;
          if(step===1) return ap.hung;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 23:
          if(step===0) return ap.leftApplied;
          if(step===1) return ap.rightApplied;
          if(step===2) return rs.some(r=>r.c3==='平衡') && rs.some(r=>r.c3==='不平衡');
          if(step===3) return state.analysisOk;
          return false;
        case 24:
          if(step===0) return ap.slowObserved;
          if(step===1) return ap.quickObserved;
          if(step===2) return rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
        case 25:
          if(step===0) return ap.tests.some(t=>t.track==='low');
          if(step===1) return ap.tests.some(t=>t.track==='high');
          if(step===2) return rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
        case 26:
          if(step===0) return ap.tests.filter(t=>t.balanced).length >= 1;
          if(step===1) return ap.tests.filter(t=>t.balanced).length >= 2;
          if(step===2) return rs.filter(r=>r.c4==='平衡').length >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 27:
          if(step===0) return ap.tests.filter(t=>t.area===20).length >= 1;
          if(step===1) return ap.tests.filter(t=>t.area===8).length >= 1;
          if(step===2) return rs.length>=3;
          if(step===3) return state.analysisOk;
          return false;
        case 28:
          if(step===0) return ap.tests.some(t=>t.d <= 15);
          if(step===1) return ap.tests.some(t=>t.d >= 22);
          if(step===2) return rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
        case 29:{
          const guidedRs = rs.filter(r=>!String(r.c4).includes('自由'));
          if(step===0) return guidedRs.some(r=>r.c1 === '侧壁橡皮膜');
          if(step===1) return guidedRs.some(r=>r.c1 === '底部橡皮膜');
          if(step===2) return guidedRs.some(r=>r.c1 === '装水塑料袋');
          if(step===3) return state.analysisOk;
          return false;
        }
        case 30:
          if(step===0) return ap.depthCompared;
          if(step===1) return ap.densityCompared;
          if(step===2) return rs.length>=3;
          if(step===3) return state.analysisOk;
          return false;
      }
      return false;
    }

    function tryPassStep(showFailToast=true){
      if(state.freeMode || state.autoPlaying || state.completed || state.successCooldown) return false;
      const ok = checkStepPass(state.currentTask);
      if(!ok){
        if(showFailToast) showToast('当前步骤条件还未满足');
        return false;
      }
      state.successCooldown = true;
      showCheck();
      trackTimeout(()=>{
        if(state.currentTask < LAB.tasks.length - 1) setStepUI(state.currentTask + 1);
        else finishLab();
        state.successCooldown = false;
      }, 420);
      return true;
    }

    function recalcProgress(){
      if(state.completed || state.freeMode) return;
      let idx = 0;
      while(idx < LAB.tasks.length && checkStepPass(idx)) idx += 1;
      if(idx >= LAB.tasks.length) finishLab();
      else setStepUI(idx);
    }

    function finishLab(){
      if(state.completed) return;
      state.completed = true;
      state.currentTask = LAB.tasks.length - 1;
      setStepUI(state.currentTask);
      doneMaskEl.style.display = 'flex';
    }

    function drawScene(){
      const rect = scene.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width * dpr));
      const h = Math.max(1, Math.floor(rect.height * dpr));
      if(scene.width !== w || scene.height !== h){ scene.width = w; scene.height = h; }
      const ctx = scene.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width;
      const H = rect.height;

      ctx.fillStyle = '#2f343a';
      ctx.fillRect(0, H-70, W, 70);
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      ctx.fillRect(0, H-70, W, 2);

      switch(LAB_ID){
        case 14: draw14(ctx,W,H); break;
        case 15: draw15(ctx,W,H); break;
        case 16: draw16(ctx,W,H); break;
        case 17: draw17(ctx,W,H); break;
        case 18: draw18(ctx,W,H); break;
        case 19: draw19(ctx,W,H); break;
        case 20: draw20(ctx,W,H); break;
        case 21: draw21(ctx,W,H); break;
        case 22: draw22(ctx,W,H); break;
        case 23: draw23(ctx,W,H); break;
        case 24: draw24(ctx,W,H); break;
        case 25: draw25(ctx,W,H); break;
        case 26: draw26(ctx,W,H); break;
        case 27: draw27(ctx,W,H); break;
        case 28: draw28(ctx,W,H); break;
        case 29: draw29(ctx,W,H); break;
        case 30: draw30(ctx,W,H); break;
      }
    }

    function drawBeaker(ctx, x, y, w, h, fillRatio, color, label){
      ctx.save();
      ctx.strokeStyle = 'rgba(210,230,255,.72)';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);
      const fh = h * clamp(fillRatio,0,1);
      ctx.fillStyle = color;
      ctx.fillRect(x+3, y+h-fh-3, w-6, fh);
      ctx.fillStyle = '#d8e7ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(label, x+4, y-8);
      ctx.strokeStyle = 'rgba(255,255,255,.4)';
      for(let i=1;i<=5;i++){
        const ty = y + h - i*h/5;
        ctx.beginPath(); ctx.moveTo(x+2,ty); ctx.lineTo(x+16,ty); ctx.stroke();
      }
      ctx.restore();
    }

    function draw14(ctx,W,H){
      const ap = state.apparatus;
      const y = H-320;
      drawBeaker(ctx, W*0.08, y, 120, 220, ap.waterMl/50, 'rgba(115,190,255,.85)', '量筒A(水)');
      drawBeaker(ctx, W*0.30, y, 120, 220, ap.alcoholMl/50, 'rgba(255,194,126,.85)', '量筒B(酒精)');
      drawBeaker(ctx, W*0.60, y-20, 140, 240, ap.mixMl/110, 'rgba(180,146,255,.78)', '混合量筒');

      ctx.fillStyle = '#9fb6d2';
      ctx.beginPath();
      ctx.moveTo(W*0.67, y-40);
      ctx.lineTo(W*0.62, y-12);
      ctx.lineTo(W*0.72, y-12);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#dfe9ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText('漏斗', W*0.66, y-48);

      if(ap.shaken){
        for(let i=0;i<60;i++){
          const px = W*0.61 + (i%10)*12 + ((i*37)%7);
          const py = y+210 - Math.floor(i/10)*30 + ((i*17)%9);
          ctx.fillStyle = i%2 ? 'rgba(122,214,255,.65)' : 'rgba(218,156,255,.65)';
          ctx.beginPath();
          ctx.arc(px, py, 2, 0, Math.PI*2);
          ctx.fill();
        }
      }

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 量筒外壳  液体对象: 水/酒精/混合液  测量器具: 量筒刻度', W*0.06, H-26);
    }

    function getLab15Layout(){
      const ap = state.apparatus;
      const rect = scene.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      const compact = W <= 760;
      const baseY = H - (compact ? 150 : 170);
      const blockW = compact ? 96 : 130;
      const blockH = compact ? 74 : 90;
      const releaseGap = 82;
      const openGap = compact ? 22 : 26;
      const closeGap = ap.scraped ? 6 : 11;
      const clampEffect = ap.separated ? 0 : clamp(ap.clampLevel, 0, 1);
      const gap = ap.separated ? releaseGap : round(openGap - clampEffect * (openGap - closeGap), 1);
      const lx = W * (compact ? 0.18 : 0.30);
      const rx = lx + blockW + gap;
      const frameRx = lx + blockW + releaseGap;
      const leftFace = { x: lx + blockW - 8, y: baseY + 5, w: 8, h: blockH - 10 };
      const rightFace = { x: rx, y: baseY + 5, w: 8, h: blockH - 10 };
      const scrubZoneA = { x: leftFace.x - 18, y: leftFace.y - 6, w: 26, h: leftFace.h + 12 };
      const scrubZoneB = { x: rightFace.x, y: rightFace.y - 6, w: 26, h: rightFace.h + 12 };
      const toolW = compact ? 18 : 22;
      const toolH = compact ? 56 : 66;
      const toolHomeX = W * (compact ? 0.08 : 0.14);
      const toolHomeY = baseY + (compact ? 10 : 16);
      const clampTrackW = compact ? 56 : 72;
      const clampTrackXRaw = frameRx + (compact ? 58 : 92);
      const clampTrackX = clamp(clampTrackXRaw, lx + blockW + 26, W - clampTrackW - 18);
      const clampTrackY = baseY - (compact ? 56 : 66);
      const clampHandleX = clampTrackX + (1 - clamp(ap.clampLevel, 0, 1)) * clampTrackW;
      const clampHandleY = clampTrackY + 8;
      const meterW = compact ? 92 : 110;
      const meterH = compact ? 148 : 170;
      const meterX = compact ? (W - meterW - 10) : W * 0.76;
      const meterY = H - (compact ? 318 : 340);
      return {
        W, H, compact, baseY, blockW, blockH, lx, rx,
        leftFace, rightFace, scrubZoneA, scrubZoneB,
        toolW, toolH, toolHomeX, toolHomeY,
        clampTrackX, clampTrackY, clampTrackW, clampHandleX, clampHandleY,
        meterW, meterH, meterX, meterY, frameRx
      };
    }

    function rectContainsPoint(rect, x, y){
      return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
    }

    function rectOverlap(a, b){
      return !(a.x + a.w < b.x || b.x + b.w < a.x || a.y + a.h < b.y || b.y + b.h < a.y);
    }

    function scenePointFromEvent(e){
      const r = scene.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function getLab29Layout(W, H){
      const showAll = state.freeMode || state.currentTask >= 3;
      if(!showAll){
        const big = { x: W*0.23, y: H*0.12, w: W*0.50, h: H*0.72 };
        if(state.currentTask === 0) return { showAll:false, side:big, active:'side' };
        if(state.currentTask === 1) return { showAll:false, bottom:big, active:'bottom' };
        return { showAll:false, bag:big, active:'bag' };
      }
      const y = H*0.2;
      const w = W*0.22;
      const h = H*0.56;
      return {
        showAll:true,
        side:{ x: W*0.07, y, w, h },
        bottom:{ x: W*0.385, y, w, h },
        bag:{ x: W*0.695, y: y + H*0.01, w: W*0.21, h: H*0.52 },
        active:'all'
      };
    }

    function getLab29CupRect(rect){
      return {

        y: rect.y + rect.h * 0.08,
        w: rect.w * 0.30,
        h: rect.h * 0.28

    function getLab29TargetRect(rect, kind){

    function getLab29PourAnchor(rect, kind){
      if(kind === 'side' || kind === 'bottom'){
        const tank = getLab29TankRect(rect);
        return {
          x: tank.x + tank.w * 0.5,
          y: tank.y + 6
        };
      }
      const bag = getLab29BagRect(rect);
      return {

      };

    function getLab29PourCupRect(anchor, kind, sourceRect){
      const w = sourceRect ? sourceRect.w : (kind === 'bag' ? 74 : 72);
      const h = sourceRect ? sourceRect.h : (kind === 'bag' ? 56 : 54);
      const rot = -1.14;
      const pivotX = w * 0.8;
      const pivotY = h * 0.72;
      const lipLocalX = 7;
      const lipLocalY = 10;
      const cos = Math.cos(rot);
      const sin = Math.sin(rot);
      const dx = lipLocalX - pivotX;
      const dy = lipLocalY - pivotY;
      const worldDx = dx * cos - dy * sin;
      const worldDy = dx * sin + dy * cos;
      return {
        x: anchor.x - pivotX - worldDx,
        y: anchor.y - pivotY - worldDy,
        w,
        h,
        rot,
        pivotX,
        pivotY
      };
    }

    function resetLab29Pointer(){
      lab29Pointer.id = null;
      lab29Pointer.kind = '';
      lab29Pointer.dragging = false;
      lab29Pointer.overTarget = false;
      lab29Pointer.hoverStart = 0;
    }

    function getLab29PourPreview(kind){
      if(!lab29Pointer.dragging || lab29Pointer.kind !== kind || !lab29Pointer.overTarget || !lab29Pointer.hoverStart) return null;
      const t = clamp((performance.now() - lab29Pointer.hoverStart) / 760, 0, 1);
      const ap = state.apparatus;
      const currentCup = kind === 'side'
        ? ap.sideCupLevel
        : kind === 'bottom'
          ? ap.bottomCupLevel
          : ap.bagCupLevel;
      return {
        progress: t,
        cupFill: currentCup + (0.16 - currentCup) * t
      };
    }

    function commitLab29PourPreview(kind){
      const ap = state.apparatus;
      const preview = getLab29PourPreview(kind);
      if(!preview) return;
      if(kind === 'side'){
        ap.sideCupLevel = preview.cupFill;
        ap.sideFill = ap.sideFill + (1 - ap.sideFill) * preview.progress;
        ap.sideBulge = ap.sideBulge + (1 - ap.sideBulge) * preview.progress;
      }else if(kind === 'bottom'){
        ap.bottomCupLevel = preview.cupFill;
        ap.bottomFill = ap.bottomFill + (1 - ap.bottomFill) * preview.progress;
        ap.bottomBulge = ap.bottomBulge + (1 - ap.bottomBulge) * preview.progress;
      }else if(kind === 'bag'){
        ap.bagCupLevel = preview.cupFill;
        ap.bagFill = ap.bagFill + (1 - ap.bagFill) * preview.progress;
        ap.bagBulge = ap.bagBulge + (1 - ap.bagBulge) * preview.progress;
      }
    }

    function performLab29Pour(kind, showStep=true){
      const ap = state.apparatus;
      const order = ['side','bottom','bag'];
      if(!state.freeMode && !state.autoPlaying){
        const expected = order[state.currentTask];
        if(expected && expected !== kind){
          const hints = {
            side:'当前步骤请先向侧壁橡皮膜容器加水。',
            bottom:'当前步骤请先向底部橡皮膜容器加水。',
            bag:'当前步骤请先向塑料袋加水。'
          };
          warnCurrentStep(hints[expected] || '请先完成当前步骤加水操作');
          setStatus('越步加水已拦截');
          return false;
        }
      }

      const map = {
        side:{ scene:'侧壁橡皮膜', phenomenon:'向外鼓起', direction:'侧向', strength:1.2, status:'已向侧壁容器加水，侧膜被液体向外顶起' },
        bottom:{ scene:'底部橡皮膜', phenomenon:'向下鼓起', direction:'向下', strength:1.35, status:'已向底膜容器加水，底膜被液体向下顶起' },
        bag:{ scene:'装水塑料袋', phenomenon:'袋壁向四周鼓起', direction:'各方向', strength:1.5, status:'已向塑料袋加水，袋壁向四周鼓起' }
      };
      const info = map[kind];
      if(!info) return false;

      commitLab29PourPreview(kind);

      ap.lastScene = info.scene;
      ap.lastPhenomenon = info.phenomenon;
      ap.lastDirection = info.direction;
      ap.lastStrength = info.strength;
      ap.sideObserved = ap.sideObserved || kind === 'side';
      ap.bottomObserved = ap.bottomObserved || kind === 'bottom';
      ap.bagObserved = ap.bagObserved || kind === 'bag';
      if(kind === 'side'){
        ap.sideCupLevelTarget = 0.16;
        ap.sideFillTarget = 1;
        ap.sideTarget = 1;
      }else if(kind === 'bottom'){
        ap.bottomCupLevelTarget = 0.16;
        ap.bottomFillTarget = 1;
        ap.bottomTarget = 1;
      }else{
        ap.bagCupLevelTarget = 0.16;
        ap.bagFillTarget = 1;
        ap.bagTarget = 1;
      }
      updatePills();
      setStatus(info.status);
      if(!state.autoPlaying){
        showToast(`已加水：${info.phenomenon}`);
        tryPassStep(false);
      }
      return true;
    }

    function drawSpringScaleSimple(ctx, x, y, nValue, label='弹簧测力计', opts={}){
      const w = opts.w || 110;
      const h = opts.h || 168;
      const maxN = opts.maxN || 8;
      const ratio = clamp((nValue || 0) / maxN, 0, 1);
      ctx.fillStyle = '#d8ecff';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#4da3ff';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);

      ctx.fillStyle = '#00131f';
      ctx.fillRect(x + 16, y + 14, w - 32, 26);
      ctx.fillStyle = '#66b0ff';
      ctx.font = 'bold 17px Courier New';
      ctx.fillText((nValue || 0).toFixed(2), x + 24, y + 33);

      const scaleTop = y + 52;
      const scaleBottom = y + h - 42;
      ctx.strokeStyle = '#b7d8ff';
      ctx.lineWidth = 1.4;
      for(let i=0;i<=maxN*2;i++){
        const yy = scaleTop + (scaleBottom - scaleTop) * (i/(maxN*2));
        const long = i%2===0 ? 14 : 8;
        ctx.beginPath();
        ctx.moveTo(x + 12, yy);
        ctx.lineTo(x + 12 + long, yy);
        ctx.stroke();
      }

      const pointerY = scaleTop + ratio * (scaleBottom - scaleTop);
      ctx.strokeStyle = '#ffcf6f';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + w - 16, pointerY);
      ctx.lineTo(x + 44, pointerY);
      ctx.stroke();
      ctx.fillStyle = '#ffcf6f';
      ctx.beginPath();
      ctx.arc(x + w - 16, pointerY, 4.5, 0, Math.PI*2);
      ctx.fill();

      const hookX = x + w * 0.5;
      const hookY = y + h - 8;
      ctx.strokeStyle = '#e7f2ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hookX, y + h - 30);
      ctx.lineTo(hookX, hookY - 7);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(hookX, hookY, 7, 0, Math.PI*2);
      ctx.stroke();

      ctx.fillStyle = '#dfeaff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText(label, x + 8, y - 8);
      return { hookX, hookY, w, h };
    }

    function drawHorizontalGauge(ctx, x, y, w, h, nValue, label, reverse=false){
      const maxN = 8;
      const ratio = clamp((nValue || 0)/maxN, 0, 1);
      ctx.fillStyle = '#d8ecff';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#4da3ff';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = '#0c1622';
      ctx.fillRect(x + 10, y + 9, w - 20, 20);
      ctx.fillStyle = '#7fd1ff';
      ctx.font = 'bold 14px Courier New';
      ctx.fillText((nValue || 0).toFixed(2), x + 24, y + 24);

      const sx = x + 18;
      const ex = x + w - 18;
      const py = y + h - 14;
      ctx.strokeStyle = '#a8c6e8';
      ctx.lineWidth = 1.2;
      for(let i=0;i<=16;i++){
        const tx = sx + (ex - sx) * (i/16);
        const long = i%4===0 ? 8 : 4;
        ctx.beginPath();
        ctx.moveTo(tx, py);
        ctx.lineTo(tx, py - long);
        ctx.stroke();
      }
      const px = reverse ? ex - ratio*(ex-sx) : sx + ratio*(ex-sx);
      ctx.strokeStyle = '#ffcf6f';
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(px, py + 1);
      ctx.lineTo(px, py - 12);
      ctx.stroke();
      ctx.fillStyle = '#dfeaff';
      ctx.font = '11px -apple-system,Segoe UI';
      ctx.fillText(label, x + 8, y - 7);
      return { hookX: reverse ? x : x + w, hookY: y + h * 0.56 };
    }

    function drawCartDetailed(ctx, x, y, scale=1){
      const w = 72 * scale;
      const h = 28 * scale;
      ctx.fillStyle = '#ffd06b';
      ctx.fillRect(x - w*0.5, y - h, w, h);
      ctx.fillStyle = '#ffb84f';
      ctx.fillRect(x - w*0.38, y - h - 9*scale, w*0.76, 9*scale);
      ctx.strokeStyle = 'rgba(255,255,255,.55)';
      ctx.strokeRect(x - w*0.5, y - h, w, h);
      ctx.fillStyle = '#9eb9d8';
      ctx.beginPath();
      ctx.arc(x - w*0.28, y, 8*scale, 0, Math.PI*2);
      ctx.arc(x + w*0.28, y, 8*scale, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c7d9eb';
      ctx.beginPath();
      ctx.arc(x - w*0.28, y, 3.2*scale, 0, Math.PI*2);
      ctx.arc(x + w*0.28, y, 3.2*scale, 0, Math.PI*2);
      ctx.fill();
    }

    function drawTankWithScale(ctx, x, y, w, h, fillRatio, color, label='液体容器'){
      ctx.strokeStyle = '#b9d0e6';

      ctx.strokeRect(x, y, w, h);
      const topY = y + h*(1 - clamp(fillRatio, 0, 1));

      ctx.fillRect(x+2, topY, w-4, y+h-topY-2);
      ctx.fillStyle = 'rgba(240,248,255,.18)';
      ctx.fillRect(x+4, topY + 2, 16, y+h-topY-6);

      ctx.strokeStyle = 'rgba(225,238,255,.56)';

        ctx.moveTo(x - 12, yy);
        ctx.lineTo(x, yy);
        ctx.stroke();
      }

      ctx.fillStyle = '#dce8fa';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText(label, x + 2, y - 10);
