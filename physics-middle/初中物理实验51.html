    <section class="explanation"><h2>实验名：设计与制作简易直流发电机模型</h2><p><b>关键过程：</b>沿圆周拖动手摇柄，使线圈在 N、S 磁极间转动；比较顺时针、快速和反向转动时中心零位电流计的响应。</p><p><b>现象与结论：</b>线圈内产生交变感应电动势，分裂环换向器每半周交换接触，使固定转向时外电路得到同一极性的脉动直流；加快转速响应增强，反转曲柄后端子极性和指针方向反转。发电机把机械能转化为电能。</p></section>
