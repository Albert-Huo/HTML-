<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>初中物理实验60｜探究电流与电压、电阻的关系</title>
  <style>
    :root{
      --bg:#1a1a1a;
      --ink:#fff;
      --card-bg:rgba(255,255,255,.08);
      --panel-bg:rgba(15,15,15,.58);
      --line:rgba(255,255,255,.12);
      --accent:#3ddc97;
      --warn:#ffb74d;
      --dockShadow:0 14px 36px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    html,body{ min-height:100%; }
    body{
      margin:0;
      padding:10px;
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
      letter-spacing:0;
    }
    #app{ width:100%; max-width:980px; margin:0 auto 34px; }
    button{ font:inherit; touch-action:manipulation; }
    button.main,button.sub{
      border:none;
      border-radius:8px;
      padding:8px 12px;
      color:#fff;
      cursor:pointer;
      transition:background .2s,transform .05s,opacity .2s;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      font-size:13px;
      background:#444;
    }
    button.main{ background:#2e7d32; }
    button.main:hover,button.sub:hover{ background:#5a5a5a; }
    button.main:active,button.sub:active{ transform:scale(.98); }
    button:disabled{ opacity:.34; cursor:not-allowed; filter:grayscale(.65); }
    #spectrum{
      position:relative;
      width:100%;
      max-width:980px;
      height:24px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,255,255,.12);
      margin:0 0 12px;
      background:#050505;
      flex-shrink:0;
    }
    #spectrum::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:linear-gradient(90deg,#ff4c4c 0%,#ff9a3d 5.5%,#f7e94c 11%,#54e86d 17%,#40e0d0 24%,#4aa3ff 31%,#8757ff 38%,#ec5cff 44%,#ff4c4c 50%,#ff9a3d 55.5%,#f7e94c 61%,#54e86d 67%,#40e0d0 74%,#4aa3ff 81%,#8757ff 88%,#ec5cff 94%,#ff4c4c 100%);
      background-size:200% 100%;
      background-repeat:repeat;
      filter:saturate(1.18) brightness(1.04);
      opacity:.96;
      animation:flowRainbow 8s linear infinite;
    }
    @keyframes flowRainbow{ 0%{background-position:0 0;} 100%{background-position:-100% 0;} }
    .task-card{
      width:100%;
      max-width:980px;
      background:var(--card-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      backdrop-filter:blur(6px);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:10px;
    }
    .task-step{
      background:rgba(255,255,255,.16);
      border-radius:8px;
      padding:6px 10px;
      font-weight:700;
      white-space:nowrap;
    }
    .task-text{ min-width:0; line-height:1.55; }
    #taskHint{ color:#ffd54f; font-size:12px; opacity:.95; margin-top:2px; }
    .progress-dots{ display:flex; gap:6px; align-items:center; }
    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(255,255,255,.26);
      outline:2px solid rgba(255,255,255,.12);
    }
    .dot.active{ background:var(--warn); }
    .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,.45); }
    .dot.warn{ background:#ff4d4f; outline-color:rgba(255,77,79,.58); box-shadow:0 0 10px rgba(255,77,79,.62); }
    #stage{
      width:100%;
      max-width:980px;
      height:66vh;
      max-height:660px;
      min-height:500px;
      margin-top:10px;
      border-radius:12px;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b0f14;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
      touch-action:pan-y pinch-zoom;
      background-image:
        radial-gradient(circle at 76% 25%, rgba(255,255,255,.06), transparent 42%),
        radial-gradient(circle at 22% 78%, rgba(0,255,255,.05), transparent 46%);
    }
    .lab-area{
      position:absolute;
      inset:54px 10px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(5,10,16,.82);
      overflow:hidden;
    }
    #labCanvas{ width:100%; height:100%; display:block; touch-action:pan-y pinch-zoom; cursor:crosshair; }
    .hud{
      position:absolute;
      left:10px;
      top:10px;
      z-index:20;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      background:rgba(0,0,0,.48);
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
    }
    .tag{
      border:1px solid rgba(255,255,255,.26);
      border-radius:999px;
      padding:2px 8px;
      font-weight:700;
      color:#dce9ff;
      background:rgba(255,255,255,.06);
    }
    #stage #modeTag.mode-strip{
      position:relative;
      isolation:isolate;
      min-width:158px;
      width:auto;
      max-width:none;
      border:2px solid transparent;
      border-radius:999px;
      padding:4px 12px;
      font-weight:900;
      color:#fff;
      background:
        linear-gradient(rgba(6,10,14,.94),rgba(6,10,14,.94)) padding-box,
        linear-gradient(90deg,#35ff73,#4bd8ff,#6c5cff,#ff4fc3,#ffd166,#35ff73,#4bd8ff) border-box;
      background-size:100% 100%,260% 100%;
      box-shadow:0 0 13px rgba(75,216,255,.2),inset 0 0 10px rgba(255,255,255,.06);
      white-space:nowrap;
      text-align:center;
      overflow:hidden;
      animation:modeRibbonFlow 3.2s linear infinite,modeGlow 1.8s ease-in-out infinite alternate;
    }
    #stage #modeTag.mode-strip::before{
      content:"";
      position:absolute;
      top:-2px;
      bottom:-2px;
      left:-48%;
      width:46%;
      border-radius:inherit;
      background:linear-gradient(100deg,transparent 0%,rgba(255,255,255,.08) 34%,rgba(255,255,255,.88) 50%,rgba(112,255,204,.42) 64%,transparent 100%);
      opacity:.68;
      transform:skewX(-18deg) translateX(-130%);
      animation:modeSweep 2.4s linear infinite;
      mix-blend-mode:screen;
      pointer-events:none;
    }
    #stage #modeTag.mode-strip::after{
      content:"";
      position:absolute;
      left:16px;
      right:16px;
      bottom:3px;
      height:2px;
      border-radius:999px;
      background:linear-gradient(90deg,transparent,#70ffcc,#ffd166,transparent);
      opacity:.82;
      pointer-events:none;
    }
    @keyframes modeRibbonFlow{ 0%{background-position:0 0,0 0} 100%{background-position:0 0,-260% 0} }
    @keyframes modeSweep{ 0%{transform:skewX(-18deg) translateX(-130%)} 100%{transform:skewX(-18deg) translateX(430%)} }
    @keyframes modeGlow{ 0%{box-shadow:0 0 11px rgba(75,216,255,.18),inset 0 0 9px rgba(255,255,255,.05)} 100%{box-shadow:0 0 19px rgba(112,255,204,.34),inset 0 0 12px rgba(255,255,255,.1)} }
    .hint-lamp{
      position:absolute;
      left:10px;
      top:56px;
      z-index:22;
      width:34px;
      height:34px;
      border-radius:8px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.2);
      color:#ffd54f;
      font-size:16px;
      cursor:pointer;
      padding:0;
    }
    .hint-lamp.flash{ animation:lampFlash .6s ease; }
    @keyframes lampFlash{ 50%{ box-shadow:0 0 22px rgba(255,77,79,.86); border-color:#ff4d4f; color:#ffb0b0; } }
    .hint-pop{
      position:absolute;
      left:10px;
      top:96px;
      z-index:23;
      width:min(340px, calc(100% - 24px));
      display:none;
      padding:10px 12px;
      border:1px solid rgba(255,209,102,.36);
      border-radius:10px;
      background:rgba(16,18,20,.9);
      color:#f4efe2;
      font-size:13px;
      line-height:1.55;
    }
    .hint-pop.open{ display:block; }
    .dock{
      position:absolute;
      width:min(94%, 380px);
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-bg);
      backdrop-filter:blur(6px);
      box-shadow:var(--dockShadow);
      overflow:hidden;
      touch-action:none;
      z-index:30;
    }
    .dock-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    .dockTitle{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700; color:#e7f0ff; white-space:nowrap; }
    .iconBtn{
      border:1px solid rgba(255,255,255,.2);
      background:rgba(255,255,255,.08);
      color:#e8f1ff;
      border-radius:7px;
      padding:4px 8px;
      font-size:12px;
      cursor:pointer;
      white-space:nowrap;
    }
    .dock-body{ padding:10px; max-height:360px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .collapsed .dock-body{ display:none; }
    .read-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
    .readout{ border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); border-radius:8px; padding:8px; min-height:56px; }
    .readout b{ display:block; color:#cfe4ff; font-size:12px; margin-bottom:5px; }
    .readout span{ color:#fff; font-size:13px; line-height:1.4; }
    .controls{ display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; }
    .controls button{ flex:1 1 98px; }
    .analysis{ margin-top:9px; border:1px solid rgba(91,188,255,.32); background:rgba(91,188,255,.08); color:#d9ecff; border-radius:8px; padding:8px 10px; font-size:13px; line-height:1.55; }
    .analysis:empty{ display:none; }
    .analysis.ok{ border-color:rgba(61,220,151,.55); background:rgba(61,220,151,.12); color:#e7fff3; }
    .badge{ display:inline-grid; place-items:center; min-width:18px; height:18px; padding:0 5px; border-radius:999px; background:#ef476f; color:#fff; font-size:12px; transform:scale(0); opacity:0; transition:.15s; }
    .badge.show{ transform:scale(1); opacity:1; animation:badgePulse .9s ease-in-out infinite; }
    @keyframes badgePulse{ 50%{transform:scale(1.14);} }
    table.record{ width:100%; border-collapse:collapse; font-size:12px; color:#e8f1ff; }
    table.record th,table.record td{ border:1px solid rgba(255,255,255,.1); padding:6px; vertical-align:top; line-height:1.45; text-align:left; }
    table.record th{ background:rgba(255,255,255,.08); color:#cfe4ff; }
    .empty{ margin:8px 2px; color:#aebbd0; font-size:12px; }
    .chartWrap{ height:220px; margin-top:10px; border:1px solid rgba(255,255,255,.12); border-radius:8px; overflow:hidden; background:rgba(0,0,0,.18); }
    #recordChart{ width:100%; height:100%; display:block; }
    .toolbar{ width:100%; max-width:980px; display:flex; gap:8px; flex-wrap:wrap; margin:10px 0 0; }
    .toast{ position:absolute; left:50%; bottom:24px; transform:translateX(-50%) translateY(18px); opacity:0; pointer-events:none; padding:10px 16px; border-radius:999px; background:rgba(0,0,0,.72); border:1px solid rgba(255,255,255,.12); color:#fff; font-weight:800; transition:.18s ease; z-index:80; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
    .checkmark{ position:absolute; left:50%; top:50%; width:64px; height:64px; border-radius:50%; transform:translate(-50%,-50%) scale(.7); opacity:0; pointer-events:none; background:rgba(37,194,119,.96); box-shadow:0 0 24px rgba(37,194,119,.55); z-index:82; transition:.18s ease; }
    .checkmark::before{ content:""; position:absolute; left:19px; top:16px; width:24px; height:13px; border-left:5px solid #fff; border-bottom:5px solid #fff; transform:rotate(-45deg); }
    .checkmark.active{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    .modal-mask{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.64); z-index:120; padding:18px; }
    .modal{ width:min(430px, 92vw); padding:24px 22px; border-radius:14px; border:1px solid rgba(91,188,255,.38); background:linear-gradient(180deg,#17344f,#10283d); text-align:center; box-shadow:0 24px 70px rgba(0,0,0,.58),0 0 0 1px rgba(255,255,255,.04) inset; }
    .modal h3{ margin:4px 0 8px; font-size:21px; }
    .modal p{ margin:0; color:#cdd7e0; line-height:1.55; }
    .modal .ok{ margin-top:14px; border:none; border-radius:8px; padding:8px 18px; background:var(--accent); color:#07170f; font-weight:800; cursor:pointer; }
    .demo-cursor{ position:absolute; left:0; top:0; width:20px; height:20px; border-radius:50%; border:2px solid #fff; background:rgba(91,188,255,.8); box-shadow:0 0 14px rgba(91,188,255,.8); opacity:0; z-index:72; pointer-events:none; transition:opacity .15s; }
    .demo-cursor.click{ animation:cursorClick .28s ease; }
    @keyframes cursorClick{ 50%{ transform:scale(1.8); opacity:.55; } }
    .explanation{ width:100%; max-width:980px; margin:14px 0 22px; color:#e8f4ff; line-height:1.66; font-size:15px; }
    .explanation h2{ margin:0 0 8px; color:#9bd3ff; font-size:20px; }
    .explanation ul{ margin:0; padding-left:22px; }
    .mobile-tabs,.sheet-close{ display:none; }
    @media (max-width:720px){
      body{ padding:8px; }
      #app,#spectrum,.task-card,#stage,.toolbar,.explanation{ max-width:100%; }
      #spectrum{ height:20px; margin-bottom:10px; }
      .task-card{ grid-template-columns:1fr; gap:7px; }
      .task-step{ width:fit-content; }
      .progress-dots{ justify-content:flex-start; }
      #stage{ height:72vh; min-height:600px; max-height:660px; }
      .lab-area{ inset:96px 8px 10px; }
      .hud{ max-width:calc(100% - 20px); }
      .hint-lamp{ top:56px; }
      .hint-pop{ top:96px; }
      .mobile-tabs{ position:absolute; left:12px; right:12px; bottom:8px; z-index:44; display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:5px; border:1px solid rgba(91,188,255,.24); border-radius:11px; background:rgba(9,12,16,.9); backdrop-filter:blur(10px); box-shadow:0 12px 30px rgba(0,0,0,.42); }
      .mobile-tabs.attached{ border-top:0; border-radius:0 0 12px 12px; background:linear-gradient(180deg,rgba(9,21,33,.96),rgba(6,14,23,.96)); }
      .mobile-tab{ position:relative; border:0; border-radius:8px; padding:9px 10px; background:rgba(255,255,255,.04); color:#cfe4ff; font-weight:900; font-size:13px; cursor:pointer; }
      .mobile-tab.active{ background:rgba(61,220,151,.16); color:#effff7; box-shadow:inset 0 0 0 1px rgba(61,220,151,.56); }
      .tab-label{ position:relative; display:inline-block; }
      .mobile-badge{ position:absolute; top:-9px; right:-17px; display:grid; place-items:center; min-width:18px; height:18px; padding:0 5px; border-radius:999px; background:#ff3b30; color:#fff; font-size:11px; font-weight:900; line-height:1; border:2px solid rgba(9,12,16,.96); opacity:0; transform:scale(.55); pointer-events:none; transition:opacity .16s,transform .16s; }
      .mobile-badge.show{ opacity:1; transform:scale(1); }
      .dock.mobile-sheet{ bottom:56px; width:calc(100% - 24px); border-color:rgba(91,188,255,.32); border-radius:12px 12px 0 0; background:linear-gradient(180deg,rgba(22,44,64,.97),rgba(9,21,33,.97)); box-shadow:0 18px 36px rgba(0,0,0,.5); touch-action:auto; }
      .dock.mobile-sheet .dock-header{ display:none; }
      .dock.mobile-sheet .dock-body{ display:grid; max-height:188px; padding:8px; overflow:auto; background:rgba(3,10,16,.26); }
      .dock.mobile-sheet.collapsed{ display:none; }
      .dock.mobile-sheet .sheet-close{ display:inline-flex; align-items:center; justify-content:center; width:36px; min-width:36px; height:36px; border:1px solid rgba(255,255,255,.14); border-radius:50%; background:rgba(255,255,255,.055); color:#e3f0ff; font-size:17px; }
      .control.mobile-sheet .dock-body{ grid-template-columns:minmax(0,1fr) 36px; gap:8px; align-items:center; }
      .control.mobile-sheet .controls{ grid-column:1; grid-row:1; margin:0; padding:8px; border:1px solid rgba(255,255,255,.1); border-radius:9px; background:rgba(255,255,255,.055); display:grid; grid-template-columns:1fr 1fr; gap:8px; }
      .control.mobile-sheet .sheet-close{ grid-column:2; grid-row:1; }
      .control.mobile-sheet .analysis{ grid-column:1/-1; margin-top:0; }
      .data.mobile-sheet .dock-body{ grid-template-columns:minmax(0,1fr) 36px; gap:8px; align-items:start; }
      .data.mobile-sheet .sheet-close{ grid-column:2; grid-row:1; }
      .data.mobile-sheet table.record{ grid-column:1/-1; display:block; width:100%; border-collapse:separate; border-spacing:0; }
      .data.mobile-sheet table.record thead{ display:none; }
      .data.mobile-sheet table.record tbody{ display:grid; gap:8px; }
      .data.mobile-sheet table.record tr{ display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:8px; border:1px solid rgba(255,255,255,.1); border-radius:9px; background:rgba(255,255,255,.045); }
      .data.mobile-sheet table.record td{ display:grid; gap:2px; border:0; padding:0; font-size:12px; }
      .data.mobile-sheet table.record td::before{ content:attr(data-label); color:#8fb4d8; font-size:10px; font-weight:800; }
      .data.mobile-sheet table.record td:first-child{ grid-column:1/-1; display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,.08); padding-bottom:5px; }
      .data.mobile-sheet .chartWrap{ display:none; }
      .toolbar{ display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-top:8px; padding:6px; border:1px solid rgba(255,255,255,.08); border-radius:11px; background:rgba(255,255,255,.035); }
      .toolbar button{ min-width:0; padding:8px 6px; border-radius:8px; font-size:12px; font-weight:800; }
    }
    @media (prefers-reduced-motion:reduce){
      #spectrum::before,#stage #modeTag.mode-strip,#stage #modeTag.mode-strip::before{ animation:none; }
      #stage #modeTag.mode-strip::before{ display:none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="spectrum"></div>
    <section class="task-card" id="taskCard">
      <div class="task-step" id="taskStep">关卡 1 / 4</div>
      <div class="task-text">
        <div id="taskText"></div>
        <div id="taskHint"></div>
      </div>
      <div class="progress-dots" id="dots"></div>
    </section>
    <main id="stage" aria-label="探究电流与电压、电阻的关系实验台">
      <div class="hud">
        <span class="mode-strip" id="modeTag">模式：闯关模式 · 关卡 1/4</span>
        <span class="tag" id="statusTag">状态：待操作</span>
      </div>
      <button class="hint-lamp" id="hintLamp" type="button" aria-label="查看提示">💡</button>
      <div class="hint-pop" id="hintPop"></div>
      <div class="lab-area" id="labArea"><canvas id="labCanvas"></canvas></div>
      <div class="mobile-tabs" id="mobileTabs" role="group" aria-label="实验数据面板切换">
        <button class="mobile-tab active" id="experimentTab" type="button" aria-controls="controlDock" aria-expanded="true"><span class="tab-label">实验面板<span class="mobile-badge" id="experimentTabBadge" aria-hidden="true">0</span></span></button>
        <button class="mobile-tab" id="dataTab" type="button" aria-controls="dataDock" aria-expanded="false"><span class="tab-label">数据面板<span class="mobile-badge" id="dataTabBadge" aria-hidden="true">0</span></span></button>
      </div>
      <section class="dock drawer control collapsed" id="controlDock" aria-label="实验面板">
        <div class="dock-header" data-drag-handle>
          <span class="dockTitle">实验面板</span>
          <button class="iconBtn mini" id="controlToggleBtn" type="button">展开</button>
        </div>
        <div class="dock-body">
          <div class="controls">
            <button class="main" id="recordBtn" type="button">记录本次</button>
            <button class="sub" id="analyzeBtn" type="button">分析结论</button>
          </div>
          <button class="sheet-close" id="controlSheetCloseBtn" type="button" aria-label="收起实验面板" title="收起">⌄</button>
          <div class="analysis" id="analysisText"></div>
        </div>
      </section>
      <section class="dock drawer data collapsed" id="dataDock" aria-label="数据面板">
        <div class="dock-header" data-drag-handle>
          <span class="dockTitle">数据面板 <span class="badge" id="dataNotice">0</span></span>
          <button class="iconBtn mini" id="dataToggleBtn" type="button">展开</button>
        </div>
        <div class="dock-body">
          <button class="sheet-close" id="dataSheetCloseBtn" type="button" aria-label="收起数据面板" title="收起">⌄</button>
          <table class="record" id="recordTable">
            <thead><tr><th>阶段</th><th>R/Ω</th><th>U/V</th><th>I/A</th></tr></thead>
            <tbody></tbody>
          </table>
          <div class="empty" id="emptyRecords">还没有记录。按关卡操作后点击“记录本次”。</div>
          <div class="chartWrap"><canvas id="recordChart"></canvas></div>
        </div>
      </section>
      <div class="toast" id="toast">提示</div>
      <div class="checkmark" id="checkmark"></div>
      <div class="demo-cursor" id="demoCursor"></div>
    </main>
    <div class="toolbar">
      <button class="sub" id="resetBtn" type="button">重置关卡</button>
      <button class="sub" id="autoDemoBtn" type="button">演示模式</button>
      <button class="sub" id="freeBtn" type="button">自由模式</button>
    </div>
    <div class="modal-mask" id="doneMask">
      <div class="modal">
        <h3>实验完成</h3>
        <p>电阻一定时，电流与电压成正比；电压一定时，电流与电阻成反比。</p>
        <button class="ok" id="okBtn" type="button">OK</button>
      </div>
    </div>
    <section class="explanation">
      <h2>实验名：探究电流与电压、电阻的关系</h2>
      <ul>
        <li><b>关键过程：</b>控制变量，分别改变电压和电阻并记录电流。</li>
        <li><b>实验结论：</b>电阻一定时，电流与电压成正比；电压一定时，电流与电阻成反比。</li>
      </ul>
    </section>
  </div>
  <script>
    (() => {
      "use strict";
      const SPEC = {
        id: 60,
        title: "探究电流与电压、电阻的关系",
        category: "ohm-real",
        textbookEntry: "EXP025（九年级，第十七章，索引条目标注需核对）",
        apparatus: "4.5 V电池组、单刀开关、滑动变阻器、电流表、电压表、5/10/15 Ω定值电阻、导线",
        conclusion: "电阻一定时，电流与电压成正比；电压一定时，电流与电阻成反比。",
        keyPoint: "闭合开关后先调滑动变阻器改变定值电阻两端电压，再换不同阻值并重新调到相同电压。"
      };
      const SUPPLY_VOLTAGE = 4.5;
      const RHEOSTAT_MIN = 1;
      const RHEOSTAT_MAX = 50;
      const FIXED_RESISTORS = [
        { value: 5, label: "5 Ω", color: "#8d6e63", band: "#3ddc97" },
        { value: 10, label: "10 Ω", color: "#6d4c41", band: "#ffd54f" },
        { value: 15, label: "15 Ω", color: "#5d4037", band: "#5bbcff" }
      ];
      const VOLTAGE_TARGETS = [1, 2, 3];
      const CONSTANT_VOLTAGE = 2;
      const GUIDED_CAPTURE_TOLERANCE = 0.4;
      const $ = (selector) => document.querySelector(selector);
      const stage = $("#stage");
      const labArea = $("#labArea");
      const canvas = $("#labCanvas");
      const ctx = canvas.getContext("2d");
      const chartCanvas = $("#recordChart");
      const chartCtx = chartCanvas.getContext("2d");
      const taskStep = $("#taskStep");
      const taskText = $("#taskText");
      const taskHint = $("#taskHint");
      const dots = $("#dots");
      const modeTag = $("#modeTag");
      const statusTag = $("#statusTag");
      const hintLamp = $("#hintLamp");
      const hintPop = $("#hintPop");
      const controlDock = $("#controlDock");
      const dataDock = $("#dataDock");
      const controlToggleBtn = $("#controlToggleBtn");
      const dataToggleBtn = $("#dataToggleBtn");
      const mobileTabs = $("#mobileTabs");
      const experimentTab = $("#experimentTab");
      const dataTab = $("#dataTab");
      const experimentTabBadge = $("#experimentTabBadge");
      const dataTabBadge = $("#dataTabBadge");
      const controlSheetCloseBtn = $("#controlSheetCloseBtn");
      const dataSheetCloseBtn = $("#dataSheetCloseBtn");
      const recordBtn = $("#recordBtn");
      const analyzeBtn = $("#analyzeBtn");
      const analysisText = $("#analysisText");
      const recordBody = $("#recordTable tbody");
      const emptyRecords = $("#emptyRecords");
      const dataNotice = $("#dataNotice");
      const resetBtn = $("#resetBtn");
      const autoDemoBtn = $("#autoDemoBtn");
      const freeBtn = $("#freeBtn");
      const toast = $("#toast");
      const checkmark = $("#checkmark");
      const doneMask = $("#doneMask");
      const okBtn = $("#okBtn");
      const demoCursor = $("#demoCursor");

      const state = {
        currentTask: 0,
        completed: false,
        demoCompleted: false,
        freeMode: false,
        autoPlaying: false,
        autoCancel: false,
        autoRunId: 0,
        draggingId: null,
        drawerDrag: null,
        stepWarning: false,
        successCooldown: false,
        timers: new Set(),
        records: [],
        unseenRecords: 0,
        lastObservation: null,
        analysisDone: false,
        switchClosed: false,
        switchTouched: false,
        slider: 0,
        sliderMoved: false,
        resistorIndex: 1,
        resistorChanged: false,
        hotSpots: {},
        layoutCache: null,
        lastOperation: "等待闭合开关",
        width: 0,
        height: 0,
        stageWidth: 0,
        stageHeight: 0,
        phase: 0
      };

      const tasks = [
        {
          text: "检查电路：电流表串联、电压表并联。闭合开关，调至 1.0 V 并记录。",
          hint: "确认滑动变阻器处于最大阻值后闭合开关，再向左拖动滑片 P。",
          detail: "主回路中电流表和滑动变阻器串联，电压表并联在定值电阻两端。第一组保持 10 Ω，闭合前滑动变阻器接入最大阻值。",
          check: () => hasVoltageTarget(1)
        },
        {
          text: "保持 10 Ω 定值电阻不变，继续调节滑片，分别记录约 2.0 V 和 3.0 V 时的电流。",
          hint: "只移动滑片，不换电阻；要形成 1.0 V、2.0 V、3.0 V 三组记录。",
          detail: "这一步考查“控制变量”：电阻 R 不变，只改变电阻两端电压 U，再观察电流 I 怎样变化。",
          check: () => VOLTAGE_TARGETS.every(hasVoltageTarget)
        },
        {
          text: "断开开关，依次换用 5 Ω 和 15 Ω；每次重新闭合并调至 2.0 V 后记录。",
          hint: "必须先断电换阻；换好后滑动变阻器自动回到最大阻值，再闭合、调压。",
          detail: "每次换电阻前先断开开关。换好后从最大阻值起步，重新闭合并把电压表调到同一个 2.0 V，才能比较电流与电阻的关系。",
          check: () => FIXED_RESISTORS.every(item => hasResistanceRecord(item.value))
        },
        {
          text: "点击“分析结论”，归纳实验规律。",
          hint: "需要 U-I 三组数据，以及 U≈2.0 V 时 5/10/15 Ω 的比较数据。",
          detail: SPEC.conclusion,
          check: () => state.analysisDone
        }
      ];

      function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
      function lerp(a, b, t) { return a + (b - a) * t; }
      function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
      function schedule(fn, ms) {
        const id = setTimeout(() => { state.timers.delete(id); fn(); }, ms);
        state.timers.add(id);
        return id;
      }
      function clearAllTimers() {
        for (const id of state.timers) clearTimeout(id);
        state.timers.clear();
      }
      function fixedResistance() { return FIXED_RESISTORS[state.resistorIndex].value; }
      function rheostatResistance() { return RHEOSTAT_MAX - state.slider * (RHEOSTAT_MAX - RHEOSTAT_MIN); }
      function readings() {
        const r = fixedResistance();
        const rs = rheostatResistance();
        const voltage = state.switchClosed ? SUPPLY_VOLTAGE * r / (r + rs) : 0;
        const current = r ? voltage / r : 0;
        return { r, rs, voltage, current };
      }
      function round1(value) { return Math.round(value * 10) / 10; }
      function round2(value) { return Math.round(value * 100) / 100; }
      function near(value, target, tolerance = 0.08) { return Math.abs(value - target) <= tolerance; }
      function nearestVoltageTarget(voltage) {
        return VOLTAGE_TARGETS.reduce((best, target) => {
          return Math.abs(voltage - target) < Math.abs(voltage - best) ? target : best;
        }, VOLTAGE_TARGETS[0]);
      }
      function hasVoltageTarget(target) {
        return state.records.some(record => record.resistance === 10 && record.voltageTarget === target && record.sliderMoved && record.switchClosed);
      }
      function hasResistanceRecord(resistance) {
        return state.records.some(record => record.resistance === resistance && record.constantVoltage && record.resistorAction && record.sliderMoved && record.switchClosed);
      }
      function allEvidenceReady() {
        return VOLTAGE_TARGETS.every(hasVoltageTarget) && FIXED_RESISTORS.every(item => hasResistanceRecord(item.value));
      }
      function sliderForVoltage(targetVoltage, resistance = fixedResistance()) {
        const series = resistance * (SUPPLY_VOLTAGE / targetVoltage - 1);
        return clamp((RHEOSTAT_MAX - series) / (RHEOSTAT_MAX - RHEOSTAT_MIN), 0, 1);
      }
      function guidedRecordTargets() {
        if (state.freeMode || state.autoPlaying) return [];
        if (state.currentTask === 0) return [1];
        if (state.currentTask === 1) return [2, 3].filter(target => !hasVoltageTarget(target));
        if (state.currentTask === 2) return [CONSTANT_VOLTAGE];
        return [];
      }
      function nearestGuidedRecordTarget(voltage) {
        const candidates = guidedRecordTargets();
        if (!candidates.length) return null;
        return candidates.reduce((best, value) => {
          return Math.abs(voltage - value) < Math.abs(voltage - best) ? value : best;
        }, candidates[0]);
      }
      function snapToNearbyGuidedTarget() {
        const r = readings();
        const target = nearestGuidedRecordTarget(r.voltage);
        if (target === null || !near(r.voltage, target, GUIDED_CAPTURE_TOLERANCE)) return null;
        state.slider = sliderForVoltage(target, r.r);
        updateReadouts();
        draw();
        return target;
      }
      function updateRecordButtonLabel() {
        const voltage = readings().voltage;
        const target = nearestGuidedRecordTarget(voltage);
        recordBtn.textContent = target !== null && near(voltage, target, GUIDED_CAPTURE_TOLERANCE)
          ? "记录 " + target.toFixed(1) + " V"
          : "记录本次";
      }
      function updateTaskProgressHint() {
        if (state.freeMode || state.currentTask !== 1) return;
        const targets = [2, 3];
        const recorded = targets.filter(hasVoltageTarget);
        const missing = targets.filter(target => !hasVoltageTarget(target));
        if (!recorded.length) {
          taskHint.textContent = "本关需记录两次：调到 2.0 V 点击“记录本次”，再调到 3.0 V 再次记录。";
          return;
        }
        taskHint.textContent = "已记录 " + recorded.map(target => target.toFixed(1) + " V").join("、")
          + "；还需 " + missing.map(target => target.toFixed(1) + " V").join("、")
          + "。调节滑片后再次点击“记录本次”。";
      }

      function initDots() {
        dots.innerHTML = "";
        tasks.forEach(() => {
          const dot = document.createElement("span");
          dot.className = "dot";
          dots.appendChild(dot);
        });
      }
      function updateDots() {
        [...dots.children].forEach((dot, index) => {
          dot.classList.toggle("done", state.completed || index < state.currentTask);
          dot.classList.toggle("active", !state.completed && index === state.currentTask && !state.stepWarning);
          dot.classList.toggle("warn", !state.completed && index === state.currentTask && state.stepWarning);
        });
      }
      function setStepUI(index) {
        state.currentTask = clamp(index, 0, tasks.length - 1);
        state.stepWarning = false;
        const task = tasks[state.currentTask];
        taskStep.textContent = "关卡 " + (state.currentTask + 1) + " / " + tasks.length;
        taskText.textContent = task.text;
        taskHint.textContent = task.hint;
        hintPop.textContent = task.detail;
        updateTaskProgressHint();
        updateRecordButtonLabel();
        setModeLabel();
        updateDots();
        updateStatus();
        draw();
      }
      function updateStatus(text) {
        if (text) statusTag.textContent = "状态：" + text;
        else if (state.completed) statusTag.textContent = "状态：实验完成";
        else if (state.autoPlaying) statusTag.textContent = "状态：演示中";
        else if (state.switchClosed) statusTag.textContent = "状态：电路接通";
        else statusTag.textContent = "状态：开关断开";
      }
      function setModeLabel() {
        modeTag.textContent = "模式：" + (
          state.autoPlaying
            ? "演示模式 · 自动运行"
            : state.freeMode
              ? "自由模式 · 自主探索"
              : state.completed
                ? (state.demoCompleted ? "演示模式 · 演示完成" : "闯关模式 · 已通关")
                : "闯关模式 · 关卡 " + (state.currentTask + 1) + "/" + tasks.length
        );
      }
      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
      }
      function showCheck() {
        checkmark.classList.add("active");
        clearTimeout(showCheck.timer);
        showCheck.timer = setTimeout(() => checkmark.classList.remove("active"), 520);
      }
      function warnCurrentStep(message) {
        state.stepWarning = true;
        updateDots();
        hintLamp.classList.remove("flash");
        void hintLamp.offsetWidth;
        hintLamp.classList.add("flash");
        showToast(message);
        schedule(() => { state.stepWarning = false; updateDots(); }, 1200);
      }
      function setSwitchClosed(closed, markAction = true) {
        state.switchClosed = !!closed;
        if (markAction) state.switchTouched = true;
        state.lastOperation = state.switchClosed ? "闭合开关" : "断开开关";
        updateReadouts();
        updateStatus();
        draw();
      }
      function toggleSwitch(markAction = true) {
        setSwitchClosed(!state.switchClosed, markAction);
      }
      function updateReadouts() {
        const r = readings();
        const target = nearestVoltageTarget(r.voltage);
        const targetText = state.currentTask <= 1 ? "；最近目标 " + target.toFixed(1) + " V" : "；目标电压 2.0 V";
        const overload = r.current > 0.605 || r.voltage > 3.02;
        updateRecordButtonLabel();
        if (!state.completed && !state.autoPlaying) {
          updateStatus(state.switchClosed ? (overload ? "电表过量程" : "读数中" + targetText) : "开关断开");
        }
      }
      function passStepIfReady({ quiet = false } = {}) {
        if (state.freeMode || state.completed || state.successCooldown) return false;
        if (!tasks[state.currentTask].check()) {
          if (!quiet) warnCurrentStep("当前关卡的证据还不完整。");
          return false;
        }
        state.successCooldown = true;
        schedule(() => { state.successCooldown = false; }, 360);
        showCheck();
        if (state.currentTask >= tasks.length - 1) {
          state.completed = true;
          prepareCompletionView();
          doneMask.style.display = "flex";
          setModeLabel();
          updateStatus();
          updateDots();
        } else {
          setStepUI(state.currentTask + 1);
        }
        return true;
      }
      function recordLastObservation({ auto = false } = {}) {
        let r = readings();
        if (!state.switchClosed) {
          warnCurrentStep("请先闭合开关，让电流表和电压表产生读数。");
          return false;
        }
        if (!state.sliderMoved && !auto) {
          warnCurrentStep("请先拖动滑动变阻器滑片，再记录读数。");
          return false;
        }
        const snappedTarget = auto ? null : snapToNearbyGuidedTarget();
        if (snappedTarget !== null) r = readings();
        const voltageTarget = nearestVoltageTarget(r.voltage);
        const voltageOk = near(r.voltage, voltageTarget);
        const constantVoltage = near(r.voltage, CONSTANT_VOLTAGE, 0.05);
        if (r.current > 0.605 || r.voltage > 3.02) {
          warnCurrentStep("当前读数超过电表量程，请增大滑动变阻器接入电阻。");
          return false;
        }
        const canCountVoltage = r.r === 10 && voltageOk;
        const canCountResistance = constantVoltage;
        if (!state.freeMode && state.currentTask === 0 && !(r.r === 10 && near(r.voltage, 1))) {
          warnCurrentStep("关卡 1 需要保持 10 Ω，并把电压调到约 1.0 V。");
          return false;
        }
        if (!state.freeMode && state.currentTask === 1 && !(r.r === 10 && voltageOk)) {
          warnCurrentStep("关卡 2 只保持 10 Ω，分别调到约 2.0 V、3.0 V 后记录。");
          return false;
        }
        if (!state.freeMode && state.currentTask === 2 && !constantVoltage) {
          warnCurrentStep("换电阻后要重新调滑片，让电压表回到约 2.0 V。");
          return false;
        }
        const key = r.r + "Ω@" + round1(r.voltage).toFixed(1) + "V";
        if (!state.records.some(record => record.key === key)) {
          state.records.push({
            key,
            stage: state.freeMode ? (constantVoltage ? "电压不变" : "自由探索") : (state.currentTask < 2 ? "电阻不变" : "电压不变"),
            resistance: r.r,
            voltage: round2(r.voltage),
            current: round2(r.current),
            rheostat: round1(r.rs),
            voltageTarget: canCountVoltage ? voltageTarget : null,
            constantVoltage: canCountResistance,
            switchClosed: state.switchClosed,
            sliderMoved: state.sliderMoved || auto,
            resistorAction: state.resistorChanged || r.r === 10,
            operation: (r.r === 10 ? "调滑片" : "换 " + r.r + " Ω 并调滑片")
          });
          if (dataDock.classList.contains("collapsed")) {
            state.unseenRecords += 1;
            updateBadge();
          }
          renderRecords();
          updateTaskProgressHint();
          showToast(snappedTarget === null ? "已记录观察" : "已对准 " + snappedTarget.toFixed(1) + " V 并记录");
        } else if (!auto) {
          showToast("这组读数已经记录过");
        }
        passStepIfReady({ quiet: true });
        return true;
      }
      function analyzeConclusion() {
        if (!allEvidenceReady()) {
          warnCurrentStep("请先补齐“电阻不变”和“电压不变”两组对比数据。");
          return false;
        }
        state.analysisDone = true;
        analysisText.classList.add("ok");
        analysisText.textContent = "结论成立：" + SPEC.conclusion;
        updateReadouts();
        showToast("已归纳实验结论");
        passStepIfReady({ quiet: true });
        return true;
      }
      function renderRecords() {
        recordBody.innerHTML = "";
        state.records.forEach(record => {
          const row = document.createElement("tr");
          const labels = ["阶段", "R/Ω", "U/V", "I/A"];
          [record.stage, record.resistance, record.voltage.toFixed(2), record.current.toFixed(2)].forEach((value, index) => {
            const cell = document.createElement("td");
            cell.textContent = String(value);
            cell.dataset.label = labels[index];
            row.appendChild(cell);
          });
          recordBody.appendChild(row);
        });
        emptyRecords.style.display = state.records.length ? "none" : "block";
        drawChart();
      }
      function updateBadge() {
        dataNotice.textContent = String(state.unseenRecords);
        const show = state.unseenRecords > 0 && dataDock.classList.contains("collapsed");
        dataNotice.classList.toggle("show", show && !isMobileStage());
        dataTabBadge.textContent = state.unseenRecords > 99 ? "99+" : String(state.unseenRecords);
        dataTabBadge.classList.toggle("show", show && isMobileStage());
      }
      function drawChart() {
        const dpr = window.devicePixelRatio || 1;
        const w = chartCanvas.clientWidth || 320;
        const h = chartCanvas.clientHeight || 220;
        chartCanvas.width = Math.round(w * dpr);
        chartCanvas.height = Math.round(h * dpr);
        chartCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        chartCtx.clearRect(0, 0, w, h);
        chartCtx.fillStyle = "rgba(0,0,0,.18)";
        chartCtx.fillRect(0, 0, w, h);
        chartCtx.save();
        chartCtx.font = "700 13px Arial";
        chartCtx.fillStyle = "#cfe4ff";
        chartCtx.fillText("I-U（R=10Ω）", 16, 24);
        chartCtx.fillText("拓展：I-1/R（U≈2V）", 16, h / 2 + 20);
        drawChartAxes(46, 42, w - 70, h / 2 - 56, "U/V", "I/A");
        drawChartAxes(46, h / 2 + 38, w - 70, h / 2 - 60, "1/R", "I/A");
        const voltageRecords = state.records.filter(record => record.resistance === 10 && record.voltageTarget);
        chartCtx.strokeStyle = "rgba(61,220,151,.75)";
        chartCtx.lineWidth = 2;
        chartCtx.beginPath();
        voltageRecords
          .sort((a, b) => a.voltage - b.voltage)
          .forEach((record, index) => {
            const x = 46 + (record.voltage / 3.2) * (w - 70);
            const y = 42 + (h / 2 - 56) - (record.current / .34) * (h / 2 - 56);
            if (index === 0) chartCtx.moveTo(x, y);
            else chartCtx.lineTo(x, y);
          });
        chartCtx.stroke();
        voltageRecords.forEach(record => drawPoint(46 + (record.voltage / 3.2) * (w - 70), 42 + (h / 2 - 56) - (record.current / .34) * (h / 2 - 56), "#3ddc97"));
        const resistanceRecords = FIXED_RESISTORS
          .map(item => state.records.find(record => record.resistance === item.value && record.constantVoltage))
          .filter(Boolean);
        resistanceRecords.forEach(record => {
          const inv = 1 / record.resistance;
          const x = 46 + (inv / .22) * (w - 70);
          const y = h / 2 + 38 + (h / 2 - 60) - (record.current / .46) * (h / 2 - 60);
          drawPoint(x, y, "#ffd54f");
        });
        chartCtx.restore();
      }
      function drawChartAxes(x, y, w, h, xLabel, yLabel) {
        chartCtx.strokeStyle = "rgba(255,255,255,.2)";
        chartCtx.lineWidth = 1;
        chartCtx.beginPath();
        chartCtx.moveTo(x, y);
        chartCtx.lineTo(x, y + h);
        chartCtx.lineTo(x + w, y + h);
        chartCtx.stroke();
        chartCtx.fillStyle = "rgba(235,245,255,.65)";
        chartCtx.font = "11px Arial";
        chartCtx.fillText(yLabel, x - 32, y + 10);
        chartCtx.fillText(xLabel, x + w - 28, y + h + 16);
      }
      function drawPoint(x, y, color) {
        chartCtx.fillStyle = color;
        chartCtx.beginPath();
        chartCtx.arc(x, y, 4, 0, Math.PI * 2);
        chartCtx.fill();
      }
      function resizeCanvas() {
        const stageRect = stage.getBoundingClientRect();
        const rect = labArea.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        state.width = rect.width;
        state.height = rect.height;
        state.stageWidth = stageRect.width;
        state.stageHeight = stageRect.height;
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        canvas.style.width = rect.width + "px";
        canvas.style.height = rect.height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        fitDrawers();
        draw();
        drawChart();
      }
      function isMobileStage() {
        return (state.stageWidth || stage.clientWidth || state.width) <= 720;
      }
      function syncMobileTabs() {
        const mobile = isMobileStage();
        [controlDock, dataDock].forEach(drawer => drawer.classList.toggle("mobile-sheet", mobile));
        const experimentActive = mobile && !controlDock.classList.contains("collapsed");
        const dataActive = mobile && !dataDock.classList.contains("collapsed");
        mobileTabs.classList.toggle("attached", experimentActive || dataActive);
        experimentTab.classList.toggle("active", experimentActive);

        const box = state.hotSpots.switch;
        moveCursorTo(box.x + box.w / 2, box.y + box.h / 2);
        await sleep(220);
        if (state.autoCancel) throw new Error("AUTO_CANCELLED");
        clickCursor();
        setSwitchClosed(closed, true);
        await sleep(280);
      }
      async function clickResistorAuto(index) {
        draw();
        const box = state.hotSpots["resistor-" + index];
        moveCursorTo(box.x + box.w / 2, box.y + box.h / 2);
        await sleep(220);
        if (state.autoCancel) throw new Error("AUTO_CANCELLED");
        clickCursor();
        if (!selectResistor(index, true)) throw new Error("AUTO_RESISTOR_CHANGE_BLOCKED");
        await sleep(260);
      }
      async function runAutoDemo() {
        if (state.autoPlaying) { state.autoCancel = true; return; }
        const runId = state.autoRunId + 1;
        state.autoRunId = runId;
        state.autoPlaying = true;
        state.autoCancel = false;
        state.demoCompleted = false;
        autoDemoBtn.textContent = "退出演示";
        freeBtn.disabled = true;
        setDrawerCollapsed(controlDock, false);
        setDrawerCollapsed(dataDock, true);
        setModeLabel();
        resetScene({ keepMode: false, preserveAuto: true });
        state.autoPlaying = true;
        state.autoCancel = false;
        autoDemoBtn.textContent = "退出演示";
        setModeLabel();
        try {
          await clickSwitchAuto(true);
          setStepUI(0);
          await dragSliderToVoltage(1, 10);
          await autoRecord(() => hasVoltageTarget(1), "U1_R10");
          setStepUI(1);
          await dragSliderToVoltage(2, 10);
          await autoRecord(() => hasVoltageTarget(2), "U2_R10");
          await dragSliderToVoltage(3, 10);
          await autoRecord(() => hasVoltageTarget(3), "U3_R10");
          setStepUI(2);
          await clickSwitchAuto(false);
          await clickResistorAuto(0);
          await clickSwitchAuto(true);
          await dragSliderToVoltage(2, 5);
          await autoRecord(() => hasResistanceRecord(5), "U2_R5");
          await clickSwitchAuto(false);
          await clickResistorAuto(2);
          await clickSwitchAuto(true);
          await dragSliderToVoltage(2, 15);
          await autoRecord(() => hasResistanceRecord(15), "U2_R15");
          setStepUI(3);
          await sleep(280);
          if (state.autoCancel || runId !== state.autoRunId) throw new Error("AUTO_CANCELLED");
          setDrawerCollapsed(dataDock, false);
          analyzeConclusion();
          state.demoCompleted = true;
        } catch (error) {
          if (String(error.message || error) !== "AUTO_CANCELLED") showToast("演示模式中断：" + (error.message || error));
          else showToast("已退出演示模式");
        } finally {
          if (runId !== state.autoRunId) return;
          state.autoPlaying = false;
          state.autoCancel = false;
          autoDemoBtn.textContent = "演示模式";
          freeBtn.disabled = false;
          demoCursor.style.opacity = "0";
          setModeLabel();
          updateStatus();
          draw();
        }
      }
      function initEvents() {
        canvas.addEventListener("pointerdown", onCanvasPointerDown);
        canvas.addEventListener("pointermove", onCanvasPointerMove);
        canvas.addEventListener("pointerup", onCanvasPointerUp);
        canvas.addEventListener("pointercancel", onCanvasPointerUp);
        recordBtn.addEventListener("click", () => recordLastObservation());
        analyzeBtn.addEventListener("click", analyzeConclusion);
        resetBtn.addEventListener("click", () => {
          const free = state.freeMode;
          resetScene();
          state.freeMode = free;
          delete controlDock.dataset.moved;
          delete dataDock.dataset.moved;
          setDrawerCollapsed(controlDock, true);
          setDrawerCollapsed(dataDock, true);
          setFreeMode(free);
          showToast(free ? "已重置自由探索。" : "已回到关卡 1。");
        });
        autoDemoBtn.addEventListener("click", runAutoDemo);
        freeBtn.addEventListener("click", () => setFreeMode(!state.freeMode));
        controlToggleBtn.addEventListener("click", () => setDrawerCollapsed(controlDock, !controlDock.classList.contains("collapsed")));
        dataToggleBtn.addEventListener("click", () => setDrawerCollapsed(dataDock, !dataDock.classList.contains("collapsed")));
        experimentTab.addEventListener("click", () => setDrawerCollapsed(controlDock, !controlDock.classList.contains("collapsed")));
        dataTab.addEventListener("click", () => setDrawerCollapsed(dataDock, !dataDock.classList.contains("collapsed")));
        controlSheetCloseBtn.addEventListener("click", () => setDrawerCollapsed(controlDock, true));
        dataSheetCloseBtn.addEventListener("click", () => setDrawerCollapsed(dataDock, true));
        hintLamp.addEventListener("click", () => hintPop.classList.toggle("open"));
        okBtn.addEventListener("click", () => { doneMask.style.display = "none"; });
        bindDrawer(controlDock);
        bindDrawer(dataDock);
        window.addEventListener("resize", () => {
          clearTimeout(resizeCanvas.timer);
          resizeCanvas.timer = setTimeout(resizeCanvas, 120);
        });
      }
      function init() {
        initDots();
        initEvents();
        resizeCanvas();
        setDrawerCollapsed(controlDock, true);
        setDrawerCollapsed(dataDock, true);
        resetScene();
        requestAnimationFrame(() => { resizeCanvas(); draw(); });
        setTimeout(() => { resizeCanvas(); draw(); }, 180);
      }
      init();
      window.state = state;
      window.recordLastObservation = recordLastObservation;
      window.analyzeConclusion = analyzeConclusion;
    })();
  </script>
</body>
</html>
