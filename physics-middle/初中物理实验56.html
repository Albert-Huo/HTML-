<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>初中物理实验56｜观察动能和势能相互转化</title>
  <style>
    :root {
      --bg: #191919;
      --ink: #f6fbff;
      --muted: #a9bdca;
      --line: rgba(255,255,255,.13);
      --card: rgba(255,255,255,.08);
      --panel: rgba(13,19,24,.9);
      --accent: #42dfa1;
      --cyan: #65d7ff;
      --yellow: #ffd166;
      --orange: #ff9f43;
      --danger: #ff6578;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      padding: 10px;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }
    #app { width: 100%; max-width: 980px; margin: 0 auto 36px; }
    button { font: inherit; touch-action: manipulation; }
    button.main, button.sub {
      border: 0;
      border-radius: 8px;
      padding: 9px 13px;
      color: #fff;
      background: #494949;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: background .18s, opacity .18s, transform .08s, box-shadow .18s;
    }
    button.main { background: #287f35; }
    button.main.ready { box-shadow: 0 0 0 2px rgba(66,223,161,.45), 0 0 20px rgba(66,223,161,.22); }
    button:hover:not(:disabled) { filter: brightness(1.12); }
    button:active:not(:disabled) { transform: scale(.98); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.demo-focus { animation: demoFocus .7s ease-in-out infinite alternate; }
    @keyframes demoFocus { to { box-shadow: 0 0 0 3px rgba(255,209,102,.6), 0 0 22px rgba(255,159,67,.55); } }

    #spectrum {
      position: relative;
      height: 24px;
      border-radius: 10px;
      margin-bottom: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 15px rgba(255,255,255,.12);
    }
    #spectrum::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: linear-gradient(90deg,#ff4c4c 0%,#ff9a3d 5.5%,#f7e94c 11%,#54e86d 17%,#40e0d0 24%,#4aa3ff 31%,#8757ff 38%,#ec5cff 44%,#ff4c4c 50%,#ff9a3d 55.5%,#f7e94c 61%,#54e86d 67%,#40e0d0 74%,#4aa3ff 81%,#8757ff 88%,#ec5cff 94%,#ff4c4c 100%);
      background-size: 200% 100%;
      filter: saturate(1.18) brightness(1.04);
      animation: spectrumFlow 8s linear infinite;
    }
    @keyframes spectrumFlow { to { background-position: -100% 0; } }
    .task-card {
      min-height: 70px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 11px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--card);
    }
    .task-step { padding: 6px 10px; border-radius: 8px; background: rgba(255,255,255,.16); font-size: 16px; font-weight: 700; white-space: nowrap; }
    #taskText { font-size: 16px; font-weight: 700; line-height: 1.45; }
    #taskHint { margin-top: 2px; color: #ffd84d; font-size: 12px; line-height: 1.45; }
    .progress-dots { display: flex; gap: 7px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.25); outline: 2px solid rgba(255,255,255,.1); }
    .dot.active { background: #ffbd55; }
    .dot.done { background: var(--accent); outline-color: rgba(66,223,161,.42); }

    #stage {
      position: relative;
      height: min(68vh, 660px);
      min-height: 550px;
      margin-top: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 13px;
      background: #07121a;
      box-shadow: 0 14px 34px rgba(0,0,0,.34);
    }
    .hud {
      position: absolute;
      z-index: 25;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(0,0,0,.56);
      font-size: 12px;
    }
    .tag { padding: 2px 8px; border: 1px solid rgba(255,255,255,.25); border-radius: 999px; color: #e1efff; font-weight: 800; }
    #modeTag.mode-strip {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      border: 1px solid transparent;
      background: linear-gradient(#10151c,#10151c) padding-box, linear-gradient(90deg,#42e6a4,#55b8ff,#a86cff,#ffbd4a,#42e6a4) border-box;
      background-size: 100% 100%, 220% 100%;
      animation: modeFlow56 5s linear infinite;
      color: #f2fbff;
    }
    @keyframes modeFlow56 { to { background-position: 0 0, 220% 0; } }
    #modeTag.mode-strip::before {
      content: "";
      position: absolute;
      z-index: 2;
      top: -45%;
      bottom: -45%;
      left: -34px;
      width: 28px;
      transform: translateX(0) skewX(-18deg);
      background: linear-gradient(90deg,transparent,rgba(220,249,255,.45),rgba(255,255,255,.98),rgba(176,235,255,.5),transparent);
      filter: blur(.2px);
      mix-blend-mode: screen;
      pointer-events: none;
      animation: modeShine56 2.7s ease-in-out infinite;
    }
    @keyframes modeShine56 {
      0%, 10% { opacity: 0; transform: translateX(0) skewX(-18deg); }
      18% { opacity: 1; }
      72% { opacity: 1; transform: translateX(205px) skewX(-18deg); }
      80%, 100% { opacity: 0; transform: translateX(205px) skewX(-18deg); }
    }
    .hint-lamp {
      position: absolute;
      z-index: 28;
      left: 13px;
      top: 62px;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 8px;
      background: rgba(255,255,255,.08);
      color: #ffd454;
      cursor: pointer;
      font-size: 18px;
    }
    .hint-pop {
      position: absolute;
      z-index: 29;
      top: 101px;
      left: 13px;
      display: none;
      width: min(350px, calc(100% - 26px));
      padding: 10px 12px;
      border: 1px solid rgba(255,209,102,.4);
      border-radius: 10px;
      background: rgba(13,18,22,.94);
      color: #fff4d8;
      font-size: 13px;
      line-height: 1.55;
    }
    .hint-pop.open { display: block; }
    .lab-area {
      position: absolute;
      inset: 55px 10px 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 11px;
      background: #09151e;
      transition: right .18s ease, top .18s ease;
    }
    #labCanvas { display: block; width: 100%; height: 100%; cursor: grab; touch-action: pan-y; }
    #labCanvas.dragging { cursor: grabbing; touch-action: none; }

    .dock {
      position: absolute;
      z-index: 35;
      right: 12px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 13px 32px rgba(0,0,0,.38);
      backdrop-filter: blur(9px);
    }
    #controlDock { top: 58px; width: min(330px, calc(100% - 24px)); }
    #dataDock { top: 250px; width: min(400px, calc(100% - 24px)); }
    #stage .dock.collapsed { width: 148px; }
    .dock-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 10px; background: rgba(255,255,255,.04); cursor: grab; user-select: none; touch-action: none; }
    .dock-header.dragging { cursor: grabbing; }
    .dock-title { display: flex; align-items: center; gap: 6px; min-width: 0; color: #e9f4ff; font-size: 13px; font-weight: 700; white-space: nowrap; }
    .icon-btn { border: 1px solid rgba(255,255,255,.22); border-radius: 7px; padding: 4px 8px; background: rgba(255,255,255,.08); color: #eef7ff; cursor: pointer; font-size: 12px; }
    .dock-body { max-height: 315px; overflow: auto; padding: 10px; border-top: 1px solid rgba(255,255,255,.09); }
    .collapsed .dock-body { display: none; }
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .analysis { margin-top: 9px; padding: 9px 10px; border: 1px solid rgba(101,215,255,.28); border-radius: 8px; background: rgba(101,215,255,.07); color: #d9efff; font-size: 13px; line-height: 1.5; }
    .analysis.ok { border-color: rgba(66,223,161,.52); background: rgba(66,223,161,.11); color: #eafff5; }
    .badge { display: none; min-width: 19px; height: 19px; place-items: center; padding: 0 5px; border-radius: 999px; background: #ef476f; font-size: 12px; }
    .badge.show { display: inline-grid; }
    table.record { width: 100%; border-collapse: collapse; color: #eaf5ff; font-size: 11px; }
    table.record th, table.record td { padding: 6px; border: 1px solid rgba(255,255,255,.1); text-align: left; vertical-align: top; line-height: 1.4; }
    table.record th { background: rgba(255,255,255,.07); color: #cce6f8; }
    .empty { padding: 8px 2px; color: var(--muted); font-size: 12px; }

    .toolbar { display: flex; gap: 8px; margin-top: 10px; padding: 7px; border: 1px solid var(--line); border-radius: 11px; background: rgba(255,255,255,.04); }
    .toolbar button { min-width: 120px; font-size: 13px; }
    .toast { position: absolute; z-index: 80; left: 50%; bottom: 25px; opacity: 0; transform: translate(-50%, 16px); padding: 9px 15px; border: 1px solid rgba(255,255,255,.14); border-radius: 999px; background: rgba(0,0,0,.78); font-weight: 800; pointer-events: none; transition: .18s; }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .checkmark { position: absolute; z-index: 82; top: 48%; left: 50%; width: 62px; height: 62px; opacity: 0; transform: translate(-50%,-50%) scale(.72); border-radius: 50%; background: rgba(38,194,121,.96); transition: .18s; pointer-events: none; }
    .checkmark::after { content: ""; position: absolute; top: 16px; left: 19px; width: 24px; height: 13px; transform: rotate(-45deg); border-bottom: 5px solid #fff; border-left: 5px solid #fff; }
    .checkmark.active { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    .demo-cursor { position: absolute; z-index: 70; top: 0; left: 0; width: 20px; height: 20px; opacity: 0; transform: translate(-100px,-100px); border: 2px solid #fff; border-radius: 50%; background: rgba(101,215,255,.78); box-shadow: 0 0 15px rgba(101,215,255,.76); pointer-events: none; }
    .modal-mask { position: absolute; z-index: 90; inset: 0; display: none; place-items: center; padding: 18px; background: rgba(0,0,0,.62); }
    .modal { width: min(450px, 94%); padding: 19px 17px; border: 1px solid rgba(255,255,255,.16); border-radius: 12px; background: #10171d; text-align: center; box-shadow: 0 20px 48px rgba(0,0,0,.42); }
    .modal h3 { margin: 2px 0 9px; }
    .modal p { margin: 0; color: #d5e2ea; line-height: 1.65; }
    .modal .ok { margin-top: 15px; border: 0; border-radius: 8px; padding: 8px 20px; background: var(--accent); color: #062318; font-weight: 900; cursor: pointer; }
    .explanation { margin: 14px 0 22px; color: #edf7ff; line-height: 1.66; font-size: 15px; }
    .explanation h2 { margin: 0 0 7px; color: #9bd6ff; font-size: 20px; }
    .explanation p { margin: 6px 0; }

    @media (max-width: 720px) {
      body { padding: 8px; }
      #spectrum { height: 20px; margin-bottom: 10px; }
      .task-card { grid-template-columns: 1fr auto; }
      .task-text { grid-column: 1 / -1; grid-row: 2; }
      .task-step { font-size: 16px; }
      #stage { height: 76vh; min-height: 700px; }
      .lab-area { inset: 106px 8px 8px; }
      #controlDock, #dataDock { right: 8px; width: calc(100% - 16px); }
      #stage .dock.collapsed { width: 148px; }
      #controlDock { top: 58px; }
      #dataDock { top: 58px; }
      .toolbar button { flex: 1; min-width: 0; padding: 8px 6px; font-size: 12px; }
      table.record thead { display: none; }
      table.record tr { display: block; margin-bottom: 7px; border: 1px solid rgba(255,255,255,.1); border-radius: 7px; }
      table.record td { display: grid; grid-template-columns: 58px 1fr; border: 0; border-bottom: 1px solid rgba(255,255,255,.07); }
      table.record td::before { content: attr(data-label); color: #9fc7df; font-weight: 800; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="spectrum"></div>
    <section class="task-card">
      <div class="task-step" id="taskStep">关卡 1/4</div>
      <div class="task-text"><div id="taskText"></div><div id="taskHint"></div></div>
      <div class="progress-dots" id="dots"></div>
    </section>

    <main id="stage" aria-label="观察动能和重力势能相互转化实验台">
      <div class="hud"><span class="tag mode-strip" id="modeTag"></span><span class="tag" id="statusTag"></span></div>
      <button class="hint-lamp" id="hintLamp" type="button" aria-label="查看提示">💡</button>
      <div class="hint-pop" id="hintPop"></div>
      <div class="lab-area" id="labArea"><canvas id="labCanvas"></canvas></div>

      <section class="dock collapsed" id="controlDock">
        <div class="dock-header"><span class="dock-title">实验面板</span><button class="icon-btn" id="controlToggleBtn" type="button">展开</button></div>
        <div class="dock-body">
          <div class="controls"><button class="main" id="recordBtn" type="button">记录</button><button class="sub" id="analyzeBtn" type="button">分析</button></div>
          <div class="analysis" id="analysisText">完成三个关键位置的记录后分析。</div>
        </div>
      </section>

      <section class="dock collapsed" id="dataDock">
        <div class="dock-header"><span class="dock-title">数据面板 <span class="badge" id="dataNotice">0</span></span><button class="icon-btn" id="dataToggleBtn" type="button">展开</button></div>
        <div class="dock-body">
          <table class="record"><thead><tr><th>位置</th><th>高度</th><th>速度</th><th>能量分配</th></tr></thead><tbody id="recordBody"></tbody></table>
          <div class="empty" id="emptyRecords">暂无记录。</div>
        </div>
      </section>

      <div class="toast" id="toast"></div><div class="checkmark" id="checkmark"></div><div class="demo-cursor" id="demoCursor"></div>
      <div class="modal-mask" id="doneMask"><div class="modal"><h3>实验完成</h3><p>小球下降时，重力势能减少、动能增大；上升时相反。若忽略阻力，机械能守恒；真实轨道中另一侧高度略低。</p><button class="ok" id="okBtn" type="button">知道了</button></div></div>
    </main>

    <div class="toolbar"><button class="sub" id="resetBtn" type="button">重置关卡</button><button class="sub" id="autoDemoBtn" type="button">演示模式</button><button class="sub" id="freeBtn" type="button">自由模式</button></div>
    <section class="explanation">
      <h2>实验名：观察动能和重力势能相互转化</h2>
      <p><b>关键过程：</b>把小球拉到轨道左侧高处释放，对比释放点、最低点和另一侧最高点的高度、速度与能量分配。</p>
      <p><b>结论：</b>重力势能和动能在运动中相互转化；忽略阻力时机械能守恒，实际运动中有少量机械能转化为内能。</p>
    </section>
  </div>

  <script>
  (() => {
    "use strict";

    const TASKS = [
      { title: "拖到高处并释放", hint: "拖动小球到左侧 A 区，松手后记录释放点。", detail: "释放时速度为 0，重力势能最大。" },
      { title: "记录最低点", hint: "小球已在 B 点自动停驻，对比高度和速度后记录。", detail: "最低点重力势能最小，速度和动能最大。" },
      { title: "记录另一侧最高点", hint: "小球已在 C 点停驻，观察它与释放点的高度差。", detail: "实际轨道有少量阻力，另一侧高度略低。" },
      { title: "分析能量转化", hint: "三组数据已齐，点击分析得出结论。", detail: "下降时势能转化为动能，上升时动能转化为势能。" }
    ];
    const MILESTONES = ["release", "bottom", "rise"];
    const MILESTONE_LABELS = { release: "A 释放点", bottom: "B 最低点", rise: "C 另一侧最高点" };
    const OMEGA = 1.12;
    const GUIDED_LOSS = .03;
    const AUTO_TIMING = { cursorStep: 105, releaseObserve: 1300, milestoneObserve: 1400, actionFocus: 650, feedback: 800, analysisFocus: 720, conclusion: 1000 };
    const $ = (selector) => document.querySelector(selector);
    const stage = $("#stage"), labArea = $("#labArea"), canvas = $("#labCanvas"), ctx = canvas.getContext("2d");
    const taskStep = $("#taskStep"), taskText = $("#taskText"), taskHint = $("#taskHint"), dots = $("#dots");
    const modeTag = $("#modeTag"), statusTag = $("#statusTag"), hintLamp = $("#hintLamp"), hintPop = $("#hintPop");
    const controlDock = $("#controlDock"), dataDock = $("#dataDock"), controlToggleBtn = $("#controlToggleBtn"), dataToggleBtn = $("#dataToggleBtn");
    const recordBtn = $("#recordBtn"), analyzeBtn = $("#analyzeBtn"), analysisText = $("#analysisText"), recordBody = $("#recordBody"), emptyRecords = $("#emptyRecords"), dataNotice = $("#dataNotice");
    const resetBtn = $("#resetBtn"), autoDemoBtn = $("#autoDemoBtn"), freeBtn = $("#freeBtn"), toast = $("#toast"), checkmark = $("#checkmark"), demoCursor = $("#demoCursor"), doneMask = $("#doneMask"), okBtn = $("#okBtn");
    const geometry = { ball: { x: 0, y: 0, r: 0 }, track: null };
    const state = {
      currentTask: 0, completed: false, analysisDone: false, freeMode: false,
      position: -.3, initialPosition: -1, phase: 0, speedRatio: 0,
      potentialRatio: .09, kineticRatio: 0, mechanicalRatio: .09,
      released: false, moving: false, dragging: false, pausedMilestone: null,
      evidence: { release: null, bottom: null, rise: null }, records: [], unseenRecords: 0,
      width: 0, height: 0, rafId: 0, lastFrameAt: 0,
      autoPlaying: false, autoCancel: false, autoToken: 0, lastError: null, drawerDrag: null, layoutMobile: false,
      delays: new Map(), uiTimers: new Set(), resizeTimer: 0, demoCursorPoint: null
    };

    function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
    function roundRectPath(x, y, width, height, radius) { ctx.beginPath(); ctx.roundRect(x, y, width, height, radius); }
    function fillRound(x, y, width, height, radius, color) { ctx.fillStyle = color; roundRectPath(x, y, width, height, radius); ctx.fill(); }
    function strokeRound(x, y, width, height, radius, color, lineWidth = 2) { ctx.strokeStyle = color; ctx.lineWidth = lineWidth; roundRectPath(x, y, width, height, radius); ctx.stroke(); }
    function text(value, x, y, size = 13, color = "#eef8ff", align = "center", weight = 700) { ctx.fillStyle = color; ctx.font = `${weight} ${size}px Arial`; ctx.textAlign = align; ctx.textBaseline = "middle"; ctx.fillText(value, x, y); }
    function line(points, color, lineWidth = 3, dashed = []) { ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.setLineDash(dashed); ctx.beginPath(); points.forEach((point, index) => index ? ctx.lineTo(point.x, point.y) : ctx.moveTo(point.x, point.y)); ctx.stroke(); ctx.restore(); }
    function schedule(fn, delay) { const id = setTimeout(() => { state.uiTimers.delete(id); fn(); }, delay); state.uiTimers.add(id); return id; }
    function clearUiTimers() { for (const id of state.uiTimers) clearTimeout(id); state.uiTimers.clear(); }
    function showToast(message) { toast.textContent = message; toast.classList.add("show"); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toast.classList.remove("show"), 1450); }
    function showCheck() { checkmark.classList.add("active"); clearTimeout(showCheck.timer); showCheck.timer = setTimeout(() => checkmark.classList.remove("active"), 560); }

    function energyAtPhase(phase, freeMode = state.freeMode) {
      const mechanical = freeMode ? Math.max(.08, Math.exp(-.024 * phase)) : Math.max(1 - GUIDED_LOSS * phase / Math.PI, 1 - GUIDED_LOSS);
      const cosine = Math.cos(phase), sine = Math.sin(phase);
      return { mechanical, potential: mechanical * cosine * cosine, kinetic: mechanical * sine * sine };
    }
    function updateMotionState(phase) {
      const energy = energyAtPhase(phase);
      state.phase = phase;
      state.mechanicalRatio = energy.mechanical;
      state.potentialRatio = energy.potential;
      state.kineticRatio = energy.kinetic;
      state.position = state.initialPosition * Math.cos(phase) * Math.sqrt(energy.mechanical);
      state.speedRatio = Math.sqrt(energy.kinetic);
    }
    function evidenceSnapshot(key) {
      return {
        key,
        label: MILESTONE_LABELS[key],
        position: state.position,
        heightRatio: state.potentialRatio,
        speedRatio: state.speedRatio,
        potentialRatio: state.potentialRatio,
        kineticRatio: state.kineticRatio,
        mechanicalRatio: state.mechanicalRatio
      };
    }
    function pauseAtMilestone(key) {
      state.moving = false;
      state.pausedMilestone = key;
      state.evidence[key] = evidenceSnapshot(key);
      stopMotion();
      if (!state.freeMode) {
        setDrawerCollapsed(dataDock, true, { quiet: true });
        setDrawerCollapsed(controlDock, false, { quiet: true });
      }
      updateStatus();
      draw();
    }
    function advanceMotion(deltaSeconds) {
      if (!state.moving) return;
      const nextPhase = state.phase + OMEGA * deltaSeconds;
      if (!state.freeMode && state.currentTask === 1 && nextPhase >= Math.PI / 2) {
        updateMotionState(Math.PI / 2);
        pauseAtMilestone("bottom");
        return;
      }
      if (!state.freeMode && state.currentTask === 2 && nextPhase >= Math.PI) {
        updateMotionState(Math.PI);
        pauseAtMilestone("rise");
        return;
      }
      updateMotionState(nextPhase);
      if (state.freeMode && state.mechanicalRatio <= .081) {
        state.moving = false;
        state.position = 0;
        state.speedRatio = 0;
        stopMotion();
      }
    }
    function motionFrame(now) {
      if (!state.rafId) return;
      const delta = Math.min(.05, Math.max(0, (now - state.lastFrameAt) / 1000));
      state.lastFrameAt = now;
      advanceMotion(delta);
      draw();
      updateStatus();
      if (state.moving) state.rafId = requestAnimationFrame(motionFrame);
      else state.rafId = 0;
    }
    function startMotion() {
      if (!state.moving || state.rafId) return;
      state.lastFrameAt = performance.now();
      state.rafId = requestAnimationFrame(motionFrame);
    }
    function stopMotion() { if (state.rafId) cancelAnimationFrame(state.rafId); state.rafId = 0; state.lastFrameAt = 0; }
    function resumeMotion() { state.pausedMilestone = null; state.moving = true; startMotion(); updateStatus(); draw(); }

    }
    async function autoDragToRelease(token) {
      const start = { x: geometry.ball.x, y: geometry.ball.y }, target = ballFrame(-.93, geometry.track).center;
      for (let index = 1; index <= 8; index++) { const progress = index / 8, point = { x: start.x + (target.x - start.x) * progress, y: start.y + (target.y - start.y) * progress }; moveDemoCursor(point); setBallPosition(-.3 + (-.63 * progress)); await delay(AUTO_TIMING.cursorStep, token); }
      releaseBall({ quiet: true });
    }
    async function waitForMilestone(key, token) { while (state.pausedMilestone !== key) await delay(80, token); }
    async function autoRecord(key, token) {
      recordBtn.classList.add("demo-focus");
      try { await delay(AUTO_TIMING.actionFocus, token); const accepted = recordObservation({ auto: true }); if (!accepted || !state.records.some((record) => record.key === key)) throw new Error(`AUTO_RECORD_NOT_PERSISTED:${key}`); await delay(AUTO_TIMING.feedback, token); }
      finally { recordBtn.classList.remove("demo-focus"); }
    }
    async function runAutoDemo() {
      if (state.autoPlaying) return cancelAutoDemo();
      resetState({ quiet: true, preserveAuto: true });
      state.autoPlaying = true; state.autoCancel = false; state.autoToken += 1; state.lastError = null;
      const token = state.autoToken;
      autoDemoBtn.textContent = "退出演示"; freeBtn.disabled = true; resetBtn.disabled = true; updateStatus();
      try {
        await autoDragToRelease(token);
        await delay(AUTO_TIMING.releaseObserve, token);
        await autoRecord("release", token);
        await waitForMilestone("bottom", token);
        await delay(AUTO_TIMING.milestoneObserve, token);
        await autoRecord("bottom", token);
        await waitForMilestone("rise", token);
        await delay(AUTO_TIMING.milestoneObserve, token);
        await autoRecord("rise", token);
        analyzeBtn.classList.add("demo-focus");
        await delay(AUTO_TIMING.analysisFocus, token);
        if (!analyzeConclusion({ auto: true })) throw new Error("AUTO_ANALYSIS_FAILED");
        await delay(AUTO_TIMING.conclusion, token);
        return { completed: state.completed };
      } catch (error) {
        if (error.message !== "AUTO_CANCELLED") { state.lastError = `实验56：${error.message || error}`; console.error(state.lastError); throw error; }
        return { cancelled: true, code: "AUTO_CANCELLED" };
      } finally {
        state.autoPlaying = false; state.autoCancel = false; autoDemoBtn.textContent = "演示模式"; freeBtn.disabled = false; resetBtn.disabled = false; demoCursor.style.opacity = "0"; analyzeBtn.classList.remove("demo-focus"); updateStatus();
      }
    }
    function cancelAutoDemo() { if (!state.autoPlaying) return { accepted: false }; state.autoCancel = true; state.autoToken += 1; cancelDelays(); stopMotion(); resetState({ quiet: true, preserveAuto: true }); return { accepted: true, cancelled: true, code: "AUTO_CANCELLED" }; }

    function resetState(opts = {}) {
      if (state.autoPlaying && !opts.preserveAuto) { state.autoCancel = true; state.autoToken += 1; cancelDelays(); }
      stopMotion(); clearUiTimers();
      state.currentTask = 0; state.completed = false; state.analysisDone = false;
      if (!opts.keepMode) state.freeMode = false;
      state.position = -.3; state.initialPosition = -.3; state.phase = 0; state.speedRatio = 0; state.potentialRatio = .09; state.kineticRatio = 0; state.mechanicalRatio = .09;
      state.released = false; state.moving = false; state.dragging = false; state.pausedMilestone = null;
      state.evidence = { release: null, bottom: null, rise: null }; state.records = []; state.unseenRecords = 0; state.lastError = null;
      analysisText.classList.remove("ok"); analysisText.textContent = "完成三个关键位置的记录后分析。"; doneMask.style.display = "none"; hintPop.classList.remove("open");
      setDrawerCollapsed(controlDock, true, { quiet: true }); setDrawerCollapsed(dataDock, true, { quiet: true }); renderRecords(); updateBadge(); setStep(0); draw();
      if (!opts.quiet) showToast("已重置");
    }
    function setFreeMode(enabled) {
      const next = Boolean(enabled);
      resetState({ quiet: true, keepMode: true });
      state.freeMode = next;
      freeBtn.textContent = next ? "退出自由模式" : "自由模式";
      autoDemoBtn.disabled = next;
      updateStatus();
      syncActions();
      showToast(next ? "自由模式：从任一侧高处释放" : "已回到闯关模式");
    }
    function simulateMilestone(key) {
      if (key === "bottom" && state.currentTask === 1 && state.released) { stopMotion(); updateMotionState(Math.PI / 2); pauseAtMilestone("bottom"); return true; }
      if (key === "rise" && state.currentTask === 2 && state.released) { stopMotion(); updateMotionState(Math.PI); pauseAtMilestone("rise"); return true; }
      return false;
    }
    function getSnapshot() {
      return structuredClone({
        schemaVersion: 1, experimentId: 56, mode: state.freeMode ? "free" : "guided",
        currentTask: state.currentTask, completed: state.completed, analysisDone: state.analysisDone, records: state.records,
        physics: { position: state.position, phase: state.phase, speedRatio: state.speedRatio, potentialRatio: state.potentialRatio, kineticRatio: state.kineticRatio, mechanicalRatio: state.mechanicalRatio, released: state.released, moving: state.moving, pausedMilestone: state.pausedMilestone, evidence: state.evidence },
        auto: { playing: state.autoPlaying, lastError: state.lastError },
        resources: { rafActive: state.rafId !== 0, timerCount: state.delays.size + state.uiTimers.size + (state.resizeTimer ? 1 : 0) },
        geometry: { ball: structuredClone(geometry.ball) }
      });
    }
    async function performTestAction(action) {
      if (!action || typeof action.type !== "string") throw new Error("实验56测试动作无效");
      if (action.type === "drag-ball") return setBallPosition(Number(action.position));
      if (action.type === "release-ball") return releaseBall({ quiet: true });
      if (action.type === "advance-to-milestone") return simulateMilestone(action.milestone);
      if (action.type === "record-observation") return recordObservation({ auto: true });
      if (action.type === "analyze-conclusion") return analyzeConclusion({ auto: true });
      if (action.type === "set-mode") { setFreeMode(action.mode === "free"); return true; }
      if (action.type === "reset") { resetState({ quiet: true }); return true; }
      throw new Error(`实验56不支持测试动作：${action.type}`);
    }

    function init() {
      dots.innerHTML = TASKS.map(() => '<span class="dot"></span>').join("");
      canvas.addEventListener("pointerdown", pointerDown);
      canvas.addEventListener("pointermove", pointerMove);
      canvas.addEventListener("pointerup", pointerUp);
      canvas.addEventListener("pointercancel", pointerUp);
      bindDrawer(controlDock);
      bindDrawer(dataDock);
      recordBtn.addEventListener("click", () => recordObservation());
      analyzeBtn.addEventListener("click", () => analyzeConclusion());
      resetBtn.addEventListener("click", () => resetState());
      autoDemoBtn.addEventListener("click", () => state.autoPlaying ? cancelAutoDemo() : runAutoDemo());
      freeBtn.addEventListener("click", () => setFreeMode(!state.freeMode));
      controlToggleBtn.addEventListener("click", () => setDrawerCollapsed(controlDock, !controlDock.classList.contains("collapsed")));
      dataToggleBtn.addEventListener("click", () => setDrawerCollapsed(dataDock, !dataDock.classList.contains("collapsed")));
      hintLamp.addEventListener("click", () => hintPop.classList.toggle("open"));
      okBtn.addEventListener("click", () => { doneMask.style.display = "none"; });
      window.addEventListener("resize", fitLayout);
      setDrawerCollapsed(controlDock, true, { quiet: true }); setDrawerCollapsed(dataDock, true, { quiet: true }); resetState({ quiet: true });
      requestAnimationFrame(() => { fitLayout(); resizeCanvas(); });
      Object.defineProperty(window, "__labTestApi", { value: Object.freeze({ getSnapshot, performTestAction, runAutoDemo, cancelAutoDemo, reset: () => resetState({ quiet: true }) }), writable: false, configurable: false });
    }
    init();
  })();
  </script>
</body>
