<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>初中物理实验14｜观察分子之间存在间隙的现象（交互版）</title>
  <!-- 实验目录依据：中小学实验教学目录（初中物理 14. 观察分子之间存在间隙的现象） -->
  <style>
    :root{
      --bg:#1a1a1a;
      --ink:#fff;
      --card-bg:rgba(255,255,255,.08);
      --panel-bg:rgba(15,15,15,.58);
      --line:rgba(255,255,255,.12);
      --accent:#3ddc97;
      --warn:#ffb74d;
      --dockShadow:0 14px 36px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:10px;
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    #spectrum{
      position:relative;
      width:100%;
      max-width:980px;
      height:40px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,255,255,.15);
      margin:0 0 12px;
      background:#000;
      flex-shrink:0;
    }
    #spectrum::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
      background-size:200% 100%;
      animation:flowRainbow 6s linear infinite;
    }
    @keyframes flowRainbow{ 0%{background-position:0 0;} 100%{background-position:-100% 0;} }

    .task-card{
      width:100%;
      max-width:980px;
      background:var(--card-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      backdrop-filter:blur(6px);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:10px;
      transition:opacity .2s, filter .2s;
    }
    .task-step{ background:rgba(255,255,255,.16); border-radius:8px; padding:6px 10px; font-weight:700; white-space:nowrap; }
    .task-text{ line-height:1.55; }
    .task-hint{ color:#ffd54f; font-size:12px; opacity:.95; margin-top:2px; }
    .progress-dots{ display:flex; gap:6px; }
    .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.26); outline:2px solid rgba(255,255,255,.12); }
    .dot.active{ background:var(--warn); }
    .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,.45); }
    .dot.warn{ background:#ff4d4f; outline-color:rgba(255,77,79,.58); box-shadow:0 0 10px rgba(255,77,79,.62); }

    #stage{
      width:100%;
      max-width:980px;
      height:66vh;
      max-height:660px;
      min-height:500px;
      margin-top:10px;
      border-radius:12px;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b0f14;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
      touch-action:none;
      background-image:
        radial-gradient(circle at 76% 25%, rgba(255,255,255,.06), transparent 42%),
        radial-gradient(circle at 22% 78%, rgba(0,255,255,.05), transparent 46%);
    }
    .hud{
      position:absolute;
      left:10px;
      top:10px;
      z-index:20;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      background:rgba(0,0,0,.48);
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
    }
    .tag{ border:1px solid rgba(255,255,255,.26); border-radius:999px; padding:2px 8px; font-weight:700; color:#dce9ff; background:rgba(255,255,255,.06); }

    .lab-area{
      position:absolute;
      inset:54px 10px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(5,10,16,.82);
      overflow:hidden;
    }
    #scene{ position:absolute; inset:0; width:100%; height:100%; display:block; touch-action:none; z-index:1; }
    .lab14-layer{
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
    }
    .lab14-layer.hidden{ display:none; }
    .lab14-note{
      position:absolute;
      left:18px;
      bottom:12px;
      z-index:9;
      max-width:min(58%, 430px);
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(3,8,16,.72);
      color:#e7f1ff;
      font-size:12px;
      line-height:1.45;
      pointer-events:none;
      box-shadow:0 8px 20px rgba(0,0,0,.24);
    }
    .lab14-note strong{ color:#fff3bf; }
    .lab14-vessel{
      --tilt:0deg;
      --lift:0px;
      position:absolute;
      left:0;
      top:0;
      transform:translate3d(var(--vx,0px), var(--vy,0px), 0) rotate(var(--tilt));
      transform-origin:52% 86%;
      transition:transform .18s ease-out, filter .18s ease-out;
      pointer-events:auto;
      user-select:none;
      touch-action:none;
      cursor:grab;
      filter:drop-shadow(0 14px 24px rgba(0,0,0,.28));
    }
    .lab14-vessel.dragging{
      cursor:grabbing;
      filter:drop-shadow(0 18px 34px rgba(0,0,0,.42));
    }
    .lab14-vessel.shaking{
      animation:mixShake .46s ease-in-out 3;
    }
    @keyframes mixShake{
      0%,100%{ transform:translate3d(var(--vx,0px), var(--vy,0px), 0) rotate(0deg); }
      25%{ transform:translate3d(calc(var(--vx,0px) - 6px), var(--vy,0px), 0) rotate(-8deg); }
      50%{ transform:translate3d(calc(var(--vx,0px) + 8px), var(--vy,0px), 0) rotate(9deg); }
      75%{ transform:translate3d(calc(var(--vx,0px) - 4px), var(--vy,0px), 0) rotate(-6deg); }
    }
    .vessel-tag{
      position:absolute;
      left:50%;
      top:-34px;
      transform:translateX(-50%);
      white-space:nowrap;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.46);
      color:#e8f1ff;
      font-size:12px;
      font-weight:700;
      pointer-events:none;
    }
    .vessel-shell{
      position:relative;
      width:100%;
      height:100%;
      border-radius:16px 16px 18px 18px;
      border:3px solid rgba(214,232,255,.7);
      background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      box-shadow:inset 16px 0 18px rgba(255,255,255,.08), inset -18px 0 24px rgba(0,0,0,.08);
      overflow:hidden;
    }
    .vessel-shell::before{
      content:"";
      position:absolute;
      inset:10px auto 12px 10px;
      width:18%;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.04));
      opacity:.7;
      pointer-events:none;
    }
    .vessel-mouth{
      position:absolute;
      left:8%;
      right:8%;
      top:-7px;
      height:14px;
      border-radius:999px;
      border:2px solid rgba(238,246,255,.85);
      background:radial-gradient(circle at 50% 45%, rgba(255,255,255,.5), rgba(255,255,255,.06) 78%);
      box-shadow:0 0 0 2px rgba(12,18,28,.18) inset;
    }
    .vessel-base{
      position:absolute;
      left:16%;
      right:16%;
      bottom:-14px;
      height:20px;
      border-radius:999px;
      background:radial-gradient(circle at 50% 40%, rgba(215,231,255,.92), rgba(133,150,172,.45));
      box-shadow:0 10px 18px rgba(0,0,0,.26);
      opacity:.9;
    }
    .vessel-scale{
      position:absolute;
      inset:12px 8px 18px auto;
      width:20px;
      opacity:.72;
      background:
        linear-gradient(180deg,
          transparent 0 3%,
          rgba(255,255,255,.48) 3% 3.8%,
          transparent 3.8% 12.6%,
          rgba(255,255,255,.32) 12.6% 13.2%,
          transparent 13.2% 22%,
          rgba(255,255,255,.48) 22% 22.8%,
          transparent 22.8% 31.6%,
          rgba(255,255,255,.32) 31.6% 32.2%,
          transparent 32.2% 41%,
          rgba(255,255,255,.48) 41% 41.8%,
          transparent 41.8% 50.6%,
          rgba(255,255,255,.32) 50.6% 51.2%,
          transparent 51.2% 60%,
          rgba(255,255,255,.48) 60% 60.8%,
          transparent 60.8% 69.6%,
          rgba(255,255,255,.32) 69.6% 70.2%,
          transparent 70.2% 79%,
          rgba(255,255,255,.48) 79% 79.8%,
          transparent 79.8% 88.6%,
          rgba(255,255,255,.32) 88.6% 89.2%,
          transparent 89.2% 100%);
      pointer-events:none;
    }
    .vessel-fill{
      position:absolute;
      left:7px;
      right:7px;
      bottom:7px;
      height:0;
      border-radius:0 0 12px 12px;
      transition:height .16s ease-out, opacity .16s ease-out;
      pointer-events:none;
    }
    .vessel-fill::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:-6px;
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.32);
      opacity:.68;
    }
    .vessel-fill.water{
      background:linear-gradient(180deg, rgba(238,248,255,.85), rgba(195,229,255,.82));
      box-shadow:inset 0 0 14px rgba(255,255,255,.18), 0 0 20px rgba(185,226,255,.12);
    }
    .vessel-fill.alcohol{
      background:linear-gradient(180deg, rgba(252,244,232,.74), rgba(244,226,197,.62));
      box-shadow:inset 0 0 12px rgba(255,255,255,.14), 0 0 18px rgba(255,218,161,.1);
    }
    .vessel-readout{
      position:absolute;
      left:50%;
      bottom:-40px;
      transform:translateX(-50%);
      min-width:86px;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(8,14,23,.78);
      color:#f4f8ff;
      font-size:12px;
      text-align:center;
      font-weight:700;
      pointer-events:none;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
    }
    .source-vessel .vessel-readout{
      bottom:-24px;
    }
    .mix-vessel .vessel-readout{
      bottom:-40px;
    }
    .vessel-highlight{
      position:absolute;
      inset:16px auto 22px 16px;
      width:20%;
      border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0));
      opacity:.62;
      pointer-events:none;
    }
    .mix-vessel .vessel-shell{
      border-radius:18px 18px 22px 22px;
    }
    .mix-vessel{ cursor:pointer; }
    .mix-vessel .vessel-mouth{
      left:7%;
      right:7%;
    }
    .mix-layer{
      position:absolute;
      left:8px;
      right:8px;
      bottom:8px;
      height:0;
      border-radius:0 0 14px 14px;
      pointer-events:none;
      opacity:0;
      transition:height .16s ease-out, opacity .16s ease-out, bottom .16s ease-out;
    }
    .mix-layer::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:-6px;
      height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.28);
      opacity:0;
    }
    .mix-layer.show{ opacity:1; }
    .mix-layer.show::before{ opacity:.72; }
    .mix-layer.water{
      background:linear-gradient(180deg, rgba(241,249,255,.88), rgba(201,229,255,.82));
    }
    .mix-layer.alcohol{
      background:linear-gradient(180deg, rgba(255,245,235,.58), rgba(240,220,189,.48));
      box-shadow:inset 0 0 12px rgba(255,255,255,.08);
    }
    .mix-layer.mixed{
      background:linear-gradient(180deg, rgba(240,248,255,.88), rgba(212,228,245,.78));
      box-shadow:inset 0 0 16px rgba(255,255,255,.18), 0 0 24px rgba(196,221,245,.14);
    }
    .mix-particles{
      position:absolute;
      inset:20px 14px 26px;
      opacity:0;
      background-image:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.72) 0 1.5px, transparent 1.6px),
        radial-gradient(circle at 72% 22%, rgba(232,246,255,.66) 0 1.5px, transparent 1.7px),
        radial-gradient(circle at 38% 52%, rgba(255,255,255,.54) 0 1.2px, transparent 1.4px),
        radial-gradient(circle at 66% 66%, rgba(232,246,255,.5) 0 1.2px, transparent 1.4px),
        radial-gradient(circle at 28% 78%, rgba(255,255,255,.48) 0 1.3px, transparent 1.5px);
      background-size:64px 64px;
      animation:mixSparkle 3.2s linear infinite;
      pointer-events:none;
    }
    @keyframes mixSparkle{
      0%{ background-position:0 0, 10px 12px, 20px 28px, 34px 18px, 50px 42px; }
      100%{ background-position:22px 32px, 32px 10px, 40px 50px, 54px 36px, 70px 62px; }
    }
    .pour-stream{
      position:absolute;
      left:0;
      top:0;
      width:10px;
      height:0;
      border-radius:999px;
      transform-origin:top center;
      background:linear-gradient(180deg, rgba(255,255,255,.85), rgba(201,229,255,.72));
      opacity:0;
      z-index:7;
      pointer-events:none;
      filter:drop-shadow(0 0 8px rgba(255,255,255,.12));
      transition:opacity .12s ease-out;
    }
    .pour-stream.alcohol{
      background:linear-gradient(180deg, rgba(255,250,244,.84), rgba(244,223,188,.66));
    }
    .pour-stream.show{ opacity:1; }

    .dock{
      position:absolute;
      width:min(94%, 380px);
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-bg);
      backdrop-filter:blur(6px);
      box-shadow:var(--dockShadow);
      overflow:hidden;
      touch-action:none;
      z-index:30;
    }
    .dock.dragging{ box-shadow:0 20px 48px rgba(0,0,0,.55); }
    .dockHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    .dockHead:active{ cursor:grabbing; }
    .dockTitle{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700; color:#e7f0ff; }
    .dataNotice{
      display:none;
      min-width:18px;
      height:18px;
      padding:0 4px;
      border-radius:999px;
      background:#ff3040;
      color:#fff;
      font-size:11px;
      line-height:18px;
      text-align:center;
      font-weight:800;
      box-shadow:0 0 0 2px rgba(255,48,64,.26);
      animation:dataNoticeBlink .9s ease-in-out infinite;
    }
    .dataNotice.show{ display:inline-block; }
    @keyframes dataNoticeBlink{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(1.18); opacity:.56; }
    }
    .dockBtns{ display:flex; gap:6px; }
    .iconBtn{ border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#e8f1ff; border-radius:7px; padding:4px 8px; font-size:12px; cursor:pointer; }
    .dockBody{ padding:10px; max-height:360px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .dockBody.collapsed{ display:none; }

    .row{ margin-bottom:8px; font-size:12px; }
    .lab-hint{ color:#dce9ff; line-height:1.55; }
    .status-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
    .pill{ border:1px solid rgba(255,255,255,.2); border-radius:999px; padding:4px 8px; font-size:11px; color:#e8f1ff; background:rgba(0,0,0,.28); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .field{ border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.2); margin-bottom:8px; }
    .field .name{ display:flex; justify-content:space-between; font-size:12px; color:#dce9ff; margin-bottom:6px; gap:8px; }
    .field input[type="range"], .field select{ width:100%; }
    .field select{ border:1px solid rgba(255,255,255,.25); border-radius:8px; background:rgba(0,0,0,.4); color:#fff; padding:6px 8px; }

    .btnRow{ display:flex; gap:8px; flex-wrap:wrap; }
    button.main, button.sub{
      border:none;
      border-radius:8px;
      padding:8px 12px;
      color:#fff;
      cursor:pointer;
      transition:background .2s, transform .05s, opacity .2s;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      font-size:13px;
    }
    button.main{ background:#2e7d32; }
    button.sub{ background:#444; }
    button.main:hover, button.sub:hover{ background:#5a5a5a; }
    button.main:active, button.sub:active{ transform:scale(.98); }
    button.main:disabled, button.sub:disabled{ opacity:.5; cursor:not-allowed; }

    .analysis{ font-size:12px; line-height:1.6; color:#e3efff; border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.24); }
    .analysis.ok{ border-color:rgba(61,220,151,.4); }
    table.record{ width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
    table.record th, table.record td{ border:1px solid rgba(255,255,255,.12); padding:4px 5px; text-align:center; }
    table.record th{ background:rgba(255,255,255,.08); color:#dce9ff; font-weight:700; }
    .chartWrap{ margin-top:8px; border:1px solid rgba(255,255,255,.12); border-radius:10px; background:rgba(0,0,0,.25); overflow:hidden; }
    #chart{ width:100%; height:170px; display:block; }

    .checkmark{
      position:absolute;
      z-index:60;
      left:50%;
      top:18%;
      transform:translate(-50%,-50%) scale(.6);
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(61,220,151,.15);
      border:3px solid var(--accent);
      display:none;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25);
      animation:pop .55s ease-out;
      pointer-events:none;
    }
    .checkmark.active{ display:flex; }
    .checkmark > div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }
    @keyframes pop{ 0%{transform:translate(-50%,-50%) scale(.4);opacity:.2;} 60%{transform:translate(-50%,-50%) scale(1.08);opacity:1;} 100%{transform:translate(-50%,-50%) scale(1);} }

    .demoCursor{
      position:absolute;
      z-index:140;
      width:26px;
      height:26px;
      left:-200px;
      top:-200px;
      opacity:0;
      pointer-events:none;
      transition:left .48s cubic-bezier(.22,.61,.36,1), top .48s cubic-bezier(.22,.61,.36,1), opacity .2s ease, transform .12s ease;
      filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));
    }
    .demoCursor.show{ opacity:1; }
    .demoCursor.clicking{ transform:scale(.9); }
    .demoCursor.dragging{ filter:drop-shadow(0 2px 4px rgba(61,220,151,.7)); }
    .demoCursor svg{ display:block; width:100%; height:100%; }
    .demoCursorPulse{
      position:absolute;
      z-index:139;
      width:24px;
      height:24px;
      border-radius:50%;
      border:2px solid rgba(255,195,74,.95);
      left:-200px;
      top:-200px;
      opacity:0;
      pointer-events:none;
      transform:translate(-50%,-50%) scale(.35);
    }
    .demoCursorPulse.active{ animation:cursorPulse .45s ease-out; }
    @keyframes cursorPulse{
      0%{ opacity:.82; transform:translate(-50%,-50%) scale(.35); }
      100%{ opacity:0; transform:translate(-50%,-50%) scale(1.7); }
    }

    .toolbar{ width:100%; max-width:980px; margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-start; }
    .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.82); color:#fff; padding:10px 14px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    .modal-mask{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:300; background:rgba(0,0,0,.5); }
    .modal{ width:min(90vw, 380px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
    .modal h3{ margin:8px 0 6px; font-size:20px; }
    .modal p{ margin-top:0; line-height:1.55; color:#cfd8dc; }
    .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; }

    .explanation{ width:100%; max-width:980px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:#e9f2ff; }
    .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em; }

    @media (max-width:760px){
      .task-card{ grid-template-columns:1fr; }
      .task-step{ width:fit-content; }
      #stage{ height:76vh; max-height:920px; }
      .dock{ width:min(96%, 380px); }
      .hud{ left:8px; right:8px; }
    }
  

/* exp35-ui-normalize: shared shell compatibility */
.hint-lamp{
  position:absolute;
  left:10px;
  top:56px;
  z-index:42;
  width:34px;
  height:34px;
  border-radius:8px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.08);

      demoCursorPulseEl.style.left = `${x}px`;

      const idx = clamp(i,0,LAB.tasks.length-1);
      state.currentTask = idx;
      const t = LAB.tasks[idx];
      taskStepEl.textContent = `步骤 ${idx+1} / ${LAB.tasks.length}`;
      taskTextEl.innerHTML = t.text;
      taskHintEl.textContent = t.hint;
      [...dotsEl.children].forEach((d,n)=>{
        d.classList.toggle('active', n===idx && !state.completed);
        d.classList.toggle('done', n<idx || state.completed);
        d.classList.toggle('warn', n===idx && !state.completed && state.stepWarnIdx===idx);
      });
      state.stepWarnIdx = -1;
    }

    function setFreeMode(on){
      state.freeMode = !!on;
      updateModeHud();
      updateAutoDemoBtn();
      updateLab14Note();
      if(state.freeMode){
        taskCard.style.opacity = '.74';
        taskCard.style.filter = 'saturate(.8)';
        setStatus('自由探索');
      }else{
        taskCard.style.opacity = '1';
        taskCard.style.filter = 'none';
        setStatus(state.completed ? '挑战完成' : '待开始');
      }
    }

    function setStatus(msg){
      statusTag.textContent = `状态：${msg}`;
    }

    function initControls(){
      state.vars = {};
      controlFields.innerHTML = '';
      for(const def of LAB.controls){
        state.vars[def.key] = def.def;
        const wrap = document.createElement('div');
        wrap.className = 'field';
        wrap.innerHTML = `<div class="name"><span>${def.label}</span><span id="pill_${def.key}"></span></div>`;
        if(def.type === 'range'){
          const input = document.createElement('input');
          input.type = 'range';
          input.min = String(def.min);
          input.max = String(def.max);
          input.step = String(def.step);
          input.value = String(def.def);
          input.addEventListener('input', ()=>{
            state.vars[def.key] = Number(input.value);
            refreshControlPill(def);
          });
          wrap.appendChild(input);
        }else if(def.type === 'select'){
          const sel = document.createElement('select');
          for(const [val,text] of def.options){
            const op = document.createElement('option');
            op.value = val;
            op.textContent = text;
            if(val === def.def) op.selected = true;
            sel.appendChild(op);
          }
          sel.addEventListener('change', ()=>{
            state.vars[def.key] = sel.value;
            refreshControlPill(def);
            if(LAB_ID === 16 && def.key === 'object'){
              state.apparatus.object = sel.value;
              state.apparatus.startCm = randIn(1.6, 3.8);
              state.apparatus.aligned = false;
              state.apparatus.lastRead = null;
              showToast('已切换物体，请先对齐零刻度');
            }
          });
          wrap.appendChild(sel);
        }
        controlFields.appendChild(wrap);
        refreshControlPill(def);
      }
    }

    function randIn(a,b){ return a + Math.random()*(b-a); }

    function refreshControlPill(def){
      const pill = $(`#pill_${def.key}`);
      if(!pill) return;
      const v = state.vars[def.key];
      if(def.type === 'range') pill.textContent = `${v}${def.unit || ''}`;
      else {
        const hit = def.options.find(x=>x[0]===v);
        pill.textContent = hit ? hit[1] : String(v);
      }
    }

    function setVar(key, value){
      state.vars[key] = value;
      const field = controlFields.querySelector(`#pill_${key}`)?.closest('.field');
      if(!field) return;
      const inp = field.querySelector('input[type="range"]');
      const sel = field.querySelector('select');
      if(inp) inp.value = String(value);
      if(sel) sel.value = String(value);
      const def = LAB.controls.find(d=>d.key===key);
      if(def) refreshControlPill(def);
    }

    function initActionButtons(){
      actionBtns.innerHTML = '';
      actionBtns.style.display = LAB.actions.length ? 'flex' : 'none';
      for(const a of LAB.actions){
        const b = document.createElement('button');
        b.className = a.id.includes('run') || a.id.includes('apply') || a.id.includes('measure') || a.id.includes('stopWatch') ? 'main' : 'sub';
        b.textContent = a.label;
        b.addEventListener('click', ()=>{ if(!state.autoPlaying) performAction(a.id, true); });
        actionBtns.appendChild(b);
      }
    }

    function resetLab14AnalysisView(){
      if(LAB_ID !== 14) return;
      state.analysisOk = false;
      analysisText.classList.remove('ok');
      if(state.records.length === 0){
        analysisText.textContent = '暂无。请先拖动两支量筒完成倾倒、摇匀并记录数据后分析。';
      }
    }

    function updateLab14Note(){
      if(LAB_ID !== 14 || !lab14Note) return;
      if(state.freeMode){
        lab14Note.innerHTML = '<strong>自由模式：</strong>可只倒入部分清水和酒精后直接摇匀、读数并记录；引导模式仍要求完成标准 50mL + 50mL 实验链。';
      }else{
        lab14Note.innerHTML = '<strong>舞台操作：</strong>拖动量筒A/量筒B到混合量筒口上方并倾倒；两种液体都加入后，轻点混合量筒进行摇匀并读数。';
      }
    }

    function canOperateLab14Source(id, showFail=true){
      const ap = state.apparatus;
      if(id === 'water'){
        if(ap.waterMl <= 0) return false;
        if(!state.freeMode && state.currentTask !== 0){
          if(showFail) warnCurrentStep('步骤1需要先把量筒A中的清水倒入混合量筒。');
          return false;
        }
        return true;
      }
      if(ap.alcoholMl <= 0) return false;
      if(!state.freeMode){
        if(!ap.pouredWater){
          if(showFail) warnCurrentStep('请先完成步骤1，把清水全部倒入混合量筒。');
          return false;
        }
        if(state.currentTask !== 1){
          if(showFail) warnCurrentStep('步骤2需要把量筒B中的酒精倒入同一混合量筒。');
          return false;
        }
      }
      return true;
    }

    function isLab14PourZone(id, vessel){
      const ap = state.apparatus;
      const mix = ap.vessels.mix;
      const centerX = vessel.x + vessel.w / 2;
      const topY = vessel.y + 28;
      const mouthX = mix.homeX + mix.w / 2;
      const mouthY = mix.homeY + 22;
      const withinX = Math.abs(centerX - mouthX) <= mix.w * 0.58;
      const withinY = topY <= mouthY + 20;
      return withinX && withinY;
    }

    function setLab14DragPose(id, vessel, localX){
      const willPour = isLab14PourZone(id, vessel);
      if(willPour){
        if(!vessel.pouring) resetLab14AnalysisView();
        const mix = state.apparatus.vessels.mix;
        const side = 'right';
        const snap = getLab14PourSnapPose(vessel, mix, side, 78);
        vessel.pourSide = side;
        vessel.x = snap.x;
        vessel.y = snap.y;
        vessel.tilt = snap.tilt;
        vessel.pouring = true;
      }else{
        vessel.pouring = false;
        vessel.pourSide = '';
        vessel.tilt = clamp((localX - vessel.homeX) * 0.08, -16, 16);
      }
    }

    function performAction(actionId, showStep=true){
      const ap = state.apparatus;
      let changed = false;

      switch(LAB_ID){
        case 14:{
          if(actionId === 'shakeRead'){
            const hasBoth = ap.mixWaterMl > 0.1 && ap.mixAlcoholMl > 0.1;
            if(!state.freeMode){
              if(!(ap.pouredWater && ap.pouredAlcohol)){ showToast('需先把清水和酒精都倒入混合量筒'); break; }
            }else if(!hasBoth){
              showToast('自由模式下也至少需要倒入一些清水和酒精，才能混合读数');
              break;
            }
            ap.shaken = true;
            ap.shakeAnim = 1;
            const total = ap.mixWaterMl + ap.mixAlcoholMl;
            const shrink = (3 + (5 - state.vars.shakeLevel) * 0.5) * (total / 100);
            ap.mixRead = round(total - shrink, 1);
            ap.mixMl = ap.mixRead;
            changed = true;
            setStatus(`已摇匀并读数：${ap.mixRead}mL`);
          }
          break;
        }
        case 15:{
          if(actionId === 'scrape'){ ap.scraped = true; changed = true; setStatus('接触面已处理'); }
          if(actionId === 'press'){
            if(!ap.scraped){ showToast('建议先刮净接触面再压紧'); }
            ap.pressed = true;
            ap.adhered = ap.scraped;
            ap.separated = !ap.scraped;
            changed = true;
            setStatus(ap.adhered ? '压紧后已吸附' : '压紧但吸附弱');
          }
          if(actionId === 'pullTest'){
            ap.pullN = Number(state.vars.pullN);
            const threshold = ap.scraped && ap.pressed ? 5.8 : 2.2;
            ap.tested = true;
            if(ap.pullN >= threshold){ ap.separated = true; ap.adhered = false; }
            else { ap.separated = false; ap.adhered = true; }
            changed = true;
            setStatus(ap.separated ? '样件已分离' : '仍保持吸附');
          }
          break;
        }
        case 16:{
          const len = OBJECT_LENGTHS[state.vars.object];
          if(actionId === 'alignZero'){
            ap.object = state.vars.object;
            ap.startCm = 0;
            ap.aligned = true;
            ap.alignedCount += 1;
            changed = true;
            setStatus('已对齐零刻度');
          }
          if(actionId === 'measureLength'){
            if(!ap.aligned){ showToast('请先对齐零刻度'); break; }
            ap.lastRead = round(len + randIn(-0.08, 0.08), 2);
            ap.measureCount += 1;
            changed = true;
            setStatus(`读数完成：${ap.lastRead}cm`);
          }
          if(actionId === 'nextObject'){
            const order = ['pencil','eraser','key'];
            const idx = order.indexOf(state.vars.object);
            const next = order[(idx + 1) % order.length];
            setVar('object', next);
            ap.object = next;
            ap.startCm = round(randIn(1.4, 3.9), 2);
            ap.aligned = false;
            ap.lastRead = null;
            changed = true;
            setStatus(`已更换物体：${nameOfObject(next)}`);
          }
          break;
        }
        case 17:{
          if(actionId === 'startPendulum'){
            ap.pendulumOn = true;
            changed = true;
            setStatus('摆球已启动');
          }
          if(actionId === 'startWatch'){
            if(!ap.pendulumOn){ showToast('请先启动摆球'); break; }
            ap.stopwatchRunning = true;
            ap.stopwatchStart = performance.now();
            changed = true;
            setStatus('秒表计时中');
          }
          if(actionId === 'stopWatch'){
            if(!ap.stopwatchRunning){ showToast('秒表尚未开始'); break; }
            const p = state.vars.tempo === 'slow' ? 1.35 : state.vars.tempo === 'fast' ? 0.75 : 1.0;
            const ideal = state.vars.cycles * p;
            ap.elapsed = round(ideal + randIn(-0.15, 0.15), 2);
            ap.stopwatchRunning = false;
            ap.measured = true;
            ap.cyclesDone = state.vars.cycles;
            changed = true;
            setStatus(`计时完成：${ap.elapsed}s`);
          }
          break;
        }
        case 18:{
          if(actionId === 'runCart'){
            if(ap.running){ showToast('小车正在运动'); break; }
            const s = Number(state.vars.distance);
            const force = Number(state.vars.push);
            const a = 0.7 + force * 0.55;
            const t = round(Math.sqrt((2*s)/a) + randIn(-0.08, 0.08), 2);
            const v = round(s / t, 2);
            ap.running = true;
            ap.progress = 0;
            ap.lastTime = t;
            ap.lastSpeed = v;
            ap.runCount += 1;
            ap.needsReset = true;
            trackTimeout(()=>{ ap.running = false; ap.progress = 1; }, 1200);
            changed = true;
            setStatus(`完成发车：t=${t}s, v=${v}m/s`);
          }
          if(actionId === 'resetCart'){
            ap.running = false;
            ap.progress = 0;
            ap.needsReset = false;
            changed = true;
            setStatus('小车已归位');
          }
          break;
        }
        case 19:{
          if(actionId === 'applyForce'){
            const f = Number(state.vars.force);
            const sample = state.vars.sample;
            let d = sample === 'spring' ? f * 3.4 : f * 5.2;
            if(sample === 'sponge') d = Math.min(d, 42);
            ap.lastDeform = round(d, 1);
            ap.applied = true;
            ap.recoverPct = sample === 'spring' ? 98 : 86;
            ap.applyCount += 1;
            changed = true;
            setStatus(`已施力：形变量${ap.lastDeform}mm`);
          }
          if(actionId === 'releaseForce'){
            ap.applied = false;
            ap.lastDeform = 0;
            changed = true;
            setStatus('已撤去力');
          }
          break;
        }
        case 20:{
          if(actionId === 'applyMotionForce'){
            const dir = state.vars.dir === 'forward' ? 1 : -1;
            const mag = Number(state.vars.mag);
            const dt = Number(state.vars.duration);
            ap.beforeV = round(ap.velocity, 2);
            const dv = dir * mag * dt * 0.45;
            ap.velocity = round(clamp(ap.velocity + dv, -6, 6), 2);
            ap.afterV = ap.velocity;
            ap.changed = true;
            const nx = clamp(ap.cartX + ap.velocity * 0.012, 0.08, 0.92);
            ap.targetX = nx;
            ap.animating = true;
            trackTimeout(()=>{ ap.cartX = ap.targetX; ap.animating = false; }, 800);
            changed = true;
            setStatus(`速度变化：${ap.beforeV}→${ap.afterV}m/s`);
          }
          if(actionId === 'stopCart'){
            ap.beforeV = ap.velocity;
            ap.velocity = 0;
            ap.afterV = 0;
            ap.changed = true;
            changed = true;
            setStatus('小车已停车');
          }
          break;
        }
      }

      if(changed){
        updatePills();
        scheduleChart();
      }
      return changed;
    }

    function nameOfObject(k){
      if(k==='pencil') return '铅笔';
      if(k==='eraser') return '橡皮';
      return '钥匙';
    }

    function buildRecord(){
      const ap = state.apparatus;
      switch(LAB_ID){
        case 14:{
          if(ap.mixRead === null){ showToast('请先摇匀并读数'); return null; }
          const theoretical = round(ap.mixWaterMl + ap.mixAlcoholMl, 1);
          return {
            c1:`水${ap.mixWaterMl.toFixed(1)}+酒精${ap.mixAlcoholMl.toFixed(1)}`,
            c2:theoretical.toFixed(1),
            c3:String(ap.mixRead),
            c4:ap.mixRead < theoretical ? '体积缩小' : '无明显变化',
            y:ap.mixRead
          };
        }
        case 15:{
          if(!ap.tested){ showToast('请先进行拉伸测力'); return null; }
          return { c1:`拉力${ap.pullN}N`, c2:String(ap.pullN), c3:ap.separated ? '已分离' : '未分离', c4:ap.scraped&&ap.pressed ? '处理后测试' : '未充分处理', y:ap.pullN };
        }
        case 16:{
          if(ap.lastRead === null){ showToast('请先读取长度'); return null; }
          const ref = OBJECT_LENGTHS[state.vars.object];
          return { c1:nameOfObject(state.vars.object), c2:String(ap.lastRead), c3:String(ref), c4:`误差${round(ap.lastRead-ref,2)}cm`, y:ap.lastRead };
        }
        case 17:{
          if(!ap.measured){ showToast('请先完成一次计时'); return null; }
          const single = round(ap.elapsed / ap.cyclesDone, 3);
          return { c1:`${ap.cyclesDone}次`, c2:String(ap.elapsed), c3:String(single), c4:`节奏:${state.vars.tempo}`, y:single };
        }
        case 18:{
          if(ap.lastTime===null || ap.lastSpeed===null){ showToast('请先发车并计时'); return null; }
          return { c1:`s=${state.vars.distance}m, 推力${state.vars.push}`, c2:String(ap.lastTime), c3:String(ap.lastSpeed), c4:'v=s/t', y:ap.lastSpeed };
        }
        case 19:{
          if(!ap.applied){ showToast('请先施加力'); return null; }
          return { c1:`${state.vars.sample==='spring'?'弹簧':'海绵'} ${state.vars.force}N`, c2:String(ap.lastDeform), c3:`恢复${ap.recoverPct}%`, c4:ap.lastDeform>20 ? '形变明显' : '形变较小', y:ap.lastDeform };
        }
        case 20:{
          if(!ap.changed){ showToast('请先施加力或停车'); return null; }
          return { c1:`${state.vars.dir==='forward'?'向右':'向左'} ${state.vars.mag}N`, c2:String(ap.beforeV), c3:String(ap.afterV), c4:ap.afterV>ap.beforeV ? '加速/起动' : (ap.afterV<ap.beforeV ? '减速/反向' : '保持/停止'), y:Math.abs(ap.afterV) };
        }
      }
      return null;
    }

    function addRecord(){
      const rec = buildRecord();
      if(!rec) return;
      if(!state.freeMode){
        if(LAB_ID === 14 && state.currentTask !== 2){
          warnCurrentStep('当前步骤还不需要记录数据，请先按步骤完成操作后再记录。');
          return false;
        }
        if(LAB_ID === 14 && !(state.apparatus.shaken && state.apparatus.mixRead !== null && state.apparatus.mixRead < 100)){
          warnCurrentStep('步骤3要求：先摇匀并读取到小于100mL的混合体积，再记录当前数据。');
          return false;
        }
      }
      pushRecord(rec);
      setStatus(state.freeMode ? '自由探索' : '已记录，等待确认');
      showToast('已记录当前数据');
      return true;
    }

    function renderRecords(){
      recordBody.innerHTML = '';
      if(!state.records.length){
        recordBody.innerHTML = '<tr><td colspan="4" style="color:#9db4d6;">暂无记录</td></tr>';
        return;
      }
      for(const r of [...state.records].slice(-12).reverse()){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.c1}</td><td>${r.c2}</td><td>${r.c3}</td><td>${r.c4}</td>`;
        recordBody.appendChild(tr);
      }
    }

    function analyzeConclusion(showToastMsg=true){
      const rs = state.records;
      let ok = false;
      let msg = '';
      switch(LAB_ID){
        case 14:{
          const hit = rs.find(r=>Number(r.c3) < 100);
          ok = !!hit;
          msg = ok ? '结论：水和酒精混合后总体积小于100mL，说明分子之间存在间隙。' : '请至少获得一条“混合体积小于100mL”的记录。';
          break;
        }
        case 15:{
          const stuck = rs.find(r=>r.c3==='未分离' && Number(r.c2)>=2.5);
          ok = !!stuck;
          msg = ok ? '结论：接触面处理并压紧后，金属块需一定拉力才分开，说明分子间存在引力。' : '请完成一次“有明显拉力但仍未分离”的记录。';
          break;
        }
        case 16:{
          const objs = new Set(rs.map(r=>r.c1));
          const good = rs.filter(r=>Math.abs(Number(r.c2)-Number(r.c3)) <= 0.2).length;
          ok = objs.size >= 2 && good >= 2;
          msg = ok ? '结论：长度测量应先零刻度对齐，再读取另一端刻度；重复测量可提高准确性。' : '请至少测量2种物体，且读数与参考值偏差较小。';
          break;
        }
        case 17:{
          const set = new Set(rs.map(r=>r.c1));
          ok = rs.length>=2 && set.size>=2;
          msg = ok ? '结论：秒表可测总时长，通过“总时长/计次数”可求单次时间。' : '请至少记录两组不同计次数的时间数据。';
          break;
        }
        case 18:{
          if(rs.length>=2){
            const ys = rs.map(r=>Number(r.c3));
            ok = Math.max(...ys) > Math.min(...ys);
          }
          msg = ok ? '结论：通过测程和用时可算速度 v=s/t；不同条件下速度会变化。' : '请记录至少2组速度数据并形成差异。';
          break;
        }
        case 19:{
          const spring = rs.filter(r=>r.c1.includes('弹簧')).map(r=>Number(r.c2));
          const sponge = rs.filter(r=>r.c1.includes('海绵')).map(r=>Number(r.c2));
          ok = (spring.length>=2 && Math.max(...spring)>Math.min(...spring)) || (sponge.length>=2 && Math.max(...sponge)>Math.min(...sponge));
          msg = ok ? '结论：力可使物体发生形变，且一般力越大形变越明显。' : '请补充同一样件在不同力下的对比记录。';
          break;
        }
        case 20:{
          const a = rs.find(r=>Number(r.c2)===0 && Number(r.c3)>0);
          const b = rs.find(r=>Number(r.c3) < Number(r.c2));
          ok = !!(a && b);
          msg = ok ? '结论：力可使静止物体运动，也可使运动物体减速、停止或改变方向。' : '请至少包含“由静止到运动”和“速度减小/反向”两类记录。';
          break;
        }
      }
      state.analysisOk = ok;
      analysisText.textContent = msg;
      analysisText.classList.toggle('ok', ok);
      if(ok) setStatus('分析完成，等待确认');
      else if(showToastMsg) setStatus('分析未通过');
      if(showToastMsg) showToast(ok ? '分析完成：结论成立' : '分析未通过，请补充实验记录');
      return ok;
    }

    function checkStepPass(step){
      const ap = state.apparatus;
      const rs = state.records;
      switch(LAB_ID){
        case 14:
          if(step===0) return ap.pouredWater;
          if(step===1) return ap.pouredAlcohol;
          if(step===2) return ap.shaken && ap.mixRead !== null && ap.mixRead < 100 && rs.length >= 1;
          if(step===3) return state.analysisOk;
          return false;
        case 15:
          if(step===0) return ap.scraped;
          if(step===1) return ap.pressed;
          if(step===2) return rs.some(r=>r.c3==='未分离');
          if(step===3) return state.analysisOk;
          return false;
        case 16:
          if(step===0) return ap.alignedCount >= 1;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 17:
          if(step===0) return ap.pendulumOn;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 18:
          if(step===0) return ap.runCount >= 1;
          if(step===1) return ap.runCount >= 2;
          if(step===2) return rs.length >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 19:
          if(step===0) return rs.length>=1;
          if(step===1) return rs.length>=2;
          if(step===2) return rs.some(r=>r.c1.includes('海绵')) || rs.some(r=>r.c1.includes('弹簧'));
          if(step===3) return state.analysisOk;
          return false;
        case 20:
          if(step===0) return rs.some(r=>Number(r.c2)===0 && Number(r.c3)>0);
          if(step===1) return rs.some(r=>Number(r.c3) < Number(r.c2));
          if(step===2) return rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
      }
      return false;
    }

    function tryPassStep(showFailToast=true, fromAuto=false){
      if(state.freeMode || state.completed || state.successCooldown) return false;
      if(state.autoPlaying && !fromAuto) return false;
      const ok = checkStepPass(state.currentTask);
      if(!ok){
        if(showFailToast){
          if(LAB_ID===14){
            if(state.currentTask===0) warnCurrentStep('请先完成“倒入水”，再点击“确认观察”。');
            else if(state.currentTask===1) warnCurrentStep('请先完成“倒入酒精”，再点击“确认观察”。');
            else if(state.currentTask===2) warnCurrentStep('请先摇匀并记录小于100mL的读数，再点击“确认观察”。');
            else warnCurrentStep('请先分析出“分子之间存在间隙”的结论，再点击“确认观察”。');
          }else{
            warnCurrentStep('当前步骤条件还未满足，请先完成操作后再点击“确认观察”。');
          }
        }
        return false;
      }
      state.successCooldown = true;
      state.stepWarnIdx = -1;
      showCheck();
      trackTimeout(()=>{
        if(state.currentTask < LAB.tasks.length - 1) setStepUI(state.currentTask + 1);
        else finishLab();
        state.successCooldown = false;
      }, 420);
      return true;
    }

    function recalcProgress(){
      if(state.completed || state.freeMode) return;
      let idx = 0;
      while(idx < LAB.tasks.length && checkStepPass(idx)) idx += 1;
      if(idx >= LAB.tasks.length) finishLab();
      else if(idx !== state.currentTask) setStepUI(idx);
    }

    function finishLab(){
      if(state.completed) return;
      state.completed = true;
      state.stepWarnIdx = -1;
      state.currentTask = LAB.tasks.length - 1;
      setStepUI(state.currentTask);
      setStatus('挑战完成');
      doneMaskEl.style.display = 'flex';
    }

    function drawScene(){
      const rect = scene.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width * dpr));
      const h = Math.max(1, Math.floor(rect.height * dpr));
      if(scene.width !== w || scene.height !== h){ scene.width = w; scene.height = h; }
      const ctx = scene.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width;
      const H = rect.height;

      ctx.fillStyle = '#2f343a';
      ctx.fillRect(0, H-70, W, 70);
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      ctx.fillRect(0, H-70, W, 2);

      switch(LAB_ID){
        case 14: draw14(ctx,W,H); break;
        case 15: draw15(ctx,W,H); break;
        case 16: draw16(ctx,W,H); break;
        case 17: draw17(ctx,W,H); break;
        case 18: draw18(ctx,W,H); break;
        case 19: draw19(ctx,W,H); break;
        case 20: draw20(ctx,W,H); break;
      }
    }

    function drawBeaker(ctx, x, y, w, h, fillRatio, color, label){
      ctx.save();
      ctx.strokeStyle = 'rgba(210,230,255,.72)';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);
      const fh = h * clamp(fillRatio,0,1);
      ctx.fillStyle = color;
      ctx.fillRect(x+3, y+h-fh-3, w-6, fh);
      ctx.fillStyle = '#d8e7ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(label, x+4, y-8);
      ctx.strokeStyle = 'rgba(255,255,255,.4)';
      for(let i=1;i<=5;i++){
        const ty = y + h - i*h/5;
        ctx.beginPath(); ctx.moveTo(x+2,ty); ctx.lineTo(x+16,ty); ctx.stroke();
      }
      ctx.restore();
    }

    function getLab14Layout(W, H){
      const narrow = W <= 760;
      const scale = narrow ? Math.max(0.82, Math.min(0.96, W / 520)) : 1;
      const sourceW = round(86 * scale, 1);
      const sourceH = round(236 * scale, 1);
      const mixW = round(108 * scale, 1);
      const mixH = round(270 * scale, 1);
      const floorY = H - 70;
      return {
        water:{ homeX:W * (narrow ? 0.08 : 0.10), homeY:floorY - sourceH - 18, w:sourceW, h:sourceH },
        alcohol:{ homeX:W * (narrow ? 0.28 : 0.30), homeY:floorY - sourceH - 18, w:sourceW, h:sourceH },
        mix:{ homeX:W * (narrow ? 0.63 : 0.62), homeY:floorY - mixH - 26, w:mixW, h:mixH },
        floorY
      };
    }

    function setLab14VesselBox(el, box, x, y, tilt=0){
      if(!el) return;
      el.style.width = `${box.w}px`;
      el.style.height = `${box.h}px`;
      el.style.setProperty('--vx', `${round(x, 1)}px`);
      el.style.setProperty('--vy', `${round(y, 1)}px`);
      el.style.setProperty('--tilt', `${round(tilt, 1)}deg`);
    }

    function getLab14VesselPoint(vessel, sx, sy){
      const angle = (vessel.tilt || 0) * Math.PI / 180;
      const ox = vessel.w * 0.52;
      const oy = vessel.h * 0.86;
      const px = vessel.w * sx;
      const py = vessel.h * sy;
      const dx = px - ox;
      const dy = py - oy;
      const rx = dx * Math.cos(angle) - dy * Math.sin(angle);
      const ry = dx * Math.sin(angle) + dy * Math.cos(angle);
      return { x:vessel.x + ox + rx, y:vessel.y + oy + ry };
    }

    function getLab14VesselLip(vessel, side='right'){
      return getLab14VesselPoint(vessel, side === 'right' ? 0.88 : 0.12, 0.10);
    }

    function getLab14MixMouthTarget(mix, side='right'){
      return {
        x: mix.x + mix.w * (side === 'right' ? 0.40 : 0.60),
        y: mix.y + 8
      };
    }

    function getLab14PourSnapPose(vessel, mix, side='right', tilt=78){
      const angle = tilt * Math.PI / 180;
      const ox = vessel.w * 0.52;
      const oy = vessel.h * 0.86;
      const px = vessel.w * (side === 'right' ? 0.88 : 0.12);
      const py = vessel.h * 0.10;
      const dx = px - ox;
      const dy = py - oy;
      const rx = dx * Math.cos(angle) - dy * Math.sin(angle);
      const ry = dx * Math.sin(angle) + dy * Math.cos(angle);
      const target = getLab14MixMouthTarget(mix, side);
      return {
        x: round(target.x - (ox + rx), 1),
        y: round(target.y - (oy + ry), 1),
        tilt
      };
    }

    function updateLab14Stream(ap){
      const sourceKey = ap.vessels.water.pouring ? 'water' : (ap.vessels.alcohol.pouring ? 'alcohol' : '');
      if(!sourceKey){
        lab14PourStream.classList.remove('show', 'alcohol');
        return;
      }
      const source = ap.vessels[sourceKey];
      const mix = ap.vessels.mix;
      const side = source.pourSide || 'right';
      const lip = getLab14VesselLip(source, side);
      const target = getLab14MixMouthTarget(mix, side);
      const targetX = target.x;
      const targetY = target.y;
      const lipX = lip.x;
      const lipY = lip.y;
      const dx = targetX - lipX;
      const dy = targetY - lipY;
      const len = Math.max(22, Math.hypot(dx, dy));
      const angle = Math.atan2(dy, dx) * 180 / Math.PI + 90;
      lab14PourStream.classList.toggle('alcohol', sourceKey === 'alcohol');
      lab14PourStream.classList.add('show');
      lab14PourStream.style.left = `${round(lipX - 5, 1)}px`;
      lab14PourStream.style.top = `${round(lipY, 1)}px`;
      lab14PourStream.style.height = `${round(len, 1)}px`;
      lab14PourStream.style.transform = `rotate(${round(angle, 1)}deg)`;
    }

    function renderLab14Stage(W, H){
      if(!lab14Layer) return;
      if(LAB_ID !== 14){
        lab14Layer.classList.add('hidden');
        return;
      }
      lab14Layer.classList.remove('hidden');
      const ap = state.apparatus;
      const layout = getLab14Layout(W, H);
      const water = ap.vessels.water;
      const alcohol = ap.vessels.alcohol;
      const mix = ap.vessels.mix;

      water.homeX = layout.water.homeX; water.homeY = layout.water.homeY; water.w = layout.water.w; water.h = layout.water.h;
      alcohol.homeX = layout.alcohol.homeX; alcohol.homeY = layout.alcohol.homeY; alcohol.w = layout.alcohol.w; alcohol.h = layout.alcohol.h;
      mix.homeX = layout.mix.homeX; mix.homeY = layout.mix.homeY; mix.w = layout.mix.w; mix.h = layout.mix.h;

      if(!Number.isFinite(water.x) || water.x === 0 && water.y === 0){ water.x = water.homeX; water.y = water.homeY; }
      if(!Number.isFinite(alcohol.x) || alcohol.x === 0 && alcohol.y === 0){ alcohol.x = alcohol.homeX; alcohol.y = alcohol.homeY; }
      if(!Number.isFinite(mix.x) || mix.x === 0 && mix.y === 0){ mix.x = mix.homeX; mix.y = mix.homeY; }

      setLab14VesselBox(lab14WaterEl, water, water.x, water.y, water.tilt || 0);
      setLab14VesselBox(lab14AlcoholEl, alcohol, alcohol.x, alcohol.y, alcohol.tilt || 0);
      setLab14VesselBox(lab14MixEl, mix, mix.homeX, mix.homeY, 0);

      lab14WaterEl.classList.toggle('dragging', !!water.dragging);
      lab14AlcoholEl.classList.toggle('dragging', !!alcohol.dragging);
      lab14MixEl.classList.toggle('shaking', !!ap.shakeAnim);

      const sourceInnerWater = Math.max(0, water.h - 16);
      const sourceInnerAlcohol = Math.max(0, alcohol.h - 16);
      lab14WaterFill.style.height = `${round(sourceInnerWater * clamp(ap.waterMl / 50, 0, 1), 1)}px`;
      lab14AlcoholFill.style.height = `${round(sourceInnerAlcohol * clamp(ap.alcoholMl / 50, 0, 1), 1)}px`;
      lab14WaterReadout.textContent = `${ap.waterMl.toFixed(1)} mL`;
      lab14AlcoholReadout.textContent = `${ap.alcoholMl.toFixed(1)} mL`;

      const mixInner = Math.max(0, mix.h - 18);
      const waterHeight = round(mixInner * clamp(ap.mixWaterMl / 110, 0, 1), 1);
      const alcoholHeight = round(mixInner * clamp(ap.mixAlcoholMl / 110, 0, 1), 1);
      const mixedHeight = round(mixInner * clamp(ap.mixMl / 110, 0, 1), 1);
      if(ap.shaken){
        lab14MixWater.style.height = '0px';
        lab14MixAlcohol.style.height = '0px';
        lab14MixMixed.style.height = `${mixedHeight}px`;
        lab14MixWater.classList.remove('show');
        lab14MixAlcohol.classList.remove('show');
        lab14MixMixed.classList.toggle('show', mixedHeight > 0);
        lab14MixParticles.style.opacity = mixedHeight > 10 ? '.9' : '0';
      }else{
        lab14MixMixed.style.height = '0px';
        lab14MixMixed.classList.remove('show');
        lab14MixParticles.style.opacity = '0';
        lab14MixWater.style.height = `${waterHeight}px`;
        lab14MixAlcohol.style.height = `${alcoholHeight}px`;
        lab14MixAlcohol.style.bottom = `${round(8 + waterHeight, 1)}px`;
        lab14MixWater.classList.toggle('show', waterHeight > 0);
        lab14MixAlcohol.classList.toggle('show', alcoholHeight > 0);
      }
      lab14MixReadout.textContent = ap.mixRead === null ? `当前液面：${ap.mixMl.toFixed(1)} mL` : `当前读数：${ap.mixRead.toFixed(1)} mL`;
      updateLab14Stream(ap);
    }

    function updateDynamic(dt){
      const ap = state.apparatus;
      if(LAB_ID === 14){
        if(ap.shaken) ap.bubblePhase += dt*0.004;
        const layout = getLab14Layout(labArea.clientWidth || stageEl.clientWidth || 980, labArea.clientHeight || stageEl.clientHeight || 540);
        const settle = Math.min(1, dt * 0.012);
        const tiltSettle = Math.min(1, dt * 0.018);
        ['water','alcohol'].forEach((key)=>{
          const v = ap.vessels[key];
          v.homeX = layout[key].homeX;
          v.homeY = layout[key].homeY;
          v.w = layout[key].w;
          v.h = layout[key].h;
          if(!v.dragging){
            v.x += (v.homeX - v.x) * settle;
            v.y += (v.homeY - v.y) * settle;
            v.tilt += (0 - (v.tilt || 0)) * tiltSettle;
          }
          if(v.pouring){
            const remaining = key === 'water' ? ap.waterMl : ap.alcoholMl;
            if(remaining > 0){
              const delta = Math.min(remaining, dt * 0.055);
              if(key === 'water'){
                ap.waterMl = round(Math.max(0, ap.waterMl - delta), 1);
                ap.mixWaterMl = round(ap.mixWaterMl + delta, 1);
                ap.pouredWater = ap.waterMl <= 0.05;
                if(ap.pouredWater) ap.waterMl = 0;
              }else{
                ap.alcoholMl = round(Math.max(0, ap.alcoholMl - delta), 1);
                ap.mixAlcoholMl = round(ap.mixAlcoholMl + delta, 1);
                ap.pouredAlcohol = ap.alcoholMl <= 0.05;
                if(ap.pouredAlcohol) ap.alcoholMl = 0;
              }
              ap.mixMl = round(ap.mixWaterMl + ap.mixAlcoholMl, 1);
              ap.shaken = false;
              ap.mixRead = null;
              state.analysisOk = false;
            }else{
              v.pouring = false;
            }
          }
        });
        ap.vessels.mix.homeX = layout.mix.homeX;
        ap.vessels.mix.homeY = layout.mix.homeY;
        ap.vessels.mix.w = layout.mix.w;
        ap.vessels.mix.h = layout.mix.h;
        ap.vessels.mix.x = layout.mix.homeX;
        ap.vessels.mix.y = layout.mix.homeY;
        if(ap.shakeAnim > 0) ap.shakeAnim = Math.max(0, ap.shakeAnim - dt * 0.00075);
        updatePills();
      }
      if(LAB_ID === 17 && ap.pendulumOn){ ap.angle = Math.sin(performance.now()*0.006) * 0.38; }
      if(LAB_ID === 18 && ap.running){ ap.progress = clamp(ap.progress + dt/1200, 0, 1); }
      if(LAB_ID === 20 && ap.animating){
        const dx = ap.targetX - ap.cartX;
        ap.cartX += dx * Math.min(1, dt*0.01);
      }
    }

    function loop(ts){
      const dt = state.lastTs ? (ts - state.lastTs) : 16;
      state.lastTs = ts;
      updateDynamic(dt);
      drawScene();
      state.rafId = requestAnimationFrame(loop);
    }

    function scheduleChart(){
      if(scheduleChart.t) return;
      scheduleChart.t = trackTimeout(()=>{
        scheduleChart.t = null;
        drawChart();
      }, 60);
    }

    function drawChart(){
      const rect = chart.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width*dpr));
      const h = Math.max(1, Math.floor(rect.height*dpr));
      if(chart.width!==w || chart.height!==h){ chart.width = w; chart.height = h; }
      const ctx = chart.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width, H = rect.height;

      ctx.fillStyle = 'rgba(6,10,16,.9)';
      ctx.fillRect(0,0,W,H);
      const left=38, right=W-10, top=12, bottom=H-24;
      const pw = right-left, ph = bottom-top;

      ctx.strokeStyle = 'rgba(255,255,255,.12)';
      for(let i=0;i<=4;i++){
        const y = top + ph*(i/4);
        ctx.beginPath(); ctx.moveTo(left,y); ctx.lineTo(right,y); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(left,bottom); ctx.lineTo(right,bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(left,top); ctx.lineTo(left,bottom); ctx.stroke();

      const ys = state.records.map(r=>Number(r.y));
      if(!ys.length) return;
      let maxY = Math.max(...ys);
      if(maxY <= 0) maxY = 1;
      maxY *= 1.2;

      const toX = (i)=> left + pw * (i/(Math.max(1, ys.length-1)));
      const toY = (v)=> bottom - (v/maxY)*ph;

      ctx.strokeStyle = 'rgba(61,220,151,.85)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
      ctx.stroke();

      ctx.fillStyle = '#7ed6ff';
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); ctx.beginPath(); ctx.arc(x,y,3.6,0,Math.PI*2); ctx.fill(); });

      ctx.fillStyle = '#dce9ff';
      ctx.font = '11px -apple-system,Segoe UI';
      ctx.fillText('记录序号', right-56, bottom+16);
      ctx.fillText('读数趋势', left+2, top+10);
    }

    function setDockPos(el, x, y){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const nx = clamp(x, 4, stage.width - r.width - 4);
      const ny = clamp(y, 4, stage.height - r.height - 4);
      el.style.left = `${nx}px`;
      el.style.top = `${ny}px`;
      el.style.right = 'auto';
      el.style.bottom = 'auto';
    }

    function isNarrowStage(){
      return stageEl.getBoundingClientRect().width <= 760;
    }

    function shouldStartControlCollapsed(){
      return isNarrowStage() || LAB_ID===17 || LAB_ID===18 || LAB_ID===20;
    }

    function bringToFront(kind){
      state.zTop += 1;
      if(kind==='control') controlDock.style.zIndex = String(state.zTop);
      if(kind==='data') dataDock.style.zIndex = String(state.zTop);
    }

    function snapDockToEdges(el){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const x = r.left - stage.left;
      const y = r.top - stage.top;
      const leftGap = x;
      const rightGap = stage.width - (x + r.width);
      const topGap = y;
      const bottomGap = stage.height - (y + r.height);
      const m = 14;
      let nx = x, ny = y;
      if(leftGap < m) nx = 4;
      else if(rightGap < m) nx = stage.width - r.width - 4;
      if(topGap < m) ny = 4;
      else if(bottomGap < m) ny = stage.height - r.height - 4;
      setDockPos(el, nx, ny);
    }

    function makeDockDraggable(el, head, kind){
      let dragging = false;
      let offX = 0, offY = 0;
      head.addEventListener('pointerdown', (e)=>{
        if(e.target.closest('button')) return;
        dragging = true;
        el.classList.add('dragging');
        bringToFront(kind);
        const r = el.getBoundingClientRect();
        offX = e.clientX - r.left;
        offY = e.clientY - r.top;
        state.dockMoved[kind] = true;
        head.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      head.addEventListener('pointermove', (e)=>{
        if(!dragging) return;
        const stage = stageEl.getBoundingClientRect();
        setDockPos(el, e.clientX - stage.left - offX, e.clientY - stage.top - offY);
        e.preventDefault();
      });
      const end = ()=>{
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        snapDockToEdges(el);
      };
      head.addEventListener('pointerup', end);
      head.addEventListener('pointercancel', end);
    }

    function setControlCollapsed(on){
      state.controlCollapsed = !!on;
      controlBody.classList.toggle('collapsed', state.controlCollapsed);
      controlToggleBtn.textContent = state.controlCollapsed ? '展开' : '收起';
      bringToFront('control');
      if(!state.dockMoved.control && !state.dockMoved.data) initDockPositions(false);
    }

    function setDataCollapsed(on){
      state.dataCollapsed = !!on;
      dataBody.classList.toggle('collapsed', state.dataCollapsed);
      dataToggleBtn.textContent = state.dataCollapsed ? '展开' : '收起';
      bringToFront('data');
      if(!state.dataCollapsed) clearBadge();
      if(!state.dockMoved.control && !state.dockMoved.data) initDockPositions(false);
    }

    function initDockPositions(force=false){
      const stage = stageEl.getBoundingClientRect();
      const cr = controlDock.getBoundingClientRect();
      const dr = dataDock.getBoundingClientRect();
      const pad = 10;
      const gap = 12;
      const dataTop = pad + cr.height + gap;
      if(stage.width <= 760){
        if(force || !state.dockMoved.control) setDockPos(controlDock, stage.width - cr.width - pad, pad);
        if(force || !state.dockMoved.data) setDockPos(dataDock, stage.width - dr.width - pad, Math.min(dataTop, stage.height - dr.height - pad));
      }else{
        if(force || !state.dockMoved.control) setDockPos(controlDock, stage.width - cr.width - pad, pad);
        if(force || !state.dockMoved.data) setDockPos(dataDock, stage.width - dr.width - pad, Math.min(dataTop, stage.height - dr.height - pad));
      }
    }

    function clearData(showTip=true){
      state.records = [];
      state.analysisOk = false;
      analysisText.classList.remove('ok');
      analysisText.textContent = LAB_ID === 14 ? '暂无。请先拖动两支量筒完成倾倒、摇匀并记录数据后分析。' : '暂无。请按步骤操作器材并记录数据后分析。';
      state.unseenRecordCount = 0;
      updateBadge();
      renderRecords();
      scheduleChart();
      if(showTip) showToast('数据已清空');
    }

    function resetFlow(showTip=true){
      clearAllTimers();
      state.completed = false;
      state.successCooldown = false;
      state.stepWarnIdx = -1;
      state.pointerDrag = null;
      doneMaskEl.style.display = 'none';
      setDemoCursorVisible(false);
      if(lab14WaterEl) lab14WaterEl.classList.remove('dragging');
      if(lab14AlcoholEl) lab14AlcoholEl.classList.remove('dragging');

    function requestStopAutoDemo(){
      if(!state.autoPlaying) return;
      state.autoPlaying = false;
      state.autoRunId += 1;
      autoDemoBtn.textContent = '正在退出...';
      autoDemoBtn.disabled = true;
      setDemoCursorVisible(false);
      setStatus('已退出自动演示');
      updateModeHud();

    function bindLab14StageInteractions(){
      if(LAB_ID !== 14 || !lab14WaterEl) return;
      const sourceMap = { water:lab14WaterEl, alcohol:lab14AlcoholEl };
      const startDrag = (id, e)=>{
        if(state.autoPlaying) return;
        if(!canOperateLab14Source(id, true)) return;
        const vessel = state.apparatus.vessels[id];
        const area = labArea.getBoundingClientRect();
        state.pointerDrag = {
          type:'lab14-source',
          id,
          pointerId:e.pointerId,
          offX:e.clientX - area.left - vessel.x,
          offY:e.clientY - area.top - vessel.y
        };
        vessel.dragging = true;
        vessel.pouring = false;
        sourceMap[id].classList.add('dragging');
        if(sourceMap[id].setPointerCapture){
          try{
            sourceMap[id].setPointerCapture(e.pointerId);
          }catch(err){
            console.warn('[lab14 drag] setPointerCapture failed:', err);
          }
        }
        e.preventDefault();
      };
      const moveDrag = (id, e)=>{
        if(!state.pointerDrag || state.pointerDrag.type !== 'lab14-source' || state.pointerDrag.id !== id) return;
        const area = labArea.getBoundingClientRect();
        const vessel = state.apparatus.vessels[id];
        vessel.x = clamp(e.clientX - area.left - state.pointerDrag.offX, 8, area.width - vessel.w - 8);
        vessel.y = clamp(e.clientY - area.top - state.pointerDrag.offY, 8, area.height - vessel.h - 74);
        setLab14DragPose(id, vessel, vessel.x);
        e.preventDefault();
      };
      const endDrag = (id)=>{
        if(!state.pointerDrag || state.pointerDrag.id !== id) return;
        const vessel = state.apparatus.vessels[id];
        vessel.dragging = false;
        vessel.pouring = false;
        sourceMap[id].classList.remove('dragging');
        if(id === 'water' && state.apparatus.pouredWater){
          setStatus('已将清水倒入混合量筒');
          showToast('清水已全部倒入混合量筒');
        }
        if(id === 'alcohol' && state.apparatus.pouredAlcohol){
          setStatus('已将酒精倒入混合量筒');
          showToast('酒精已全部倒入混合量筒');
        }
        state.pointerDrag = null;
      };
      Object.entries(sourceMap).forEach(([id, el])=>{
        el.addEventListener('pointerdown', (e)=>startDrag(id, e));
        el.addEventListener('pointermove', (e)=>moveDrag(id, e));
        el.addEventListener('pointerup', ()=>endDrag(id));
        el.addEventListener('pointercancel', ()=>endDrag(id));
      });
      lab14MixEl.addEventListener('pointerdown', ()=>{
        if(state.autoPlaying) return;
        if(!state.freeMode && state.currentTask !== 2){
          warnCurrentStep('步骤3需要轻点混合量筒进行摇匀并读数。');
          return;
        }
        const before = state.apparatus.mixRead;
        performAction('shakeRead', true);
        if(state.apparatus.mixRead !== before){
          updatePills();
          scheduleChart();
        }
      });
    }

    async function autoDemo(){
      if(state.autoPlaying || state.freeMode) return;
      const runId = ++state.autoRunId;
      state.autoPlaying = true;
      updateModeHud();
      updateAutoDemoBtn();
      recordBtn.disabled = true;
      checkBtn.disabled = true;
      analyzeBtn.disabled = true;
      resetBtn.disabled = true;
      freeBtn.disabled = true;

      const ensure = ()=>{ if(!state.autoPlaying || runId !== state.autoRunId) throw new Error('auto-cancelled'); };
      const wait = async (ms)=>{ await sleep(ms); ensure(); };
      const clickEl = async (el, ms=260)=>{
        const p = centerOf(el);
        await moveDemoCursorTo(p.x, p.y, ms);
        ensure();
        await pulseDemoCursor();
        ensure();
      };
      const doA = async (id, ms=950, actionBtn=null)=>{
        if(actionBtn) await clickEl(actionBtn, 240);
        performAction(id, false);
        updatePills();
        await wait(ms);
      };
      const doR = async (ms=850)=>{
        const beforeLen = state.records.length;
        await clickEl(recordBtn, 240);
        if(!addRecord()) throw new Error('AUTO_RECORD_FAILED');
        if(state.records.length <= beforeLen) throw new Error('AUTO_RECORD_NOT_PERSISTED');
        await wait(ms);
      };
      const doLab14Pour = async (id)=>{
        const ap = state.apparatus;
        renderLab14Stage(labArea.clientWidth || stageEl.clientWidth || 960, labArea.clientHeight || stageEl.clientHeight || 540);
        const vessel = ap.vessels[id];
        const target = ap.vessels.mix;
        const side = 'right';
        const snap = getLab14PourSnapPose(vessel, target, side, 78);
        const dragX = snap.x;
        const dragY = snap.y;
        const cursorOffsetX = vessel.w * 0.5;
        const cursorOffsetY = vessel.h * 0.36;
        const startX = vessel.homeX + cursorOffsetX;
        const startY = vessel.homeY + cursorOffsetY;
        await moveDemoCursorTo(startX, startY, 220);
        await pulseDemoCursor();
        demoCursorEl.classList.add('dragging');
        vessel.dragging = true;
        for(let i=1;i<=10;i++){

      table.querySelectorAll('tbody tr').forEach(tr => {
        Array.from(tr.children).forEach((td, index) => {
          if (td.tagName && td.tagName.toLowerCase() === 'td' && !td.getAttribute('data-label') && labels[index]) td.setAttribute('data-label', labels[index]);
        });
      });
    });
  }
  function syncMobileShell(){
    normalizeLabels();
    applyDataLabels();
    const mobile = isMobile();
    controlDock.classList.toggle('mobile-sheet', mobile);
    dataDock.classList.toggle('mobile-sheet', mobile);
    if (!mobile) {
      tabs.classList.remove('attached', 'experiment-open', 'data-open');
      return;
    }
    const controlClosed = mirrorCollapsed(controlDock, controlBody);
    const dataClosed = mirrorCollapsed(dataDock, dataBody);
    const experimentOpen = !controlClosed;
    const dataOpen = !dataClosed;
    tabs.classList.toggle('attached', experimentOpen || dataOpen);
    tabs.classList.toggle('experiment-open', experimentOpen);
    tabs.classList.toggle('data-open', dataOpen);
    experimentTab?.classList.toggle('active', experimentOpen);
    dataTab?.classList.toggle('active', dataOpen);
    experimentTab?.setAttribute('aria-expanded', String(experimentOpen));
    dataTab?.setAttribute('aria-expanded', String(dataOpen));
    syncBadge();
  }
  window.codexLabMobileSync = syncMobileShell;
  function setInitialMobileState(){ if (isMobile()) { forceClassState('data', false); forceClassState('control', true); } syncMobileShell(); }
  experimentTab?.addEventListener('click', () => clickToOpen('control'));
  dataTab?.addEventListener('click', () => clickToOpen('data'));
  controlClose?.addEventListener('click', () => { forceClassState('control', false); syncMobileShell(); });
  dataClose?.addEventListener('click', () => { forceClassState('data', false); syncMobileShell(); });
  [controlToggle, dataToggle, resetBtn].forEach(btn => btn?.addEventListener('click', () => setTimeout(syncMobileShell, 80), true));
  setInterval(() => { normalizeLabels(); applyDataLabels(); syncBadge(); }, 700);
  window.addEventListener('resize', syncMobileShell);
  window.addEventListener('orientationchange', syncMobileShell);
  requestAnimationFrame(setInitialMobileState);
  setTimeout(setInitialMobileState, 160);
  setTimeout(syncMobileShell, 600);
})();
</script>
</body>
</html>
