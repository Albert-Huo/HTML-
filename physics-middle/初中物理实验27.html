    function drawSpringScaleSimple(ctx, x, y, nValue, label='弹簧测力计', opts={}){
      const w = opts.w || 110;
      const h = opts.h || 168;
      const maxN = opts.maxN || 8;
      const ratio = clamp((nValue || 0) / maxN, 0, 1);
      ctx.fillStyle = '#d8ecff';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#4da3ff';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);

      ctx.fillStyle = '#00131f';
      ctx.fillRect(x + 16, y + 14, w - 32, 26);
      ctx.fillStyle = '#66b0ff';
      ctx.font = 'bold 17px Courier New';
      ctx.fillText((nValue || 0).toFixed(2), x + 24, y + 33);

      const scaleTop = y + 52;
      const scaleBottom = y + h - 42;
      ctx.strokeStyle = '#b7d8ff';
      ctx.lineWidth = 1.4;
      for(let i=0;i<=maxN*2;i++){
        const yy = scaleTop + (scaleBottom - scaleTop) * (i/(maxN*2));
        const long = i%2===0 ? 14 : 8;
        ctx.beginPath();
        ctx.moveTo(x + 12, yy);
        ctx.lineTo(x + 12 + long, yy);
        ctx.stroke();
      }

      const pointerY = scaleTop + ratio * (scaleBottom - scaleTop);
      ctx.strokeStyle = '#ffcf6f';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + w - 16, pointerY);
      ctx.lineTo(x + 44, pointerY);
      ctx.stroke();
      ctx.fillStyle = '#ffcf6f';
      ctx.beginPath();
      ctx.arc(x + w - 16, pointerY, 4.5, 0, Math.PI*2);
      ctx.fill();

      const hookX = x + w * 0.5;
      const hookY = y + h - 8;
      ctx.strokeStyle = '#e7f2ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(hookX, y + h - 30);
      ctx.lineTo(hookX, hookY - 7);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(hookX, hookY, 7, 0, Math.PI*2);
      ctx.stroke();

      ctx.fillStyle = '#dfeaff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText(label, x + 8, y - 8);
      return { hookX, hookY, w, h };
    }

    function drawHorizontalGauge(ctx, x, y, w, h, nValue, label, reverse=false){
      const maxN = 8;
      const ratio = clamp((nValue || 0)/maxN, 0, 1);
      ctx.fillStyle = '#d8ecff';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = '#4da3ff';
      ctx.lineWidth = 2.5;
      ctx.strokeRect(x, y, w, h);

      const sx = x + 18;
      const ex = x + w - 18;
      const py = y + h - 14;
      ctx.strokeStyle = '#a8c6e8';
      ctx.lineWidth = 1.2;
      for(let i=0;i<=16;i++){
        const tx = sx + (ex - sx) * (i/16);
        const long = i%4===0 ? 8 : 4;
        ctx.beginPath();
        ctx.moveTo(tx, py);
        ctx.lineTo(tx, py - long);
        ctx.stroke();
      }
      const px = reverse ? ex - ratio*(ex-sx) : sx + ratio*(ex-sx);
      ctx.strokeStyle = '#ffcf6f';
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.moveTo(px, py + 1);
      ctx.lineTo(px, py - 12);
      ctx.stroke();
      ctx.fillStyle = '#dfeaff';
      ctx.font = '11px -apple-system,Segoe UI';
      ctx.fillText(label, x + 8, y - 7);
      return { hookX: reverse ? x : x + w, hookY: y + h * 0.56 };
    }

      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(`接触面：${rough ? '粗糙木板' : '光滑木板'}  压力：${state.vars.normalN}N`, W*0.08, H-102);
      ctx.fillText(`本次读数：${(ap.lastF || 0).toFixed(2)}N（需保持匀速）`, W*0.08, H-80);
    }

    function draw22(ctx,W,H){
      const ap = state.apparatus;

      const standY = H-350;
      ctx.fillStyle = '#92a4b9';
      ctx.fillRect(standX, standY, 10, 242);

      if(ap.hung){

        ctx.moveTo(meter.hookX, meter.hookY + 6);

          ctx.fillStyle = i%2 ? '#f0c06b' : '#e6b45d';
          ctx.fillRect(bx, by + i*11, 32, 10);

          ctx.strokeRect(bx, by + i*11, 32, 10);
        }
      }

      ctx.fillStyle = ap.zeroed ? '#7fe6b1' : '#ff8a8a';

      ctx.fillStyle = '#dfeaff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(`零位：${ap.zeroed ? '已校准' : '未校准'}`, W*0.34, H-178);
      ctx.fillText(`挂载质量：${(ap.hangMass || 0).toFixed(1)}kg`, W*0.34, H-156);
      if(ap.needRehang){
        ctx.fillStyle = '#ffcf6f';
        ctx.fillText('质量已改动，请重新挂重物', W*0.34, H-134);
      }
    }

    function draw23(ctx,W,H){

    function draw24(ctx,W,H){
      const ap = state.apparatus;
      const trackY = H-152;
      const left = W*0.09;
      const right = W*0.9;

    function draw25(ctx,W,H){
      const ap = state.apparatus;
      const topX = W*0.14, topY = H-290;
      const splitX = W*0.34, baseY = H-146;
      const lowEndX = W*0.49, highEndX = W*0.87;

      ctx.strokeStyle = '#9cb1ca';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(topX, topY);
      ctx.lineTo(splitX, baseY);
      ctx.stroke();
      ctx.fillStyle = '#91a3ba';
      ctx.fillRect(topX-14, topY-8, 30, 12);
      ctx.fillStyle = '#dfeaff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText('斜面释放端', topX-22, topY-14);

      ctx.fillStyle = '#6f889f';
      ctx.fillRect(splitX, baseY-4, lowEndX-splitX, 12);
      ctx.fillStyle = '#6b4f34';
      ctx.fillRect(splitX, baseY+22, highEndX-splitX, 12);
      for(let i=0;i<22;i++){
        const x = splitX + i*(highEndX-splitX)/22;
        ctx.fillStyle = 'rgba(255,230,190,.18)';
        ctx.fillRect(x, baseY+22, 3, 12);
      }
      ctx.fillStyle = '#dfeaff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText('低阻跑道', splitX + 24, baseY - 12);
      ctx.fillText('高阻跑道', splitX + 24, baseY + 48);

      let cartX = topX + 6;
      let cartY = topY - 2;
      if(ap.running){
        if(ap.launchTrack === 'low'){
          cartX = splitX + (lowEndX - splitX - 20) * ap.progress;
          cartY = baseY - 4;
        }else{
          cartX = splitX + (highEndX - splitX - 20) * ap.progress;
          cartY = baseY + 22;
        }
      }else if(ap.lastDist > 0){
        const ratio = clamp(ap.lastDist / 70, 0, 1);
        if(ap.lastTrack === 'low'){
          cartX = splitX + (lowEndX - splitX - 18) * ratio;
          cartY = baseY - 4;
        }else{
          cartX = splitX + (highEndX - splitX - 18) * ratio;
          cartY = baseY + 22;
        }
      }
      drawCartDetailed(ctx, cartX, cartY, 0.8);

      ctx.fillStyle = '#dfeaff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(`最近滑行：${(ap.lastDist || 0).toFixed(1)}cm`, W*0.08, H-92);
      ctx.fillText(`推力：${(ap.lastPush || state.vars.pushN)}N`, W*0.08, H-70);
    }

    function draw26(ctx,W,H){
      const ap = state.apparatus;
      const cx = W*0.5, cy = H*0.54;
      const beamLen = W*0.52;
      const torqueDiff = (ap.leftTorque || 0) - (ap.rightTorque || 0);
      const ang = clamp(torqueDiff / 180, -0.24, 0.24);
      const armScale = beamLen / 40;

      ctx.fillStyle = '#8899ad';
      ctx.beginPath();
      ctx.moveTo(cx-28, cy+34);
      ctx.lineTo(cx+28, cy+34);
      ctx.lineTo(cx, cy-18);
      ctx.closePath();
      ctx.fill();

      const lx = cx - Math.cos(ang) * beamLen * 0.5;
      const ly = cy - Math.sin(ang) * beamLen * 0.5;
      const rx = cx + Math.cos(ang) * beamLen * 0.5;
      const ry = cy + Math.sin(ang) * beamLen * 0.5;
      ctx.strokeStyle = '#dbe7f6';
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(lx,ly);
      ctx.lineTo(rx,ry);
      ctx.stroke();

      ctx.strokeStyle = 'rgba(255,255,255,.5)';
      ctx.lineWidth = 1.2;
      for(let i=-20;i<=20;i+=2){
        const px = cx + Math.cos(ang) * (i*armScale);
        const py = cy + Math.sin(ang) * (i*armScale);
        const nx = px - Math.sin(ang) * (i%10===0 ? 10 : 5);
        const ny = py + Math.cos(ang) * (i%10===0 ? 10 : 5);
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(nx, ny);
        ctx.stroke();
      }

      function pointOnBeam(offsetCm){
        const off = offsetCm * armScale;
        return {
          x: cx + Math.cos(ang) * off,
          y: cy + Math.sin(ang) * off
        };
      }
      const leftP = pointOnBeam(-Number(state.vars.leftArm));
      const rightP = pointOnBeam(Number(state.vars.rightArm));
      ctx.strokeStyle = '#f4f8ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(leftP.x, leftP.y);
      ctx.lineTo(leftP.x, leftP.y + 42);
      ctx.moveTo(rightP.x, rightP.y);
      ctx.lineTo(rightP.x, rightP.y + 42);
      ctx.stroke();

      const leftW = 20 + Number(state.vars.leftForce) * 2;
      const rightW = 20 + Number(state.vars.rightForce) * 2;
      ctx.fillStyle = '#ffd06b';
      ctx.fillRect(leftP.x - 14, leftP.y + 42, 28, leftW * 0.7);
      ctx.fillRect(rightP.x - 14, rightP.y + 42, 28, rightW * 0.7);
      ctx.strokeStyle = '#fff4d2';
      ctx.strokeRect(leftP.x - 14, leftP.y + 42, 28, leftW * 0.7);
      ctx.strokeRect(rightP.x - 14, rightP.y + 42, 28, rightW * 0.7);

      ctx.fillStyle = '#dfeaff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(`左力矩：${(ap.leftTorque || 0).toFixed(2)}`, W*0.14, H-92);
      ctx.fillText(`右力矩：${(ap.rightTorque || 0).toFixed(2)}`, W*0.14, H-70);
      ctx.fillStyle = ap.balanced ? '#7fe6b1' : '#ffcf6f';
      ctx.fillText(`状态：${ap.balanced ? '平衡' : '不平衡'}`, W*0.14, H-48);
    }

    function draw27(ctx,W,H){
      const ap = state.apparatus;
      const g = getLab27Layout();
      const meta = getLab27Metrics();
      const sink = ap.deskPlaced ? getLab27DisplayedSink() : 0;
      const desk = getLab27DeskRect();
      const weightRect = getLab27WeightRect();
      const deskDrop = getLab27DeskDropRect();
      const trayDrop = getLab27TrayDropRect();

      const deskSurfaceY = desk.y + (ap.orientation === 'up' ? 0 : g.legH);
      const deskContactY = ap.orientation === 'up' ? desk.y : desk.y + g.legH + g.deskTopH;
      const contactW = ap.orientation === 'up' ? g.deskW * 0.72 : g.deskW * 0.82;
      const depressDepth = clamp(
        sink * (ap.orientation === 'up' ? 0.96 : 0.58),
        ap.orientation === 'up' ? 12.0 : 0.9,
        ap.orientation === 'up' ? 30 : 7.2
      );
      const spongeTop = !ap.deskPlaced ? g.sponge.y : (ap.orientation === 'up' ? g.sponge.y + 10 : g.sponge.y);
      const leftX = g.sponge.x;
      const rightX = g.sponge.x + g.sponge.w;
      const dipL = g.deskCx - contactW * 0.5;
      const dipR = g.deskCx + contactW * 0.5;
      const spongeGrad = ctx.createLinearGradient(0, g.sponge.y, 0, g.sponge.y + g.sponge.h);
      spongeGrad.addColorStop(0, '#ffcf76');
      spongeGrad.addColorStop(0.55, '#f3b45d');
      spongeGrad.addColorStop(1, '#d68433');
      ctx.fillStyle = spongeGrad;
      ctx.beginPath();
      ctx.moveTo(leftX, g.sponge.y + g.sponge.h);
      ctx.lineTo(leftX, spongeTop);
      if(!ap.deskPlaced){
        ctx.lineTo(rightX, spongeTop);
      }else if(ap.orientation === 'up'){
        const legCenters = [desk.x + 18, desk.x + g.deskW - 18, desk.x + 38, desk.x + g.deskW - 38];
        const ordered = [...legCenters].sort((a,b)=>a-b);
        const dimpleW = 13;
        const shallowLift = Math.max(1.4, depressDepth * 0.18);
        ctx.bezierCurveTo(leftX + 28, spongeTop - 2, ordered[0] - 24, spongeTop - 1, ordered[0] - dimpleW, spongeTop + shallowLift);
        ordered.forEach((cx, idx)=>{
          ctx.quadraticCurveTo(cx - dimpleW * 0.35, spongeTop + depressDepth * 0.72, cx, spongeTop + depressDepth);
          ctx.quadraticCurveTo(cx + dimpleW * 0.35, spongeTop + depressDepth * 0.72, cx + dimpleW, spongeTop + shallowLift);
          const next = ordered[idx + 1];
          if(next){
            const mid = (cx + next) * 0.5;
            ctx.quadraticCurveTo(mid, spongeTop + shallowLift * 0.55, next - dimpleW, spongeTop + shallowLift);
          }
        });
        ctx.bezierCurveTo(ordered[ordered.length - 1] + 18, spongeTop + 1, rightX - 28, spongeTop - 2, rightX, spongeTop);
      }else{
        const shoulderDip = depressDepth * 0.84;
        const centerDip = depressDepth * 0.9;
        const troughHalf = contactW * 0.28;
        ctx.bezierCurveTo(leftX + 28, spongeTop - 2, dipL - 44, spongeTop + 0.3, dipL - 20, spongeTop + shoulderDip);
        ctx.quadraticCurveTo(dipL + 6, spongeTop + centerDip, g.deskCx - troughHalf, spongeTop + centerDip);
        ctx.lineTo(g.deskCx + troughHalf, spongeTop + centerDip);
        ctx.quadraticCurveTo(dipR - 6, spongeTop + centerDip, dipR + 20, spongeTop + shoulderDip);
        ctx.bezierCurveTo(dipR + 44, spongeTop + 0.3, rightX - 28, spongeTop - 2, rightX, spongeTop);
      }
      ctx.lineTo(rightX, g.sponge.y + g.sponge.h);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = '#ffd7a4';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(leftX, g.sponge.y + g.sponge.h);
      ctx.lineTo(leftX, spongeTop);
      if(!ap.deskPlaced){
        ctx.lineTo(rightX, spongeTop);
      }else if(ap.orientation === 'up'){
        const legCenters = [desk.x + 18, desk.x + g.deskW - 18, desk.x + 38, desk.x + g.deskW - 38];
        const ordered = [...legCenters].sort((a,b)=>a-b);
        const dimpleW = 13;
        const shallowLift = Math.max(1.4, depressDepth * 0.18);
        ctx.bezierCurveTo(leftX + 28, spongeTop - 2, ordered[0] - 24, spongeTop - 1, ordered[0] - dimpleW, spongeTop + shallowLift);
        ordered.forEach((cx, idx)=>{
          ctx.quadraticCurveTo(cx - dimpleW * 0.35, spongeTop + depressDepth * 0.72, cx, spongeTop + depressDepth);
          ctx.quadraticCurveTo(cx + dimpleW * 0.35, spongeTop + depressDepth * 0.72, cx + dimpleW, spongeTop + shallowLift);
          const next = ordered[idx + 1];
          if(next){
            const mid = (cx + next) * 0.5;
            ctx.quadraticCurveTo(mid, spongeTop + shallowLift * 0.55, next - dimpleW, spongeTop + shallowLift);
          }
        });
        ctx.bezierCurveTo(ordered[ordered.length - 1] + 18, spongeTop + 1, rightX - 28, spongeTop - 2, rightX, spongeTop);
      }else{
        const shoulderDip = depressDepth * 0.84;
        const centerDip = depressDepth * 0.9;
        const troughHalf = contactW * 0.28;
        ctx.bezierCurveTo(leftX + 28, spongeTop - 2, dipL - 44, spongeTop + 0.3, dipL - 20, spongeTop + shoulderDip);
        ctx.quadraticCurveTo(dipL + 6, spongeTop + centerDip, g.deskCx - troughHalf, spongeTop + centerDip);
        ctx.lineTo(g.deskCx + troughHalf, spongeTop + centerDip);
        ctx.quadraticCurveTo(dipR - 6, spongeTop + centerDip, dipR + 20, spongeTop + shoulderDip);
        ctx.bezierCurveTo(dipR + 44, spongeTop + 0.3, rightX - 28, spongeTop - 2, rightX, spongeTop);
      }
      ctx.lineTo(rightX, g.sponge.y + g.sponge.h);
      ctx.closePath();
      ctx.clip();
      for(let i=0;i<12;i++){
        const px = g.sponge.x + 8 + i * (g.sponge.w / 11);
        ctx.strokeStyle = 'rgba(255,255,255,.10)';
        ctx.beginPath();
        ctx.moveTo(px, g.sponge.y + 10);
        ctx.lineTo(px + 12, g.sponge.y + g.sponge.h - 10);
        ctx.stroke();
      }
      for(let i=0;i<18;i++){
        const px = g.sponge.x + 12 + (i % 6) * (g.sponge.w / 6) + ((i / 6)|0) * 9;
        const py = g.sponge.y + 18 + ((i * 17) % Math.max(28, g.sponge.h - 34));
        ctx.fillStyle = 'rgba(255,244,206,.16)';
        ctx.beginPath();
        ctx.arc(px, py, 2.2 + (i % 3) * 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      if(ap.deskPlaced && ap.orientation === 'down'){
        const pocketTopY = deskContactY - 0.05;
        const pocketBottomY = deskContactY + depressDepth * 0.76;
        const leftPocketL = desk.x + 8;
        const leftPocketR = dipL - 6;
        const rightPocketL = dipR + 6;
        const rightPocketR = desk.x + g.deskW - 8;
        ctx.fillStyle = 'rgba(6,12,20,.42)';
        if(leftPocketR - leftPocketL > 8){
          ctx.beginPath();
          ctx.moveTo(leftPocketL, pocketTopY);
          ctx.quadraticCurveTo(leftPocketL + 4, pocketBottomY * 0.98, leftPocketR - 4, pocketBottomY);
          ctx.quadraticCurveTo(leftPocketR - 1, pocketTopY + 1.2, leftPocketR, pocketTopY);
          ctx.closePath();
          ctx.fill();
        }
        if(rightPocketR - rightPocketL > 8){
          ctx.beginPath();
          ctx.moveTo(rightPocketL, pocketTopY);
          ctx.quadraticCurveTo(rightPocketL + 1, pocketTopY + 1.2, rightPocketL + 4, pocketBottomY);
          ctx.quadraticCurveTo(rightPocketR - 4, pocketBottomY * 0.98, rightPocketR, pocketTopY);
          ctx.closePath();
          ctx.fill();
        }
      }

      const trayY = g.tray.y;
      ctx.fillStyle = '#be9152';
      ctx.fillRect(g.tray.x, trayY, g.tray.w, g.tray.h);
      ctx.fillStyle = '#94693a';
      ctx.fillRect(g.tray.x + 8, trayY - 5, g.tray.w - 16, 5);
      ctx.fillStyle = '#dfeaff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText('备用钩码', g.tray.x + 34, trayY + 28);

      const tagX = g.sponge.x + 8;
      const chipY = 18;
      ['甲','乙','丙'].forEach((label, idx)=>{
        const x = tagX + idx * 54;
        const active = meta.sceneLabel === label;
        ctx.fillStyle = active ? 'rgba(127,230,177,.18)' : 'rgba(255,255,255,.06)';
        ctx.strokeStyle = active ? '#7fe6b1' : 'rgba(255,255,255,.16)';
        ctx.lineWidth = 1.4;
        roundRectPath(ctx, x, chipY, 40, 24, 12);
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = active ? '#bff6d8' : '#dfeaff';
        ctx.font = 'bold 12px -apple-system,Segoe UI';
        ctx.fillText(label, x + 14, chipY + 16);
      });

      if(lab27Pointer.mode === 'desk'){
        ctx.strokeStyle = 'rgba(127,230,177,.75)';
        ctx.lineWidth = 2;
        roundRectPath(ctx, deskDrop.x, deskDrop.y, deskDrop.w, deskDrop.h, 14);
        ctx.stroke();
      }else if(lab27Pointer.mode === 'weight'){
        const hoverRect = rectContainsPoint(deskDrop, weightRect.x + weightRect.w * 0.5, weightRect.y + weightRect.h * 0.5)
          ? deskDrop
          : (rectContainsPoint(trayDrop, weightRect.x + weightRect.w * 0.5, weightRect.y + weightRect.h * 0.5) ? trayDrop : null);
        if(hoverRect){
          ctx.strokeStyle = 'rgba(127,230,177,.65)';
          ctx.lineWidth = 2;
          roundRectPath(ctx, hoverRect.x, hoverRect.y, hoverRect.w, hoverRect.h, 14);
          ctx.stroke();
        }
      }

      if(ap.orientation === 'up'){
        const topY = desk.y;
        ctx.fillStyle = 'rgba(15,28,44,.18)';
        [desk.x + 18, desk.x + g.deskW - 18, desk.x + 38, desk.x + g.deskW - 38].forEach((cx)=>{
          ctx.beginPath();
          ctx.ellipse(cx, deskSurfaceY + 4.5, 7.5, 3.8 + depressDepth * 0.14, 0, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.fillStyle = '#9fd8ff';
        ctx.fillRect(desk.x, topY, g.deskW, g.deskTopH);
        ctx.strokeStyle = '#eaf6ff';
        ctx.strokeRect(desk.x, topY, g.deskW, g.deskTopH);
        const legXs = [desk.x + 14, desk.x + g.deskW - 22, desk.x + 34, desk.x + g.deskW - 42];
        legXs.forEach((lx)=>{
          ctx.fillStyle = '#88bddf';
          ctx.fillRect(lx, topY + g.deskTopH, 8, g.legH);
          ctx.fillStyle = '#6ea6c7';
          ctx.fillRect(lx - 2, topY + g.deskTopH + g.legH - 2 + sink * 0.06, 12, 4);
        });
      }else{
        const topY = desk.y;
        ctx.fillStyle = '#9fd8ff';
        ctx.fillRect(desk.x, topY + g.legH, g.deskW, g.deskTopH);
        ctx.strokeStyle = '#eaf6ff';
        ctx.strokeRect(desk.x, topY + g.legH, g.deskW, g.deskTopH);
        const legXs = [desk.x + 12, desk.x + g.deskW - 20, desk.x + 32, desk.x + g.deskW - 40];
        legXs.forEach((lx)=>{

    function refreshLab15ScrapeState(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      ap.scrapeProgress = round((clamp(ap.leftPolish,0,100) + clamp(ap.rightPolish,0,100)) * 0.5, 1);
      if(!ap.scraped && ap.leftPolish >= 88 && ap.rightPolish >= 88){
        ap.scraped = true;
        setStatus('接触面打磨完成');
        showToast('打磨完成，可进行横向夹紧');
        updatePills();
        if(!state.autoPlaying) tryPassStep(false);
      }
    }

    function refreshLab15ClampState(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      const ready = ap.scraped && ap.clampLevel >= 0.82;
      if(ready && (!ap.pressed || ap.separated || !ap.adhered)){
        ap.pressed = true;
        ap.clampDone = true;
        ap.adhered = true;
        ap.separated = false;
        setStatus('夹具已压紧');
        showToast('压紧到位，可进行拉伸测力');
        updatePills();
        if(!state.autoPlaying) tryPassStep(false);
      }else if(!ready && ap.pressed){
        ap.pressed = false;
        ap.adhered = false;
        updatePills();
      }
    }

    function ensureLab15ToolReady(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      if(ap.toolReady) return;
      const g = getLab15Layout();
      ap.toolX = g.toolHomeX;
      ap.toolY = g.toolHomeY;
      ap.lastDragX = ap.toolX;
      ap.lastDragY = ap.toolY;
      ap.toolReady = true;
    }

    function applyLab15ToolAtStagePoint(stageX, stageY){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      ensureLab15ToolReady();
      const g = getLab15Layout();
      const p = stagePointToScene(stageX, stageY);
      const nx = clamp(p.x - g.toolW * 0.5, 6, g.W - g.toolW - 6);
      const ny = clamp(p.y - g.toolH * 0.56, g.baseY - 130, g.H - g.toolH - 80);
      const dx = nx - ap.lastDragX;
      const dy = ny - ap.lastDragY;
      const travel = Math.hypot(dx, dy);
      ap.toolX = nx;
      ap.toolY = ny;
      ap.lastDragX = nx;
      ap.lastDragY = ny;

      const toolRect = { x: ap.toolX, y: ap.toolY, w: g.toolW, h: g.toolH };
      const gain = clamp(travel * 0.75, 0, 4.6);
      if(rectOverlap(toolRect, g.scrubZoneA)) ap.leftPolish = clamp(ap.leftPolish + gain, 0, 100);
      if(rectOverlap(toolRect, g.scrubZoneB)) ap.rightPolish = clamp(ap.rightPolish + gain, 0, 100);
      refreshLab15ScrapeState();
      updatePills();
    }

    function applyLab15ClampAtStagePoint(stageX, stageY){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      const g = getLab15Layout();
      const p = stagePointToScene(stageX, stageY);
      ap.clampLevel = clamp((g.clampTrackX + g.clampTrackW - p.x) / g.clampTrackW, 0, 1);
      refreshLab15ClampState();
      updatePills();
    }

    function avoidControlDockOccludingLab15Meter(){
      if(LAB_ID !== 15) return;
      const stageRect = stageEl.getBoundingClientRect();
      const dockRect = controlDock.getBoundingClientRect();
      const g = getLab15Layout();
      const dockInStage = {
        x: dockRect.left - stageRect.left,
        y: dockRect.top - stageRect.top,
        w: dockRect.width,
        h: dockRect.height
      };
      const meterRect = { x: g.meterX, y: g.meterY, w: g.meterW, h: g.meterH };
      if(rectOverlap(dockInStage, meterRect)){
        setDockPos(controlDock, 10, 10);
      }
    }

    function bindLab15StageInteraction(){
      if(LAB_ID !== 15) return;

      const endDrag = (e)=>{
        if(lab15Pointer.id !== e.pointerId) return;
        lab15Pointer.id = null;
        lab15Pointer.mode = '';
      };

      scene.addEventListener('pointerdown', (e)=>{
        if(state.autoPlaying) return;
        const ap = state.apparatus;
        const p = scenePointFromEvent(e);
        const g = getLab15Layout();
        const toolRect = { x: ap.toolX, y: ap.toolY, w: g.toolW, h: g.toolH };
        const onClampHandle = Math.hypot(p.x - g.clampHandleX, p.y - g.clampHandleY) <= 14;
        const onTool = rectContainsPoint(toolRect, p.x, p.y)
          || rectContainsPoint(g.scrubZoneA, p.x, p.y)
          || rectContainsPoint(g.scrubZoneB, p.x, p.y);

        if(onTool){
          lab15Pointer.mode = 'tool';
          lab15Pointer.id = e.pointerId;
          lab15Pointer.offX = clamp(p.x - ap.toolX, 0, g.toolW);
          lab15Pointer.offY = clamp(p.y - ap.toolY, 0, g.toolH);
          ap.lastDragX = ap.toolX;
          ap.lastDragY = ap.toolY;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
          return;
        }

        if(onClampHandle){
          if(!ap.scraped){
            if(!state.freeMode && !state.autoPlaying){
              warnCurrentStep('步骤1未完成，请先把接触面打磨到100%');
              showToast('请先完成打磨，再旋紧夹具');
              return;
            }
          }
          lab15Pointer.mode = 'clamp';
          lab15Pointer.id = e.pointerId;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
        }
      });

      scene.addEventListener('pointermove', (e)=>{
        if(lab15Pointer.id !== e.pointerId || !lab15Pointer.mode) return;
        const p = scenePointFromEvent(e);
        const g = getLab15Layout();

        if(lab15Pointer.mode === 'tool'){
          const nx = clamp(p.x - lab15Pointer.offX, 6, g.W - g.toolW - 6);
          const ny = clamp(p.y - lab15Pointer.offY, g.baseY - 130, g.H - g.toolH - 80);
          const center = scenePointToStage(nx + g.toolW * 0.5, ny + g.toolH * 0.56);
          applyLab15ToolAtStagePoint(center.x, center.y);
          e.preventDefault();
          return;
        }

        if(lab15Pointer.mode === 'clamp'){
          const stageP = scenePointToStage(p.x, p.y);
          applyLab15ClampAtStagePoint(stageP.x, stageP.y);
          e.preventDefault();
        }
      });

      scene.addEventListener('pointerup', endDrag);
      scene.addEventListener('pointercancel', endDrag);
    }

    function bindLab27StageInteraction(){
      if(LAB_ID !== 27) return;

      const endDrag = (e)=>{
        if(lab27Pointer.id !== e.pointerId) return;
        if(lab27Pointer.mode === 'weight'){
          commitLab27WeightDropAtStagePoint(e.clientX - stageEl.getBoundingClientRect().left, e.clientY - stageEl.getBoundingClientRect().top);
        }else if(lab27Pointer.mode === 'desk'){
          commitLab27DeskDropAtStagePoint(e.clientX - stageEl.getBoundingClientRect().left, e.clientY - stageEl.getBoundingClientRect().top);
        }
        lab27Pointer.id = null;
        lab27Pointer.mode = '';
      };

      scene.addEventListener('pointerdown', (e)=>{
        if(state.autoPlaying) return;
        const p = scenePointFromEvent(e);
        const weightRect = getLab27WeightRect();
        if(rectContainsPoint(weightRect, p.x, p.y)){
          lab27Pointer.mode = 'weight';
          lab27Pointer.id = e.pointerId;
          lab27Pointer.offX = clamp(p.x - weightRect.x, 0, weightRect.w);
          lab27Pointer.offY = clamp(p.y - weightRect.y, 0, weightRect.h);
          lab27Pointer.from = state.apparatus.weightPos;
          lab27Pointer.fromPlaced = !!state.apparatus.deskPlaced;
          state.apparatus.dragWeightX = weightRect.x;
          state.apparatus.dragWeightY = weightRect.y;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
          return;
        }

        const deskRect = getLab27DeskRect();
        if(rectContainsPoint({ x: deskRect.x - 10, y: deskRect.y - 10, w: deskRect.w + 20, h: deskRect.h + 20 }, p.x, p.y)){
          if(!state.apparatus.deskPlaced){
            lab27Pointer.mode = 'desk';
            lab27Pointer.id = e.pointerId;
            lab27Pointer.offX = clamp(p.x - deskRect.x, 0, deskRect.w);
            lab27Pointer.offY = clamp(p.y - deskRect.y, 0, deskRect.h);
            lab27Pointer.fromPlaced = !!state.apparatus.deskPlaced;
            state.apparatus.dragDeskX = deskRect.x;
            state.apparatus.dragDeskY = deskRect.y;
            scene.setPointerCapture(e.pointerId);
            e.preventDefault();
            return;
          }
          const before = state.apparatus.orientation;
          toggleLab27Orientation();
          if(before !== state.apparatus.orientation){
            showToast(state.apparatus.orientation === 'up' ? '小桌已恢复桌面朝上' : '小桌已翻面');
          }
          e.preventDefault();
        }
      });

      scene.addEventListener('pointermove', (e)=>{
        if(lab27Pointer.id !== e.pointerId) return;
        if(lab27Pointer.mode === 'weight'){
          applyLab27WeightDragAtStagePoint(
            e.clientX - stageEl.getBoundingClientRect().left,
            e.clientY - stageEl.getBoundingClientRect().top
          );
        }else if(lab27Pointer.mode === 'desk'){
          applyLab27DeskDragAtStagePoint(
            e.clientX - stageEl.getBoundingClientRect().left,
            e.clientY - stageEl.getBoundingClientRect().top
          );
        }
        e.preventDefault();
      });

      scene.addEventListener('pointerup', endDrag);
      scene.addEventListener('pointercancel', endDrag);
    }

    function updateDynamic(dt){
      const ap = state.apparatus;
      if(LAB_ID === 14 && ap.shaken) ap.bubblePhase += dt*0.004;
      if(LAB_ID === 17 && ap.pendulumOn){ ap.angle = Math.sin(performance.now()*0.006) * 0.38; }
      if(LAB_ID === 18 && ap.running){ ap.progress = clamp(ap.progress + dt/1200, 0, 1); }
      if(LAB_ID === 20 && ap.animating){
        const dx = ap.targetX - ap.cartX;
        ap.cartX += dx * Math.min(1, dt*0.01);
      }
      if(LAB_ID === 21 && ap.pulling){
        ap.pullTrace = clamp(ap.pullTrace + dt/420, 0, 1);
        if(ap.pullTrace >= 1) ap.pulling = false;
      }
      if(LAB_ID === 23){
        const target = clamp(((ap.rightN || 0) - (ap.leftN || 0)) * 9, -56, 56);
        ap.ringOffset += (target - ap.ringOffset) * Math.min(1, dt*0.012);
      }
      if(LAB_ID === 24 && ap.moving){
        ap.cartX = clamp(ap.cartX + dt/1700, 0.14, 0.82);
      }
      if(LAB_ID === 25 && ap.running){
        ap.progress = clamp(ap.progress + dt/900, 0, 1);
      }
      if(LAB_ID === 27){
        const prevSink = ap.sinkDepth;
        if(document.hidden){
          ap.sinkDepth = ap.targetSinkDepth;
        }else{
          ap.sinkDepth += (ap.targetSinkDepth - ap.sinkDepth) * Math.min(1, dt * 0.03);
        }
        if(Math.abs(ap.sinkDepth - prevSink) > 0.04){
          updatePills();
        }
      }
    }

    function loop(ts){
      const dt = state.lastTs ? (ts - state.lastTs) : 16;
      state.lastTs = ts;
      updateDynamic(dt);
      drawScene();
      state.rafId = requestAnimationFrame(loop);
    }

    function scheduleChart(){
      if(scheduleChart.t) return;
      scheduleChart.t = trackTimeout(()=>{
        scheduleChart.t = null;
        drawChart();
      }, 60);
    }

    function drawChart(){
      const rect = chart.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width*dpr));
      const h = Math.max(1, Math.floor(rect.height*dpr));
      if(chart.width!==w || chart.height!==h){ chart.width = w; chart.height = h; }
      const ctx = chart.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width, H = rect.height;

      ctx.fillStyle = 'rgba(6,10,16,.9)';
      ctx.fillRect(0,0,W,H);
      const left=38, right=W-10, top=12, bottom=H-24;
      const pw = right-left, ph = bottom-top;

      ctx.strokeStyle = 'rgba(255,255,255,.12)';
      for(let i=0;i<=4;i++){
        const y = top + ph*(i/4);
        ctx.beginPath(); ctx.moveTo(left,y); ctx.lineTo(right,y); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(left,bottom); ctx.lineTo(right,bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(left,top); ctx.lineTo(left,bottom); ctx.stroke();

      const ys = state.records.map(r=>Number(r.y));
      if(!ys.length) return;
      let maxY = Math.max(...ys);
      if(maxY <= 0) maxY = 1;
      maxY *= 1.2;

      const toX = (i)=> left + pw * (i/(Math.max(1, ys.length-1)));
      const toY = (v)=> bottom - (v/maxY)*ph;

      ctx.strokeStyle = 'rgba(61,220,151,.85)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
      ctx.stroke();

      ctx.fillStyle = '#7ed6ff';
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); ctx.beginPath(); ctx.arc(x,y,3.6,0,Math.PI*2); ctx.fill(); });

      ctx.fillStyle = '#dce9ff';
      ctx.font = '11px -apple-system,Segoe UI';
      ctx.fillText('记录序号', right-56, bottom+16);
      ctx.fillText('读数趋势', left+2, top+10);
    }

    function setDockPos(el, x, y){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const nx = clamp(x, 4, stage.width - r.width - 4);
      const ny = clamp(y, 4, stage.height - r.height - 4);
      el.style.left = `${nx}px`;
      el.style.top = `${ny}px`;
      el.style.right = 'auto';
      el.style.bottom = 'auto';
    }

    function isNarrowStage(){
      return stageEl.getBoundingClientRect().width <= 760;
    }

    function shouldStartControlCollapsed(){
      return true;
    }

    function bringToFront(kind){
      state.zTop += 1;
      if(kind==='control') controlDock.style.zIndex = String(state.zTop);
      if(kind==='data') dataDock.style.zIndex = String(state.zTop);
    }

    function snapDockToEdges(el){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const x = r.left - stage.left;
      const y = r.top - stage.top;
      const leftGap = x;
      const rightGap = stage.width - (x + r.width);
      const topGap = y;
      const bottomGap = stage.height - (y + r.height);
      const m = 14;
      let nx = x, ny = y;
      if(leftGap < m) nx = 4;
      else if(rightGap < m) nx = stage.width - r.width - 4;
      if(topGap < m) ny = 4;
      else if(bottomGap < m) ny = stage.height - r.height - 4;
      setDockPos(el, nx, ny);
    }

    function makeDockDraggable(el, head, kind){
      let dragging = false;
      let offX = 0, offY = 0;
      head.addEventListener('pointerdown', (e)=>{
        if(e.target.closest('button')) return;
        dragging = true;
        el.classList.add('dragging');
        bringToFront(kind);
        const r = el.getBoundingClientRect();
        offX = e.clientX - r.left;
        offY = e.clientY - r.top;
        state.dockMoved[kind] = true;
        head.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      head.addEventListener('pointermove', (e)=>{
        if(!dragging) return;
        const stage = stageEl.getBoundingClientRect();
        setDockPos(el, e.clientX - stage.left - offX, e.clientY - stage.top - offY);
        e.preventDefault();
      });
      const end = ()=>{
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        snapDockToEdges(el);
      };
      head.addEventListener('pointerup', end);
      head.addEventListener('pointercancel', end);
    }

        }
      }finally{
        if(runId === state.autoRunId){
          const stopped = state.autoStopRequested;
          state.autoPlaying = false;
          state.autoStopRequested = false;
          showDemoCursor(false);
          modeTag.textContent = `模式：${state.freeMode ? '自由' : '引导'}`;
          refreshAutoDemoButton();
          recordBtn.disabled = false;
          analyzeBtn.disabled = false;
          resetBtn.disabled = false;
          freeBtn.disabled = false;
          if(stopped) setStatus('已退出自动演示');
        }
      }
    }

    function bindEvents(){
      controlToggleBtn.addEventListener('click', ()=>setControlCollapsed(!state.controlCollapsed));
      dataToggleBtn.addEventListener('click', ()=>setDataCollapsed(!state.dataCollapsed));

      recordBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) addRecord(); });
      analyzeBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) analyzeConclusion(true); });
      clearBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) clearData(true); });
      resetBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) resetFlow(true); });
      autoDemoBtn.addEventListener('click', ()=>{
        if(state.autoPlaying) requestStopAutoDemo();
        else autoDemo();
      });
      freeBtn.addEventListener('click', ()=>{ if(!state.autoPlaying) setFreeMode(!state.freeMode); });
      okBtn.addEventListener('click', ()=>{ doneMaskEl.style.display = 'none'; });

      const onResize = (()=>{
        let t = 0;
        return ()=>{
          clearTimeout(t);
          t = setTimeout(()=>{
            if(!state.dockMoved.control || !state.dockMoved.data) initDockPositions(false);
            snapDockToEdges(controlDock);
            snapDockToEdges(dataDock);
            scheduleChart();
          }, 130);
        };
      })();

      window.addEventListener('resize', onResize);
      window.addEventListener('orientationchange', onResize);
      document.addEventListener('gesturestart', e=>e.preventDefault(), {passive:false});

      controlDock.addEventListener('pointerdown', ()=>bringToFront('control'));
      dataDock.addEventListener('pointerdown', ()=>bringToFront('data'));
      bindLab15StageInteraction();
      bindLab27StageInteraction();
    }

    function init(){
      initUIStatic();
      initTaskUI();
      state.apparatus = makeInitialApparatus();
      if(LAB_ID === 27) refreshLab27Setup(false);
      initControls();
      initActionButtons();
      updatePills();
      renderRecords();

      makeDockDraggable(controlDock, controlHead, 'control');
      makeDockDraggable(dataDock, dataHead, 'data');
      bindEvents();

      setControlCollapsed(shouldStartControlCollapsed());
      setDataCollapsed(true);
      initDockPositions(true);
      refreshAutoDemoButton();
      if(LAB_ID === 27) refreshLab27Setup(true);
      else setStatus('待开始');

      state.lastTs = 0;
      if(state.rafId) cancelAnimationFrame(state.rafId);
      state.rafId = requestAnimationFrame(loop);
      scheduleChart();
    }

    init();
  </script>

<script id="exp35-ui-normalize-runtime">
(function(){
  "use strict";
  var $ = function(selector){ return document.querySelector(selector); };
  var hintLamp = $("#hintLamp");
  var hintPop = $("#hintPop");
  var taskHint = $("#taskHint");
  var taskText = $("#taskText");
  var dataDock = $("#dataDock");
  var dataNotice = $("#dataNotice");
  var recordBody = $("#recordBody");
  var recordChart = $("#recordChart");
  var modalTitle = $("#doneMask .modal h3");

  try {
    if (typeof state !== "undefined") window.state = state;
  } catch (_) {}

  if (modalTitle && !/实验完成/.test(modalTitle.textContent || "")) {
    modalTitle.textContent = "实验完成";
  }

  function updateHintText(){
    if (!hintPop) return;
    var hint = taskHint ? taskHint.textContent.trim() : "";
    var text = taskText ? taskText.textContent.trim() : "";
    hintPop.textContent = hint || text || "按步骤操作器材，观察现象并记录数据。";
  }

  if (hintLamp && hintPop && !hintLamp.dataset.exp35Bound) {
    hintLamp.dataset.exp35Bound = "1";
    updateHintText();
    hintLamp.addEventListener("click", function(){
      updateHintText();
      hintPop.classList.toggle("open");
    });
  }

  function drawRecordChart(){
    if (!recordChart) return;
    var ctx = recordChart.getContext("2d");
    if (!ctx) return;
    var dpr = window.devicePixelRatio || 1;
    var w = recordChart.clientWidth || 320;
    var h = recordChart.clientHeight || 180;
    var nextW = Math.max(1, Math.round(w * dpr));
    var nextH = Math.max(1, Math.round(h * dpr));
    if (recordChart.width !== nextW || recordChart.height !== nextH) {
      recordChart.width = nextW;
      recordChart.height = nextH;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = "rgba(0,0,0,.18)";
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = "rgba(155,211,255,.22)";
    ctx.lineWidth = 1;
    for (var x = 24; x < w; x += 32) {
      ctx.beginPath(); ctx.moveTo(x, 14); ctx.lineTo(x, h - 18); ctx.stroke();
    }
    for (var y = 28; y < h - 8; y += 30) {
      ctx.beginPath(); ctx.moveTo(12, y); ctx.lineTo(w - 12, y); ctx.stroke();
    }
    var rows = recordBody ? Array.from(recordBody.querySelectorAll("tr")).filter(function(row){
      return row.querySelectorAll("td").length > 1 && !/当前无记录|暂无|还没有记录/.test(row.textContent);
    }) : [];
    ctx.font = "700 13px Arial";
    ctx.fillStyle = "#cfe4ff";
    ctx.fillText("记录概览", 16, 24);
    if (!rows.length) {
      ctx.font = "12px Arial";
      ctx.fillStyle = "rgba(235,245,255,.64)";
      ctx.fillText("完成步骤后，这里显示记录进度。", 16, 52);
      return;
    }
    var max = Math.max(3, rows.length);
    rows.slice(0, 8).forEach(function(row, index){
      var barW = (w - 96) * ((index + 1) / max);
      var y = 46 + index * 20;
      ctx.fillStyle = ["#ffd54f", "#3ddc97", "#5bbcff", "#ef476f"][index % 4];
      ctx.fillRect(72, y - 10, barW, 9);
      ctx.fillStyle = "rgba(235,245,255,.86)";
      ctx.font = "12px Arial";
      ctx.fillText("记录 " + (index + 1), 16, y);
    });
  }

  if (recordBody && recordChart && !recordChart.dataset.exp35Bound) {
    recordChart.dataset.exp35Bound = "1";
    new MutationObserver(drawRecordChart).observe(recordBody, { childList:true, subtree:true, characterData:true });
    window.addEventListener("resize", drawRecordChart);
    setTimeout(drawRecordChart, 60);
  }

  if (dataDock && dataNotice && !dataDock.dataset.exp35NoticeBound) {
    dataDock.dataset.exp35NoticeBound = "1";
    var clearNotice = function(){
      dataNotice.textContent = "0";
      dataNotice.classList.remove("show");
      dataNotice.classList.add("hidden");
    };
    dataDock.addEventListener("click", function(evt){
      if (evt.target && evt.target.id === "dataToggleBtn") setTimeout(clearNotice, 20);
    });
  }
})();
</script>


<script id="exp35-ui-completion-drawer-fit">
(function(){
  "use strict";
  var $ = function(selector){ return document.querySelector(selector); };
  var stage = $("#stage");
  var controlDock = $("#controlDock");
  var dataDock = $("#dataDock");
  var controlBody = $("#controlBody");
  var dataBody = $("#dataBody");
  var controlToggle = $("#controlToggleBtn");
  var dataToggle = $("#dataToggleBtn");
  var doneMask = $("#doneMask");

  function isDone(){
    var modalDone = doneMask && getComputedStyle(doneMask).display !== "none";
    var stateDone = false;
    try { stateDone = !!window.state && !!window.state.completed; } catch (_) {}
    return modalDone || stateDone;
  }

  function setPanelCollapsed(dock, body, toggle, collapsed){
    if (dock) dock.classList.toggle("collapsed", collapsed);
    if (body) body.classList.toggle("collapsed", collapsed);
    if (toggle) toggle.textContent = collapsed ? "展开" : "收起";
  }

  function placeDock(dock, left, top){
    if (!dock || !stage) return;
    var sw = stage.clientWidth;
    var sh = stage.clientHeight;
    var w = dock.offsetWidth || 160;
    var h = dock.offsetHeight || 44;
    var x = Math.max(10, Math.min(left, sw - w - 10));
    var y = Math.max(10, Math.min(top, sh - h - 10));
    dock.style.left = x + "px";
    dock.style.top = y + "px";
    dock.style.right = "auto";
  }

  function fitCompletionDrawers(){
    if (!stage || !controlDock || !dataDock || !isDone()) return;
    setPanelCollapsed(controlDock, controlBody, controlToggle, true);
    setPanelCollapsed(dataDock, dataBody, dataToggle, false);
    var sw = stage.clientWidth;
    var controlW = controlDock.offsetWidth || 160;
    var dataW = dataDock.offsetWidth || 260;
    var controlX = sw - controlW - 10;
    var dataX = sw - dataW - 10;
    placeDock(controlDock, controlX, 10);
    placeDock(dataDock, dataX, 10 + (controlDock.offsetHeight || 44) + 10);
  }

  if (!stage || !controlDock || !dataDock) return;
  window.addEventListener("resize", function(){ requestAnimationFrame(fitCompletionDrawers); });
  setInterval(fitCompletionDrawers, 450);
})();
</script>
