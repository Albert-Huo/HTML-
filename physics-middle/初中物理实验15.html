<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>初中物理实验15｜观察分子之间存在引力的现象（交互版）</title>
  <!-- 实验目录依据：中小学实验教学目录（初中物理 15. 观察分子之间存在引力的现象） -->
  <style>
    :root{
      --bg:#1a1a1a;
      --ink:#fff;
      --card-bg:rgba(255,255,255,.08);
      --panel-bg:rgba(15,15,15,.58);
      --line:rgba(255,255,255,.12);
      --accent:#3ddc97;
      --warn:#ffb74d;
      --dockShadow:0 14px 36px rgba(0,0,0,.42);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:10px;
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    #spectrum{
      position:relative;
      width:100%;
      max-width:980px;
      height:40px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,255,255,.15);
      margin:0 0 12px;
      background:#000;
      flex-shrink:0;
    }
    #spectrum::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
      background-size:200% 100%;
      animation:flowRainbow 6s linear infinite;
    }
    @keyframes flowRainbow{ 0%{background-position:0 0;} 100%{background-position:-100% 0;} }

    .task-card{
      width:100%;
      max-width:980px;
      background:var(--card-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      backdrop-filter:blur(6px);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:10px;
      transition:opacity .2s, filter .2s;
    }
    .task-step{ background:rgba(255,255,255,.16); border-radius:8px; padding:6px 10px; font-weight:700; white-space:nowrap; }
    .task-text{ line-height:1.55; }
    .task-hint{ color:#ffd54f; font-size:12px; opacity:.95; margin-top:2px; }
    .progress-dots{ display:flex; gap:6px; }
    .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.26); outline:2px solid rgba(255,255,255,.12); }
    .dot.active{ background:var(--warn); }
    .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,.45); }
    .dot.warn{ background:#ff4d4f; outline-color:rgba(255,77,79,.58); box-shadow:0 0 10px rgba(255,77,79,.62); }

    #stage{
      width:100%;
      max-width:980px;
      height:66vh;
      max-height:660px;
      min-height:500px;
      margin-top:10px;
      border-radius:12px;
      position:relative;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:#0b0f14;
      box-shadow:0 10px 26px rgba(0,0,0,.35);
      touch-action:none;
      background-image:
        radial-gradient(circle at 76% 25%, rgba(255,255,255,.06), transparent 42%),
        radial-gradient(circle at 22% 78%, rgba(0,255,255,.05), transparent 46%);
    }
    .hud{
      position:absolute;
      left:10px;
      top:10px;
      z-index:20;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      background:rgba(0,0,0,.48);
      border:1px solid var(--line);
      border-radius:10px;
      padding:7px 10px;
      font-size:12px;
    }
    .tag{ border:1px solid rgba(255,255,255,.26); border-radius:999px; padding:2px 8px; font-weight:700; color:#dce9ff; background:rgba(255,255,255,.06); }

    .lab-area{
      position:absolute;
      inset:54px 10px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(5,10,16,.82);
      overflow:hidden;
    }
    #scene{ width:100%; height:100%; display:block; touch-action:none; }

    .dock{
      position:absolute;
      width:min(94%, 380px);
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--panel-bg);
      backdrop-filter:blur(6px);
      box-shadow:var(--dockShadow);
      overflow:hidden;
      touch-action:none;
      z-index:30;
    }
    .dock.dragging{ box-shadow:0 20px 48px rgba(0,0,0,.55); }
    .dockHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:8px 10px;
      border-bottom:1px solid rgba(255,255,255,.1);
      background:rgba(255,255,255,.04);
      cursor:grab;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
    }
    .dockHead:active{ cursor:grabbing; }
    .dockTitle{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700; color:#e7f0ff; }
    .dataNotice{
      display:none;
      min-width:18px;
      height:18px;
      padding:0 4px;
      border-radius:999px;
      background:#ff3040;
      color:#fff;
      font-size:11px;
      line-height:18px;
      text-align:center;
      font-weight:800;
      box-shadow:0 0 0 2px rgba(255,48,64,.26);
      animation:dataNoticeBlink .9s ease-in-out infinite;
    }
    .dataNotice.show{ display:inline-block; }
    @keyframes dataNoticeBlink{
      0%,100%{ transform:scale(1); opacity:1; }
      50%{ transform:scale(1.18); opacity:.56; }
    }
    .dockBtns{ display:flex; gap:6px; }
    .iconBtn{ border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08); color:#e8f1ff; border-radius:7px; padding:4px 8px; font-size:12px; cursor:pointer; }
    .dockBody{ padding:10px; max-height:360px; overflow:auto; -webkit-overflow-scrolling:touch; }
    .dockBody.collapsed{ display:none; }

    .row{ margin-bottom:8px; font-size:12px; }
    .lab-hint{ color:#dce9ff; line-height:1.55; }
    .status-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
    .pill{ border:1px solid rgba(255,255,255,.2); border-radius:999px; padding:4px 8px; font-size:11px; color:#e8f1ff; background:rgba(0,0,0,.28); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .field{ border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.2); margin-bottom:8px; }
    .field .name{ display:flex; justify-content:space-between; font-size:12px; color:#dce9ff; margin-bottom:6px; gap:8px; }
    .field input[type="range"], .field select{ width:100%; }
    .field select{ border:1px solid rgba(255,255,255,.25); border-radius:8px; background:rgba(0,0,0,.4); color:#fff; padding:6px 8px; }

    .btnRow{ display:flex; gap:8px; flex-wrap:wrap; }
    button.main, button.sub{
      border:none;
      border-radius:8px;
      padding:8px 12px;
      color:#fff;
      cursor:pointer;
      transition:background .2s, transform .05s, opacity .2s;
      user-select:none;
      -webkit-tap-highlight-color:transparent;
      font-size:13px;
    }
    button.main{ background:#2e7d32; }
    button.sub{ background:#444; }
    button.main:hover, button.sub:hover{ background:#5a5a5a; }
    button.main:active, button.sub:active{ transform:scale(.98); }
    button.main:disabled, button.sub:disabled{ opacity:.5; cursor:not-allowed; }

    .analysis{ font-size:12px; line-height:1.6; color:#e3efff; border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:8px; background:rgba(0,0,0,.24); }
    .analysis.ok{ border-color:rgba(61,220,151,.4); }
    table.record{ width:100%; border-collapse:collapse; margin-top:8px; font-size:12px; }
    table.record th, table.record td{ border:1px solid rgba(255,255,255,.12); padding:4px 5px; text-align:center; }
    table.record th{ background:rgba(255,255,255,.08); color:#dce9ff; font-weight:700; }
    .chartWrap{ margin-top:8px; border:1px solid rgba(255,255,255,.12); border-radius:10px; background:rgba(0,0,0,.25); overflow:hidden; }
    #chart{ width:100%; height:170px; display:block; }

    .checkmark{
      position:absolute;
      z-index:60;
      left:50%;
      top:18%;
      transform:translate(-50%,-50%) scale(.6);
      width:120px;
      height:120px;
      border-radius:50%;
      background:rgba(61,220,151,.15);
      border:3px solid var(--accent);
      display:none;
      align-items:center;
      justify-content:center;
      box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25);
      animation:pop .55s ease-out;
      pointer-events:none;
    }
    .checkmark.active{ display:flex; }
    .checkmark > div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }
    @keyframes pop{ 0%{transform:translate(-50%,-50%) scale(.4);opacity:.2;} 60%{transform:translate(-50%,-50%) scale(1.08);opacity:1;} 100%{transform:translate(-50%,-50%) scale(1);} }

    .demoCursor{
      position:absolute;
      z-index:140;
      width:26px;
      height:26px;
      left:-200px;
      top:-200px;
      opacity:0;
      pointer-events:none;
      transition:left .48s cubic-bezier(.22,.61,.36,1), top .48s cubic-bezier(.22,.61,.36,1), opacity .2s ease, transform .12s ease;
      filter:drop-shadow(0 1px 2px rgba(0,0,0,.55));
    }
    .demoCursor.show{ opacity:1; }
    .demoCursor.clicking{ transform:scale(.9); }
    .demoCursor.dragging{ filter:drop-shadow(0 2px 4px rgba(61,220,151,.7)); }
    .demoCursor svg{ display:block; width:100%; height:100%; }
    .demoCursorPulse{
      position:absolute;
      z-index:139;
      width:24px;
      height:24px;
      border-radius:50%;
      border:2px solid rgba(255,195,74,.95);
      left:-200px;
      top:-200px;
      opacity:0;
      pointer-events:none;
      transform:translate(-50%,-50%) scale(.35);
    }
    .demoCursorPulse.active{ animation:cursorPulse .45s ease-out; }
    @keyframes cursorPulse{
      0%{ opacity:.95; transform:translate(-50%,-50%) scale(.35); }
      100%{ opacity:0; transform:translate(-50%,-50%) scale(1.5); }
    }

    .toolbar{ width:100%; max-width:980px; margin-top:12px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-start; }
    .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,.82); color:#fff; padding:10px 14px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200; }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

    .modal-mask{ position:fixed; inset:0; display:none; align-items:center; justify-content:center; z-index:300; background:rgba(0,0,0,.5); }
    .modal{ width:min(90vw, 380px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
    .modal h3{ margin:8px 0 6px; font-size:20px; }
    .modal p{ margin-top:0; line-height:1.55; color:#cfd8dc; }
    .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; }

    .explanation{ width:100%; max-width:980px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:#e9f2ff; }
    .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em; }

    @media (max-width:760px){
      .task-card{ grid-template-columns:1fr; }
      .task-step{ width:fit-content; }
      #stage{ height:76vh; max-height:920px; }
      .dock{ width:min(96%, 380px); }
      .hud{ left:8px; right:8px; }
    }
  

/* exp35-ui-normalize: shared shell compatibility */
.hint-lamp{
  position:absolute;
  left:10px;
  top:56px;
  z-index:42;
  width:34px;
  height:34px;
  border-radius:8px;
  display:grid;
  place-items:center;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.2);
  color:#ffd54f;
  font-size:16px;
  cursor:pointer;
  padding:0;
}
.hint-lamp.flash{ animation:lampFlash35 .6s ease; }
@keyframes lampFlash35{
  0%,100%{ box-shadow:none; }
  50%{ box-shadow:0 0 22px rgba(255,77,79,.86); border-color:#ff4d4f; color:#ffb0b0; }
}
.hint-pop{
  position:absolute;
  left:10px;
  top:96px;
  z-index:43;
  width:min(330px, calc(100% - 24px));
  display:none;
  padding:10px 12px;
  border:1px solid rgba(255,209,102,.36);
  border-radius:10px;
  background:rgba(16,18,20,.9);
  color:#f4efe2;
  font-size:13px;
  line-height:1.55;
}
.hint-pop.open{ display:block; }
.drawer{
  border:1px solid var(--line, rgba(255,255,255,.12));
  background:var(--panel-bg, rgba(15,15,15,.58));
  backdrop-filter:blur(6px);
  touch-action:none;
}
.drawer-header{ cursor:grab; user-select:none; -webkit-user-select:none; touch-action:none; }
.drawer-header:active{ cursor:grabbing; }
.drawer-title{ display:flex; align-items:center; gap:6px; }
.drawer-actions{ display:flex; align-items:center; gap:6px; }
.drawer-body{ max-height:360px; overflow:auto; -webkit-overflow-scrolling:touch; }
.chartWrap.exp35-record-chart{
  height:180px;
  margin-top:10px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:8px;
  overflow:hidden;
  background:rgba(0,0,0,.18);
}
#recordChart{ width:100%; height:100%; display:block; }
.explanation h2{ color:#9bd3ff; }
.modal h3{ color:#fff; }
@media (max-width:720px){
  .hint-lamp{ top:56px; }
  .hint-pop{ top:96px; }
  .drawer-body{ max-height:260px; }
}

  </style>
</head>
<body>
  <div id="spectrum"></div>

  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 4</div>
    <div class="task-text">
      <div id="taskText"></div>
      <div class="task-hint" id="taskHint"></div>
    </div>
    <div class="progress-dots" id="dots"></div>
  </div>

  <div id="stage">
    <div class="hud">
      <span class="tag" id="modeTag">模式: 引导</span>
      <span class="tag" id="statusTag">状态: 待开始</span>
    </div>

    
    <button class="hint-lamp" id="hintLamp" type="button" aria-label="查看提示">💡</button>
    <div class="hint-pop" id="hintPop"></div>
<div class="lab-area" id="labArea">
      <canvas id="scene"></canvas>
    </div>

    <div class="dock drawer control" id="controlDock" style="left:10px; bottom:10px;">
      <div class="dockHead drawer-header" id="controlHead" data-drag-handle>
        <div class="dockTitle drawer-title">实验面板</div>
        <div class="dockBtns drawer-actions"><button class="iconBtn" id="controlToggleBtn">收起</button></div>
      </div>
      <div class="dockBody drawer-body" id="controlBody">
        <div class="row lab-hint" id="apparatusHint"></div>
        <div class="status-grid">
          <div class="pill" id="pillA">关键状态A</div>
          <div class="pill" id="pillB">关键状态B</div>
          <div class="pill" id="pillC">关键状态C</div>
          <div class="pill" id="pillD">关键状态D</div>
        </div>
        <div id="controlFields"></div>
        <div class="btnRow" id="actionBtns"></div>
        <div class="btnRow" style="margin-top:8px;">
          <button class="sub" id="recordBtn">记录当前数据</button>
          <button class="sub" id="analyzeBtn">分析结论</button>
        </div>
      </div>
    </div>

    <div class="dock drawer data" id="dataDock" style="right:10px; bottom:10px; left:auto;">
      <div class="dockHead drawer-header" id="dataHead" data-drag-handle>
        <div class="dockTitle drawer-title">数据面板<span class="dataNotice" id="dataNotice">0</span></div>
        <div class="dockBtns drawer-actions">
          <button class="iconBtn" id="clearBtn">清空</button>
          <button class="iconBtn" id="dataToggleBtn">展开</button>
        </div>
      </div>
      <div class="dockBody collapsed drawer-body" id="dataBody">
        <div class="analysis" id="analysisText">暂无。请按步骤操作器材并记录数据后分析。</div>
        <table class="record">
          <thead><tr><th id="th1">条件</th><th id="th2">读数1</th><th id="th3">读数2</th><th id="th4">备注</th></tr></thead>

        </table>

        <div class="chartWrap exp35-record-chart"><canvas id="recordChart"></canvas></div>
      </div>
    </div>

    <div class="checkmark" id="checkmark"><div></div></div>

      <svg viewBox="0 0 24 24" role="img" aria-label="自动演示鼠标">
        <path d="M3 2.5L10.2 20.8L12.7 12.9L20.8 10.3L3 2.5Z" fill="#ffffff" stroke="#111820" stroke-width="1.3" />
      </svg>
    </div>
    <div class="demoCursorPulse" id="demoCursorPulse" aria-hidden="true"></div>

  <div class="toolbar">
    <button class="sub" id="resetBtn">步骤重置</button>

      <h3 id="doneTitle">实验完成</h3>
      <p id="doneText">你已完成本实验的核心操作链与数据分析。</p>
      <button class="sub ok" id="okBtn">OK</button>

  <div class="explanation">
    <h2 id="expTitle"></h2>
    <ul id="expBullets"></ul>
  </div>

  <script>
    const LAB_ID = 15;

    const LABS = {
      14:{
        name:'观察分子之间存在间隙的现象',
        catalog:'中小学实验教学目录 初中物理 14',
        textbook:'人教版初中物理 分子热运动相关观察活动（目录条目对齐）',
        apparatusHint:'器材：量筒A(50mL水) + 量筒B(50mL酒精) + 混合量筒 + 漏斗。先后倒入并摇匀后读数。',
        bullets:[
          '向同一量筒中倒入水和酒精，混合后总体积通常小于两者体积之和。',
          '该现象说明分子之间存在间隙，分子可进入彼此间隙。',
          '实验结论来自量筒读数变化与混合前后对比。'
        ],
        tableHeaders:['操作条件','理论体积(mL)','实测体积(mL)','备注'],
        controls:[
          {key:'shakeLevel', label:'摇匀程度', type:'range', min:1, max:5, step:1, unit:'级', def:3}
        ],
        actions:[
          {id:'pourWater', label:'倒入水'},
          {id:'pourAlcohol', label:'倒入酒精'},
          {id:'shakeRead', label:'摇匀并读数'}
        ],
        tasks:[
          {text:'先将<b>50mL水</b>倒入混合量筒。', hint:'点击“倒入水”。'},
          {text:'再将<b>50mL酒精</b>倒入同一量筒。', hint:'点击“倒入酒精”。'},
          {text:'摇匀后读取混合体积并与100mL比较。', hint:'点击“摇匀并读数”，观察是否小于100mL。'},
          {text:'点击“分析结论”，完成本实验。', hint:'结论应包含“分子间有间隙”。'}
        ]
      },
      15:{
        name:'观察分子之间存在引力的现象',
        catalog:'中小学实验教学目录 初中物理 15',
        textbook:'人教版初中物理 分子动理论相关观察活动（目录条目对齐）',
        apparatusHint:'器材：两块铅柱(或金属块) + 砂纸/刮刀 + 横向螺旋夹具 + 弹簧测力计。',
        bullets:[
          '将接触面处理干净并压紧后，两块金属块间会出现较明显吸附。',
          '用弹簧测力计拉伸可观察到分开前需要一定拉力。',
          '实验体现了分子之间存在引力。'
        ],
        tableHeaders:['拉力条件','测力计读数(N)','是否分离','备注'],
        controls:[
          {key:'pullN', label:'拉力设定', type:'range', min:1, max:8, step:0.5, unit:'N', def:3}
        ],
        actions:[
          {id:'scrape', label:'打磨提示'},
          {id:'press', label:'确认压紧'},
          {id:'pullTest', label:'拉伸测力'}
        ],
        tasks:[
          {text:'先用砂纸/刮刀往返打磨两块接触面。', hint:'在画布中拖动刮刀，直到打磨进度达到100%。'},
          {text:'再用横向夹具压紧两块金属块。', hint:'拖动夹具手柄向左旋紧，压紧度达到阈值。'},

    function stagePointFromClient(clientX, clientY){
      const stage = stageEl.getBoundingClientRect();
      return {
        x: clamp(clientX - stage.left, 0, stage.width),
        y: clamp(clientY - stage.top, 0, stage.height)
      };
    }

    function scenePointToStage(x, y){
      const stage = stageEl.getBoundingClientRect();
      const sc = scene.getBoundingClientRect();
      return {
        x: clamp(sc.left - stage.left + x, 0, stage.width),
        y: clamp(sc.top - stage.top + y, 0, stage.height)
      };
    }

    function stagePointToScene(x, y){
      const stage = stageEl.getBoundingClientRect();
      const sc = scene.getBoundingClientRect();
      return {
        x: clamp(x - (sc.left - stage.left), 0, sc.width),
        y: clamp(y - (sc.top - stage.top), 0, sc.height)
      };
    }

    function getElementStageCenter(el){
      if(!el) return null;
      const r = el.getBoundingClientRect();
      return stagePointFromClient(r.left + r.width * 0.5, r.top + r.height * 0.5);
    }

    async function moveDemoCursorToStage(x, y, ms=520){
      if(!demoCursorEl){ await sleep(ms); return; }
      const dur = Math.max(120, Math.round(ms));
      demoCursorEl.style.transitionDuration = `${dur}ms`;
      demoCursorEl.style.left = `${round(x, 1)}px`;
      demoCursorEl.style.top = `${round(y, 1)}px`;
      await sleep(dur + 60);
    }

    async function clickDemoCursor(ms=260){
      if(!demoCursorEl || !demoCursorPulseEl){ await sleep(ms); return; }
      demoCursorEl.classList.add('clicking');
      const x = Number.parseFloat(demoCursorEl.style.left || '0');
      const y = Number.parseFloat(demoCursorEl.style.top || '0');
      demoCursorPulseEl.style.left = `${x}px`;
      demoCursorPulseEl.style.top = `${y}px`;
      demoCursorPulseEl.classList.remove('active');
      void demoCursorPulseEl.offsetWidth;
      demoCursorPulseEl.classList.add('active');
      await sleep(ms);
      demoCursorEl.classList.remove('clicking');
    }

    async function dragDemoCursorPath(points, segmentMs=520, onMove=null){
      if(!demoCursorEl || !Array.isArray(points) || !points.length) return;
      demoCursorEl.classList.add('dragging');
      await moveDemoCursorToStage(points[0].x, points[0].y, Math.max(180, segmentMs));
      if(typeof onMove === 'function') onMove(points[0], 0);
      await clickDemoCursor(160);
      for(let i=1;i<points.length;i++){
        const from = points[i-1];
        const to = points[i];
        const dur = Math.max(220, segmentMs);
        const steps = Math.max(10, Math.round(dur / 40));
        for(let s=1;s<=steps;s++){
          const t = s / steps;
          const x = from.x + (to.x - from.x) * t;
          const y = from.y + (to.y - from.y) * t;
          demoCursorEl.style.transitionDuration = '0ms';
          demoCursorEl.style.left = `${round(x, 1)}px`;
          demoCursorEl.style.top = `${round(y, 1)}px`;
          if(typeof onMove === 'function') onMove({x, y}, i);
          await sleep(Math.max(14, Math.round(dur / steps)));
        }
      }
      demoCursorEl.classList.remove('dragging');
      await clickDemoCursor(140);
    }

    function initControls(){
      state.vars = {};
      controlFields.innerHTML = '';
      for(const def of LAB.controls){
        state.vars[def.key] = def.def;
        const wrap = document.createElement('div');
        wrap.className = 'field';
        wrap.innerHTML = `<div class="name"><span>${def.label}</span><span id="pill_${def.key}"></span></div>`;
        if(def.type === 'range'){
          const input = document.createElement('input');
          input.type = 'range';
          input.min = String(def.min);
          input.max = String(def.max);
          input.step = String(def.step);
          input.value = String(def.def);
          input.addEventListener('input', ()=>{
            state.vars[def.key] = Number(input.value);
            refreshControlPill(def);
          });
          wrap.appendChild(input);
        }else if(def.type === 'select'){
          const sel = document.createElement('select');
          for(const [val,text] of def.options){
            const op = document.createElement('option');
            op.value = val;
            op.textContent = text;
            if(val === def.def) op.selected = true;
            sel.appendChild(op);
          }
          sel.addEventListener('change', ()=>{
            state.vars[def.key] = sel.value;
            refreshControlPill(def);
            if(LAB_ID === 16 && def.key === 'object'){
              state.apparatus.object = sel.value;
              state.apparatus.startCm = randIn(1.6, 3.8);

              state.apparatus.lastRead = null;

          });
          wrap.appendChild(sel);
        }
        controlFields.appendChild(wrap);
        refreshControlPill(def);
      }
    }

    function refreshControlPill(def){
      const pill = $(`#pill_${def.key}`);
      if(!pill) return;
      const v = state.vars[def.key];
      if(def.type === 'range') pill.textContent = `${v}${def.unit || ''}`;
      else {
        const hit = def.options.find(x=>x[0]===v);
        pill.textContent = hit ? hit[1] : String(v);
      }
    }

    function setVar(key, value){

      if(!field) return;
      const inp = field.querySelector('input[type="range"]');
      const sel = field.querySelector('select');
      if(inp) inp.value = String(value);
      if(sel) sel.value = String(value);
      const def = LAB.controls.find(d=>d.key===key);
      if(def) refreshControlPill(def);
    }

    function resetControlVarsToDefaults(){
      for(const def of LAB.controls){
        setVar(def.key, def.def);
      }
    }

    function initActionButtons(){
      actionBtns.innerHTML = '';
      for(const a of LAB.actions){
        const b = document.createElement('button');
        b.dataset.actionId = a.id;
        b.className = a.id.includes('run') || a.id.includes('apply') || a.id.includes('measure') || a.id.includes('stopWatch') ? 'main' : 'sub';
        b.textContent = a.label;
        b.addEventListener('click', ()=>{ if(!state.autoPlaying) performAction(a.id, true); });
        actionBtns.appendChild(b);
      }
    }

    function performAction(actionId, showStep=true){
      const ap = state.apparatus;
      let changed = false;

      switch(LAB_ID){
        case 14:{
          if(actionId === 'pourWater' && !ap.pouredWater){ ap.pouredWater = true; ap.waterMl = 0; ap.mixMl += 50; changed = true; setStatus('已倒入水'); }
          if(actionId === 'pourAlcohol' && !ap.pouredAlcohol){ ap.pouredAlcohol = true; ap.alcoholMl = 0; ap.mixMl += 50; changed = true; setStatus('已倒入酒精'); }
          if(actionId === 'shakeRead'){
            if(!(ap.pouredWater && ap.pouredAlcohol)){ showToast('需先倒入两种液体'); break; }
            ap.shaken = true;
            const shrink = 3 + (5 - state.vars.shakeLevel) * 0.5;
            ap.mixRead = round(100 - shrink, 1);
            ap.mixMl = ap.mixRead;
            changed = true;
            setStatus('已摇匀并读数');
          }
          break;
        }
        case 15:{
          if(!state.autoPlaying && !state.freeMode){
            const needActionByStep = ['scrape', 'press', 'pullTest', null];
            const expected = needActionByStep[state.currentTask] || null;
            if(expected && actionId !== expected){
              warnCurrentStep(`请先完成当前步骤：${LAB.tasks[state.currentTask].hint}`);
              setStatus(`越步操作已拦截（当前应完成步骤${state.currentTask + 1}）`);
              return false;
            }
          }
          if(actionId === 'scrape'){
            if(state.autoPlaying){
              ap.leftPolish = 100;
              ap.rightPolish = 100;
              ap.scrapeProgress = 100;
              ap.scraped = true;
              changed = true;
              setStatus('接触面已完成打磨');
            }else{
              showToast('请在画布中拖动刮刀，往返打磨两侧接触面');
              setStatus('等待打磨操作');
            }
          }
          if(actionId === 'press'){
            if(state.autoPlaying){
              ap.clampLevel = 1;
              ap.pressed = true;
              ap.clampDone = true;
              ap.adhered = ap.scraped;
              ap.separated = false;
              changed = true;
              setStatus(ap.adhered ? '横向夹具已压紧' : '夹紧完成但接触面未充分处理');
            }else if(!ap.scraped){
              warnCurrentStep('步骤1未完成，不能进行压紧操作');
              showToast('请先完成打磨，再进行压紧');
            }else if(ap.clampLevel < 0.82){
              showToast('请继续拖动夹具手柄，压紧度需达到阈值');
            }else{
              ap.pressed = true;
              ap.clampDone = true;
              ap.adhered = true;
              ap.separated = false;
              changed = true;
              setStatus('横向夹具已压紧');
            }
          }
          if(actionId === 'pullTest'){
            ap.pullN = Number(state.vars.pullN);
            const polish = (clamp(ap.leftPolish,0,100) + clamp(ap.rightPolish,0,100)) / 200;
            const threshold = round(2.0 + 2.2 * polish + 2.0 * clamp(ap.clampLevel,0,1) + (ap.pressed ? 0.6 : 0), 1);
            ap.tested = true;
            if(ap.pullN >= threshold){
              ap.separated = true;
              ap.adhered = false;
              ap.pressed = false;
              ap.clampLevel = 0;
            }else{
              ap.separated = false;
              ap.adhered = ap.scraped && ap.pressed;
            }
            changed = true;
            setStatus(ap.separated ? '样件已分离（夹具已回松）' : `仍保持吸附（分离阈值约${threshold}N）`);
            addRecord();
            if(!state.autoPlaying){
              showToast('本次拉伸已自动记录');
            }
          }
          break;
        }
        case 16:{
          const len = OBJECT_LENGTHS[state.vars.object];
          if(actionId === 'alignZero'){
            ap.object = state.vars.object;
            ap.startCm = 0;
            ap.aligned = true;
            ap.alignedCount += 1;
            changed = true;
            setStatus('已对齐零刻度');
          }
          if(actionId === 'measureLength'){
            if(!ap.aligned){ showToast('请先对齐零刻度'); break; }
            ap.lastRead = round(len + randIn(-0.08, 0.08), 2);
            ap.measureCount += 1;
            changed = true;
            setStatus(`读数完成：${ap.lastRead}cm`);
          }
          if(actionId === 'nextObject'){
            const order = ['pencil','eraser','key'];
            const idx = order.indexOf(state.vars.object);
            const next = order[(idx + 1) % order.length];
            setVar('object', next);
            ap.object = next;
            ap.startCm = round(randIn(1.4, 3.9), 2);
            ap.aligned = false;
            ap.lastRead = null;
            changed = true;
            setStatus(`已更换物体：${nameOfObject(next)}`);
          }
          break;
        }
        case 17:{
          if(actionId === 'startPendulum'){
            ap.pendulumOn = true;
            changed = true;
            setStatus('摆球已启动');
          }
          if(actionId === 'startWatch'){
            if(!ap.pendulumOn){ showToast('请先启动摆球'); break; }
            ap.stopwatchRunning = true;
            ap.stopwatchStart = performance.now();
            changed = true;
            setStatus('秒表计时中');
          }
          if(actionId === 'stopWatch'){
            if(!ap.stopwatchRunning){ showToast('秒表尚未开始'); break; }
            const p = state.vars.tempo === 'slow' ? 1.35 : state.vars.tempo === 'fast' ? 0.75 : 1.0;
            const ideal = state.vars.cycles * p;
            ap.elapsed = round(ideal + randIn(-0.15, 0.15), 2);
            ap.stopwatchRunning = false;
            ap.measured = true;
            ap.cyclesDone = state.vars.cycles;
            changed = true;
            setStatus(`计时完成：${ap.elapsed}s`);
          }
          break;
        }
        case 18:{
          if(actionId === 'runCart'){
            if(ap.running){ showToast('小车正在运动'); break; }
            const s = Number(state.vars.distance);
            const force = Number(state.vars.push);
            const a = 0.7 + force * 0.55;
            const t = round(Math.sqrt((2*s)/a) + randIn(-0.08, 0.08), 2);
            const v = round(s / t, 2);
            ap.running = true;
            ap.progress = 0;
            ap.lastTime = t;
            ap.lastSpeed = v;
            ap.runCount += 1;
            ap.needsReset = true;
            trackTimeout(()=>{ ap.running = false; ap.progress = 1; }, 1200);
            changed = true;
            setStatus(`完成发车：t=${t}s, v=${v}m/s`);
          }
          if(actionId === 'resetCart'){
            ap.running = false;
            ap.progress = 0;
            ap.needsReset = false;
            changed = true;
            setStatus('小车已归位');
          }
          break;
        }
        case 19:{
          if(actionId === 'applyForce'){
            const f = Number(state.vars.force);
            const sample = state.vars.sample;
            let d = sample === 'spring' ? f * 3.4 : f * 5.2;
            if(sample === 'sponge') d = Math.min(d, 42);
            ap.lastDeform = round(d, 1);
            ap.applied = true;
            ap.recoverPct = sample === 'spring' ? 98 : 86;
            ap.applyCount += 1;
            changed = true;
            setStatus(`已施力：形变量${ap.lastDeform}mm`);
          }
          if(actionId === 'releaseForce'){
            ap.applied = false;
            ap.lastDeform = 0;
            changed = true;
            setStatus('已撤去力');
          }
          break;
        }
        case 20:{
          if(actionId === 'applyMotionForce'){
            const dir = state.vars.dir === 'forward' ? 1 : -1;
            const mag = Number(state.vars.mag);
            const dt = Number(state.vars.duration);
            ap.beforeV = round(ap.velocity, 2);
            const dv = dir * mag * dt * 0.45;
            ap.velocity = round(clamp(ap.velocity + dv, -6, 6), 2);
            ap.afterV = ap.velocity;
            ap.changed = true;
            const nx = clamp(ap.cartX + ap.velocity * 0.012, 0.08, 0.92);
            ap.targetX = nx;
            ap.animating = true;
            trackTimeout(()=>{ ap.cartX = ap.targetX; ap.animating = false; }, 800);
            changed = true;
            setStatus(`速度变化：${ap.beforeV}→${ap.afterV}m/s`);
          }
          if(actionId === 'stopCart'){
            ap.beforeV = ap.velocity;
            ap.velocity = 0;
            ap.afterV = 0;
            ap.changed = true;
            changed = true;
            setStatus('小车已停车');
          }
          break;
        }
      }

      if(changed){
        updatePills();
        scheduleChart();
        if(showStep && !state.autoPlaying) tryPassStep(false);
      }
      return changed;
    }

    function nameOfObject(k){
      if(k==='pencil') return '铅笔';
      if(k==='eraser') return '橡皮';
      return '钥匙';
    }

    function buildRecord(){
      const ap = state.apparatus;
      switch(LAB_ID){
        case 14:{
          if(ap.mixRead === null){ showToast('请先摇匀并读数'); return null; }
          return { c1:'水50+酒精50', c2:'100.0', c3:String(ap.mixRead), c4:ap.mixRead < 100 ? '体积缩小' : '无明显变化', y:ap.mixRead };
        }
        case 15:{
          if(!ap.tested){ showToast('请先进行拉伸测力'); return null; }
          const polishPct = Math.round((ap.leftPolish + ap.rightPolish) * 0.5);
          const clampPct = Math.round(ap.clampLevel * 100);
          return { c1:`拉力${ap.pullN}N`, c2:String(ap.pullN), c3:ap.separated ? '已分离' : '未分离', c4:`打磨${polishPct}%/夹紧${clampPct}%`, y:ap.pullN };
        }
        case 16:{
          if(ap.lastRead === null){ showToast('请先读取长度'); return null; }
          const ref = OBJECT_LENGTHS[state.vars.object];
          return { c1:nameOfObject(state.vars.object), c2:String(ap.lastRead), c3:String(ref), c4:`误差${round(ap.lastRead-ref,2)}cm`, y:ap.lastRead };
        }
        case 17:{
          if(!ap.measured){ showToast('请先完成一次计时'); return null; }
          const single = round(ap.elapsed / ap.cyclesDone, 3);
          return { c1:`${ap.cyclesDone}次`, c2:String(ap.elapsed), c3:String(single), c4:`节奏:${state.vars.tempo}`, y:single };
        }
        case 18:{
          if(ap.lastTime===null || ap.lastSpeed===null){ showToast('请先发车并计时'); return null; }
          return { c1:`s=${state.vars.distance}m, 推力${state.vars.push}`, c2:String(ap.lastTime), c3:String(ap.lastSpeed), c4:'v=s/t', y:ap.lastSpeed };
        }
        case 19:{
          if(!ap.applied){ showToast('请先施加力'); return null; }
          return { c1:`${state.vars.sample==='spring'?'弹簧':'海绵'} ${state.vars.force}N`, c2:String(ap.lastDeform), c3:`恢复${ap.recoverPct}%`, c4:ap.lastDeform>20 ? '形变明显' : '形变较小', y:ap.lastDeform };
        }
        case 20:{
          if(!ap.changed){ showToast('请先施加力或停车'); return null; }
          return { c1:`${state.vars.dir==='forward'?'向右':'向左'} ${state.vars.mag}N`, c2:String(ap.beforeV), c3:String(ap.afterV), c4:ap.afterV>ap.beforeV ? '加速/起动' : (ap.afterV<ap.beforeV ? '减速/反向' : '保持/停止'), y:Math.abs(ap.afterV) };
        }
      }
      return null;
    }

    function addRecord(){
      const rec = buildRecord();
      if(!rec) return;
      state.records.push(rec);
      if(state.records.length > 40) state.records.shift();
      renderRecords();
      scheduleChart();
      if(state.dataCollapsed){
        state.unseenRecordCount = Math.min(999, state.unseenRecordCount + 1);
      }else{
        state.unseenRecordCount = 0;
      }
      refreshDataNotice();
      tryPassStep(false);
    }

    function renderRecords(){
      recordBody.innerHTML = '';
      if(!state.records.length){
        recordBody.innerHTML = '<tr><td colspan="4" style="color:#9db4d6;">暂无记录</td></tr>';
        return;
      }
      for(const r of [...state.records].slice(-12).reverse()){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.c1}</td><td>${r.c2}</td><td>${r.c3}</td><td>${r.c4}</td>`;
        recordBody.appendChild(tr);
      }
    }

    function analyzeConclusion(showToastMsg=true){
      const rs = state.records;
      let ok = false;
      let msg = '';
      switch(LAB_ID){
        case 14:{
          const hit = rs.find(r=>Number(r.c3) < 100);
          ok = !!hit;
          msg = ok ? '结论：水和酒精混合后总体积小于100mL，说明分子之间存在间隙。' : '请至少获得一条“混合体积小于100mL”的记录。';
          break;
        }
        case 15:{
          const hasStuck = rs.some(r=>r.c3==='未分离' && Number(r.c2)>=2.5);
          const hasSeparated = rs.some(r=>r.c3==='已分离' && Number(r.c2)>=5.5);
          ok = hasStuck && hasSeparated;
          msg = ok ? '结论：接触面处理并压紧后，金属块在较小拉力下不易分离、在更大拉力下可分离，说明分子间存在引力。' : '请完成两次对比拉伸：约3N且未分离、约7N且已分离（系统会自动记录）。';
          break;
        }
        case 16:{
          const objs = new Set(rs.map(r=>r.c1));
          const good = rs.filter(r=>Math.abs(Number(r.c2)-Number(r.c3)) <= 0.2).length;
          ok = objs.size >= 2 && good >= 2;
          msg = ok ? '结论：长度测量应先零刻度对齐，再读取另一端刻度；重复测量可提高准确性。' : '请至少测量2种物体，且读数与参考值偏差较小。';
          break;
        }
        case 17:{
          const set = new Set(rs.map(r=>r.c1));
          ok = rs.length>=2 && set.size>=2;
          msg = ok ? '结论：秒表可测总时长，通过“总时长/计次数”可求单次时间。' : '请至少记录两组不同计次数的时间数据。';
          break;
        }
        case 18:{
          if(rs.length>=2){
            const ys = rs.map(r=>Number(r.c3));
            ok = Math.max(...ys) > Math.min(...ys);
          }
          msg = ok ? '结论：通过测程和用时可算速度 v=s/t；不同条件下速度会变化。' : '请记录至少2组速度数据并形成差异。';
          break;
        }
        case 19:{
          const spring = rs.filter(r=>r.c1.includes('弹簧')).map(r=>Number(r.c2));
          const sponge = rs.filter(r=>r.c1.includes('海绵')).map(r=>Number(r.c2));
          ok = (spring.length>=2 && Math.max(...spring)>Math.min(...spring)) || (sponge.length>=2 && Math.max(...sponge)>Math.min(...sponge));
          msg = ok ? '结论：力可使物体发生形变，且一般力越大形变越明显。' : '请补充同一样件在不同力下的对比记录。';
          break;
        }
        case 20:{
          const a = rs.find(r=>Number(r.c2)===0 && Number(r.c3)>0);
          const b = rs.find(r=>Number(r.c3) < Number(r.c2));
          ok = !!(a && b);
          msg = ok ? '结论：力可使静止物体运动，也可使运动物体减速、停止或改变方向。' : '请至少包含“由静止到运动”和“速度减小/反向”两类记录。';
          break;
        }
      }
      state.analysisOk = ok;
      analysisText.textContent = msg;
      analysisText.classList.toggle('ok', ok);
      if(showToastMsg) showToast(ok ? '分析完成：结论成立' : '分析未通过，请补充实验记录');
      if(!state.autoPlaying) tryPassStep(false);
      return ok;
    }

    function checkStepPass(step){
      const ap = state.apparatus;
      const rs = state.records;
      switch(LAB_ID){
        case 14:
          if(step===0) return ap.pouredWater;
          if(step===1) return ap.pouredAlcohol;
          if(step===2) return ap.shaken && ap.mixRead !== null && ap.mixRead < 100;
          if(step===3) return state.analysisOk;
          return false;
        case 15:
          if(step===0) return ap.scraped;
          if(step===1) return !!(ap.clampDone || ap.pressed);
          if(step===2) return rs.some(r=>r.c3==='未分离') && rs.some(r=>r.c3==='已分离');
          if(step===3) return state.analysisOk;
          return false;
        case 16:
          if(step===0) return ap.alignedCount >= 1;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 17:
          if(step===0) return ap.pendulumOn;
          if(step===1) return rs.length >= 1;
          if(step===2) return new Set(rs.map(r=>r.c1)).size >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 18:
          if(step===0) return ap.runCount >= 1;
          if(step===1) return ap.runCount >= 2;
          if(step===2) return rs.length >= 2;
          if(step===3) return state.analysisOk;
          return false;
        case 19:
          if(step===0) return rs.length>=1;
          if(step===1) return rs.length>=2;
          if(step===2) return rs.some(r=>r.c1.includes('海绵')) || rs.some(r=>r.c1.includes('弹簧'));
          if(step===3) return state.analysisOk;
          return false;
        case 20:
          if(step===0) return rs.some(r=>Number(r.c2)===0 && Number(r.c3)>0);
          if(step===1) return rs.some(r=>Number(r.c3) < Number(r.c2));
          if(step===2) return rs.length>=2;
          if(step===3) return state.analysisOk;
          return false;
      }
      return false;
    }

    function tryPassStep(showFailToast=true){
      if(state.freeMode || state.autoPlaying || state.completed || state.successCooldown) return false;
      const ok = checkStepPass(state.currentTask);
      if(!ok){
        if(showFailToast) showToast('当前步骤条件还未满足');
        return false;
      }
      state.successCooldown = true;
      showCheck();
      trackTimeout(()=>{
        if(state.currentTask < LAB.tasks.length - 1) setStepUI(state.currentTask + 1);
        else finishLab();
        state.successCooldown = false;
      }, 420);
      return true;
    }

    function recalcProgress(){
      if(state.completed || state.freeMode) return;
      let idx = 0;
      while(idx < LAB.tasks.length && checkStepPass(idx)) idx += 1;
      if(idx >= LAB.tasks.length) finishLab();
      else setStepUI(idx);
    }

    function finishLab(){
      if(state.completed) return;
      state.completed = true;
      state.currentTask = LAB.tasks.length - 1;
      setStepUI(state.currentTask);
      doneMaskEl.style.display = 'flex';
    }

    function updatePills(){
      const ap = state.apparatus;
      switch(LAB_ID){
        case 14:
          pillA.textContent = `水:${ap.waterMl.toFixed(0)}mL`;
          pillB.textContent = `酒精:${ap.alcoholMl.toFixed(0)}mL`;
          pillC.textContent = `混合:${ap.mixMl.toFixed(1)}mL`;
          pillD.textContent = `读数:${ap.mixRead===null?'--':ap.mixRead+'mL'}`;
          break;
        case 15:
          pillA.textContent = `打磨:${Math.round(ap.scrapeProgress)}%`;
          pillB.textContent = `夹紧:${Math.round(ap.clampLevel*100)}%`;
          pillC.textContent = `拉力:${ap.pullN||0}N`;
          pillD.textContent = ap.separated ? '状态:已分离' : (ap.adhered ? '状态:吸附中' : '状态:待吸附');
          break;
        case 16:
          pillA.textContent = `物体:${nameOfObject(state.vars.object)}`;
          pillB.textContent = `对齐:${ap.aligned?'是':'否'}`;
          pillC.textContent = `读数:${ap.lastRead===null?'--':ap.lastRead+'cm'}`;
          pillD.textContent = `记录:${state.records.length}条`;
          break;
        case 17:
          pillA.textContent = `摆球:${ap.pendulumOn?'运行':'停止'}`;
          pillB.textContent = `秒表:${ap.stopwatchRunning?'计时中':'待机'}`;
          pillC.textContent = `总时:${ap.elapsed||0}s`;
          pillD.textContent = `计次:${state.vars.cycles}次`;
          break;
        case 18:
          pillA.textContent = `测程:${state.vars.distance}m`;
          pillB.textContent = `用时:${ap.lastTime===null?'--':ap.lastTime+'s'}`;
          pillC.textContent = `速度:${ap.lastSpeed===null?'--':ap.lastSpeed+'m/s'}`;
          pillD.textContent = `发车:${ap.runCount}次`;
          break;
        case 19:
          pillA.textContent = `样件:${state.vars.sample==='spring'?'弹簧':'海绵'}`;
          pillB.textContent = `施力:${state.vars.force}N`;
          pillC.textContent = `形变:${ap.lastDeform}mm`;
          pillD.textContent = `恢复:${ap.recoverPct}%`;
          break;
        case 20:
          pillA.textContent = `方向:${state.vars.dir==='forward'?'向右':'向左'}`;
          pillB.textContent = `速度:${ap.velocity.toFixed(2)}m/s`;
          pillC.textContent = `前后:${ap.beforeV.toFixed(2)}→${ap.afterV.toFixed(2)}`;
          pillD.textContent = `位置:${(ap.cartX*100).toFixed(0)}%`;
          break;
      }
    }

    function drawScene(){
      const rect = scene.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width * dpr));
      const h = Math.max(1, Math.floor(rect.height * dpr));
      if(scene.width !== w || scene.height !== h){ scene.width = w; scene.height = h; }
      const ctx = scene.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width;
      const H = rect.height;

      ctx.fillStyle = '#2f343a';
      ctx.fillRect(0, H-70, W, 70);
      ctx.fillStyle = 'rgba(255,255,255,.08)';
      ctx.fillRect(0, H-70, W, 2);

      switch(LAB_ID){
        case 14: draw14(ctx,W,H); break;
        case 15: draw15(ctx,W,H); break;
        case 16: draw16(ctx,W,H); break;
        case 17: draw17(ctx,W,H); break;
        case 18: draw18(ctx,W,H); break;
        case 19: draw19(ctx,W,H); break;
        case 20: draw20(ctx,W,H); break;
      }
    }

    function drawBeaker(ctx, x, y, w, h, fillRatio, color, label){
      ctx.save();
      ctx.strokeStyle = 'rgba(210,230,255,.72)';
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, w, h);
      const fh = h * clamp(fillRatio,0,1);
      ctx.fillStyle = color;
      ctx.fillRect(x+3, y+h-fh-3, w-6, fh);
      ctx.fillStyle = '#d8e7ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(label, x+4, y-8);
      ctx.strokeStyle = 'rgba(255,255,255,.4)';
      for(let i=1;i<=5;i++){
        const ty = y + h - i*h/5;
        ctx.beginPath(); ctx.moveTo(x+2,ty); ctx.lineTo(x+16,ty); ctx.stroke();
      }
      ctx.restore();
    }

    function draw14(ctx,W,H){
      const ap = state.apparatus;
      const y = H-320;
      drawBeaker(ctx, W*0.08, y, 120, 220, ap.waterMl/50, 'rgba(115,190,255,.85)', '量筒A(水)');
      drawBeaker(ctx, W*0.30, y, 120, 220, ap.alcoholMl/50, 'rgba(255,194,126,.85)', '量筒B(酒精)');
      drawBeaker(ctx, W*0.60, y-20, 140, 240, ap.mixMl/110, 'rgba(180,146,255,.78)', '混合量筒');

      ctx.fillStyle = '#9fb6d2';
      ctx.beginPath();
      ctx.moveTo(W*0.67, y-40);
      ctx.lineTo(W*0.62, y-12);
      ctx.lineTo(W*0.72, y-12);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#dfe9ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText('漏斗', W*0.66, y-48);

      if(ap.shaken){
        for(let i=0;i<60;i++){
          const px = W*0.61 + (i%10)*12 + ((i*37)%7);
          const py = y+210 - Math.floor(i/10)*30 + ((i*17)%9);
          ctx.fillStyle = i%2 ? 'rgba(122,214,255,.65)' : 'rgba(218,156,255,.65)';
          ctx.beginPath();
          ctx.arc(px, py, 2, 0, Math.PI*2);
          ctx.fill();
        }
      }

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 量筒外壳  液体对象: 水/酒精/混合液  测量器具: 量筒刻度', W*0.06, H-26);
    }

    function getLab15Layout(){
      const ap = state.apparatus;
      const rect = scene.getBoundingClientRect();
      const W = rect.width;
      const H = rect.height;
      const compact = W <= 760;
      const baseY = H - (compact ? 150 : 170);
      const blockW = compact ? 96 : 130;
      const blockH = compact ? 74 : 90;
      const releaseGap = 82;
      const openGap = compact ? 22 : 26;
      const closeGap = ap.scraped ? 6 : 11;
      const clampEffect = ap.separated ? 0 : clamp(ap.clampLevel, 0, 1);
      const gap = ap.separated ? releaseGap : round(openGap - clampEffect * (openGap - closeGap), 1);
      const lx = W * (compact ? 0.18 : 0.30);
      const rx = lx + blockW + gap;
      const frameRx = lx + blockW + releaseGap;
      const leftFace = { x: lx + blockW - 8, y: baseY + 5, w: 8, h: blockH - 10 };
      const rightFace = { x: rx, y: baseY + 5, w: 8, h: blockH - 10 };
      const scrubZoneA = { x: leftFace.x - 18, y: leftFace.y - 6, w: 26, h: leftFace.h + 12 };
      const scrubZoneB = { x: rightFace.x, y: rightFace.y - 6, w: 26, h: rightFace.h + 12 };
      const toolW = compact ? 18 : 22;
      const toolH = compact ? 56 : 66;
      const toolHomeX = W * (compact ? 0.08 : 0.14);
      const toolHomeY = baseY + (compact ? 10 : 16);
      const clampTrackW = compact ? 56 : 72;
      const clampTrackXRaw = frameRx + (compact ? 58 : 92);
      const clampTrackX = clamp(clampTrackXRaw, lx + blockW + 26, W - clampTrackW - 18);
      const clampTrackY = baseY - (compact ? 56 : 66);
      const clampHandleX = clampTrackX + (1 - clamp(ap.clampLevel, 0, 1)) * clampTrackW;
      const clampHandleY = clampTrackY + 8;
      const meterW = compact ? 92 : 110;
      const meterH = compact ? 148 : 170;
      const meterX = compact ? (W - meterW - 10) : W * 0.76;
      const meterY = H - (compact ? 318 : 340);
      return {
        W, H, compact, baseY, blockW, blockH, lx, rx,
        leftFace, rightFace, scrubZoneA, scrubZoneB,
        toolW, toolH, toolHomeX, toolHomeY,
        clampTrackX, clampTrackY, clampTrackW, clampHandleX, clampHandleY,
        meterW, meterH, meterX, meterY, frameRx
      };
    }

    function rectContainsPoint(rect, x, y){
      return x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h;
    }

    function rectOverlap(a, b){
      return !(a.x + a.w < b.x || b.x + b.w < a.x || a.y + a.h < b.y || b.y + b.h < a.y);
    }

    function scenePointFromEvent(e){
      const r = scene.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function draw15(ctx,W,H){
      const ap = state.apparatus;
      const g = getLab15Layout();
      if(!ap.toolReady){
        ap.toolX = g.toolHomeX;
        ap.toolY = g.toolHomeY;
        ap.lastDragX = ap.toolX;
        ap.lastDragY = ap.toolY;
        ap.toolReady = true;
      }

      ctx.fillStyle = '#8d939a';
      ctx.fillRect(g.lx, g.baseY, g.blockW, g.blockH);
      ctx.fillRect(g.rx, g.baseY, g.blockW, g.blockH);

      const leftAlpha = 0.15 + clamp(ap.leftPolish,0,100) / 150;
      const rightAlpha = 0.15 + clamp(ap.rightPolish,0,100) / 150;
      ctx.fillStyle = `rgba(235,246,255,${leftAlpha})`;
      ctx.fillRect(g.leftFace.x, g.leftFace.y, g.leftFace.w, g.leftFace.h);
      ctx.fillStyle = `rgba(235,246,255,${rightAlpha})`;
      ctx.fillRect(g.rightFace.x, g.rightFace.y, g.rightFace.w, g.rightFace.h);

      if(ap.leftPolish > 8 || ap.rightPolish > 8){
        ctx.strokeStyle = 'rgba(255,255,255,.82)';
        for(let i=0;i<5;i++){
          const dy = 8 + i * 16;
          if(ap.leftPolish > 8){
            ctx.beginPath();
            ctx.moveTo(g.leftFace.x + 1, g.baseY + dy);
            ctx.lineTo(g.leftFace.x + 6, g.baseY + dy + 6);
            ctx.stroke();
          }
          if(ap.rightPolish > 8){
            ctx.beginPath();
            ctx.moveTo(g.rightFace.x + 1, g.baseY + dy);
            ctx.lineTo(g.rightFace.x + 6, g.baseY + dy + 6);
            ctx.stroke();
          }
        }
      }

      const jawX = g.lx - (g.compact ? 16 : 28);
      const jawTopY = g.baseY - (g.compact ? 46 : 58);
      const jawSpanW = g.frameRx + g.blockW - g.lx + (g.compact ? 54 : 72);
      ctx.fillStyle = '#b9c9db';
      ctx.fillRect(jawX, jawTopY, jawSpanW, g.compact ? 12 : 14);
      ctx.fillRect(jawX, g.baseY + g.blockH + 10, jawSpanW, g.compact ? 10 : 12);
      ctx.fillRect(jawX, jawTopY, g.compact ? 12 : 14, g.blockH + (g.compact ? 66 : 80));
      ctx.fillStyle = '#c7d5e8';
      ctx.fillRect(g.clampTrackX - 8, g.clampTrackY, g.clampTrackW + 18, 16);
      ctx.strokeStyle = '#e3efff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(g.clampTrackX, g.clampTrackY + 8);
      ctx.lineTo(g.clampTrackX + g.clampTrackW, g.clampTrackY + 8);
      ctx.stroke();
      ctx.fillStyle = '#f8d08b';
      ctx.beginPath();
      ctx.arc(g.clampHandleX, g.clampHandleY, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e5efff';
      ctx.font = `${g.compact ? 11 : 13}px -apple-system,Segoe UI`;
      ctx.fillText('横向螺旋夹具（拖动手柄）', g.lx - (g.compact ? 10 : 22), g.baseY - (g.compact ? 60 : 74));

      const meterW = g.meterW;
      const meterH = g.meterH;
      const sx = g.meterX;
      const sy = g.meterY;
      const hookX = sx + meterW * 0.51;
      const hookY = sy + meterH - 16;
      ctx.fillStyle = '#d8ecff';
      ctx.fillRect(sx, sy, meterW, meterH);
      ctx.strokeStyle = '#4da3ff';
      ctx.lineWidth = 3;
      ctx.strokeRect(sx, sy, meterW, meterH);
      ctx.fillStyle = '#00131f';
      ctx.fillRect(sx + (g.compact ? 14 : 18), sy + 14, meterW - (g.compact ? 28 : 36), 26);
      ctx.fillStyle = '#66b0ff';
      ctx.font = `bold ${g.compact ? 16 : 18}px Courier New`;
      ctx.fillText((ap.pullN || 0).toFixed(1), sx + (g.compact ? 24 : 30), sy + 33);
      ctx.fillStyle = '#345';
      ctx.fillRect(sx + meterW * 0.49, sy + 40, 4, meterH - 90);
      ctx.strokeStyle = '#dce8f6';
      ctx.beginPath(); ctx.moveTo(hookX, sy + meterH - 50); ctx.lineTo(hookX, hookY - 8); ctx.stroke();
      ctx.beginPath(); ctx.arc(hookX, hookY, 8, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = '#dfeaff';
      ctx.font = `${g.compact ? 11 : 12}px -apple-system,Segoe UI`;
      ctx.fillText('弹簧测力计', sx + (g.compact ? 8 : 16), sy - 8);

      ctx.strokeStyle = '#f4f8ff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(g.rx + g.blockW, g.baseY + 44);
      ctx.lineTo(hookX, hookY);
      ctx.stroke();

      ctx.fillStyle = '#f0c06b';
      ctx.fillRect(ap.toolX, ap.toolY, g.toolW, g.toolH);
      ctx.fillStyle = '#90672c';
      ctx.fillRect(ap.toolX + 4, ap.toolY + 8, g.toolW - 8, g.toolH - 16);
      ctx.fillStyle = '#e4efff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText('刮刀', ap.toolX - 2, ap.toolY - 8);

      ctx.fillStyle = '#dce8fa';
      ctx.font = `${g.compact ? 12 : 13}px -apple-system,Segoe UI`;
      ctx.fillText(`打磨进度: ${Math.round(ap.scrapeProgress)}%`, g.lx - (g.compact ? 8 : 22), g.baseY + g.blockH + 38);
      ctx.fillText(`压紧度: ${Math.round(ap.clampLevel * 100)}%`, g.lx + (g.compact ? 108 : 170), g.baseY + g.blockH + 38);

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 金属块A/B  操作对象: 刮刀+横向夹具  测量器具: 弹簧测力计', W*0.06, H-26);
    }

    function draw16(ctx,W,H){
      const ap = state.apparatus;
      const len = OBJECT_LENGTHS[state.vars.object];
      const rulerX = W*0.1, rulerY = H-190, rulerW = W*0.74, rulerH = 56;
      ctx.fillStyle = '#f6e6aa';
      ctx.fillRect(rulerX, rulerY, rulerW, rulerH);
      ctx.strokeStyle = '#8f7f4b'; ctx.lineWidth = 2; ctx.strokeRect(rulerX, rulerY, rulerW, rulerH);

      for(let i=0;i<=20;i++){
        const x = rulerX + rulerW * (i/20);
        const long = i%5===0 ? 24 : 14;
        ctx.strokeStyle = '#5b5132'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x, rulerY); ctx.lineTo(x, rulerY + long); ctx.stroke();
        if(i%5===0){
          ctx.fillStyle = '#4f472d';
          ctx.font = '12px Arial';
          ctx.fillText(String(i), x-4, rulerY + 40);
        }
      }

      const start = ap.startCm;
      const pxPerCm = rulerW / 20;
      const ox = rulerX + start * pxPerCm;
      const ow = len * pxPerCm;
      ctx.fillStyle = state.vars.object==='pencil' ? '#ffa44f' : state.vars.object==='eraser' ? '#7ddf9f' : '#c7d3e7';
      ctx.fillRect(ox, rulerY-38, ow, 24);
      ctx.strokeStyle = 'rgba(255,255,255,.6)'; ctx.strokeRect(ox, rulerY-38, ow, 24);
      ctx.fillStyle = '#dce7f8';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(`待测物: ${nameOfObject(state.vars.object)}`, rulerX, rulerY-48);

      if(ap.aligned){
        ctx.strokeStyle = '#3ddc97'; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(rulerX, rulerY-48); ctx.lineTo(rulerX, rulerY+60); ctx.stroke();
      }

      ctx.fillStyle = '#1a2635';
      ctx.fillRect(W*0.78, H-280, 150, 120);
      ctx.strokeStyle = '#93b5d8'; ctx.lineWidth = 2; ctx.strokeRect(W*0.78, H-280, 150, 120);
      ctx.fillStyle = '#d9e8ff';
      ctx.fillText('放大读数窗', W*0.82, H-258);
      ctx.font = 'bold 28px Courier New';
      ctx.fillStyle = '#7bd2ff';
      ctx.fillText(ap.lastRead===null ? '--' : `${ap.lastRead}cm`, W*0.80, H-212);

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 待测物体  测量器具: 刻度尺', W*0.06, H-26);
    }

    function draw17(ctx,W,H){
      const ap = state.apparatus;
      const pivotX = W*0.30, pivotY = H-320;
      const L = 160;
      const theta = ap.pendulumOn ? ap.angle : 0.2;
      const bx = pivotX + Math.sin(theta) * L;
      const by = pivotY + Math.cos(theta) * L;

      ctx.fillStyle = '#7a8592';
      ctx.fillRect(pivotX-80, pivotY-8, 160, 8);
      ctx.fillRect(pivotX-4, pivotY-8, 8, 220);
      ctx.fillStyle = '#dce9ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText('摆球装置', pivotX-34, pivotY-20);

      ctx.strokeStyle = '#f2f8ff'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(pivotX, pivotY); ctx.lineTo(bx, by); ctx.stroke();
      ctx.fillStyle = '#9ec3ff';
      ctx.beginPath(); ctx.arc(bx, by, 18, 0, Math.PI*2); ctx.fill();

      const sx = W*0.60, sy = H-330;
      ctx.fillStyle = '#16222f';
      ctx.fillRect(sx, sy, 230, 170);
      ctx.strokeStyle = '#95b6d9'; ctx.lineWidth = 2; ctx.strokeRect(sx, sy, 230, 170);
      ctx.fillStyle = '#e6f2ff';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText('秒表', sx+96, sy+20);
      ctx.fillStyle = '#000';
      ctx.fillRect(sx+24, sy+34, 182, 56);
      ctx.fillStyle = '#79c5ff';
      ctx.font = 'bold 34px Courier New';
      const disp = ap.stopwatchRunning ? ((performance.now() - ap.stopwatchStart)/1000).toFixed(2) : (ap.elapsed || 0).toFixed(2);
      ctx.fillText(disp, sx+56, sy+74);
      ctx.fillStyle = '#dce9ff';
      ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText(`计次数: ${state.vars.cycles}次`, sx+30, sy+112);
      ctx.fillText(`节奏: ${state.vars.tempo}`, sx+30, sy+132);

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 摆球  测量器具: 秒表', W*0.06, H-26);
    }

    function draw18(ctx,W,H){
      const ap = state.apparatus;
      const y = H-170;
      const left = W*0.10;
      const right = W*0.85;
      ctx.strokeStyle = '#9cb0c8'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(left,y); ctx.lineTo(right,y); ctx.stroke();

      for(let i=0;i<=Math.round(state.vars.distance*10);i++){
        const x = left + (right-left) * (i/(state.vars.distance*10));
        const long = i%5===0 ? 22 : 12;
        ctx.strokeStyle = 'rgba(255,255,255,.55)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+long); ctx.stroke();
      }

      const px = left + (right-left) * ap.progress;
      ctx.fillStyle = '#ffcf6b';
      ctx.fillRect(px-26, y-28, 52, 24);
      ctx.fillStyle = '#9eb9d8';
      ctx.beginPath(); ctx.arc(px-16, y-2, 7, 0, Math.PI*2); ctx.arc(px+16,y-2,7,0,Math.PI*2); ctx.fill();

      ctx.fillStyle = '#dce8fa';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText('小车轨道', left+10, y-36);
      ctx.fillText(`测程: ${state.vars.distance}m`, left+10, y+42);

      const sx = W*0.63, sy = H-320;
      ctx.fillStyle = '#162230';
      ctx.fillRect(sx, sy, 190, 130);
      ctx.strokeStyle = '#94b7da'; ctx.strokeRect(sx, sy, 190, 130);
      ctx.fillStyle = '#e6f3ff'; ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText('秒表/速度计算', sx+48, sy+18);
      ctx.fillStyle = '#000'; ctx.fillRect(sx+20, sy+28, 150, 42);
      ctx.fillStyle = '#7fd1ff'; ctx.font = 'bold 24px Courier New';
      ctx.fillText(ap.lastTime===null ? '--' : `${ap.lastTime}s`, sx+40, sy+56);
      ctx.fillStyle = '#dce8fa'; ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(`v=${ap.lastSpeed===null?'--':ap.lastSpeed+' m/s'}`, sx+32, sy+98);

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 小车  测量器具: 刻度尺+秒表', W*0.06, H-26);
    }

    function draw19(ctx,W,H){
      const ap = state.apparatus;
      const sample = state.vars.sample;
      const force = Number(state.vars.force);

      const sx = W*0.22, sy = H-330;
      ctx.fillStyle = '#95a0ad';
      ctx.fillRect(sx-70, sy, 140, 8);
      ctx.fillRect(sx-4, sy, 8, 230);

      ctx.strokeStyle = '#b8cadb'; ctx.lineWidth = 2;

      for(let i=0;i<18;i++){
        const yy = sy+18+i*(springLen/18);

        if(i===0) ctx.moveTo(sx,yy); else ctx.lineTo(xx,yy);
      }
      ctx.stroke();
      ctx.fillStyle = '#f1d28b';
      ctx.fillRect(sx-22, sy+20+springLen, 44, 34);

      const bx = W*0.56, by = H-250;
      const baseH = 78;
      const comp = sample==='sponge' ? ap.lastDeform*1.1 : 0;
      ctx.fillStyle = '#7bd9a8';
      ctx.fillRect(bx, by + comp, 140, baseH - comp);
      ctx.strokeStyle = '#bce7d1'; ctx.strokeRect(bx, by + comp, 140, baseH - comp);
      ctx.fillStyle = '#cfdcf0';
      ctx.fillRect(bx+42, by-56, 56, 50);

      ctx.strokeStyle = '#9ab0c9'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(W*0.82, H-310); ctx.lineTo(W*0.82, H-110); ctx.stroke();
      for(let i=0;i<=10;i++){

        ctx.beginPath(); ctx.moveTo(W*0.82, y); ctx.lineTo(W*0.82 + (i%5===0?18:10), y); ctx.stroke();
      }
      ctx.fillStyle = '#dce8fa'; ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText('刻度尺(mm)', W*0.79, H-322);
      ctx.fillText(`形变量: ${ap.lastDeform} mm`, W*0.73, H-88);
      ctx.fillText(`施力: ${force}N`, W*0.73, H-68);

      ctx.fillStyle = '#dce8fa';
      ctx.font = '13px -apple-system,Segoe UI';
      ctx.fillText(sample==='spring' ? '当前观察样件: 弹簧' : '当前观察样件: 海绵', W*0.06, H-92);

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 弹簧/海绵  测量器具: 刻度尺', W*0.06, H-26);
    }

    function draw20(ctx,W,H){
      const ap = state.apparatus;
      const y = H-170;
      const left = W*0.08;
      const right = W*0.90;
      ctx.strokeStyle = '#9cb1ca'; ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(left,y); ctx.lineTo(right,y); ctx.stroke();

      const px = left + (right-left)*ap.cartX;
      ctx.fillStyle = '#ffd06b';
      ctx.fillRect(px-30, y-30, 60, 24);
      ctx.fillStyle = '#9eb9d8';
      ctx.beginPath(); ctx.arc(px-18,y-2,7,0,Math.PI*2); ctx.arc(px+18,y-2,7,0,Math.PI*2); ctx.fill();

      const dir = state.vars.dir==='forward' ? 1 : -1;
      const mag = Number(state.vars.mag);
      ctx.strokeStyle = '#ffb36d';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(px, y-64);
      ctx.lineTo(px + dir*(20 + mag*8), y-64);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(px + dir*(20 + mag*8), y-64);
      ctx.lineTo(px + dir*(12 + mag*8), y-70);
      ctx.lineTo(px + dir*(12 + mag*8), y-58);
      ctx.closePath();
      ctx.fillStyle = '#ffb36d';
      ctx.fill();

      const gx = W*0.63, gy = H-320, gw = 210, gh = 130;
      ctx.fillStyle = '#162230'; ctx.fillRect(gx, gy, gw, gh);
      ctx.strokeStyle = '#95b7d8'; ctx.strokeRect(gx, gy, gw, gh);
      ctx.fillStyle = '#dce9ff'; ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText('速度指示表', gx+72, gy+18);
      ctx.fillStyle = '#0a1119'; ctx.fillRect(gx+18, gy+28, 174, 40);
      ctx.fillStyle = '#7fd1ff'; ctx.font = 'bold 24px Courier New';
      ctx.fillText(`${ap.velocity.toFixed(2)} m/s`, gx+34, gy+56);
      ctx.fillStyle = '#dce9ff'; ctx.font = '12px -apple-system,Segoe UI';
      ctx.fillText(`前速度: ${ap.beforeV.toFixed(2)}m/s`, gx+20, gy+86);
      ctx.fillText(`后速度: ${ap.afterV.toFixed(2)}m/s`, gx+20, gy+104);

      ctx.fillStyle = '#eaf2ff';
      ctx.font = '14px -apple-system,Segoe UI';
      ctx.fillText('固体对象: 小车  测量器具: 速度指示表', W*0.06, H-26);
    }

    function refreshLab15ScrapeState(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      ap.scrapeProgress = round((clamp(ap.leftPolish,0,100) + clamp(ap.rightPolish,0,100)) * 0.5, 1);
      if(!ap.scraped && ap.leftPolish >= 88 && ap.rightPolish >= 88){
        ap.scraped = true;
        setStatus('接触面打磨完成');
        showToast('打磨完成，可进行横向夹紧');
        updatePills();
        if(!state.autoPlaying) tryPassStep(false);
      }
    }

    function refreshLab15ClampState(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      const ready = ap.scraped && ap.clampLevel >= 0.82;
      if(ready && (!ap.pressed || ap.separated || !ap.adhered)){
        ap.pressed = true;
        ap.clampDone = true;
        ap.adhered = true;
        ap.separated = false;
        setStatus('夹具已压紧');
        showToast('压紧到位，可进行拉伸测力');
        updatePills();
        if(!state.autoPlaying) tryPassStep(false);
      }else if(!ready && ap.pressed){
        ap.pressed = false;
        ap.adhered = false;
        updatePills();
      }
    }

    function ensureLab15ToolReady(){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      if(ap.toolReady) return;
      const g = getLab15Layout();
      ap.toolX = g.toolHomeX;
      ap.toolY = g.toolHomeY;
      ap.lastDragX = ap.toolX;
      ap.lastDragY = ap.toolY;
      ap.toolReady = true;
    }

    function applyLab15ToolAtStagePoint(stageX, stageY){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      ensureLab15ToolReady();
      const g = getLab15Layout();
      const p = stagePointToScene(stageX, stageY);
      const nx = clamp(p.x - g.toolW * 0.5, 6, g.W - g.toolW - 6);
      const ny = clamp(p.y - g.toolH * 0.56, g.baseY - 130, g.H - g.toolH - 80);
      const dx = nx - ap.lastDragX;
      const dy = ny - ap.lastDragY;
      const travel = Math.hypot(dx, dy);
      ap.toolX = nx;
      ap.toolY = ny;
      ap.lastDragX = nx;
      ap.lastDragY = ny;

      const toolRect = { x: ap.toolX, y: ap.toolY, w: g.toolW, h: g.toolH };
      const gain = clamp(travel * 0.75, 0, 4.6);
      if(rectOverlap(toolRect, g.scrubZoneA)) ap.leftPolish = clamp(ap.leftPolish + gain, 0, 100);
      if(rectOverlap(toolRect, g.scrubZoneB)) ap.rightPolish = clamp(ap.rightPolish + gain, 0, 100);
      refreshLab15ScrapeState();
      updatePills();
    }

    function applyLab15ClampAtStagePoint(stageX, stageY){
      if(LAB_ID !== 15) return;
      const ap = state.apparatus;
      const g = getLab15Layout();
      const p = stagePointToScene(stageX, stageY);
      ap.clampLevel = clamp((g.clampTrackX + g.clampTrackW - p.x) / g.clampTrackW, 0, 1);
      refreshLab15ClampState();
      updatePills();
    }

    function avoidControlDockOccludingLab15Meter(){
      if(LAB_ID !== 15) return;
      const stageRect = stageEl.getBoundingClientRect();
      const dockRect = controlDock.getBoundingClientRect();
      const g = getLab15Layout();
      const dockInStage = {
        x: dockRect.left - stageRect.left,
        y: dockRect.top - stageRect.top,
        w: dockRect.width,
        h: dockRect.height
      };
      const meterRect = { x: g.meterX, y: g.meterY, w: g.meterW, h: g.meterH };
      if(rectOverlap(dockInStage, meterRect)){
        setDockPos(controlDock, 10, 10);
      }
    }

    function bindLab15StageInteraction(){
      if(LAB_ID !== 15) return;

      const endDrag = (e)=>{
        if(lab15Pointer.id !== e.pointerId) return;
        lab15Pointer.id = null;
        lab15Pointer.mode = '';
      };

      scene.addEventListener('pointerdown', (e)=>{
        if(state.autoPlaying) return;
        const ap = state.apparatus;
        const p = scenePointFromEvent(e);
        const g = getLab15Layout();
        const toolRect = { x: ap.toolX, y: ap.toolY, w: g.toolW, h: g.toolH };
        const onClampHandle = Math.hypot(p.x - g.clampHandleX, p.y - g.clampHandleY) <= 14;
        const onTool = rectContainsPoint(toolRect, p.x, p.y)
          || rectContainsPoint(g.scrubZoneA, p.x, p.y)
          || rectContainsPoint(g.scrubZoneB, p.x, p.y);

        if(onTool){
          lab15Pointer.mode = 'tool';
          lab15Pointer.id = e.pointerId;
          lab15Pointer.offX = clamp(p.x - ap.toolX, 0, g.toolW);
          lab15Pointer.offY = clamp(p.y - ap.toolY, 0, g.toolH);
          ap.lastDragX = ap.toolX;
          ap.lastDragY = ap.toolY;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
          return;
        }

        if(onClampHandle){
          if(!ap.scraped){
            if(!state.freeMode && !state.autoPlaying){
              warnCurrentStep('步骤1未完成，请先把接触面打磨到100%');
              showToast('请先完成打磨，再旋紧夹具');
              return;
            }
          }
          lab15Pointer.mode = 'clamp';
          lab15Pointer.id = e.pointerId;
          scene.setPointerCapture(e.pointerId);
          e.preventDefault();
        }
      });

      scene.addEventListener('pointermove', (e)=>{
        if(lab15Pointer.id !== e.pointerId || !lab15Pointer.mode) return;
        const p = scenePointFromEvent(e);
        const g = getLab15Layout();

        if(lab15Pointer.mode === 'tool'){
          const nx = clamp(p.x - lab15Pointer.offX, 6, g.W - g.toolW - 6);
          const ny = clamp(p.y - lab15Pointer.offY, g.baseY - 130, g.H - g.toolH - 80);
          const center = scenePointToStage(nx + g.toolW * 0.5, ny + g.toolH * 0.56);
          applyLab15ToolAtStagePoint(center.x, center.y);
          e.preventDefault();
          return;
        }

        if(lab15Pointer.mode === 'clamp'){
          const stageP = scenePointToStage(p.x, p.y);
          applyLab15ClampAtStagePoint(stageP.x, stageP.y);
          e.preventDefault();
        }
      });

      scene.addEventListener('pointerup', endDrag);
      scene.addEventListener('pointercancel', endDrag);
    }

    function updateDynamic(dt){
      const ap = state.apparatus;
      if(LAB_ID === 14 && ap.shaken) ap.bubblePhase += dt*0.004;
      if(LAB_ID === 17 && ap.pendulumOn){ ap.angle = Math.sin(performance.now()*0.006) * 0.38; }
      if(LAB_ID === 18 && ap.running){ ap.progress = clamp(ap.progress + dt/1200, 0, 1); }
      if(LAB_ID === 20 && ap.animating){
        const dx = ap.targetX - ap.cartX;
        ap.cartX += dx * Math.min(1, dt*0.01);
      }
    }

    function loop(ts){
      const dt = state.lastTs ? (ts - state.lastTs) : 16;
      state.lastTs = ts;
      updateDynamic(dt);
      drawScene();
      state.rafId = requestAnimationFrame(loop);
    }

    function scheduleChart(){
      if(scheduleChart.t) return;
      scheduleChart.t = trackTimeout(()=>{
        scheduleChart.t = null;
        drawChart();
      }, 60);
    }

    function drawChart(){
      const rect = chart.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      const w = Math.max(1, Math.floor(rect.width*dpr));
      const h = Math.max(1, Math.floor(rect.height*dpr));
      if(chart.width!==w || chart.height!==h){ chart.width = w; chart.height = h; }
      const ctx = chart.getContext('2d');
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0,0,w,h);
      ctx.scale(dpr,dpr);
      const W = rect.width, H = rect.height;

      ctx.fillStyle = 'rgba(6,10,16,.9)';
      ctx.fillRect(0,0,W,H);
      const left=38, right=W-10, top=12, bottom=H-24;
      const pw = right-left, ph = bottom-top;

      ctx.strokeStyle = 'rgba(255,255,255,.12)';
      for(let i=0;i<=4;i++){
        const y = top + ph*(i/4);
        ctx.beginPath(); ctx.moveTo(left,y); ctx.lineTo(right,y); ctx.stroke();
      }
      ctx.beginPath(); ctx.moveTo(left,bottom); ctx.lineTo(right,bottom); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(left,top); ctx.lineTo(left,bottom); ctx.stroke();

      const ys = state.records.map(r=>Number(r.y));
      if(!ys.length) return;
      let maxY = Math.max(...ys);
      if(maxY <= 0) maxY = 1;
      maxY *= 1.2;

      const toX = (i)=> left + pw * (i/(Math.max(1, ys.length-1)));
      const toY = (v)=> bottom - (v/maxY)*ph;

      ctx.strokeStyle = 'rgba(61,220,151,.85)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); });
      ctx.stroke();

      ctx.fillStyle = '#7ed6ff';
      ys.forEach((v,i)=>{ const x=toX(i), y=toY(v); ctx.beginPath(); ctx.arc(x,y,3.6,0,Math.PI*2); ctx.fill(); });

      ctx.fillStyle = '#dce9ff';
      ctx.font = '11px -apple-system,Segoe UI';
      ctx.fillText('记录序号', right-56, bottom+16);
      ctx.fillText('读数趋势', left+2, top+10);
    }

    function setDockPos(el, x, y){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const nx = clamp(x, 4, stage.width - r.width - 4);
      const ny = clamp(y, 4, stage.height - r.height - 4);
      el.style.left = `${nx}px`;
      el.style.top = `${ny}px`;
      el.style.right = 'auto';
      el.style.bottom = 'auto';
    }

    function isNarrowStage(){
      return stageEl.getBoundingClientRect().width <= 760;
    }

    function shouldStartControlCollapsed(){
      return isNarrowStage() || LAB_ID===17 || LAB_ID===18 || LAB_ID===20;
    }

    function bringToFront(kind){
      state.zTop += 1;
      if(kind==='control') controlDock.style.zIndex = String(state.zTop);
      if(kind==='data') dataDock.style.zIndex = String(state.zTop);
    }

    function snapDockToEdges(el){
      const stage = stageEl.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const x = r.left - stage.left;
      const y = r.top - stage.top;
      const leftGap = x;
      const rightGap = stage.width - (x + r.width);
      const topGap = y;
      const bottomGap = stage.height - (y + r.height);
      const m = 14;
      let nx = x, ny = y;
      if(leftGap < m) nx = 4;
      else if(rightGap < m) nx = stage.width - r.width - 4;
      if(topGap < m) ny = 4;
      else if(bottomGap < m) ny = stage.height - r.height - 4;
      setDockPos(el, nx, ny);
    }

    function makeDockDraggable(el, head, kind){
      let dragging = false;
      let offX = 0, offY = 0;
      head.addEventListener('pointerdown', (e)=>{
        if(e.target.closest('button')) return;
        dragging = true;
        el.classList.add('dragging');
        bringToFront(kind);
        const r = el.getBoundingClientRect();
        offX = e.clientX - r.left;
        offY = e.clientY - r.top;
        state.dockMoved[kind] = true;
        head.setPointerCapture(e.pointerId);
        e.preventDefault();
      });
      head.addEventListener('pointermove', (e)=>{
        if(!dragging) return;
        const stage = stageEl.getBoundingClientRect();
        setDockPos(el, e.clientX - stage.left - offX, e.clientY - stage.top - offY);
        e.preventDefault();
      });
      const end = ()=>{
        if(!dragging) return;
        dragging = false;
        el.classList.remove('dragging');
        snapDockToEdges(el);
      };
      head.addEventListener('pointerup', end);
      head.addEventListener('pointercancel', end);
    }

    function setControlCollapsed(on){
      state.controlCollapsed = !!on;
      controlBody.classList.toggle('collapsed', state.controlCollapsed);
      controlToggleBtn.textContent = state.controlCollapsed ? '展开' : '收起';
      bringToFront('control');
      if(isNarrowStage() && !state.controlCollapsed && !state.dataCollapsed){
        setDataCollapsed(true);
      }
      if(isNarrowStage()) initDockPositions(true);
    }

    function setDataCollapsed(on){
      state.dataCollapsed = !!on;
      dataBody.classList.toggle('collapsed', state.dataCollapsed);
      dataToggleBtn.textContent = state.dataCollapsed ? '展开' : '收起';
      if(!state.dataCollapsed){
        state.unseenRecordCount = 0;
      }
      refreshDataNotice();
      bringToFront('data');
      if(!state.dataCollapsed) scheduleChart();
      if(isNarrowStage() && !state.dataCollapsed && !state.controlCollapsed){
        setControlCollapsed(true);
      }
      if(isNarrowStage()) initDockPositions(true);
    }

    function initDockPositions(force=false){
      const stage = stageEl.getBoundingClientRect();
      const cr = controlDock.getBoundingClientRect();
      const dr = dataDock.getBoundingClientRect();
      const pad = 10;
      if(stage.width <= 760){
        if(force || !state.dockMoved.control) setDockPos(controlDock, pad, stage.height - dr.height - cr.height - 18);
        if(force || !state.dockMoved.data) setDockPos(dataDock, pad, stage.height - dr.height - pad);
      }else{
        if(force || !state.dockMoved.control) setDockPos(controlDock, pad, stage.height - cr.height - pad);
        if(force || !state.dockMoved.data) setDockPos(dataDock, stage.width - dr.width - pad, stage.height - dr.height - pad);
      }
    }

    function clearData(showTip=true){
      state.records = [];
      state.analysisOk = false;
      state.unseenRecordCount = 0;
      refreshDataNotice();
      analysisText.classList.remove('ok');
      analysisText.textContent = '暂无。请按步骤操作器材并记录数据后分析。';
      renderRecords();
      scheduleChart();
      if(showTip) showToast('数据已清空');
    }

    function resetFlow(showTip=true){
      clearAllTimers();
      lab15Pointer.id = null;
      lab15Pointer.mode = '';
      state.stepWarnIdx = -1;
      state.completed = false;
      state.successCooldown = false;

      setStepUI(0);

    async function autoDemo(){
      if(state.autoPlaying || state.freeMode) return;
      const runId = ++state.autoRunId;
      state.autoPlaying = true;
      state.autoStopRequested = false;
      refreshAutoDemoButton();
      recordBtn.disabled = true;
      analyzeBtn.disabled = true;
      resetBtn.disabled = true;
      freeBtn.disabled = true;

      const ensure = ()=>{ if(!state.autoPlaying || runId !== state.autoRunId || state.autoStopRequested) throw new Error('auto-cancelled'); };
      const wait = async (ms)=>{ await sleep(ms); ensure(); };
      const doA = async (id, ms=950)=>{ performAction(id, false); updatePills(); await wait(ms); };
      const doR = async (ms=850)=>{ addRecord(); await wait(ms); };
      const doStep = async (idx, msg, ms=700)=>{
        setStepUI(idx);
        if(msg) showToast(msg);
        await wait(ms);

        const slider = controlFields.querySelector('input[type="range"]');
        if(slider){
          const min = Number(slider.min || '0');
          const max = Number(slider.max || '1');
          const ratio = max === min ? 0 : clamp((nextValue - min) / (max - min), 0, 1);
          const sr = slider.getBoundingClientRect();
          const p = stagePointFromClient(sr.left + sr.width * ratio, sr.top + sr.height * 0.5);
          await moveDemoCursorToStage(p.x, p.y, 760);

          scenePointToStage(g.scrubZoneB.x + g.scrubZoneB.w * 0.48, g.scrubZoneB.y + g.scrubZoneB.h * 0.14),
          scenePointToStage(g.scrubZoneB.x + g.scrubZoneB.w * 0.52, g.scrubZoneB.y + g.scrubZoneB.h * 0.88),
          scenePointToStage(g.scrubZoneA.x + g.scrubZoneA.w * 0.46, g.scrubZoneA.y + g.scrubZoneA.h * 0.46),
          scenePointToStage(g.scrubZoneB.x + g.scrubZoneB.w * 0.54, g.scrubZoneB.y + g.scrubZoneB.h * 0.46)

        await dragDemoCursorPath(pts, 460, (pt)=>applyLab15ToolAtStagePoint(pt.x, pt.y));

          await doStep(1, '步骤2：横向夹紧', 1300);
