<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>LAB_TITLE</title>
  <style>
    :root{
      --bg:#1a1a1a;
      --ink:#ffffff;
      --card-bg:rgba(255,255,255,0.08);
      --panel-bg:rgba(15,15,15,0.55);
      --line:rgba(255,255,255,0.12);
      --accent:#3ddc97;
      --warn:#ffb74d;
      --error:#ff6b6b;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      padding:10px;
      background:var(--bg);
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    #spectrum{
      position:relative;
      width:100%;
      max-width:900px;
      height:40px;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 0 15px rgba(255,255,255,0.15);
      margin:0 0 12px;
      background:#000;
    }
    #spectrum::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000,#ffff00,#00ff00,#00ffff,#0000ff,#ff00ff,#ff0000);
      background-size:200% 100%;
      animation:flowRainbow 6s linear infinite;
    }
    @keyframes flowRainbow{
      0%{ background-position:0 0; }
      100%{ background-position:-100% 0; }
    }
    .task-card{
      width:100%;
      max-width:900px;
      background:var(--card-bg);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      backdrop-filter:blur(6px);
      display:grid;
      grid-template-columns:auto 1fr auto;
      align-items:center;
      gap:10px;
      transition:opacity .2s, filter .2s;
    }
    .task-step{
      background:rgba(255,255,255,0.15);
      border-radius:8px;
      padding:6px 10px;
      font-weight:700;
      white-space:nowrap;
    }
    .task-hint{ font-size:12px; color:#ffd54f; opacity:.95; }
    .progress-dots{ display:flex; gap:6px; }
    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:rgba(255,255,255,0.26);
      outline:2px solid rgba(255,255,255,0.12);
    }
    .dot.active{ background:var(--warn); }
    .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,0.5); }
    #stage{
      width:100%;
      max-width:900px;
      height:60vh;
      max-height:540px;
      min-height:380px;
      margin-top:10px;
      position:relative;
      overflow:hidden;
      border-radius:12px;
      background:#0b0f14;
      box-shadow:0 8px 24px rgba(0,0,0,0.35);
      border:1px solid rgba(255,255,255,0.08);
      touch-action:none;
      background-image:
        radial-gradient(circle at 70% 25%, rgba(255,255,255,0.05), transparent 38%),
        radial-gradient(circle at 25% 75%, rgba(0,255,255,0.05), transparent 44%);
    }
    .hud{
      position:absolute;
      left:10px;
      top:10px;
      z-index:10;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:var(--panel-bg);
      font-size:13px;
    }
    .playfield{
      position:absolute;
      inset:0;
      z-index:1;
    }
    .node{
      position:absolute;
      left:0;
      top:0;
      width:86px;
      height:86px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,0.28);
      box-shadow:0 8px 22px rgba(0,0,0,0.35);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      color:#071328;
      user-select:none;
      touch-action:none;
      cursor:grab;
      transform:translate(-9999px,-9999px);
    }
    .node.dragging{ cursor:grabbing; box-shadow:0 18px 40px rgba(0,0,0,0.5); }
    .toolbar{
      width:100%;
      max-width:900px;
      margin-top:12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    button{
      border:none;
      border-radius:8px;
      padding:10px 16px;
      color:#fff;
      background:#444;
      cursor:pointer;
      transition:background .2s, transform .05s, opacity .2s;
    }
    button:hover{ background:#5a5a5a; }
    button:active{ transform:scale(.98); }
    button:disabled{ opacity:.5; cursor:not-allowed; }
    .primary{ background:#2e7d32; }
    .checkmark{
      position:absolute;
      left:50%;
      top:20%;
      width:120px;
      height:120px;
      border-radius:50%;
      transform:translate(-50%,-50%) scale(.6);
      border:3px solid var(--accent);
      background:rgba(61,220,151,.15);
      box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25);
      z-index:30;
      display:none;
      align-items:center;
      justify-content:center;
      pointer-events:none;
      animation:pop .55s ease-out;
    }
    .checkmark.active{ display:flex; }
    .checkmark > div{
      width:60px;
      height:30px;
      border-left:8px solid var(--accent);
      border-bottom:8px solid var(--accent);
      transform:rotate(-45deg) translateY(-6px);
    }
    @keyframes pop{
      0%{ transform:translate(-50%,-50%) scale(.4); opacity:.2; }
      60%{ transform:translate(-50%,-50%) scale(1.08); opacity:1; }
      100%{ transform:translate(-50%,-50%) scale(1); }
    }
    .toast{
      position:fixed;
      left:50%;
      bottom:24px;
      transform:translateX(-50%) translateY(20px);
      background:rgba(0,0,0,0.8);
      color:#fff;
      padding:10px 14px;
      border-radius:10px;
      font-size:14px;
      opacity:0;
      pointer-events:none;
      transition:opacity .25s, transform .25s;
      z-index:90;
    }
    .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
    .modal-mask{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:100;
      background:rgba(0,0,0,.5);
    }
    .modal{
      width:min(90vw, 360px);
      border-radius:14px;
      border:1px solid rgba(255,255,255,.15);
      background:#111;
      color:#fff;
      padding:18px 16px;
      text-align:center;
    }
    .modal h3{ margin:8px 0 6px; font-size:20px; }
    .modal p{ margin-top:0; color:#cfd8dc; }
    .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; }
    .explanation{
      width:100%;
      max-width:900px;
      margin:14px 0 20px;
      line-height:1.65;
      color:#e9f2ff;
      font-size:.95em;
    }
    @media (max-width:600px){
      .task-card{ grid-template-columns:1fr; }
      .task-step{ width:fit-content; }
      .node{ width:74px; height:74px; }
    }
  </style>
</head>
<body>
  <div id="spectrum"></div>

  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">TASK_1_TEXT</div>
      <div class="task-hint" id="taskHint">TASK_1_HINT</div>
    </div>
    <div class="progress-dots" id="dots"></div>
  </div>

  <div id="stage">
    <div class="hud" id="hud">模式: 引导</div>
    <div class="playfield" id="playfield"></div>
    <div class="checkmark" id="checkmark"><div></div></div>
  </div>

  <div class="toolbar">
    <button id="resetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
    <button id="runBtn" class="primary">运行</button>
  </div>

  <div class="toast" id="toast">提示</div>

  <div class="modal-mask" id="doneMask">
    <div class="modal">
      <h3>完成，你真棒!</h3>
      <p>你已完成全部实验步骤。</p>
      <button id="okBtn" class="ok">OK</button>
    </div>
  </div>

  <div class="explanation">
    <h2>实验原理</h2>
    <ul>
      <li>在这里替换为实验原理说明。</li>
      <li>保持 2-4 条，简明描述观察结论。</li>
    </ul>
  </div>

  <!-- Runtime bundle slot: inline files selected from assets/runtime/manifest.js here. -->
  <script id="physicsRuntimeBundle">
    /* __PHYSICS_RUNTIME_BUNDLE__ */
  </script>

  <script id="physicsLabShellTemplate">
    // Template shell only. Apparatus runtime families should be inlined above.
    const $ = (s)=>document.querySelector(s);

    const stage = $("#stage");
    const playfield = $("#playfield");
    const taskCard = $("#taskCard");
    const taskStepEl = $("#taskStep");
    const taskTextEl = $("#taskText");
    const taskHintEl = $("#taskHint");
    const dotsEl = $("#dots");
    const hudEl = $("#hud");
    const checkmarkEl = $("#checkmark");
    const toastEl = $("#toast");
    const doneMaskEl = $("#doneMask");
    const okBtn = $("#okBtn");

    const resetBtn = $("#resetBtn");
    const autoDemoBtn = $("#autoDemoBtn");
    const freeBtn = $("#freeBtn");
    const runBtn = $("#runBtn");

    const clamp = (v, a, b)=>Math.max(a, Math.min(b, v));
    const sleep = (ms)=>new Promise((r)=>setTimeout(r, ms));
    const debounce = (fn, wait=120)=>{
      let t = null;
      return (...args)=>{
        clearTimeout(t);
        t = setTimeout(()=>fn(...args), wait);
      };
    };

    const state = {
      currentTask: 0,
      completed: false,
      freeMode: false,
      autoPlaying: false,
      isRunning: false,
      draggingId: null,
      successCooldown: false,
      rafId: 0,
      timers: new Set()
    };

    const tasks = [
      {
        text: "把 A 与 B 靠近，观察变量变化。",
        hint: "拖动两个圆，直到重叠明显。",
        check: ()=>isNear(nodes.a, nodes.b, 85)
      },
      {
        text: "把 B 与 C 靠近，验证第二个条件。",
        hint: "保持 A 不远离，继续拖动 B/C。",
        check: ()=>isNear(nodes.b, nodes.c, 85)
      },
      {
        text: "点击运行，确认最终状态。",
        hint: "运行后结果满足即可完成。",
        check: ()=>state.isRunning === false && isNear(nodes.a, nodes.c, 150)
      }
    ];

    const nodes = {
      a: createNode("A", "rgba(255,80,80,.86)"),
      b: createNode("B", "rgba(80,255,120,.86)"),
      c: createNode("C", "rgba(100,170,255,.90)")
    };

    function createNode(label, bg){
      const el = document.createElement("div");
      el.className = "node";
      el.textContent = label;
      el.style.background = bg;
      el.dataset.x = "0";
      el.dataset.y = "0";
      playfield.appendChild(el);
      bindDrag(el);
      return { el };
    }

    function initDots(){
      dotsEl.innerHTML = "";
      for(let i=0;i<tasks.length;i++){
        const d = document.createElement("span");
        d.className = "dot";
        dotsEl.appendChild(d);
      }
    }

    function updateDots(){
      [...dotsEl.children].forEach((d, i)=>{
        d.classList.toggle("active", i === state.currentTask && !state.completed);
        d.classList.toggle("done", i < state.currentTask || state.completed);
      });
    }

    function setNodePos(node, x, y){
      node.el.dataset.x = String(x);
      node.el.dataset.y = String(y);
      node.el.style.transform = `translate(${x}px, ${y}px)`;
    }

    function getNodePos(node){
      return {
        x: parseFloat(node.el.dataset.x || "0"),
        y: parseFloat(node.el.dataset.y || "0")
      };
    }

    function centerNode(node){
      const p = getNodePos(node);
      const rect = node.el.getBoundingClientRect();
      return { x:p.x + rect.width * 0.5, y:p.y + rect.height * 0.5 };
    }

    function isNear(aNode, bNode, threshold){
      const a = centerNode(aNode);
      const b = centerNode(bNode);
      return Math.hypot(a.x - b.x, a.y - b.y) <= threshold;
    }

    function setStepUI(stepIndex){
      const i = clamp(stepIndex, 0, tasks.length - 1);
      state.currentTask = i;
      taskStepEl.textContent = `步骤 ${i + 1} / ${tasks.length}`;
      taskTextEl.innerHTML = tasks[i].text;
      taskHintEl.textContent = tasks[i].hint;
      updateDots();
    }

    function showToast(msg){
      toastEl.textContent = msg || "请继续尝试";
      toastEl.classList.add("show");
      clearTimeout(showToast.t);
      showToast.t = setTimeout(()=>toastEl.classList.remove("show"), 1300);
    }

    function showCheck(){
      checkmarkEl.classList.add("active");
      clearTimeout(showCheck.t);
      showCheck.t = setTimeout(()=>checkmarkEl.classList.remove("active"), 520);
    }

    function setFreeMode(on){
      state.freeMode = !!on;
      freeBtn.textContent = state.freeMode ? "退出自由模式" : "自由模式";
      autoDemoBtn.disabled = state.freeMode;
      taskCard.style.opacity = state.freeMode ? ".25" : "1";
      taskCard.style.filter = state.freeMode ? "grayscale(.6)" : "none";
      hudEl.textContent = state.freeMode ? "模式: 自由" : "模式: 引导";
    }

    function tryPassStep(){
      if(state.freeMode || state.completed || state.autoPlaying || state.successCooldown){
        return;
      }
      const ok = tasks[state.currentTask].check();
      if(!ok){
        showToast("条件尚未满足");
        return;
      }
      state.successCooldown = true;
      setTimeout(()=>{ state.successCooldown = false; }, 380);
      showCheck();
      if(state.currentTask >= tasks.length - 1){
        state.completed = true;
        doneMaskEl.style.display = "flex";
        updateDots();
      }else{
        setStepUI(state.currentTask + 1);
      }
    }

    function resetScenePositions(){
      const w = playfield.clientWidth;
      const h = playfield.clientHeight;
      setNodePos(nodes.a, w * 0.18, h * 0.55);
      setNodePos(nodes.b, w * 0.45, h * 0.30);
      setNodePos(nodes.c, w * 0.72, h * 0.60);
    }

    function resetFlow(){
      stopAnimationLoop();
      clearAllTimers();
      state.completed = false;
      state.isRunning = false;
      if(!state.freeMode){
        setStepUI(0);
      }
      doneMaskEl.style.display = "none";
      checkmarkEl.classList.remove("active");
      resetScenePositions();
      showToast("已重置");
    }

    function clearAllTimers(){
      for(const id of state.timers){
        clearTimeout(id);
      }
      state.timers.clear();
    }

    function startAnimationLoop(duration=900){
      stopAnimationLoop();
      state.isRunning = true;
      const start = performance.now();
      const step = (now)=>{
        const t = clamp((now - start) / duration, 0, 1);
        const swing = Math.sin(t * Math.PI * 2) * 8;
        playfield.style.transform = `translateY(${swing}px)`;
        if(t < 1){
          state.rafId = requestAnimationFrame(step);
        }else{
          playfield.style.transform = "translateY(0)";
          state.isRunning = false;
          state.rafId = 0;
          tryPassStep();
        }
      };
      state.rafId = requestAnimationFrame(step);
    }

    function stopAnimationLoop(){
      if(state.rafId){
        cancelAnimationFrame(state.rafId);
        state.rafId = 0;
      }
      playfield.style.transform = "translateY(0)";
      state.isRunning = false;
    }

    async function autoDemo(){
      if(state.autoPlaying || state.freeMode){
        return;
      }
      state.autoPlaying = true;
      autoDemoBtn.disabled = true;
      runBtn.disabled = true;
      try{
        setFreeMode(false);
        resetFlow();
        await sleep(260);
        animateMove(nodes.a, nodes.b, 480);
        await sleep(600);
        tryPassStep();
        await sleep(280);
        animateMove(nodes.c, nodes.b, 480);
        await sleep(620);
        tryPassStep();
        await sleep(240);
        startAnimationLoop(760);
        await sleep(860);
      }catch(err){
        console.error("[autoDemo] failed:", err);
        showToast("自动演示失败，请重试");
      }finally{
        state.autoPlaying = false;
        autoDemoBtn.disabled = false;
        runBtn.disabled = false;
      }
    }

    function animateMove(srcNode, targetNode, duration=500){
      const from = getNodePos(srcNode);
      const to = getNodePos(targetNode);
      const offset = 26;
      const tx = to.x + offset;
      const ty = to.y + offset;
      const start = performance.now();
      const id = requestAnimationFrame(function tick(now){
        const t = clamp((now - start) / duration, 0, 1);
        const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2)/2;
        setNodePos(srcNode, from.x + (tx - from.x) * e, from.y + (ty - from.y) * e);
        if(t < 1){
          requestAnimationFrame(tick);
        }
      });
      state.rafId = id;
    }

    function bindDrag(el){
      const local = { dragging:false, pointerId:null, dx:0, dy:0 };
      el.addEventListener("pointerdown", (e)=>{
        if(state.autoPlaying || state.isRunning){
          return;
        }
        local.dragging = true;
        local.pointerId = e.pointerId;
        el.setPointerCapture(e.pointerId);
        const r = el.getBoundingClientRect();
        const sr = stage.getBoundingClientRect();
        local.dx = e.clientX - sr.left - (parseFloat(el.dataset.x || "0"));
        local.dy = e.clientY - sr.top - (parseFloat(el.dataset.y || "0"));
        el.classList.add("dragging");
        e.preventDefault();
      });
      el.addEventListener("pointermove", (e)=>{
        if(!local.dragging || e.pointerId !== local.pointerId){
          return;
        }
        const sr = stage.getBoundingClientRect();
        const r = el.getBoundingClientRect();
        const maxX = stage.clientWidth - r.width;
        const maxY = stage.clientHeight - r.height;
        const nx = clamp(e.clientX - sr.left - local.dx, 0, maxX);
        const ny = clamp(e.clientY - sr.top - local.dy, 0, maxY);
        el.dataset.x = String(nx);
        el.dataset.y = String(ny);
        el.style.transform = `translate(${nx}px, ${ny}px)`;
        e.preventDefault();
      });
      const end = ()=>{
        if(!local.dragging){
          return;
        }
        local.dragging = false;
        el.classList.remove("dragging");
        tryPassStep();
      };
      el.addEventListener("pointerup", end);
      el.addEventListener("pointercancel", end);
    }

    const onResize = debounce(()=>{
      resetScenePositions();
    }, 120);

    window.addEventListener("resize", onResize);
    window.addEventListener("orientationchange", onResize);
    document.addEventListener("gesturestart", (e)=>e.preventDefault(), { passive:false });

    resetBtn.addEventListener("click", ()=>{
      if(state.autoPlaying){
        return;
      }
      resetFlow();
    });
    autoDemoBtn.addEventListener("click", autoDemo);
    freeBtn.addEventListener("click", ()=>{
      setFreeMode(!state.freeMode);
      if(!state.freeMode){
        setStepUI(0);
      }
    });
    runBtn.addEventListener("click", ()=>{
      if(state.autoPlaying || state.isRunning){
        return;
      }
      startAnimationLoop();
    });
    okBtn.addEventListener("click", ()=>{
      doneMaskEl.style.display = "none";
    });

    function init(){
      initDots();
      setStepUI(0);
      setFreeMode(false);
      resetScenePositions();
    }
    init();
  </script>
</body>
</html>
