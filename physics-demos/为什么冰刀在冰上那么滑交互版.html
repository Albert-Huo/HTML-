<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>冰刀为何在冰上那么滑 · 互动演示（放大镜与命中修复）</title>
<style>
  :root{ --card-bg: rgba(255,255,255,0.08); --accent:#3ddc97; --warn:#ffb74d; --ink:#e9f2ff; }
  body{ background:#0f1b28; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
        margin:0; padding:10px; display:flex; flex-direction:column; align-items:center;}

   /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000; 
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px; 
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg, 
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow { 
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }

  /* 步骤卡 */
  .task-card{ width:100%; max-width:900px; background:var(--card-bg); border:1px solid rgba(255,255,255,0.12); border-radius:12px;
    padding:12px 14px; backdrop-filter:blur(6px); display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center;
    transition:opacity .2s, filter .2s; }
  .task-step{ background:rgba(255,255,255,0.15); border-radius:8px; padding:6px 10px; font-weight:600; white-space:nowrap; }
  .task-text{ line-height:1.6; } .task-hint{ color:#ffd54f; font-size:12px; opacity:.95; }
  .progress-dots{ display:flex; gap:6px; align-items:center; }
  .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.25); outline:2px solid rgba(255,255,255,0.15); }
  .dot.active{ background:var(--warn);} .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,0.5); }

  /* 舞台 */
  #stage{ width:100%; max-width:900px; height:48vh; max-height:380px; min-height:260px; position:relative; overflow:hidden;
    border-radius:12px; background:#e0f8ff; box-shadow:0 8px 24px rgba(0,0,0,.3); }
  .container{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:800px; }
  #canvas{ display:block; width:800px; height:200px; border:1px solid #ccc; background:#fff; }

  /* 左下角控制条 */
  .ctrlbar{ position:absolute; left:10px; bottom:10px; z-index:10; display:flex; gap:8px; flex-wrap:wrap;
    background: rgba(15,15,15,0.55); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:8px; backdrop-filter: blur(6px); }
  .ctrlbar button{ padding:8px 10px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .ctrlbar button:hover{ background:#5a5a5a; }
  .ctrlbar .pill{ padding:6px 10px; border-radius:999px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); font-size:13px; }

  /* 底部三按钮（靠左） */
  .toolbar{ width:100%; max-width:900px; margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
  .toolbar button{ padding:10px 16px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer;
    transition: background .25s, transform .05s, opacity .2s; }
  .toolbar button:hover{ background:#5a5a5a; } .toolbar button:active{ transform:scale(.98);} .toolbar button:disabled{ opacity:.5; cursor:not-allowed; }

  /* 对勾、Toast、完成弹窗 */
  .checkmark{ position:absolute; z-index:50; left:50%; top:20%; transform:translate(-50%,-50%) scale(.6);
    width:120px; height:120px; border-radius:50%; background:rgba(61,220,151,.15);
    border:3px solid var(--accent); display:none; align-items:center; justify-content:center;
    box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25); }
  .checkmark.active{ display:flex; }
  .checkmark>div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }
  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,0.8); color:#fff; padding:10px 14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,.35);
    font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:900;}
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .modal-mask{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:800; }
  .modal{ width:min(90vw,360px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5);}
  .modal h3{ margin:8px 0 6px; font-size:20px;} .modal p{ color:#cfd8dc; margin-top:0;} .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; padding:8px 14px; border:none; border-radius:10px;}

  /* 放大镜：移出容器，固定定位，不受 scale 影响 */
  #magnifier{
    position:fixed; display:none; border:2px solid #333; border-radius:50%; overflow:hidden;
    width:150px; height:150px; pointer-events:none; box-shadow:0 0 8px rgba(0,0,0,0.45); z-index:700;
    background:#fff;
  }

  /* 说明 */
  .explanation{ width:100%; max-width:900px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:var(--ink); }
  .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em;}
  @media (max-width:600px){ .explanation{ font-size:.9em; } }
</style>
</head>
<body>
  <div id="spectrum"></div>

  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">点击<strong>开始演示</strong>，让冰刀滑到中央；注意观察刀刃下的浅白色“水膜”。</div>
      <div class="task-hint" id="taskHint">提示：水膜在刀刃下方，与冰面交界处的一条浅白细带。</div>
    </div>
    <div class="progress-dots">
      <span class="dot active" id="dot1"></span><span class="dot" id="dot2"></span><span class="dot" id="dot3"></span>
    </div>
  </div>

  <div id="stage">
    <div class="container" id="container">
      <canvas id="canvas" width="800" height="200"></canvas>
    </div>

    <div class="ctrlbar" aria-label="演示控制栏">
      <span class="pill">水膜厚度：<b id="thkLabel">2px</b></span>
      <button id="startBtn">开始演示</button>
      <button id="addPBtn">加压（更厚）</button>
      <button id="relaxBtn">减压（更薄）</button>
    </div>

    <div class="checkmark" id="checkmark"><div></div></div>
  </div>

  <!-- 放大镜移到 body 末尾，固定定位 -->
  <canvas id="magnifier" width="150" height="150"></canvas>

  <div class="toolbar">
    <button id="stepResetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <div class="toast" id="toast">再试一试：请按步骤完成当前指令</div>

  <div class="modal-mask" id="doneMask" role="dialog" aria-modal="true" aria-labelledby="doneTitle">
    <div class="modal">
      <h3 id="doneTitle">完成，你真棒！🎉</h3>
      <p>你已经体验：开始演示 → 放大镜观察水膜 → 加压增厚水膜（压力熔化）</p>
      <button class="ok" id="okBtn">好的</button>
    </div>
  </div>

  <div class="explanation">
    <h2>为什么冰刀在冰上那么滑？</h2>
    <p>当冰刀滑过，刀刃对冰面局部施加<strong>高压</strong>，使该处的冰<strong>熔点降低</strong>，瞬间产生一层极薄的<strong>水膜</strong>，像润滑油一样减小摩擦（压力熔化）。</p>
    <p>在本演示中，你可以用“放大镜”观察到刀刃与冰面接触处的白亮细带；点击“加压”会让这层水膜更厚，帮助理解“压力→局部熔化→润滑”的因果链。</p>
  </div>

<script>
/* ========= 原动画（保留） ========= */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const magnifier = document.getElementById('magnifier');
const magCtx = magnifier.getContext('2d');

const bladeWidth = 100;
const bladeHeight = 10;
let waterThickness = 2;
const zoom = 3;
let started = false;
let x = -bladeWidth;
const iceY = canvas.height / 2;
const bladeY = iceY - bladeHeight;
const targetX = (canvas.width - bladeWidth) / 2;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // 背景
  ctx.fillStyle = '#e0f8ff'; ctx.fillRect(0,0,canvas.width,iceY);
  ctx.fillStyle = '#fff';     ctx.fillRect(0,iceY,canvas.width,canvas.height-iceY);
  // 刀刃
  const bladeX = x;
  const grad = ctx.createLinearGradient(bladeX, bladeY, bladeX + bladeWidth, bladeY);
  grad.addColorStop(0, '#bbb'); grad.addColorStop(0.5, '#eee'); grad.addColorStop(1, '#aaa');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.moveTo(bladeX, bladeY);
  ctx.lineTo(bladeX + bladeWidth, bladeY);
  ctx.lineTo(bladeX + bladeWidth - 5, bladeY + bladeHeight);
  ctx.lineTo(bladeX + 5, bladeY + bladeHeight);
  ctx.closePath(); ctx.fill();
  // 高光
  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(bladeX + 5, bladeY + 2); ctx.lineTo(bladeX + bladeWidth - 5, bladeY + 2); ctx.stroke();
  // 水膜
  const waterX = x;
  const waterY = iceY - waterThickness;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillRect(waterX, waterY, bladeWidth, waterThickness);
  // 前进
  if (started && x < targetX){ x += 2; if (x > targetX) x = targetX; }
  requestAnimationFrame(draw);
}
draw();

/* ========= 放大镜（固定定位，不受 scale 影响） ========= */
let waterHoverNow = false; // 是否处在水膜区
function updateMagnifier(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const mx = clientX - rect.left;   // 画布坐标系
  const my = clientY - rect.top;

  // 放大镜显示在指尖附近（不越出边界）
  magnifier.style.display = 'block';
  const magW = magnifier.width, magH = magnifier.height;
  let left = clientX - magW/2, top = clientY - magH/2;
  const vw = window.innerWidth, vh = window.innerHeight;
  left = Math.max(6, Math.min(vw - magW - 6, left));
  top  = Math.max(6, Math.min(vh - magH - 6, top));
  magnifier.style.left = left + 'px';
  magnifier.style.top  = top  + 'px';

  // 以画布为源做截图
  const sw = magW/zoom, sh = magH/zoom;
  let sx = mx - sw/2, sy = my - sh/2;
  sx = Math.max(0, Math.min(canvas.width - sw, sx));
  sy = Math.max(0, Math.min(canvas.height - sh, sy));
  magCtx.clearRect(0,0,magW,magH);
  magCtx.drawImage(canvas, sx, sy, sw, sh, 0, 0, magW, magH);

  // 在函数内重算水膜位置，避免作用域问题
  const waterX = x;
  const waterY = iceY - waterThickness;

  // ✅ 命中判定更“宽容”：垂直 ±12px，水平 ±8px
  const inWater = (mx >= waterX - 8 && mx <= waterX + bladeWidth + 8 &&
                   my >= waterY - 12 && my <= waterY + waterThickness + 12);
  waterHoverNow = inWater;
  if (inWater){
    const fx = waterX + bladeWidth/2, fy = waterY + waterThickness/2;
    const magX = (fx - sx) * zoom, magY = (fy - sy) * zoom;
    magCtx.strokeStyle = '#f00'; magCtx.fillStyle = '#f00'; magCtx.lineWidth = 2;
    magCtx.beginPath(); magCtx.moveTo(magX, magY - 24); magCtx.lineTo(magX, magY + 6); magCtx.stroke();
    magCtx.beginPath(); magCtx.moveTo(magX - 5, magY + 6); magCtx.lineTo(magX, magY + 12); magCtx.lineTo(magX + 5, magY + 6); magCtx.fill();
    magCtx.font = '16px sans-serif'; magCtx.fillText('水膜', magX + 8, magY - 10);
  }
}
function hideMagnifier(){ magnifier.style.display = 'none'; waterHoverNow = false; }

/* ========= 模板骨架 ========= */
const taskCard = document.getElementById('taskCard');
const taskStepEl = document.getElementById('taskStep');
const taskTextEl = document.getElementById('taskText');
const taskHintEl = document.getElementById('taskHint');
const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];

const stepResetBtn = document.getElementById('stepResetBtn');
const autoDemoBtn = document.getElementById('autoDemoBtn');
const freeBtn = document.getElementById('freeBtn');
const checkmark = document.getElementById('checkmark');
const toast = document.getElementById('toast');
const doneMask = document.getElementById('doneMask');
const okBtn = document.getElementById('okBtn');

const startBtn = document.getElementById('startBtn');
const addPBtn  = document.getElementById('addPBtn');
const relaxBtn = document.getElementById('relaxBtn');
const thkLabel = document.getElementById('thkLabel');

let freeMode=false, autoPlaying=false, completed=false, currentTask=0;
let holdTimer=null;

const tasks = [
  { text:'点击<strong>开始演示</strong>，让冰刀滑到中央；注意观察刀刃下的浅白色“水膜”。',
    hint:'点左下角“开始演示”。',
    expected:'start',
    extraCheck:()=> x >= targetX },
  { text:'把指针/手指放到<strong>水膜区域</strong>（停留约 1 秒），用放大镜观察“水膜”标注。',
    hint:'把指针停在刀刃和冰面交界的白亮细带上（放大镜会显示“水膜”字样）。',
    expected:'hover_water',
    extraCheck:()=> true },
  { text:'点击<strong>加压</strong>，让水膜明显变厚（≥ 5 px），完成！',
    hint:'点击“加压（更厚）”，水膜厚度数值会增加。',
    expected:'press_more',
    extraCheck:()=> waterThickness >= 5 }
];

function setStepUI(i){
  i = Math.max(0, Math.min(i, tasks.length-1));
  dots.forEach((d,k)=> d.className = 'dot' + (k<i ? ' done' : (k===i ? ' active' : '')));
  taskStepEl.textContent = `步骤 ${i+1} / ${tasks.length}`;
  taskTextEl.innerHTML   = tasks[i].text;
  taskHintEl.textContent = tasks[i].hint;
}
function showCheck(){ checkmark.classList.add('active'); setTimeout(()=>checkmark.classList.remove('active'), 500); }
function showToast(msg){ toast.textContent = msg || '再试一试'; toast.classList.add('show'); setTimeout(()=> toast.classList.remove('show'), 1200); }
function showDone(){ doneMask.style.display='flex'; }
okBtn.onclick = ()=> doneMask.style.display='none';

function setFreeMode(on){
  freeMode = on;
  taskCard.style.opacity = on ? 0.25 : 1;
  taskCard.style.filter  = on ? 'grayscale(.6)' : 'none';
  freeBtn.textContent    = on ? '退出自由模式' : '自由模式';
  autoDemoBtn.disabled   = on;
}

function stepReset(){
  autoPlaying=false; completed=false; currentTask=0;
  dots.forEach(d=> d.className='dot'); dots[0].classList.add('active');
  setStepUI(0); hideMagnifier();
  started = false;
  x = -bladeWidth; waterThickness = 2; thkLabel.textContent = waterThickness.toFixed(0) + 'px';
}
stepReset();

function inStepMode(){ return !freeMode && !completed && !autoPlaying; }

startBtn.addEventListener('click', ()=>{
  if (inStepMode()){
    if (tasks[currentTask].expected === 'start'){
      started = false; x = -bladeWidth; started = true;
      const chk = setInterval(()=>{ if (x >= targetX){ clearInterval(chk); tryPass('start'); } }, 120);
    }else{ showToast(tasks[currentTask].hint); }
  }else{ started = false; x = -bladeWidth; started = true; }
});

addPBtn.addEventListener('click', ()=>{
  waterThickness = Math.min(14, waterThickness + 1);
  thkLabel.textContent = waterThickness.toFixed(0) + 'px';
  if (inStepMode()){
    if (tasks[currentTask].expected === 'press_more'){ tryPass('press_more'); }
    else showToast(tasks[currentTask].hint);
  }
});
relaxBtn.addEventListener('click', ()=>{
  waterThickness = Math.max(1, waterThickness - 1);
  thkLabel.textContent = waterThickness.toFixed(0) + 'px';
});

/* ====== 第二步判定：停留 1 秒（hover 或 点击按住） ====== */
function startWaterHoldCheck(){
  if (holdTimer) return;
  holdTimer = setTimeout(()=>{
    if (inStepMode() && tasks[currentTask].expected === 'hover_water' && waterHoverNow){
      tryPass('hover_water');
    }
    clearTimeout(holdTimer); holdTimer=null;
  }, 1000);
}
function pointerXY(e){
  return {
    x: (e.clientX !== undefined ? e.clientX : e.touches[0].clientX),
    y: (e.clientY !== undefined ? e.clientY : e.touches[0].clientY)
  };
}

/* —— 悬停/拖动 —— */
['mousemove','touchmove'].forEach(evt=>{
  canvas.addEventListener(evt, function(e){
    if (autoPlaying) return;
    if (e.cancelable) e.preventDefault();
    const {x:px, y:py} = pointerXY(e);
    updateMagnifier(px, py);
    if (waterHoverNow) startWaterHoldCheck();
  }, {passive:false});
});

/* —— 点击/按住：强制显示放大镜在指尖 —— */
['mousedown','touchstart'].forEach(evt=>{
  canvas.addEventListener(evt, function(e){
    if (autoPlaying) return;
    if (e.cancelable) e.preventDefault();
    const {x:px, y:py} = pointerXY(e);
    updateMagnifier(px, py);                 // 强制显示放大镜
    if (waterHoverNow) startWaterHoldCheck();
    // 若当前是步骤2，但不在水膜，给提示（严格守卫）
    if (inStepMode() && tasks[currentTask].expected === 'hover_water' && !waterHoverNow){
      showToast(tasks[currentTask].hint);
    }
  }, {passive:false});
});

canvas.addEventListener('mouseout', hideMagnifier);
canvas.addEventListener('touchend', hideMagnifier);
canvas.addEventListener('touchcancel', hideMagnifier);

/* 统一推进 */
function tryPass(action){
  const t = tasks[currentTask]; if (!t) return;
  const correct = (action === t.expected);
  const ok = t.extraCheck ? t.extraCheck() : true;
  if (correct && ok){
    showCheck();
    setTimeout(()=>{
      dots[currentTask].classList.remove('active'); dots[currentTask].classList.add('done');
      currentTask++;
      if (currentTask >= tasks.length){ completed=true; showDone(); }
      else{ dots[currentTask].classList.add('active'); setStepUI(currentTask); }
    }, 520);
  }else{
    if (!autoPlaying) showToast(t.hint);
  }
}

/* 自动演示（严格按同一判定逻辑推进） */
function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }
async function autoDemo(){
  if (freeMode || autoPlaying) return;
  autoPlaying = true; stepReset();

  // Step1
  startBtn.click();
  while (x < targetX) await sleep(80);
  tryPass('start');

  // Step2：把放大镜对准水膜中心
  await sleep(300);
  const rect = canvas.getBoundingClientRect();
  const fx = (x + bladeWidth/2) + rect.left;
  const fy = (iceY - waterThickness/2) + rect.top;
  updateMagnifier(fx, fy);
  await sleep(1000);
  tryPass('hover_water');
  hideMagnifier();

  // Step3：加压 ≥ 5px
  await sleep(300);
  while (waterThickness < 5){ addPBtn.click(); await sleep(160); }
  tryPass('press_more');

  autoPlaying = false;
}

autoDemoBtn.addEventListener('click', autoDemo);
stepResetBtn.addEventListener('click', stepReset);
freeBtn.addEventListener('click', ()=> setFreeMode(!freeMode));

/* 舞台自适应：保持 800×200 等比居中 */
function fitStage(){
  const stage = document.getElementById('stage');
  const cont  = document.getElementById('container');
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const scale = Math.min(sw/800, sh/220);
  cont.style.transform = `translate(-50%,-50%) scale(${scale})`;
}
addEventListener('resize', fitStage); addEventListener('orientationchange', fitStage);
setTimeout(fitStage, 50);
</script>
</body>
</html>
