<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>草丛中的老虎 · 互动演示</title>
<style>
  :root{
    --card-bg: rgba(255,255,255,0.08);
    --accent:#3ddc97;
    --warn:#ffb74d;
    --green1:#2d5a27;
    --green2:#3d6b34;
    --green3:#4c7d42;
  }
  body {
    background: #1a1a1a;
    display:flex; flex-direction:column; align-items:center;
    color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
    margin:0; padding:10px;
  }

  /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000; 
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px; 
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg, 
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow { 
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }

  /* 步骤卡片 */
  .task-card{
    width:100%; max-width:900px; background:var(--card-bg);
    border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:12px 14px; backdrop-filter:blur(6px);
    display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px;
  }
  .task-step{ background:rgba(255,255,255,0.15); border-radius:8px; padding:6px 10px; font-weight:600; white-space:nowrap;}
  .task-text{ line-height:1.5; }
  .task-hint{ color:#ffd54f; font-size:12px; opacity:.9; }
  .progress-dots{ display:flex; gap:6px; align-items:center; }
  .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.25); }
  .dot.active{ background:var(--warn); }
  .dot.done{ background:var(--accent); }

  /* 画布容器 */
  #canvas{
    width:100%; max-width:900px; height:60vh; max-height:520px;
    position:relative; overflow:hidden; border-radius:12px; background:#000;
    margin-top:10px; box-shadow:0 8px 24px rgba(0,0,0,0.3); touch-action:none;
  }

  /* ===== 固定设计坐标 (900×520) + 等比缩放适配 ===== */
  #sceneWrap{
    position:absolute; left:50%; top:50%;
    width:900px; height:520px;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:0 0;
    overflow:hidden; display:block;
    background:linear-gradient(180deg,#87CEEB,#E0FFFF); /* 天空 */
  }

  .mountain{
    position:absolute; width:900px; height:300px; left:0; bottom:100px;
    background:linear-gradient(90deg,var(--green1) 0%,var(--green2) 20%,var(--green3) 50%,var(--green2) 80%,var(--green1) 100%);
    filter:brightness(1.2); z-index:3; pointer-events:none;
  }
  .ground{
    position:absolute; left:0; right:0; bottom:0; height:100px; z-index:2;
    background:linear-gradient(90deg,var(--green1) 0%,var(--green2) 20%,var(--green3) 50%,var(--green2) 80%,var(--green1) 100%);
    filter:brightness(1.2);
  }
  .mountain-icon{
    position:absolute; font-size:120px; bottom:80px; right:465px; color:var(--green2);
    text-shadow:2px 2px 4px rgba(0,0,0,0.3); z-index:4; pointer-events:none;
  }

  .grass{
    position:absolute; font-size:24px; transform-origin:bottom;
    animation:sway 2s ease-in-out infinite alternate; z-index:5; pointer-events:none;
  }
  @keyframes sway{ from{transform:rotate(-5deg)} to{transform:rotate(5deg)} }

  /* 老虎置于山后 */
  #tiger{
    position:absolute; font-size:40px; right:528px; bottom:135px;
    z-index:3; cursor:pointer; transition:transform .15s;
  }
  #tiger:active{ transform:scale(.98); }
  .tiger-eye{ position:absolute; width:5px; height:5px; background:yellow; border-radius:80%; animation:blink 3s infinite; }
  @keyframes blink{ 98%{height:8px} 0%,96%,100%{height:1px} }

  .deer{ position:absolute; font-size:50px; bottom:210px; animation:glance 3s ease-in-out infinite; z-index:6; pointer-events:none; }
  @keyframes glance{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

  .filter-human{ filter:none; }
  .filter-deer{ filter:grayscale(0.7) sepia(0.6) hue-rotate(-30deg) contrast(1.2); }

  /* 画面内按钮（右上角纵向） */
  .in-canvas-controls{
    position:absolute; right:12px; top:12px; z-index:10; display:flex; flex-direction:column; gap:8px;
  }
  .in-canvas-controls button{
    padding:8px 10px; background:rgba(0,0,0,0.55); color:#fff; border:none; border-radius:8px; font-size:14px; cursor:pointer;
    transition:background .2s; backdrop-filter:blur(3px);
  }
  .in-canvas-controls button:hover{ background:rgba(0,0,0,0.7); }

  .badge{
    position:absolute; left:50%; top:14%; transform:translate(-50%,-50%);
    font-size:26px; font-weight:800; color:#FFD700; text-shadow:2px 2px 6px rgba(0,0,0,0.8);
    opacity:0; pointer-events:none;
  }
  .badge.show{ animation:badgeFade 2.2s ease forwards; }
  @keyframes badgeFade{
    0%{opacity:0; transform:translate(-50%,-60%);} 10%{opacity:1; transform:translate(-50%,-50%);}
    85%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-40%);}
  }

  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; width:100%; max-width:900px; margin-top:12px; justify-content:flex-start; }
  button{ padding:10px 16px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer; transition:.25s; }
  button:hover{ background:#5a5a5a; } button:active{ transform:scale(.98); } button:disabled{ opacity:.5; cursor:not-allowed; }

  .checkmark{ position:absolute; z-index:50; left:50%; top:20%; transform:translate(-50%,-50%) scale(0.6);
    width:120px; height:120px; border-radius:50%; background:rgba(61,220,151,0.15); border:3px solid var(--accent);
    display:none; align-items:center; justify-content:center; }
  .checkmark.active{ display:flex; }
  .checkmark>div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }

  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,0.8); color:#fff; padding:10px 14px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none; transition:.25s; z-index:200; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .modal-mask{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:300; }
  .modal{ width:min(90vw,360px); background:#111; color:#fff; border:1px solid rgba(255,255,255,0.15); border-radius:14px; padding:18px 16px; text-align:center; }
  .modal h3{ margin:8px 0 6px; font-size:20px; }
  .modal p{ color:#cfd8dc; margin-top:0; }
  .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; }

  .explanation{ width:100%; max-width:900px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:#e9f2ff; }
  .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em; }
</style>
</head>
<body>
  <div id="spectrum"></div>

  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">点击<strong>羚羊视觉</strong>。当前是<span style="font-weight:700">人类视觉</span>。</div>
      <div class="task-hint" id="taskHint">提示：点画面右上角“羚羊视觉”。</div>
    </div>
    <div class="progress-dots">
      <span class="dot active" id="dot1"></span>
      <span class="dot" id="dot2"></span>
      <span class="dot" id="dot3"></span>
    </div>
  </div>

  <div id="canvas">
    <!-- 固定坐标舞台 -->
    <!-- ★ 初始即为人类视觉 -->
    <div id="sceneWrap" class="filter-human">
      <div class="mountain"></div>
      <div class="ground"></div>
      <div class="mountain-icon">⛰️</div>

      <!-- 老虎（山后） -->
      <div id="tiger">🐯
        <div class="tiger-eye" style="left:11px; top:27px;"></div>
        <div class="tiger-eye" style="left:23px; top:27px;"></div>
      </div>

      <!-- 两只羚羊 -->
      <div class="deer" style="left:300px;">🦌</div>
      <div class="deer" style="left:400px;">🦌</div>

      <div id="badge" class="badge">羚羊发现老虎了吗？</div>

      <!-- 画面内按钮 -->
      <div class="in-canvas-controls">
        <button id="humanBtn">👨 人类视觉</button>
        <button id="deerBtn">🦌 羚羊视觉</button>
        <button id="refreshBtn">🔄 刷新草丛</button>
      </div>
    </div>

    <div class="checkmark" id="checkmark"><div></div></div>
  </div>

  <div class="toolbar">
    <button id="resetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <div class="toast" id="toast">再试一试：按照指令完成本步骤</div>
  <div class="modal-mask" id="doneMask">
    <div class="modal">
      <h3 id="doneTitle">完成，你真棒！🎉</h3>
      <p>你已经体验了不同视觉下的伪装，以及草丛遮挡如何帮助老虎隐藏。</p>
      <button class="ok" id="okBtn">好的</button>
    </div>
  </div>

  <div class="explanation">
    <h2>为什么老虎在草丛里不容易被发现？</h2>
    <ul>
      <li><b>色觉差异</b>：许多有蹄类动物（如羚羊）色觉通道更少，看起来是偏黄灰的世界；老虎与草色在它们眼里更接近。</li>
      <li><b>形状破碎</b>：草叶的竖直纹理和老虎身上的条纹共同打散外轮廓，视觉系统更难从背景中分割前景目标。</li>
      <li><b>前景遮挡</b>：草丛越密、越靠近目标，遮挡越强，边缘线索越弱，更难被注意到。</li>
    </ul>
  </div>

<script>
  /* ===== 舞台等比缩放（保持相对位置不变） ===== */
  const DESIGN_W = 900, DESIGN_H = 520;
  const canvasEl = document.getElementById('canvas');
  const sceneWrap = document.getElementById('sceneWrap');
  function fitStage(){
    const cw = canvasEl.clientWidth || DESIGN_W;
    const ch = canvasEl.clientHeight || DESIGN_H;
    const scale = Math.min(cw / DESIGN_W, ch / DESIGN_H);
    sceneWrap.style.transform = `translate(-50%,-50%) scale(${scale})`;
  }
  window.addEventListener('resize', fitStage);

  /* ===== 通用UI ===== */
  const sleep = (ms)=> new Promise(r=>setTimeout(r, ms));
  const waitFor = async (predicate, timeout=1600, interval=30)=>{
    const start = performance.now();
    while (performance.now() - start < timeout){
      if (predicate()) return true;
      await sleep(interval);
    }
    return false;
  };
  const taskCard = document.getElementById('taskCard');
  const taskStepEl = document.getElementById('taskStep');
  const taskTextEl = document.getElementById('taskText');
  const taskHintEl = document.getElementById('taskHint');
  const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];
  const checkmark = document.getElementById('checkmark');
  const toast = document.getElementById('toast');
  const doneMask = document.getElementById('doneMask');
  const okBtn = document.getElementById('okBtn');
  const autoDemoBtn = document.getElementById('autoDemoBtn');
  const freeBtn = document.getElementById('freeBtn');
  const resetBtn = document.getElementById('resetBtn');

  let freeMode = false;
  let autoPlaying = false;
  let successCooldown = false;
  let completed = false;
  let currentTask = 0;

  function setStepUI(stepIndex){
    const tasksLen = tasks.length;
    stepIndex = Math.max(0, Math.min(stepIndex, tasksLen-1));
    dots.forEach((d,i)=>{
      d.className = 'dot' + (i<stepIndex ? ' done' : '') + (i===stepIndex ? ' active' : '');
    });
    taskStepEl.textContent = `步骤 ${stepIndex+1} / ${tasksLen}`;
    taskTextEl.innerHTML = tasks[stepIndex].text;
    taskHintEl.textContent = tasks[stepIndex].hint;
  }
  function showCheck(){ checkmark.classList.add('active'); setTimeout(()=> checkmark.classList.remove('active'), 500); }
  function hideCheck(){ checkmark.classList.remove('active'); }
  function showToast(text){ toast.textContent = text || '再试一试'; toast.classList.add('show'); setTimeout(()=> toast.classList.remove('show'), 1200); }
  function showDone(){ doneMask.style.display='flex'; }
  okBtn.addEventListener('click', ()=> doneMask.style.display='none');
  function lockSuccess(){ successCooldown = true; setTimeout(()=> successCooldown = false, 450); }

  function nextTask(){
    hideCheck();
    dots[currentTask].classList.remove('active');
    dots[currentTask].classList.add('done');
    currentTask++;
    if(currentTask >= tasks.length){
      completed = true;
      showDone();
      return;
    }
    dots[currentTask].classList.add('active');
    setStepUI(currentTask);
  }

  function setFreeMode(on){
    freeMode = on;
    if (freeMode){
      taskCard.style.opacity = .25; taskCard.style.filter = 'grayscale(0.6)';
      freeBtn.textContent = '退出自由模式'; autoDemoBtn.disabled = true;
      hideCheck(); toast.classList.remove('show'); doneMask.style.display = 'none';
    } else {
      taskCard.style.opacity = 1; taskCard.style.filter = 'none';
      freeBtn.textContent = '自由模式'; autoDemoBtn.disabled = false;
    }
  }

  /* ===== 场景&元素 ===== */
  const tigerEl = document.getElementById('tiger');
  const humanBtn = document.getElementById('humanBtn');
  const deerBtn = document.getElementById('deerBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const badge = document.getElementById('badge');

  // ★ 初始视觉调整为“人类”
  let currentVision = 'human';
  let tigerClicked = false;

  function badgeFlash(){ badge.classList.remove('show'); void badge.offsetWidth; badge.classList.add('show'); }

  function clearGrass(){ sceneWrap.querySelectorAll('.grass').forEach(el => el.remove()); }

  /* 虎区“高密草”固定在设计坐标 */
  const tigerArea = { x1:250, x2:350, y1:150, y2:200 };

  function createGrass(inTigerArea){
    const g = document.createElement('div');
    g.className = 'grass';
    if (inTigerArea) {
      g.style.left   = (tigerArea.x1 + Math.random()*(tigerArea.x2 - tigerArea.x1)) + 'px';
      g.style.bottom = (tigerArea.y1 + Math.random()*(tigerArea.y2 - tigerArea.y1)) + 'px';
      g.style.zIndex = 5;
      g.style.fontSize = (20 + Math.random()*15) + 'px';
    } else {
      g.style.left   = Math.random()* (DESIGN_W - 20) + 'px';
      g.style.bottom = 100 + Math.random()*50 + 'px';
      g.style.zIndex = 4;
      g.style.fontSize = (18 + Math.random()*14) + 'px';
    }
    g.style.transform = `rotate(${Math.random()*30 - 15}deg)`;
    g.textContent = '🌿';
    sceneWrap.appendChild(g);
  }

  // ★ 初始化/刷新草丛：仅刷新草，不改变视觉
  function initScene(){
    clearGrass();
    for (let i = 0; i < 30; i++) createGrass(false);
    for (let i = 0; i < 30; i++) createGrass(true);
    badgeFlash();
    tigerClicked = false;
  }

  function setVision(type){
    currentVision = type === 'human' ? 'human' : 'deer';
    sceneWrap.className = type === 'human' ? 'filter-human' : 'filter-deer';
    tigerEl.style.opacity = type === 'human' ? '1' : '0.6';
    tigerEl.style.filter  = type === 'human' ? 'none' : 'hue-rotate(20deg) brightness(0.8)';
  }

  function countGrassInTigerArea(){
    let count = 0;
    sceneWrap.querySelectorAll('.grass').forEach(g=>{
      const left = parseFloat(g.style.left||'0');
      const bottom = parseFloat(g.style.bottom||'0');
      if (left >= tigerArea.x1 && left <= tigerArea.x2 && bottom >= tigerArea.y1 && bottom <= tigerArea.y2) count++;
    });
    return count;
  }

  /* ===== 严格动作驱动判定：只有“正确点击”才通过 ===== */
  const tasks = [
    { text:'点击<strong>羚羊视觉</strong>。当前是人类视觉。',
      hint:'点画面右上角“羚羊视觉”。',
      expected:'click_deer',
      failHint:'要点击“羚羊视觉”。' },

    { text:'点击<strong>刷新草丛</strong>。是否能看到老虎？',
      hint:'系统检测“虎区前景草量”达标即通过。',
      expected:'click_refresh',
      extraCheck:()=> countGrassInTigerArea() >= 12,
      failHint:'请点击“刷新草丛”，并让老虎附近草更密些。' },

    { text:'切换回<strong>人类视觉</strong>，然后<strong>点击老虎</strong>把它标出来（完成）',
      hint:'先点“人类视觉”，再点老虎 🐯。',
      expected:'click_tiger',
      extraCheck:()=> currentVision === 'human' && tigerClicked === true,
      failHint:'先点击“人类视觉”，再点击老虎哦。' }
  ];

  function tryPass(action, fromAuto=false){
    if (successCooldown || completed) return;
    const task = tasks[currentTask];
    if (!task) return;

    const correctAction = (action === task.expected);
    const extraOK = task.extraCheck ? task.extraCheck() : true;

    if (correctAction && extraOK){
      showCheck(); lockSuccess(); setTimeout(nextTask, 520);
    } else {
      if (!autoPlaying && !fromAuto) showToast(task.failHint || '再试一试');
    }
  }

  /* ====== “步骤判定时点错不改画面” 的按钮保护 ====== */
  function inStepMode(){ return !freeMode && !completed && !autoPlaying; }

  // 老虎：只有到第3步才响应并改变状态
  tigerEl.addEventListener('click', ()=>{
    if (inStepMode()){
      if (tasks[currentTask].expected === 'click_tiger'){
        tigerClicked = true;
        tryPass('click_tiger');
      } else {
        showToast(tasks[currentTask].failHint || '再试一试');
      }
    } else {
      // 自由模式可随便点
      tigerClicked = true;
    }
  });

  // 人类视觉：仅在第3步允许切换（作为前置条件），其他步骤点了不改画面
  humanBtn.addEventListener('click', ()=>{
    if (inStepMode()){
      if (tasks[currentTask].expected === 'click_tiger'){
        setVision('human'); // 允许切换，但不直接通过
      } else {
        showToast(tasks[currentTask].failHint || tasks[currentTask].hint);
      }
    } else {
      setVision('human'); // 自由模式/完成后可随意切换
    }
  });

  // 羚羊视觉：仅在第1步允许切换，其余步骤不改画面
  deerBtn.addEventListener('click', ()=>{
    if (inStepMode()){
      if (tasks[currentTask].expected === 'click_deer'){
        setVision('deer');
        tryPass('click_deer');
      } else {
        showToast(tasks[currentTask].failHint || tasks[currentTask].hint);
      }
    } else {
      setVision('deer');
    }
  });

  // 刷新草丛：仅在第2步有效；任何模式都不改变视觉（initScene不改视觉）
  refreshBtn.addEventListener('click', ()=>{
    if (inStepMode()){
      if (tasks[currentTask].expected === 'click_refresh'){
        initScene();
        tryPass('click_refresh');
      } else {
        showToast(tasks[currentTask].failHint || tasks[currentTask].hint);
      }
    } else {
      initScene(); // 自由模式/完成后也只是刷新草
    }
  });

  /* ===== 自动演示：用“正确动作序列”驱动（直接调用核心函数，绕过按钮守卫） ===== */
  async function autoDemo(){
    if (autoPlaying) return;
    autoPlaying = true; freeBtn.disabled = true;

    resetFlow(false); await sleep(300);

    // Step 1：点击羚羊视觉
    setVision('deer'); tryPass('click_deer', true);
    await waitFor(()=> currentTask === 1);

    // Step 2：点击刷新草丛直到达标（不改变视觉）
    let tries = 0;
    while (countGrassInTigerArea() < 12 && tries < 6){
      initScene(); await sleep(220); tries++;
    }
    tryPass('click_refresh', true);
    await waitFor(()=> currentTask === 2);

    // Step 3：切人类视觉 + 点击老虎
    setVision('human'); await sleep(250);
    tigerClicked = true;
    tryPass('click_tiger', true);
    await waitFor(()=> completed === true);

    autoPlaying = false; freeBtn.disabled = false;
  }

  /* ===== 重置：自由模式下仅复位，不退出自由模式；并回到“人类视觉” ===== */
  function resetFlow(){
    completed = false; successCooldown = false; tigerClicked = false;
    setVision('human'); // ★ 重置后回到正常颜色（人类视觉）
    if (!freeMode){
      currentTask = 0; setStepUI(0);
      dots.forEach((d,i)=> d.className = 'dot' + (i===0?' active':''));
      hideCheck(); doneMask.style.display = 'none';
    } else {
      hideCheck(); doneMask.style.display = 'none';
    }
    initScene(); // ★ 仅刷新草，不改视觉
  }

  resetBtn.addEventListener('click', ()=>{ if (!autoPlaying) resetFlow(true); });
  autoDemoBtn.addEventListener('click', ()=>{ if (!autoPlaying) autoDemo(); });
  freeBtn.addEventListener('click', ()=> setFreeMode(!freeMode));

  /* ===== 初始化 ===== */
  function init(){
    setStepUI(0);
    setVision('human'); // ★ 初始化显示人类视觉
    initScene();        // ★ 仅生成草
    fitStage();
  }
  init();
</script>
