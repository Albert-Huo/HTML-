<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由落体实验模拟</title>
    <style>
        :root{ --card-bg: rgba(255,255,255,0.08); --accent:#3ddc97; --warn:#ffb74d; --error:#ff6b6b; --ink:#e9f2ff; }
        body{ background:#1a1a1a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif; margin:0; padding:10px; display:flex; flex-direction:column; align-items:center; }
        /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000;
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px;
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg,
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow {
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }

        .task-card{ width:100%; max-width:900px; background:var(--card-bg); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:12px 14px; backdrop-filter:blur(6px); display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; transition:opacity .2s, filter .2s; }
        .task-step{ background:rgba(255,255,255,0.15); border-radius:8px; padding:6px 10px; font-weight:600; white-space:nowrap; }
        .task-text{ line-height:1.55; }
        .task-hint{ color:#ffd54f; font-size:12px; opacity:.9; }
        .progress-dots{ display:flex; gap:6px; align-items:center; }
        .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.25); outline:2px solid rgba(255,255,255,0.15); }
        .dot.active{ background:var(--warn);}
        .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,0.5);}

        .toolbar{ width:100%; max-width:900px; margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
        .toolbar button{ padding:10px 16px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer; transition:background .25s, transform .05s, opacity .2s; user-select:none; font-size: 14px; }
        .toolbar button:hover{ background:#5a5a5a;}
        .toolbar button:active{ transform:scale(.98);}
        .toolbar button:disabled{ opacity:.5; cursor:not-allowed;}

        #canvasWrap{ width:100%; max-width:900px; height:60vh; max-height:520px; margin-top:10px; position: relative; }
        #canvas{ width:100%; height:100%; background:#000; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.3); position:relative; overflow:hidden; touch-action:none; }

        .canvas-controls { position: absolute; bottom: 12px; left: 12px; z-index: 50; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .canvas-controls button { padding: 6px 12px; font-size: 12px; background: rgba(30, 30, 30, 0.7); color: #eee; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .canvas-controls button:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
        .canvas-controls button:active { transform: scale(0.95); }

        .checkmark{ position:absolute; z-index:60; left:50%; top:20%; transform:translate(-50%,-50%) scale(.6); width:120px; height:120px; border-radius:50%; background:rgba(61,220,151,.15); border:3px solid var(--accent); display:none; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25); animation:pop .55s ease-out;}
        .checkmark.active{ display:flex;}
        .checkmark>div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }
        @keyframes pop{ 0%{transform:translate(-50%,-50%) scale(.4);opacity:.2}60%{transform:translate(-50%,-50%) scale(1.08);opacity:1}100%{transform:translate(-50%,-50%) scale(1)} }

        .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,0.8); color:#fff; padding:10px 14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,.35); font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200;}
        .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

        .modal-mask{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:300; }
        .modal{ width:min(90vw,360px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5);}
        .modal h3{ margin:8px 0 6px; font-size:20px;}
        .modal p{ color:#cfd8dc; margin-top:0;}
        .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; padding:8px 18px; border-radius:999px; border:none; cursor:pointer;}

        .explanation{ width:100%; max-width:900px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:var(--ink);}
        .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em;}
        .explanation ul{ margin:.2em 0 .2em 1.1em;}

        #canvas { position: relative; }

        .tower {
            position: absolute;
            width: 150px;
            height: 450px;
            left: 50%;
            transform: translateX(-50%) perspective(800px) rotateX(5deg) rotateY(-5deg);
            top: 20px;
            z-index: 8; /* 楼层在地面后面 */
            --tower-color-light: #b0a58e;
            --tower-color-dark: #8c8172;
            --tower-layer-color: #7d7260;
            --window-color: #2e4459;
        }
        .tower-body {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--tower-color-dark), var(--tower-color-light));
            border-radius: 10px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .tower-layer {
            position: absolute;
            width: 120%;
            height: 25px;
            background: var(--tower-layer-color);
            left: -10%;
            border-radius: 6px;
            box-shadow: inset 0 -3px 6px rgba(0,0,0,0.1);
        }
        .layer1 { top: 30px; } .layer2 { top: 80px; } .layer3 { top: 130px; }
        .layer4 { top: 180px; } .layer5 { top: 230px; } .layer6 { top: 280px; }
        .layer7 { top: 330px; } .layer8 { bottom: 20px; }

        .tower-window {
            position: absolute;
            width: 25px;
            height: 35px;
            background: var(--window-color);
            border-radius: 6px;
            border: 1px solid #1a2a3a;
        }
        .window1 { top: 40px; left: 62.5px; } .window2 { top: 90px; left: 62.5px; }
        .window3 { top: 140px; left: 62.5px; } .window4 { top: 190px; left: 62.5px; }
        .window5 { top: 240px; left: 62.5px; } .window6 { top: 290px; left: 62.5px; }

        #platform {
            position: absolute;
            width: 250px;
            height: 20px;
            background: #6D4C3A;
            left: 50%;
            transform: translateX(-50%) perspective(800px) rotateX(5deg) rotateY(-5deg) translateX(30px);
            z-index: 11;
            border-radius: 5px;
            transition: top 0.25s ease-in-out, opacity 0.25s ease-in-out;
        }

        #ground {
            position: absolute;
            width: 100%;
            height: 50px;
            background: linear-gradient(0deg, #382d22, #4a3a2a);
            bottom: 0;
            z-index: 10; /* 地面在楼前面 */
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
        }

        .ball {
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5);
            transition: none;
            z-index: 12; /* 球在地面前，视觉上“放在地上” */
        }
        .large {
            width: 36px;
            height: 36px;
            background: radial-gradient(circle at 30% 30%, #aaaaaa, #555555);
            left: calc(50% + 15px);
        }
        .small {
            width: 24px;
            height: 24px;
            background: radial-gradient(circle at 30% 30%, #cccccc, #777777);
            left: calc(50% + 55px);
        }
        .ball.hit {
            animation: impact 0.2s ease-out;
        }
        @keyframes impact {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 精简科技感速度条 */
        #speedometer {
            position: absolute;
            top: 40px;
            left: 20px;
            width: 14px;
            height: 220px;
            background: radial-gradient(circle at 30% 0, rgba(255,255,255,0.18), transparent 60%);
            border-radius: 999px;
            border: 1px solid rgba(120,200,180,0.7);
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            overflow: hidden;
        }
        #speedBar {
            width: 100%;
            height: 0%;
            background: linear-gradient(180deg, #3ddc97, #00b894);
            box-shadow: 0 0 10px rgba(61,220,151,0.8);
            transition: height 0.06s linear, background 0.12s;
        }
        #speedBar.fast {
            background: linear-gradient(180deg, #ffb74d, #ff6b6b);
            box-shadow: 0 0 12px rgba(255,183,77,0.9);
        }
        #speedometer .label {
            position: absolute;
            right: -60px;
            color: #cfd8dc;
            font-size: 10px;
            opacity: 0.8;
            padding: 2px 0;
            white-space: nowrap;
        }
        #speedometer .max { top: -2px; }
        #speedometer .min { bottom: -2px; }

        #currentSpeedText {
            position: absolute;
            top: 265px;
            left: 22px;
            transform: translateX(0);
            color: var(--warn);
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 3px rgba(0,0,0,0.8);
            z-index: 20;
        }

        .canvas-controls #task3Controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 5px;
            width: 100%;
        }
        .canvas-controls .choiceBtn {
            padding: 8px 10px;
            flex-grow: 1;
        }
        .canvas-controls .choiceBtn.selected {
            background: var(--accent);
            color: #1a1a1a;
            font-weight: bold;
            border-color: var(--accent);
        }

        @media (max-width:768px){
          .task-card{ grid-template-columns:1fr; }
        }

<body>
  <div id="spectrum"></div>
  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText"></div>
      <div class="task-hint" id="taskHint"></div>
    </div>
    <div class="progress-dots">
      <span class="dot active" id="dot1"></span><span class="dot" id="dot2"></span><span class="dot" id="dot3"></span>
    </div>
  </div>

  <div id="canvasWrap">
    <div id="canvas">
        <div id="ground"></div>

        <div class="tower" id="tower">
            <div class="tower-body">
                <div class="tower-layer layer1"></div>
                <div class="tower-layer layer2"></div>
                <div class="tower-layer layer3"></div>
                <div class="tower-layer layer4"></div>
                <div class="tower-layer layer5"></div>
                <div class="tower-layer layer6"></div>
                <div class="tower-layer layer7"></div>
                <div class="tower-layer layer8"></div>
                <div class="tower-window window1"></div>
                <div class="tower-window window2"></div>
                <div class="tower-window window3"></div>
                <div class="tower-window window4"></div>
                <div class="tower-window window5"></div>
                <div class="tower-window window6"></div>
            </div>
        </div>
        <div id="platform"></div>
        <div class="ball large" id="ball1"></div>
        <div class="ball small" id="ball2"></div>

        <div id="speedometer">
            <div id="speedBar"></div>
            <div class="label max" id="maxSpeedLabel">Vmax</div>
            <div class="label min">0 m/s</div>
        </div>
        <div id="currentSpeedText">0.0 m/s</div>

        <div class="canvas-controls" id="canvasControls">
            <label for="heightSlider" style="color:var(--ink); font-size:12px; margin-right:5px; white-space: nowrap;">高度 (H): <span id="heightValue">60</span> m</label>
            <input type="range" id="heightSlider" min="30" max="100" value="60" step="5">
            <button id="dropButton">释放铁球</button>

            <div id="task3Controls" style="display:none;">
                <button class="choiceBtn" data-choice="A">A. 总是同时落地</button>
                <button class="choiceBtn" data-choice="B">B. 不同时落地</button>
                <button class="choiceBtn" data-choice="C">C. 与下落高度有关</button>
            </div>
        </div>
        <div class="checkmark" id="checkmark"><div></div></div>
    </div>
  </div>

  <div class="toolbar">
    <button id="resetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <div class="toast" id="toast">再试一试</div>

  <div class="modal-mask" id="doneMask">
    <div class="modal">
      <h3 id="doneTitle">完成，你真棒！🎉</h3>
      <p id="doneText">你成功复现了伽利略的比萨斜塔实验！</p>
      <button class="ok" id="okBtn">OK</button>
    </div>
  </div>

  <div class="explanation">
    <h2>实验原理与结论</h2>
    <p>伽利略通过比萨斜塔自由落体实验发现：在同一个地方，如果只是“松手让物体掉下来”（不往下用力扔），重球和轻球会同时落地。这说明它们变快的快慢几乎是一样的。</p>
    <ul>
        <li>本演示中，你可以改变下落高度，观察铁球从平台掉下所用的时间。</li>
        <li>高度越高，落地所需时间就越长，临近地面时速度也更大（看左侧速度条和速度数字）。</li>
        <li>无论质量大小，只要从同样的高度自由落体，两个物体就会一起落地。</li>
    </ul>
  </div>

<script>
(function(){
  const $ = id => document.getElementById(id);

  const canvas = $('canvas');
  const groundEl = $('ground');
  const platform = $('platform');
  const ball1 = $('ball1');
  const ball2 = $('ball2');
  const speedBar = $('speedBar');
  const currentSpeedText = $('currentSpeedText');
  const maxSpeedLabel = $('maxSpeedLabel');

  const heightSlider = $('heightSlider');
  const heightValueSpan = $('heightValue');
  const dropButton = $('dropButton');

  const taskCard = $('taskCard');
  const taskStepEl = $('taskStep');
  const taskTextEl = $('taskText');
  const taskHintEl = $('taskHint');
  const dots = [ $('dot1'), $('dot2'), $('dot3') ];

  const resetBtn = $('resetBtn');
  const autoDemoBtn = $('autoDemoBtn');
  const freeBtn = $('freeBtn');
  const toast = $('toast');
  const checkmark = $('checkmark');
  const doneMask = $('doneMask');
  const okBtn = $('okBtn');

  const task3Controls = $('task3Controls');
  const choiceButtons = document.querySelectorAll('.choiceBtn');

  const g = 9.8;
  const minH = 30;
  const maxH = 100;

  let H = 60;
  let groundTop = 0;
  let maxDropPx = 380;
  let animating = false;
  let autoPlaying = false;
  let freeMode = false;
  let currentStep = 0;
  let selectedChoice = null;
  let animFrameId = null;

  const steps = [
    {
      text: '保持高度约为 60 m，点击“释放铁球”，观察两颗不同大小的铁球是否同时落地。',
      hint: '先不要动滑块，直接点击“释放铁球”。',
    },
    {
      text: '把高度调高到 90 m 或 100 m，再次点击“释放铁球”，观察是否仍然同时落地。',
      hint: '拖动滑块把高度调高一些，再释放铁球。',
    },
    {
      text: '根据前两步观察到的现象，选择下面的正确结论。',
      hint: '回想：在同一个地方自由落下时，重球和轻球的落地情况如何？',
    }
  ];

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(()=>toast.classList.remove('show'), 1600);
  }

  function showCheck(){
    checkmark.classList.add('active');
    setTimeout(()=>checkmark.classList.remove('active'), 600);
  }

  function showDone(){
    doneMask.style.display = 'flex';
  }

  function recomputeGeometry(){
    const canvasRect = canvas.getBoundingClientRect();
    const groundRect = groundEl.getBoundingClientRect();
    groundTop = groundRect.top - canvasRect.top;
    const marginTop = 80;
    maxDropPx = Math.max(groundTop - marginTop, 200);
  }

  function computePlatformY(Hm){
    const ratio = (Hm - minH) / (maxH - minH);
    const dropPx = ratio * maxDropPx;
    const platformY = groundTop - dropPx;
    return platformY;
  }

  function updateHeightUI(){
    heightSlider.value = H;
    heightValueSpan.textContent = H;
    const vmax = Math.sqrt(2 * g * H);
    maxSpeedLabel.textContent = vmax.toFixed(0) + ' m/s';
  }

  function positionBalls(){
    const b1h = ball1.offsetHeight || 36;
    const b2h = ball2.offsetHeight || 24;

    const platformY = computePlatformY(H);
    platform.style.opacity = 1;
    platform.style.top = platformY + 'px';

    const y1 = platformY - b1h;
    const y2 = platformY - b2h;

    ball1.style.top = y1 + 'px';
    ball2.style.top = y2 + 'px';
  }

  function updateSpeedDisplay(v, vmax){
    if (v < 0) v = 0;
    currentSpeedText.textContent = v.toFixed(1) + ' m/s';
    const percent = vmax > 0 ? Math.min(v / vmax, 1) * 100 : 0;
    speedBar.style.height = percent + '%';
    if (percent > 90){
      speedBar.classList.add('fast');
    } else {
      speedBar.classList.remove('fast');
    }
  }

  function updateStepUI(){
    taskStepEl.textContent = '步骤 ' + (currentStep + 1) + ' / 3';
    taskTextEl.textContent = steps[currentStep].text;
    taskHintEl.textContent = steps[currentStep].hint;

    dots.forEach((d,i)=>{
      d.className = 'dot';
      if (i < currentStep) d.classList.add('done');
      if (i === currentStep) d.classList.add('active');
    });

    const label = document.querySelector('label[for="heightSlider"]');

    if (currentStep === 2){
      task3Controls.style.display = 'flex';
      dropButton.style.display = 'none';
      heightSlider.style.display = 'none';
      if (label) label.style.display = 'none';
    } else {
      task3Controls.style.display = 'none';
      dropButton.style.display = 'block';
      heightSlider.style.display = 'inline-block';
      if (label) label.style.display = 'inline-block';
    }
  }

  function resetScene(){
    if (animFrameId !== null){
      cancelAnimationFrame(animFrameId);
      animFrameId = null;
    }
    animating = false;
    ball1.classList.remove('hit');
    ball2.classList.remove('hit');
    platform.style.opacity = 1;
    updateSpeedDisplay(0, Math.sqrt(2*g*H));
    positionBalls();
    dropButton.disabled = false;
  }

  function resetAll(){
    freeMode = false;
    autoPlaying = false;
    currentStep = 0;
    selectedChoice = null;
    choiceButtons.forEach(btn=>btn.classList.remove('selected'));
    taskCard.style.opacity = 1;
    taskCard.style.filter = 'none';
    freeBtn.textContent = '自由模式';
    H = 60;
    updateHeightUI();
    recomputeGeometry();
    resetScene();
    updateStepUI();
  }

  function setFreeMode(on){
    if (animating || autoPlaying) return;
    freeMode = on;
    if (on){
      taskCard.style.opacity = 0.3;
      taskCard.style.filter = 'grayscale(1)';
      freeBtn.textContent = '退出自由模式';
      autoDemoBtn.disabled = true;
      H = 80;
      updateHeightUI();
      recomputeGeometry();
      resetScene();
    } else {
      taskCard.style.opacity = 1;
      taskCard.style.filter = 'none';
      freeBtn.textContent = '自由模式';
      autoDemoBtn.disabled = false;
      resetAll();
    }
  }

  function handleDropFinished(){
    if (freeMode || autoPlaying) return;

    if (currentStep === 0){
      if (Math.abs(H - 60) <= 2.5){
        showCheck();
        setTimeout(()=>{
          currentStep = 1;
          updateStepUI();
        }, 500);
      } else {
        showToast('第 1 步请先用高度 60 m 来做实验。');
      }
    } else if (currentStep === 1){
      if (H >= 90){
        showCheck();
        setTimeout(()=>{
          currentStep = 2;
          updateStepUI();
          resetScene();
        }, 500);
      } else {
        showToast('请把高度调高到 90 m 或 100 m 再试一次。');
      }
    }
  }

  function selectChoice(choice){
    if (currentStep !== 2) return;
    selectedChoice = choice;
    choiceButtons.forEach(btn=>{
      if (btn.dataset.choice === choice) btn.classList.add('selected');
      else btn.classList.remove('selected');
    });
    if (choice === 'A'){
      showCheck();
      setTimeout(showDone, 600);
    } else {
      showToast('再想一想：前两步实验中，两球是一起落地的吗？');
    }
  }

  function animateDrop(fromAuto){
    if (animating) return;
    animating = true;
    dropButton.disabled = true;

    const b1h = ball1.offsetHeight || 36;
    const b2h = ball2.offsetHeight || 24;

    const startY1 = parseFloat(ball1.style.top) || (groundTop - b1h - maxDropPx);
    const startY2 = parseFloat(ball2.style.top) || (startY1 + (b1h - b2h));

    // 精准落到地面：球底 = groundTop
    const endY1 = groundTop - b1h;
    const endY2 = groundTop - b2h;
    const totalDrop = endY1 - startY1;

    const T = Math.sqrt(2*H/g);
    const duration = T * 1000;
    const vmax = Math.sqrt(2*g*H);
    const start = performance.now();

    const plankTop = parseFloat(platform.style.top) || computePlatformY(H);
    platform.style.top = (plankTop + 18) + 'px';
    platform.style.opacity = 0;

    function frame(now){
      const elapsed = now - start;
      const prog = Math.min(elapsed / duration, 1);
      const tSec = T * prog;
      const d = totalDrop * prog * prog;

      ball1.style.top = (startY1 + d) + 'px';
      ball2.style.top = (startY2 + d) + 'px';

      const v = g * tSec;
      updateSpeedDisplay(v, vmax);

      if (prog < 1){
        animFrameId = requestAnimationFrame(frame);
      } else {
        ball1.style.top = endY1 + 'px';
        ball2.style.top = endY2 + 'px';
        ball1.classList.add('hit');
        ball2.classList.add('hit');

        const bounceDy = 10;
        setTimeout(()=>{
          ball1.style.transition = 'top 0.12s ease-out';
          ball2.style.transition = 'top 0.12s ease-out';
          ball1.style.top = (endY1 - bounceDy) + 'px';
          ball2.style.top = (endY2 - bounceDy) + 'px';
          setTimeout(()=>{
            ball1.style.top = endY1 + 'px';
            ball2.style.top = endY2 + 'px';
            setTimeout(()=>{
              ball1.style.transition = 'none';
              ball2.style.transition = 'none';
              updateSpeedDisplay(0, vmax);
              animating = false;
              dropButton.disabled = false;
              if (!fromAuto) handleDropFinished();
            }, 90);
          }, 130);
        }, 70);
      }
    }
    animFrameId = requestAnimationFrame(frame);
  }

  async function autoDemo(){
    if (animating || autoPlaying) return;
    autoPlaying = true;
    resetAll();
    autoDemoBtn.disabled = true;
    freeBtn.disabled = true;
    resetBtn.disabled = true;

    currentStep = 0;
    H = 60;
    updateHeightUI();
    recomputeGeometry();
    resetScene();
    updateStepUI();
    await new Promise(res=>{
      animateDrop(true);
      setTimeout(res, Math.sqrt(2*60/g)*1000 + 1000);
    });
    showCheck();
    await new Promise(res=>setTimeout(res, 600));

    currentStep = 1;
    H = 100;
    updateHeightUI();
    recomputeGeometry();
    resetScene();
    updateStepUI();
    await new Promise(res=>{
      animateDrop(true);
      setTimeout(res, Math.sqrt(2*100/g)*1000 + 1000);
    });
    showCheck();
    await new Promise(res=>setTimeout(res, 600));

    currentStep = 2;
    updateStepUI();
    resetScene();
    await new Promise(res=>setTimeout(res, 600));
    selectChoice('A');

    autoPlaying = false;
    autoDemoBtn.disabled = false;
    freeBtn.disabled = false;
    resetBtn.disabled = false;
  }

  function initEvents(){
    heightSlider.addEventListener('input', ()=>{
      H = parseInt(heightSlider.value, 10);
      heightValueSpan.textContent = H;
      if (!animating){
        updateHeightUI();
        recomputeGeometry();
        positionBalls();
        updateSpeedDisplay(0, Math.sqrt(2*g*H));
      }
    });

    dropButton.addEventListener('click', ()=> animateDrop(false));
    resetBtn.addEventListener('click', resetAll);
    autoDemoBtn.addEventListener('click', autoDemo);
    freeBtn.addEventListener('click', ()=> setFreeMode(!freeMode));
    okBtn.addEventListener('click', ()=> doneMask.style.display = 'none');

    choiceButtons.forEach(btn=>{
      btn.addEventListener('click', ()=> selectChoice(btn.dataset.choice));
    });

    window.addEventListener('resize', ()=>{
      if (!animating){
        recomputeGeometry();
        positionBalls();
      }
    });
  }

  function init(){
    recomputeGeometry();
    H = 60;
    updateHeightUI();
    positionBalls();
    updateSpeedDisplay(0, Math.sqrt(2*g*H));
    updateStepUI();
  }

  window.addEventListener('load', ()=>{
    initEvents();
    init();
  });

})();
</script>
