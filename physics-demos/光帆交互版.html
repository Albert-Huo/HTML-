<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>光帆推进</title>
<style>
  :root{
    --card-bg: rgba(255,255,255,0.08);
    --accent:#3ddc97;
    --warn:#ffb74d;
    --error:#ff6b6b;
    --ink:#e9f2ff;
  }
  body{
    margin:0; background:#0e0f13; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
    display:flex; flex-direction:column; align-items:center; padding:10px;
  }

  /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000;
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px;
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg,
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow {
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }

  /* 步骤卡（模板） */
  .task-card{
    width:100%; max-width:980px; background:var(--card-bg);
    border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:12px 14px;
    backdrop-filter:blur(6px);
    display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px;
    transition:opacity .2s, filter .2s;
  }
  .task-step{ background:rgba(255,255,255,0.15); border-radius:8px; padding:6px 10px; font-weight:600; white-space:nowrap; }
  .task-text{ line-height:1.55; }
  .task-hint{ color:#ffd54f; font-size:12px; opacity:.9; }
  .progress-dots{ display:flex; gap:6px; align-items:center; }
  .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.25); outline:2px solid rgba(255,255,255,0.15);}
  .dot.active{ background:var(--warn); }
  .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,0.5); }

  /* 舞台（容器） */
  .stageWrap{ width:100%; max-width:980px; margin-top:10px; }
  #stage{ position:relative; width:100%; height:60vh; max-height:560px; border-radius:12px; overflow:hidden; background:#000;
          box-shadow:0 8px 24px rgba(0,0,0,0.35); }
  canvas#canvas{ width:100%; height:100%; display:block; }

  /* 原文件中的“开始/重置/速度”控件 → 收纳为舞台内浮层，保持原功能 */
  #panelLeft{
    position:absolute; top:12px; left:12px; z-index:2;
    background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15);
    border-radius:8px; padding:8px; display:flex; gap:8px; flex-wrap:wrap;
  }
  .kbtn{ padding:8px 12px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer; }
  .kbtn:hover{ background:#5a5a5a; }
  #info{
    position:absolute; top:12px; right:12px; z-index:2; color:#fff;
    background:rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:8px 10px;
    font-variant-numeric: tabular-nums;
  }

  /* 底部三按钮（模板） */
  .toolbar{ display:flex; gap:10px; flex-wrap:wrap; width:100%; max-width:980px; margin-top:10px; }
  .toolbar button{ padding:10px 16px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer; transition:background .25s, transform .05s, opacity .2s; }
  .toolbar button:hover{ background:#5a5a5a; }
  .toolbar button:active{ transform:scale(.98); }
  .toolbar button:disabled{ opacity:.5; cursor:not-allowed; }

  /* 对勾、Toast、完成弹窗（模板） */
  .checkmark{
    position:absolute; z-index:50; left:50%; top:22%; transform:translate(-50%,-50%) scale(0.6);
    width:120px; height:120px; border-radius:50%; background:rgba(61,220,151,0.15);
    border:3px solid var(--accent); display:none; align-items:center; justify-content:center;
    box-shadow:0 0 40px rgba(61,220,151,0.45), inset 0 0 20px rgba(61,220,151,0.25);
  }
  .checkmark.active{ display:flex; }
  .checkmark > div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); filter:drop-shadow(0 0 6px rgba(61,220,151,0.6)); }
  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,0.8); color:#fff; padding:10px 14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,0.35); font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .modal-mask{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:300; }
  .modal{ width:min(90vw, 360px); background:#111; color:#fff; border:1px solid rgba(255,255,255,0.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .modal h3{ margin:8px 0 6px; color:#fff; font-size:20px; }
  .modal p{ color:#cfd8dc; margin-top:0; }
  .modal .ok{ margin-top:12px; background: var(--accent); color:#081a12; font-weight:700; border:none; border-radius:10px; padding:10px 14px; }

  /* 说明 */
  .explain{ width:100%; max-width:980px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:var(--ink); }
  .explain h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em; }

/* CODEX_STANDARD_OPTIMIZATION_START 20260622 */
*,*::before,*::after{box-sizing:border-box}
:root{--codex-shell-max:980px;--codex-spectrum-height:24px;--codex-spectrum-mobile-height:20px;--codex-panel-line:rgba(255,255,255,.12);--codex-panel-bg:rgba(15,15,15,.55);--codex-card-bg:rgba(255,255,255,.08);--codex-accent:#3ddc97;--codex-warn:#ffb74d}
html{-webkit-text-size-adjust:100%}
body{letter-spacing:0;overflow-x:hidden}
button,input,select,textarea{font:inherit}
button,.button,.kbtn,.quizBtn,.mode-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#spectrum{position:relative;width:100%;max-width:var(--codex-shell-max);height:var(--codex-spectrum-height);border-radius:10px;overflow:hidden;box-shadow:0 0 15px rgba(255,255,255,.12);margin:0 0 12px;background:#050505;flex-shrink:0}
#spectrum::before{content:"";position:absolute;inset:0;border-radius:inherit;background-image:linear-gradient(90deg,#ff4c4c 0%,#ff9a3d 5.5%,#f7e94c 11%,#54e86d 17%,#40e0d0 24%,#4aa3ff 31%,#8757ff 38%,#ec5cff 44%,#ff4c4c 50%,#ff9a3d 55.5%,#f7e94c 61%,#54e86d 67%,#40e0d0 74%,#4aa3ff 81%,#8757ff 88%,#ec5cff 94%,#ff4c4c 100%);background-size:200% 100%;background-repeat:repeat;filter:saturate(1.18) brightness(1.04);opacity:.96;animation:codexSpectrumFlow 8s linear infinite}
@keyframes codexSpectrumFlow{0%{background-position:0 0}100%{background-position:-100% 0}}
.task-card,.taskCard{width:100%;max-width:var(--codex-shell-max);border-radius:12px;border:1px solid var(--codex-panel-line);background:var(--codex-card-bg);display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;backdrop-filter:blur(6px)}
.task-step,.stepBadge{display:inline-flex;align-items:center;justify-content:center;width:max-content;max-width:100%;border-radius:8px;padding:6px 10px;background:rgba(255,255,255,.16);border:0;color:#fff;font-weight:800;white-space:nowrap;line-height:1.2}
.task-text,.taskText,.taskMain{min-width:0;line-height:1.55}
.task-hint,.taskGoal,.taskHint{color:#ffd54f;font-size:12px;line-height:1.45;opacity:.95}
.progress-dots,.dots{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;outline:2px solid rgba(255,255,255,.12)}
.dot.active,.dot.on{background:var(--codex-warn)}
.dot.done{background:var(--codex-accent);outline-color:rgba(61,220,151,.45)}
.mode-strip,.modePill,.mode-pill{border:2px solid transparent;border-radius:999px;background:linear-gradient(rgba(6,10,14,.94),rgba(6,10,14,.94)) padding-box,linear-gradient(90deg,#35ff73,#4bd8ff,#6c5cff,#ff4fc3,#ffd166,#35ff73,#4bd8ff) border-box;background-size:100% 100%,240% 100%;box-shadow:0 0 16px rgba(75,216,255,.18),inset 0 0 10px rgba(255,255,255,.06);color:#fff;font-weight:900;white-space:nowrap;animation:codexModeRibbonFlow 5s linear infinite}
@keyframes codexModeRibbonFlow{0%{background-position:0 0,0 0}100%{background-position:0 0,-240% 0}}
.helpBtn,.help-btn,.hint-lamp{display:inline-grid;place-items:center;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#ffd54f;line-height:1;font-size:16px;font-weight:900;box-shadow:none}
.toolbar{width:100%;max-width:var(--codex-shell-max);gap:8px}
.toolbar button{border-radius:8px;min-width:0}
.explanation{width:100%;max-width:var(--codex-shell-max);line-height:1.66}
canvas,svg,img{max-width:100%}
#stage,#labArea,.lab,.simulation-area,.container{max-width:100%}
.overlay-panel,.panel,.control-panel,.controls-panel,.controlPanel{max-width:calc(100% - 24px)}
.codex-auto-task{margin-bottom:10px}
@media(max-width:720px){
  body{padding:8px}
  #spectrum{height:var(--codex-spectrum-mobile-height);margin-bottom:10px;border-radius:10px}
  .task-card,.taskCard{grid-template-columns:1fr;align-items:start;gap:7px;padding:12px 14px}
  .task-step,.stepBadge{font-size:16px}
  .task-text,.taskText{font-size:14px}
  .progress-dots,.dots{justify-content:flex-start}
  #stage,#labArea,.lab{min-height:430px}
  .overlay-panel{left:12px!important;right:12px!important;width:auto!important;max-height:42%;overflow:auto}
  .toolbar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:8px;padding:6px;border:1px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.035)}
  .toolbar button{padding:8px 6px;font-size:12px;font-weight:800;background:rgba(255,255,255,.075)}
  .explanation{font-size:14px}
}

@media(max-width:720px){
  html,body{box-sizing:border-box} body{width:100vw!important;max-width:100vw;margin:0!important;padding:8px!important;overflow-x:hidden}
  #spectrum,.task-card,.taskCard,.toolbar,.explanation,.container{width:calc(100vw - 16px)!important;max-width:calc(100vw - 16px)!important;margin-left:auto;margin-right:auto}
  #stage,#labArea,.lab,#stageWrap,.simulation-area{max-width:calc(100vw - 16px)!important}
  .explanation h1,.explanation h2,.explanation h3,.explanation p,.explanation ul,.explanation ol,.explanation li{width:auto!important;max-width:100%!important}
  .explanation ul,.explanation ol{padding-left:1.2em}
}

@media(max-width:720px){
  .app,.wrapper,.wrap,.main,.page,#container{width:calc(100vw - 16px)!important;max-width:calc(100vw - 16px)!important;margin-left:auto!important;margin-right:auto!important}
  #container,#container h1,#container h2,#container h3,#container .controls,#container #animation,#container svg,#container #elevator,#container #elevatorFloor{width:100%!important;max-width:100%!important}
  .container{padding:14px!important}
  .container > *,.container .explanation,.container .control-panel,.container .simulation-area{width:100%!important;max-width:100%!important;margin-left:0!important;margin-right:0!important}

}

@media(max-width:720px){
  .page{padding-left:8px!important;padding-right:8px!important}
  .page > #spectrum,.page > .task-card,.page > .toolbar{width:100%!important;max-width:100%!important}

}
@media(prefers-reduced-motion:reduce){#spectrum::before,.mode-strip,.modePill,.mode-pill{animation:none}}
/* CODEX_STANDARD_OPTIMIZATION_END */

<body>
  <!-- 顶部彩色条 -->
  <div id="spectrum"></div>

  <!-- 步骤卡 -->
  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">点击左上角「开始加速」，观察船速从 0 上升，直到 <b>v/c ≥ 0.05</b>。</div>
      <div class="task-hint" id="taskHint">提示：开始后速度会逐步接近光速，但永远到不了 1。</div>
    </div>
    <div class="progress-dots">
      <span class="dot active" id="dot1"></span>
      <span class="dot" id="dot2"></span>
      <span class="dot" id="dot3"></span>
    </div>
  </div>

  <!-- 舞台 -->
  <div class="stageWrap">
    <div id="stage">
      <canvas id="canvas"></canvas>

      <!-- 原文件控制：开始 / 重置（保留功能与命名） -->
      <div id="panelLeft">
        <button class="kbtn" id="btnStart">开始加速</button>
        <button class="kbtn" id="btnReset">重置</button>
      </div>
      <div id="info">速度：<span id="speed">0.000</span> c</div>

      <!-- 对勾 -->
      <div class="checkmark" id="checkmark"><div></div></div>
    </div>
  </div>

  <!-- 底部三按钮 -->
  <div class="toolbar">
    <button id="stepResetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <!-- 完成提示 -->
  <div class="toast" id="toast">再试一试：按提示完成当前阈值</div>
  <div class="modal-mask" id="doneMask" role="dialog" aria-modal="true" aria-labelledby="doneTitle">
    <div class="modal">
      <h3 id="doneTitle">完成，你真棒！🎉</h3>
      <p>你已完成三个观察：起步 → 半光速附近 → 逼近光速（但永远达不到）。</p>
      <button class="ok" id="okBtn">好的</button>
    </div>
  </div>

  <!-- 说明 -->
  <div class="explain">
    <h2>光帆推进的核心原理（简述）</h2>
    <ul>
      <li>光子携带动量，对光帆产生辐射压力，持续推行。</li>
      <li>在接近光速时，相对论效应使加速度逐渐减小，速度只会无限逼近而不会达到光速。</li>
    </ul>
  </div>

<script>
/* ====== 原动画&渲染逻辑（保持不变） ====== */
// 光速（比例）
const c = 3e8; // m/s
let animating = false;
let startTime = null;
let v = 0;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let stars = [];

// 让画布自适应舞台尺寸（原逻辑用 window 尺寸，这里换成舞台尺寸以适配移动端）
function init() {
  const stage = document.getElementById('stage');
  canvas.width  = stage.clientWidth;
  canvas.height = stage.clientHeight;

  // 背景恒星
  stars = [];
  for (let i=0; i<200; i++){
    stars.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*2,
      brightness: Math.random()
    });
  }
}

// 太阳
function drawSun(){
  const grad = ctx.createRadialGradient(100, canvas.height/2, 20, 100, canvas.height/2, 100);
  grad.addColorStop(0, 'rgba(255, 255, 150, 1)');
  grad.addColorStop(1, 'rgba(255, 100, 50, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(100, canvas.height/2, 100, 0, Math.PI*2);
  ctx.fill();
}

// 光帆
function drawSail(x){
  ctx.save();
  ctx.translate(x/3 + 200, canvas.height/2);
  ctx.rotate(20 * Math.PI / 180);
  ctx.fillStyle = `rgba(200, 200, 255, ${0.2 + v/0.999 * 0.6})`;
  ctx.fillRect(-30, -50, 60, 100);
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 2;
  for(let i=-1;i<=1;i+=2){
    ctx.beginPath();
    ctx.moveTo(i*25, -40); ctx.lineTo(0,0); ctx.lineTo(i*25, 40);
    ctx.stroke();
  }
  ctx.restore();
}

// 动画主循环（含相对论逼近公式与速度显示）
function animate(timestamp){
  if (!animating) return;
  if (!startTime) startTime = timestamp;
  const elapsed = (timestamp - startTime) / 800;         // 演示时间尺
  v = 0.999 * c * (1 - Math.exp(-elapsed/5));            // 速度渐近 c（原公式）
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 星空流动
  stars.forEach(star=>{
    ctx.fillStyle = `rgba(255,255,255,${star.brightness})`;
    ctx.fillRect(star.x - v*elapsed/5e9, star.y, star.size, star.size);
  });

  drawSun();
  drawSail(200 + v * elapsed/5e6);

  // 更新显示
  document.getElementById('speed').textContent = (v/c).toFixed(3);

  // 步骤判定（严格：只判定，不改变画面）
  stepJudgeRoutine();

  requestAnimationFrame(animate);
}

// 开始/重置（保留原语义）
function start(){
  if (!animating){
    animating = true;
    requestAnimationFrame(animate);
  }
}
function reset(){
  animating = false; v = 0; startTime = null;
  document.getElementById('speed').textContent = '0.000';
  init();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  requestAnimationFrame(()=>{
    drawSun(); drawSail(200);
  });
}

/* ====== 交互版模板：步骤/自由/自动（严格守卫） ====== */
const taskCard = document.getElementById('taskCard');
const taskStepEl = document.getElementById('taskStep');
const taskTextEl = document.getElementById('taskText');
const taskHintEl = document.getElementById('taskHint');
const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];

const checkmark = document.getElementById('checkmark');
const toast = document.getElementById('toast');
const doneMask = document.getElementById('doneMask');
const okBtn = document.getElementById('okBtn');

const stepResetBtn = document.getElementById('stepResetBtn');
const autoDemoBtn  = document.getElementById('autoDemoBtn');
const freeBtn      = document.getElementById('freeBtn');

const btnStart = document.getElementById('btnStart');
const btnReset = document.getElementById('btnReset');

let freeMode=false, autoPlaying=false, completed=false;
const TH1=0.05, TH2=0.50, TH3=0.90;   // 三个判定阈值（v/c）

const tasks = [
  { text:`点击左上角「开始加速」，观察直到 <b>v/c ≥ ${TH1.toFixed(2)}</b>。`,
    hint:'速度会逐步上升；未达阈值不算通过。',
    check: () => v/c >= TH1
  },
  { text:`继续观察，当 <b>v/c ≥ ${TH2.toFixed(2)}</b>（约半光速）。`,
    hint:'注意此时仍未超过光速（相对论效应存在）。',
    check: () => v/c >= TH2
  },
  { text:`最终观察到 <b>v/c ≥ ${TH3.toFixed(2)}</b>（逼近光速），弹出“完成”。`,
    hint:'速度只会无限逼近，永远达不到 1。',
    check: () => v/c >= TH3
  }
];
let currentTask = 0;

function setStepUI(i){
  i = Math.max(0, Math.min(i, tasks.length-1));
  dots.forEach((d,k)=>{ d.className = 'dot' + (k<i ? ' done' : '') + (k===i ? ' active' : ''); });
  taskStepEl.textContent = `步骤 ${i+1} / ${tasks.length}`;
  taskTextEl.innerHTML = tasks[i].text;
  taskHintEl.textContent = tasks[i].hint;
}
function showCheck(){ checkmark.classList.add('active'); setTimeout(()=>checkmark.classList.remove('active'), 500); }
function showToast(text){ toast.textContent = text || '再试一试'; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'), 1200); }
function showDone(){ doneMask.style.display='flex'; }
okBtn.addEventListener('click', ()=> doneMask.style.display='none' );

function nextTask(){
  dots[currentTask].classList.remove('active'); dots[currentTask].classList.add('done');
  currentTask++;
  if (currentTask>=tasks.length){ completed=true; setTimeout(showDone, 350); return; }
  dots[currentTask].classList.add('active'); setStepUI(currentTask);
}

/* 严格守卫：仅由“自然达到阈值”触发过关，不响应误点 */
function stepJudgeRoutine(){
  if (freeMode || autoPlaying || completed) return;
  const t = tasks[currentTask];
  if (t && t.check()){
    showCheck();
    nextTask();
  }
}

/* 自由模式（模板） */
function setFreeMode(on){
  freeMode = on;
  if (on){
    taskCard.style.opacity=.25; taskCard.style.filter='grayscale(.6)';
    freeBtn.textContent='退出自由模式';
    autoDemoBtn.disabled = true;
    toast.classList.remove('show'); doneMask.style.display='none';
  }else{
    taskCard.style.opacity=1; taskCard.style.filter='none';
    freeBtn.textContent='自由模式';
    autoDemoBtn.disabled = false;
  }
}

/* 自动演示：与手动一致的阈值逻辑推进（无特权） */
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function waitUntil(pred, timeout=20000, step=60){
  const start=performance.now();
  return new Promise((resolve,reject)=>{
    function tick(){
      if (pred()) return resolve(true);
      if (performance.now()-start>timeout) return resolve(false);
      setTimeout(tick, step);
    } tick();
  });
}
async function autoDemo(){
  if (freeMode || autoPlaying) return;
  autoPlaying = true;

  // 复位 → 开始 → 等阈值1 → 等阈值2 → 等阈值3
  btnReset.click(); await sleep(150);
  setStepUI(0);
  btnStart.click();
  await waitUntil(()=> v/c >= TH1, 20000); // 与手动同阈值
  await sleep(400); showCheck(); nextTask();

  await waitUntil(()=> v/c >= TH2, 30000);
  await sleep(400); showCheck(); nextTask();

  await waitUntil(()=> v/c >= TH3, 40000);
  await sleep(400); showCheck(); nextTask();

  autoPlaying = false;
}

/* 三个按钮（模板） */
stepResetBtn.addEventListener('click', ()=>{
  autoPlaying=false; completed=false; currentTask=0;
  dots.forEach(d=> d.className='dot'); dots[0].classList.add('active');
  setStepUI(0);
  // 不强制停止/开始动画，保持画面；若需要可手动点左上“重置”
});
autoDemoBtn.addEventListener('click', autoDemo);
freeBtn.addEventListener('click', ()=> setFreeMode(!freeMode));

/* 原控制按钮绑定 */
btnStart.addEventListener('click', ()=>{
  start();
  if (!freeMode && !autoPlaying && currentTask!==0){
    showToast('继续观察直到达到当前阈值'); // 守卫，不推进
  }
});
btnReset.addEventListener('click', ()=>{
  reset();
  if (!freeMode && !autoPlaying){
    showToast('已重置：可重新开始观察');
  }
});

/* 初始化 */
function initAll(){
  setStepUI(0);
  init();
  drawSun(); drawSail(200);
}
window.addEventListener('resize', init);
window.addEventListener('orientationchange', init);
initAll();
</script>
