<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum=1"/>
<title>不同波长的波遇到障碍物</title>
<style>
  :root{
    --card-bg: rgba(255,255,255,0.08);
    --accent:#3ddc97;
    --warn:#ffb74d;
    --ink:#e9f2ff;
  }
  body{
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
    margin:0; padding:10px; display:flex; flex-direction:column; align-items:center;
  }
  /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000;
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px;
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg,
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow {
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }

  .task-card{ width:100%; max-width:900px; background:var(--card-bg);
    border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:12px 14px; backdrop-filter:blur(6px);
    display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; transition:opacity .2s, filter .2s; }
  .task-step{ background:rgba(255,255,255,0.15); border-radius:8px; padding:6px 10px; font-weight:600; white-space:nowrap; }
  .task-text{ line-height:1.55; }
  .task-hint{ color:#ffd54f; font-size:12px; opacity:.9; }
  .progress-dots{ display:flex; gap:6px; align-items:center; }
  .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.25); outline:2px solid rgba(255,255,255,0.15); }
  .dot.active{ background:var(--warn);} .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,0.5);}

  #stageWrap{ width:100%; max-width:900px; height:60vh; max-height:520px; margin-top:10px; }
  #stage{ width:100%; height:100%; position:relative; overflow:hidden; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.3); touch-action:none; }
  canvas{ width:100%; height:100%; display:block; border:2px solid #3caea3; border-radius:8px; }

  .in-canvas{
    position:absolute; right:10px; top:10px; z-index:12; display:flex; flex-direction:column; gap:8px;
    background:rgba(15,15,15,0.55); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:8px; backdrop-filter:blur(6px);
  }
  .in-canvas button, .in-canvas input[type="range"]{
    background:#333; color:#fff; border:none; border-radius:8px; padding:8px 10px; font-size:14px; cursor:pointer;
  }
  .in-canvas .row{ display:flex; align-items:center; gap:8px; }
  .in-canvas .tag{ font-size:12px; opacity:.9; white-space:nowrap; }
  .pill{ display:flex; gap:6px; }
  .seg{ padding:6px 10px; border-radius:999px; background:#2a2a2a; cursor:pointer; border:1px solid rgba(255,255,255,.15); }
  .seg.active{ background:#0b5; color:#041; font-weight:700; }
  .in-canvas .btn{ transition:background .2s; }
  .in-canvas .btn:hover{ background:#4a4a4a; }

  .toolbar{ width:100%; max-width:900px; margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-start; }
  .toolbar button{
    padding:10px 16px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer; transition:background .25s, transform .05s, opacity .2s;
  }
  .toolbar button:hover{ background:#5a5a5a;} .toolbar button:active{ transform:scale(.98);} .toolbar button:disabled{ opacity:.5; cursor:not-allowed;}

  .checkmark{ position:absolute; z-index:50; left:50%; top:20%; transform:translate(-50%,-50%) scale(.6);
    width:120px; height:120px; border-radius:50%; background:rgba(61,220,151,.15); border:3px solid var(--accent);
    display:none; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25);}
  .checkmark.active{ display:flex; }
  .checkmark>div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }

  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,.8); color:#fff; padding:10px 14px; border-radius:10px; font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .modal-mask{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:300; }
  .modal{ width:min(90vw,360px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .modal h3{ margin:8px 0 6px; font-size:20px; } .modal p{ color:#cfd8dc; margin-top:0; }
  .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; border:none; border-radius:10px; padding:10px 14px; cursor:pointer; }

  .explain{ width:100%; max-width:900px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:var(--ink); }
  .explain h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.05em; }

<body>
  <div id="spectrum"></div>

  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">选择<strong>长波（≥30 cm）</strong>，然后点击<strong>发波</strong>，观察通过障碍物。</div>
      <div class="task-hint" id="taskHint">提示：当波长 ≥ 30 cm 时，本模型设置为“可通过”。</div>
    </div>
    <div class="progress-dots">
      <span class="dot active" id="dot1"></span>
      <span class="dot" id="dot2"></span>
      <span class="dot" id="dot3"></span>
    </div>
  </div>

  <div id="stageWrap">
    <div id="stage">
      <canvas id="canvas" width="800" height="400"></canvas>

      <div class="in-canvas">
        <div class="row">
          <span class="tag">快速选择</span>
          <div class="pill">
            <button id="longBtn" class="seg active">长波（45cm）</button>
            <button id="shortBtn" class="seg">短波（20cm）</button>
          </div>
        </div>
        <div class="row">
          <span class="tag">波长</span>
          <input id="wavelengthRange" type="range" min="5" max="50" step="1" value="30"/>
          <span id="wlLabel" class="tag">30 cm</span>
        </div>
        <div class="row">
          <button id="emitBtn" class="btn">发波</button>
          <button id="resetSceneBtn" class="btn">重置场景</button>
        </div>
      </div>

      <div class="checkmark" id="checkmark"><div></div></div>
    </div>
  </div>

  <div class="toolbar">
    <button id="stepResetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <div class="toast" id="toast">再试一试：请按指令进行本步骤</div>
  <div class="modal-mask" id="doneMask" role="dialog" aria-modal="true" aria-labelledby="doneTitle">
    <div class="modal">
      <h3 id="doneTitle">完成，你真棒！🎉</h3>
      <p>你已完成：长波（≥30cm）能通过 → 短波（&lt;30cm）被反射 → 临界 30cm 观察“刚好通过”。</p>
      <button class="ok" id="okBtn">好的</button>
    </div>
  </div>

  <div class="explain">
    <h2>现象说明：</h2>
    <ul>
      <li>当波长 <b>&lt; 30 cm</b>：在障碍处发生<strong>反射</strong>，并逐渐淡出（模拟能量损失）。</li>
      <li>当波长 <b>≥ 30 cm</b>：波<strong>通过</strong>障碍物。</li>
      <li>“重置”会将波长恢复为 <b>30 cm</b>（临界值）。</li>
    </ul>
  </div>

<script>
/* ======== 复用你原动画：参数/函数保持一致 ======== */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const OBSTACLE_WIDTH = 10;
const OBSTACLE_HEIGHT = 50;
const CRITICAL_WAVELENGTH = 30;

const REFLECTION_COLOR = '#ff9a9e';

let wavelength = 30;
let waves = [];
let time = 0;

function drawObstacle() {
  ctx.fillStyle = '#888';
  ctx.fillRect(600, 175, OBSTACLE_WIDTH, OBSTACLE_HEIGHT);
}

function createWave() {
  return { startX: 100, startTime: time, reflected: false, blocked: false, reflectTime: null };
}

function emitWave() {
  if (waves.length < 3) waves.push(createWave());
}

function drawSineWave(wave) {
  const amplitude = 30;
  const speed = 100;                      // ← 与自动演示的节拍一致
  const freq = speed / wavelength;

  // 入射波
  ctx.beginPath();
  ctx.strokeStyle = '#7ecbff';
  ctx.lineWidth = 2;
  let drawing = false;
  for (let x = 0; x <= wavelength * 4; x += wavelength/100) {
    const globalX = wave.startX + speed * (time - wave.startTime) + x;
    const y = 200 + amplitude * Math.sin(2 * Math.PI * (x / wavelength - freq * (time - wave.startTime)));
    const shouldBlock = (globalX >= 600 && globalX <= 600 + OBSTACLE_WIDTH) && (y >= 175 && y <= 225);
    if (shouldBlock) { drawing = false; continue; }
    if (!drawing) { ctx.moveTo(globalX, y); drawing = true; } else { ctx.lineTo(globalX, y); }
  }
  if (drawing) ctx.stroke();

  // 反射判定
  const waveFront = wave.startX + speed * (time - wave.startTime);
  const reachObstacle = (waveFront > 600);
  if (reachObstacle && !wave.reflected) {
    wave.reflected = true;
    wave.blocked = (wavelength < CRITICAL_WAVELENGTH);  // ← 你的原判定
    wave.reflectTime = time;
  }

  // 反射波（逐渐淡出）
  if (wave.reflected && wave.blocked) {
    const elapsed = time - wave.reflectTime;
    const fadeDuration = 2.0;
    const alpha = Math.max(0, 1 - elapsed / fadeDuration);
    if (alpha > 0) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.strokeStyle = REFLECTION_COLOR;
      ctx.lineWidth = 2;
      for (let x = 0; x <= wavelength; x += wavelength/100) {
        const origX = wave.startX + 100 * (time - wave.startTime) + x;
        const reflectedX = 2*(600 + OBSTACLE_WIDTH/2) - origX;
        const y = 200 + amplitude * Math.sin(2 * Math.PI * (x/wavelength - freq*(time-wave.startTime)));
        if (reflectedX > 0) {
          if (x === 0) ctx.moveTo(reflectedX, y); else ctx.lineTo(reflectedX, y);
        }
      }
      ctx.stroke();
      ctx.restore();
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 波源
  ctx.beginPath();
  ctx.arc(100, 200, 10, 0, Math.PI*2);
  ctx.fillStyle = '#ffd700';
  ctx.fill();

  drawObstacle();

  time += 0.02;

  for (let i = 0; i < waves.length; i++) {
    const wave = waves[i];
    const waveFront = wave.startX + 100 * (time - wave.startTime);
    drawSineWave(wave);
    if (waveFront > 800) { waves.splice(i, 1); i--; }
  }
  requestAnimationFrame(animate);
}
function reset() {
  waves = [];
  time = 0;
  wavelength = 30;
  const slider = document.getElementById('wavelengthRange');
  if (slider) slider.value = 30;
  const lbl = document.getElementById('wlLabel');
  if (lbl) lbl.textContent = '30 cm';
}
function updateWavelength(val) {
  wavelength = parseInt(val);
  const lbl = document.getElementById('wlLabel');
  if (lbl) lbl.textContent = wavelength + ' cm';
}
animate();

/* ======== 交互模板：步骤/自由/自动/守卫 ======== */
const taskCard = document.getElementById('taskCard');
const taskStepEl = document.getElementById('taskStep');
const taskTextEl = document.getElementById('taskText');
const taskHintEl = document.getElementById('taskHint');
const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];
const toast = document.getElementById('toast');
const checkmark = document.getElementById('checkmark');
const doneMask = document.getElementById('doneMask');
const okBtn = document.getElementById('okBtn');

const stepResetBtn = document.getElementById('stepResetBtn');
const autoDemoBtn  = document.getElementById('autoDemoBtn');
const freeBtn      = document.getElementById('freeBtn');

const longBtn = document.getElementById('longBtn');
const shortBtn = document.getElementById('shortBtn');
const wlRange  = document.getElementById('wavelengthRange');
const emitBtn  = document.getElementById('emitBtn');
const resetSceneBtn = document.getElementById('resetSceneBtn');

let freeMode=false, autoPlaying=false, completed=false;
let currentTask=0, successCooldown=false;
let lastRun=null;

const tasks = [
  { text:'选择<strong>长波（≥30 cm）</strong>，然后点击<strong>发波</strong>，观察通过障碍物。',
    hint:'当前模型设定：波长 ≥ 30 cm 时可通过。',
    expect:'emit_long',
    pass: ()=> lastRun && lastRun.tag==='emit_long' && lastRun.wavelength>=30
  },
  { text:'选择<strong>短波（&lt;30 cm）</strong>，然后点击<strong>发波</strong>，观察反射逐渐淡出。',
    hint:'波长 &lt; 30 cm 时会在障碍处发生反射并淡出。',
    expect:'emit_short',
    pass: ()=> lastRun && lastRun.tag==='emit_short' && lastRun.wavelength<30
  },
  { text:'把波长调到<strong>30 cm（临界）</strong>，再点击<strong>发波</strong>（完成）。',
    hint:'将滑块调至 30 cm 再发波，观察“刚好通过”的情形。',
    expect:'emit_critical',
    pass: ()=> lastRun && lastRun.tag==='emit_critical' && Math.abs(lastRun.wavelength-30)<=0
  }
];

function setStepUI(i){
  i=Math.max(0,Math.min(i,tasks.length-1));
  dots.forEach((d,k)=> d.className='dot'+(k<i?' done':k===i?' active':''));
  taskStepEl.textContent=`步骤 ${i+1} / ${tasks.length}`;
  taskTextEl.innerHTML=tasks[i].text;
  taskHintEl.textContent=tasks[i].hint;
}
function showToast(msg){ toast.textContent=msg||'再试一试'; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),1200);}
function showCheck(){ checkmark.classList.add('active'); setTimeout(()=>checkmark.classList.remove('active'),520); }
function showDone(){ doneMask.style.display='flex'; } okBtn.onclick=()=> doneMask.style.display='none';
function inStepMode(){ return !freeMode && !autoPlaying && !completed; }
function lockSuccess(){ successCooldown=true; setTimeout(()=>successCooldown=false, 450); }

function nextTask(){
  dots[currentTask].classList.remove('active');
  dots[currentTask].classList.add('done');
  currentTask++;
  if(currentTask>=tasks.length){ completed=true; showDone(); return; }
  dots[currentTask].classList.add('active'); setStepUI(currentTask);
}

/* 守卫：步骤模式下，非期望操作仅提示不改画面 */
function guardAction(action, doReal){
  if (!inStepMode()){ doReal(); return; }
  const t=tasks[currentTask]; if(!t){ doReal(); return; }
  const okMap = {
    'set_long'  : ['emit_long'],
    'emit_long' : ['emit_long'],
    'set_short' : ['emit_short'],
    'emit_short': ['emit_short'],
    'tune_wl'   : ['emit_critical'],
    'emit_critical': ['emit_critical']
  };
  const allowed = okMap[action]||[];
  if (allowed.includes(t.expect) || action===t.expect){ doReal(); }
  else { showToast(t.hint||'再试一试'); }
}

/* 绑定交互（调用你的原函数） */
function setLong(){ longBtn.classList.add('active'); shortBtn.classList.remove('active'); wlRange.value=45; updateWavelength(45); }
function setShort(){ shortBtn.classList.add('active'); longBtn.classList.remove('active'); wlRange.value=20; updateWavelength(20); }

longBtn.onclick = ()=> guardAction('set_long', setLong);
shortBtn.onclick= ()=> guardAction('set_short', setShort);
wlRange.addEventListener('input', ()=> guardAction('tune_wl', ()=> updateWavelength(wlRange.value)));

emitBtn.onclick = ()=>{
  let tag='emit_critical';
  if (currentTask===0) tag='emit_long';
  else if (currentTask===1) tag='emit_short';
  guardAction(tag, ()=>{
    lastRun = { tag, wavelength: Number(wavelength) };
    emitWave();
    tryPass(tag);
  });
};
resetSceneBtn.onclick = ()=> { reset(); };

function tryPass(expectTag){
  if (successCooldown || completed) return;
  const t=tasks[currentTask]; if(!t) return;
  if (expectTag===t.expect && t.pass()){
    showCheck(); lockSuccess(); setTimeout(nextTask, 520);
  } else {
    if (!autoPlaying) showToast(t.hint);
  }
}

/* ========= 自动演示（放慢节奏，等到达障碍后再判定） ========= */
/* 与你的动画保持一致的几何与速度，用它们来计算真实等待时间 */
const SRC_X = 100;
const OBSTACLE_X = 600;
const SPEED_PX_S = 100;
const TRAVEL_MS = Math.round(((OBSTACLE_X - SRC_X) / SPEED_PX_S) * 1000); // ≈ 5000ms
const REFLECT_VIEW_MS = 1600; // 反射后多给一点观察时间
const PASS_VIEW_MS    = 1400; // 通过后也停留一会儿

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function autoDemo(){
  if (freeMode || autoPlaying) return; autoPlaying=true; freeBtn.disabled=true; emitBtn.disabled=true;

  // Step 1：长波通过（等到达障碍 + 少许停顿再判定）
  setStepUI(0); reset(); setLong(); await sleep(250);
  lastRun={tag:'emit_long', wavelength:Number(wavelength)}; emitWave();
  await sleep(TRAVEL_MS + PASS_VIEW_MS);  // ← 关键：放慢到真正到障碍
  tryPass('emit_long'); await sleep(600);

  // Step 2：短波反射（同理，等波碰到障碍后，才会触发反射并可见）
  setStepUI(1); reset(); setShort(); await sleep(250);
  lastRun={tag:'emit_short', wavelength:Number(wavelength)}; emitWave();
  await sleep(TRAVEL_MS + REFLECT_VIEW_MS); // ← 反射可见 + 淡出一段时间
  tryPass('emit_short'); await sleep(600);

  // Step 3：临界 30cm（刚好通过）
  setStepUI(2); reset(); wlRange.value=30; updateWavelength(30); await sleep(250);
  lastRun={tag:'emit_critical', wavelength:Number(wavelength)}; emitWave();
  await sleep(TRAVEL_MS + PASS_VIEW_MS);
  tryPass('emit_critical');

  autoPlaying=false; freeBtn.disabled=false; emitBtn.disabled=false;
}

/* ======== 步骤重置 / 自由模式 ======== */
function stepReset(){
  autoPlaying=false; completed=false; currentTask=0; successCooldown=false;
  dots.forEach((d,i)=> d.className='dot'+(i===0?' active':'')); setStepUI(0);
  reset(); setLong();
}
function setFreeMode(on){
  freeMode = on;
  if (on){
    taskCard.style.opacity = 0.25;
    taskCard.style.filter  = 'grayscale(0.6)';
    freeBtn.textContent='退出自由模式';
    autoDemoBtn.disabled=true;
  } else {
    taskCard.style.opacity = 1;
    taskCard.style.filter  = 'none';
    freeBtn.textContent='自由模式';
    autoDemoBtn.disabled=false;
  }
}
stepResetBtn.onclick = ()=>{ if(!autoPlaying) stepReset(); };
autoDemoBtn.onclick  = ()=>{ if(!autoPlaying) autoDemo(); };
freeBtn.onclick      = ()=> setFreeMode(!freeMode);

/* 初始化 */
(function init(){
  setStepUI(0);
  reset(); setLong();
})();
</script>
