<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>月光下的水和路</title>
<style>
  :root{
    --card-bg: rgba(255,255,255,0.08);
    --accent:#3ddc97;
    --warn:#ffb74d;
    --ink:#e9f2ff;
  }
  body{
    background:#1a1a1a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
    margin:0; padding:10px; display:flex; flex-direction:column; align-items:center;
  }

   /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000; 
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px; 
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg, 
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow { 
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }

  /* 步骤卡（模板） */
  .task-card{
    width:100%; max-width:900px; background:var(--card-bg); border:1px solid rgba(255,255,255,0.12);
    border-radius:12px; padding:12px 14px; backdrop-filter:blur(6px);
    display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; transition:opacity .2s, filter .2s;
  }
  .task-step{ background:rgba(255,255,255,0.15); border-radius:8px; padding:6px 10px; font-weight:600; white-space:nowrap; }
  .task-text{ line-height:1.55; }
  .task-hint{ color:#ffd54f; font-size:12px; opacity:.9; }
  .progress-dots{ display:flex; gap:6px; align-items:center; }
  .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.25); outline:2px solid rgba(255,255,255,0.15); }
  .dot.active{ background:var(--warn);} .dot.done{ background:var(--accent); outline-color:rgba(61,220,151,0.5);}

  /* 画布（模板壳） */
  #canvas{ width:100%; max-width:900px; height:60vh; max-height:520px; margin-top:10px;
    background:#000; border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.3); position:relative; overflow:hidden; }

  /* ====== 原文件舞台（完整复用结构与样式） ====== */
  .container { width:800px; height:500px; background:#1a1a2e; position:absolute; inset:0; margin:auto; }
  .mountain{ position:absolute; bottom:100px; font-size:100px; color:#081408; text-shadow:2px 2px 4px rgba(0,0,0,0.7); z-index:2; transition:color 2s ease; }
  .mountain.left{ left:250px !important; }
  .mountain.right{ left:400px; }
  .moon{ position:absolute; width:50px; height:50px; background:#f8f3d6; border-radius:50%;
    top:80px; left:250px; transition:all 2s ease; z-index:1; }
  .shadow{ position:absolute; width:80px; height:30px; background:rgba(0,0,0,0.5); filter:blur(8px); bottom:100px; transform-origin:center bottom; z-index:1; }
  .shadow.left{ left:250px; transform:skewX(-20deg) scaleY(1.5); }
  .shadow.right{ left:410px; transform:skewX(-20deg) scaleY(1.5); }
  .road{ position:absolute; width:100%; height:200px; background:#333; bottom:0; transition:all 2s ease; z-index:0; }
  /* 原文件中“湖泊形状 + 涟漪”样式（保留） */
  .water{ position:absolute; width:180px; height:70px; background:rgba(255,255,255,0.25);
    border-radius:60% 40% 55% 45% / 50% 60% 40% 50%; bottom:50px; left:320px; transition:all 2s ease; z-index:3;
    box-shadow:0 0 20px rgba(255,255,255,0.15) inset; animation:ripple 6s infinite ease-in-out; }
  @keyframes ripple{ 0%,100%{transform:scaleX(1)} 50%{transform:scaleX(1.05)} }
  /* “背对月亮”时的 away 状态（保留） */
  .moon.away{ transform:translateX(600px) scale(.8); }
  .mountain.away{ color:#1a2e1a; }
  .road.away{ background:#666; }
  .water.away{ background:rgba(0,0,0,0.7); }

  /* 画面内功能键（替代表层老按钮，严格守卫） */
  .in-canvas{
    position:absolute; right:10px; top:10px; z-index:10; display:flex; flex-direction:column; gap:8px;
    background:rgba(15,15,15,0.55); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:8px; backdrop-filter:blur(6px);
  }
  .in-canvas button, .toolbar button{
    padding:10px 16px; background:#444; color:#fff; border:none; border-radius:8px; cursor:pointer;
    transition:background .25s, transform .05s, opacity .2s;
  }
  .in-canvas button:hover, .toolbar button:hover{ background:#5a5a5a; }
  .in-canvas button:active, .toolbar button:active{ transform:scale(.98); }
  .in-canvas button:disabled, .toolbar button:disabled{ opacity:.5; cursor:not-allowed; }

  /* 模板：底部“三按钮” */
  .toolbar{ width:100%; max-width:900px; margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-start; }

  /* 对勾 / 提示 / 完成弹窗（模板） */
  .checkmark{ position:absolute; z-index:50; left:50%; top:20%; transform:translate(-50%,-50%) scale(.6);
    width:120px; height:120px; border-radius:50%; background:rgba(61,220,151,.15); border:3px solid var(--accent);
    display:none; align-items:center; justify-content:center; box-shadow:0 0 40px rgba(61,220,151,.45), inset 0 0 20px rgba(61,220,151,.25); }
  .checkmark.active{ display:flex; }
  .checkmark>div{ width:60px; height:30px; border-left:8px solid var(--accent); border-bottom:8px solid var(--accent); transform:rotate(-45deg) translateY(-6px); }

  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:rgba(0,0,0,.8); color:#fff; padding:10px 14px; border-radius:10px; box-shadow:0 6px 18px rgba(0,0,0,.35);
    font-size:14px; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:200; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .modal-mask{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; z-index:300; }
  .modal{ width:min(90vw,360px); background:#111; color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:14px; padding:18px 16px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.5); }
  .modal h3{ margin:8px 0 6px; font-size:20px; } .modal p{ color:#cfd8dc; margin-top:0; }
  .modal .ok{ margin-top:12px; background:var(--accent); color:#081a12; font-weight:700; border:none; border-radius:10px; padding:10px 14px; }

  /* 说明 */
  .explanation{ width:100%; max-width:900px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:var(--ink); }
  .explanation h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em; }

  /* —— 隐藏原文件顶部按钮，但保留供原函数引用（严格复用逻辑） —— */
  .legacy-controls{ display:none; }
</style>
</head>
<body>
  <!-- 顶部彩条 -->
  <div id="spectrum"></div>

  <!-- 步骤卡 -->
  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">点击<strong>背对月亮</strong>（观察：水面变暗、路面偏亮）。</div>
      <div class="task-hint" id="taskHint">提示：点画面右上角“背对月亮”。</div>
    </div>
    <div class="progress-dots">
      <span class="dot active" id="dot1"></span><span class="dot" id="dot2"></span><span class="dot" id="dot3"></span>
    </div>
  </div>

  <!-- 画布：原动画 + 画面内按钮 -->
  <div id="canvas">
    <!-- 原文件按钮（隐藏但保留，供原函数切换 disabled 状态等副作用使用） -->
    <div class="legacy-controls">
      <button id="faceBtn" onclick="toggleMoon('face')">面对月亮</button>
      <button id="backBtn" onclick="toggleMoon('back')">背对月亮</button>
    </div>

    <!-- ✅ 原文件舞台结构：完整复用 -->
    <div class="container" id="stage">
      <div class="moon"></div>
      <div class="mountain left">⛰️</div>
      <div class="mountain right">⛰️</div>
      <div class="shadow left"></div>
      <div class="shadow right"></div>
      <div class="road"></div>
      <div class="water"></div>
    </div>

    <!-- 画面内交互按钮（守卫步骤模式） -->
    <div class="in-canvas">
      <button id="btnBack">背对月亮</button>
      <button id="btnFace">面对月亮</button>
    </div>

    <!-- 对勾 -->
    <div class="checkmark" id="checkmark"><div></div></div>
  </div>

  <!-- 底部三按钮 -->
  <div class="toolbar">
    <button id="resetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <!-- 提示 & 完成弹窗 -->
  <div class="toast" id="toast">再试一试：请按步骤完成本次操作</div>
  <div class="modal-mask" id="doneMask" role="dialog" aria-modal="true" aria-labelledby="doneTitle">
    <div class="modal">
      <h3 id="doneTitle">完成，你真棒！🎉</h3>
      <p>你已用“面对 / 背对月亮”的切换，观察到水面镜面反射与路面漫反射的差异。</p>
      <button class="ok" id="okBtn">好的</button>
    </div>
  </div>

  <div class="explanation">
    <h2>为什么“背对月亮时水更暗、面对月亮时水更亮”？</h2>
    <ul>
      <li><b>镜面反射</b>：平滑水面把月光定向反射。只有当反射方向正好射向你的眼睛（面对月亮）时，你看到强光斑。</li>
      <li><b>漫反射</b>：粗糙路面把光向多方向散射，亮度分布更均匀，因此看起来不刺眼。</li>
      <li><b>阴影联动</b>：切换时，山体阴影随“月位”改变而平滑过渡，更贴近真实观感。</li>
    </ul>
  </div>

<script>
/* ====== 原文件核心逻辑：完整复用 ====== */
/* 直接照用原来的 toggleMoon(direction) 与初始按钮状态逻辑 */
function toggleMoon(direction) {
  const moon = document.querySelector('.moon');
  const shadows = document.querySelectorAll('.shadow');
  const road = document.querySelector('.road');
  const water = document.querySelector('.water');
  const mountains = document.querySelectorAll('.mountain');

  const faceBtn = document.getElementById('faceBtn');
  const backBtn = document.getElementById('backBtn');

  if (direction === 'back') {
    moon.classList.add('away');
    road.classList.add('away');
    water.classList.add('away');
    mountains.forEach(m => m.classList.add('away'));
    backBtn.disabled = true; faceBtn.disabled = false;

    shadows.forEach(shadow => {
      shadow.style.transition = 'all 0.5s ease';
      setTimeout(() => { shadow.style.transform = `translate(-25px, 0px) skewX(-40deg) scaleY(1)`; }, 300);
      setTimeout(() => { shadow.style.transform = `translate(-10px, -30px) skewX(0deg) scaleY(1.5)`; }, 1000);
    });
  } else {
    moon.classList.remove('away');
    road.classList.remove('away');
    water.classList.remove('away');
    mountains.forEach(m => m.classList.remove('away'));
    faceBtn.disabled = true; backBtn.disabled = false;

    shadows.forEach(shadow => {
      shadow.style.transition = 'all 1s ease';
      shadow.style.transform = 'skewX(-20deg) scaleY(1.5)';
      shadow.style.background = 'rgba(0,0,0,0.5)';
      shadow.style.filter = 'blur(8px)';
    });
  }
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('faceBtn').disabled = true;
  document.getElementById('backBtn').disabled = false;
});

/* ====== 交互版模板骨架：严格守卫 / 自由模式 / 自动演示 ====== */
const checkmark = document.getElementById('checkmark');
const toast = document.getElementById('toast');
const doneMask = document.getElementById('doneMask'); const okBtn = document.getElementById('okBtn');
okBtn.onclick = ()=> doneMask.style.display='none';

const taskStepEl = document.getElementById('taskStep');
const taskTextEl = document.getElementById('taskText');
const taskHintEl = document.getElementById('taskHint');
const dots = [document.getElementById('dot1'), document.getElementById('dot2'), document.getElementById('dot3')];

const btnBack = document.getElementById('btnBack');
const btnFace = document.getElementById('btnFace');
const resetBtn = document.getElementById('resetBtn');
const autoBtn = document.getElementById('autoDemoBtn');
const freeBtn = document.getElementById('freeBtn');

let freeMode = false, autoPlaying = false, completed = false;
let currentTask = 0;

const tasks = [
  { text:'点击<strong>背对月亮</strong>（水面变暗、路面偏亮）。', hint:'点右上角“背对月亮”。', expect:'back' },
  { text:'点击<strong>面对月亮</strong>（水面出现亮斑、路面较暗）。', hint:'点右上角“面对月亮”。', expect:'face' },
  { text:'再次<strong>背对月亮</strong>，确认现象可复现（完成）。', hint:'再点一次“背对月亮”。', expect:'back' }
];

function setStepUI(i){
  dots.forEach((d,k)=> d.className = 'dot' + (k<i ? ' done' : k===i ? ' active' : ''));
  taskStepEl.textContent = `步骤 ${i+1} / ${tasks.length}`;
  taskTextEl.innerHTML = tasks[i].text;
  taskHintEl.textContent = tasks[i].hint;
}
function showCheck(){ checkmark.classList.add('active'); setTimeout(()=>checkmark.classList.remove('active'), 520); }
function showToast(msg){ toast.textContent = msg || '再试一试'; toast.classList.add('show'); setTimeout(()=> toast.classList.remove('show'), 1200); }
function showDone(){ doneMask.style.display='flex'; }

function moonIsAway(){ return document.querySelector('.moon').classList.contains('away'); }
function inStepMode(){ return !freeMode && !autoPlaying && !completed; }

function tryPass(action, fromAuto=false){
  const expect = tasks[currentTask].expect;
  const stateOK = (action==='back' ? moonIsAway() : !moonIsAway());
  if (action===expect && stateOK){
    showCheck();
    setTimeout(()=>{
      dots[currentTask].classList.remove('active'); dots[currentTask].classList.add('done');
      currentTask++;
      if (currentTask>=tasks.length){ completed = true; showDone(); }
      else { dots[currentTask].classList.add('active'); setStepUI(currentTask); }
    }, 520);
  }else{
    if (!fromAuto) showToast('再试一试：请按提示点击正确按钮');
  }
}

/* —— 画面内按钮：步骤模式下严格守卫，不改画面；自由模式无限制 —— */
btnBack.onclick = ()=>{
  if (inStepMode()){
    if (tasks[currentTask].expect==='back'){ toggleMoon('back'); tryPass('back'); }
    else showToast(tasks[currentTask].hint);
  } else { toggleMoon('back'); }
};
btnFace.onclick = ()=>{
  if (inStepMode()){
    if (tasks[currentTask].expect==='face'){ toggleMoon('face'); tryPass('face'); }
    else showToast(tasks[currentTask].hint);
  } else { toggleMoon('face'); }
};

/* —— 自动演示：严格按同一判定逻辑推进 —— */
const wait = (ms)=> new Promise(r=>setTimeout(r, ms));
async function autoDemo(){
  if (autoPlaying || freeMode) return;
  autoPlaying = true; freeBtn.disabled = true;

  stepReset(false); await wait(220);
  // Step1
  toggleMoon('back'); await wait(900); tryPass('back', true);
  await wait(400);
  // Step2
  toggleMoon('face'); await wait(1200); tryPass('face', true);
  await wait(400);
  // Step3
  toggleMoon('back'); await wait(900); tryPass('back', true);

  freeBtn.disabled = false; autoPlaying = false;
}

/* —— 自由模式：只灰化步骤卡，按钮可随意切 —— */
function setFreeMode(on){
  freeMode = on; freeBtn.textContent = on? '退出自由模式':'自由模式';
  autoBtn.disabled = on;
  const card = document.getElementById('taskCard');
  card.style.opacity = on? .25 : 1; card.style.filter = on? 'grayscale(.6)' : 'none';
}

/* —— 重置：步骤模式回到第一步；自由模式仅复位 UI 提示 —— */
function stepReset(showTip=true){
  completed=false; autoPlaying=false; currentTask=0;
  dots.forEach(d=> d.className='dot'); dots[0].classList.add('active'); setStepUI(0);
  checkmark.classList.remove('active'); doneMask.style.display='none';
  // 恢复到“面对月亮”的初始状态（与原文件一致：faceBtn disabled）
  toggleMoon('face');
  if (showTip && !freeMode){ /* showToast('已重置到起点'); */ }
}

resetBtn.onclick = ()=>{ if (!autoPlaying) stepReset(true); };
autoBtn.onclick = autoDemo;
freeBtn.onclick = ()=> setFreeMode(!freeMode);

/* 初始化 */
(function init(){
  setStepUI(0);
  // 与原文件一致的初始按钮状态
  document.getElementById('faceBtn').disabled = true;
  document.getElementById('backBtn').disabled = false;
})();
</script>
</body>
</html>
