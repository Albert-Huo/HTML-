<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum=1"/>
<title>冰块🧊取火🔥</title>
<style>
  body{ background:#1a1a1a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif; margin:0; padding:10px; display:flex; flex-direction:column; align-items:center;}

 /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000; 
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px; 
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg, 
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow { 
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }

  /* 步骤行 */
  .task-card{
    width:100%; max-width:900px; background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:12px 14px; backdrop-filter:blur(6px);
    display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; transition:opacity .2s, filter .2s;
  }
  .task-step{ background:rgba(255,255,255,0.15); border-radius:8px; padding:6px 10px; font-weight:600; white-space:nowrap; }
  .task-text{ line-height:1.55; } .task-hint{ color:#ffd54f; font-size:12px; opacity:.9; }
  .progress-dots{ display:flex; gap:6px; align-items:center; }
  .dot{ width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.25); outline:2px solid rgba(255,255,255,0.15); }
  .dot.active{ background:#ffb74d;} .dot.done{ background:#3ddc97; outline-color:rgba(61,220,151,0.5);}

  /* 顶部按钮 */
  .toolbar{ width:100%; max-width:900px; margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
  .toolbar button{
    padding:10px 16px; background:#444; color:#fff; border:none; border-radius:8px;
    cursor:pointer; transition:background .25s, transform .05s, opacity .2s; user-select:none;
  }
  .toolbar button:hover{ background:#5a5a5a;} .toolbar button:active{ transform:scale(.98);} .toolbar button:disabled{ opacity:.5; cursor:not-allowed;}

  /* 舞台 */
  .stageWrap{ width:100%; max-width:900px; height:60vh; max-height:520px; margin-top:10px; }
  .stage{
    width:100%; height:100%; position:relative; overflow:hidden; touch-action:none;
    background: linear-gradient(to bottom, #B0E2FF, #87CEEB);
    border-radius:12px; box-shadow:0 8px 24px rgba(0,0,0,.3);
  }
  #terrain{ position:absolute; bottom:0; width:100%; height:180px; background: linear-gradient(#F8F8F8,#E8E8E8); z-index:2; box-shadow: inset 0 10px 20px rgba(0,0,0,0.1); }
  #mountains{ position:absolute; bottom:180px; width:100%; text-align:center; font-size:0; z-index:1; overflow:hidden; height:120px; }
  .mountain{ display:inline-block; font-size:80px; color:#FFF; text-shadow:0 0 15px rgba(255,255,255,0.8); margin:0 -25px; line-height:1; }
  #sun{ position:absolute; left:15%; top:15%; width:60px; height:60px; background: radial-gradient(#FFD700,#FFA500); border-radius:50%; box-shadow:0 0 80px #FFA500; z-index:3; }

  .lens{ position:absolute; width:80px; height:40px; border:2px solid rgba(255,255,255,.1); border-radius:50%;
    background:linear-gradient(135deg, rgba(255,255,255,.3) 0%, rgba(220,240,255,.6) 50%, rgba(255,255,255,.3) 100%);
    box-shadow:0 0 15px rgba(255,255,255,.8), inset 0 0 20px rgba(255,255,255,.5); backdrop-filter: blur(2px); z-index:10; touch-action:none; cursor:grab; }
  .lens:active{ cursor:grabbing; }
  .lens::after{ content:''; position:absolute; inset:5px; border:1px solid rgba(255,255,255,.5); border-radius:50%; box-shadow: inset 0 0 10px rgba(255,255,255,.8); }

  .lens-shadow{ position:absolute; border-radius:50%; background: radial-gradient(ellipse at center, rgba(0,0,0,.35) 0%, rgba(0,0,0,.18) 50%, transparent 80%);
    filter:blur(8px); z-index:4; pointer-events:none; transform: translate(-50%,-50%); opacity:0.8; }
  .hotspot{ position:absolute; background: radial-gradient(ellipse at center,#fff 0%, rgba(255,255,255,.9) 50%, transparent 70%);
    border-radius:50%; opacity:0; box-shadow:0 0 40px rgba(255,255,255,.95); pointer-events:none; z-index:5; transform: translate(-50%,-50%); transition: all 0.25s; }
  .grass-container{ position:absolute; bottom:80px; left:55%; z-index:6; }
  .grass{ font-size:24px; filter:contrast(0.5); transition:all 1s; }
  #timer{ position:absolute; top:12px; left:50%; transform:translateX(-50%); font-size:18px; color:#FF4500; background:rgba(255,255,255,.85);
    padding:4px 12px; border-radius:18px; display:none; z-index:11; }

  .explain{ width:100%; max-width:900px; margin:14px 0 20px; line-height:1.65; font-size:.95em; color:#e9f2ff;}
  .explain h2{ margin:.2em 0 .4em; color:#9bd3ff; font-size:1.15em;}

  /* 恭喜弹窗 */
  .modal-mask{ position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; place-items:center; z-index:2000; }
  .modal{
    width:min(92vw,520px); background:#ffffff; color:#0f172a;
    border:1px solid rgba(0,0,0,.08); border-radius:14px; padding:18px 18px 14px;
    box-shadow:0 24px 48px rgba(0,0,0,.35); text-align:center;
  }
  .modal h3{ margin:4px 0 6px; font-size:20px; }
  .modal p{ margin:0 0 12px; color:#374151; }
  .modal .actions{ display:flex; gap:10px; justify-content:center; }
  .modal .btn{ padding:10px 14px; border:none; border-radius:10px; font-weight:700; cursor:pointer; }
  .modal .primary{ background:#1d4ed8; color:#fff; }
</style>
</head>
<body>
  <!-- 彩条 -->
  <div id="spectrum"></div>

  <!-- 步骤行 -->
  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">把<strong>冰块透镜</strong>移到一个<strong>光斑很大</strong>的位置。</div>
      <div class="task-hint" id="taskHint">提示：远离最佳焦点，光斑会变大。</div>
    </div>
    <div class="progress-dots">
      <span class="dot active" id="dot1"></span>
      <span class="dot" id="dot2"></span>
      <span class="dot" id="dot3"></span>
    </div>
  </div>

  <!-- 三按钮 -->
  <div class="toolbar">
    <button id="resetBtn">步骤重置</button>
    <button id="autoDemoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <!-- 舞台 -->
  <div class="stageWrap">
    <div class="stage" id="stage">
      <div id="mountains"><span class="mountain">🏔</span><span class="mountain">🏔</span><span class="mountain">🏔</span></div>
      <div id="sun"></div>
      <div id="terrain"></div>
      <div class="lens" id="lens" style="left:45%; top:40%;"></div>
      <div class="lens-shadow" id="lensShadow"></div>
      <div class="hotspot" id="hotspot"></div>
      <div class="grass-container" id="grassBox"><div class="grass" id="grass">🍂🍂🍂</div></div>
      <div id="timer">10</div>
    </div>
  </div>

  <!-- 恭喜弹窗（单按钮） -->
  <div class="modal-mask" id="congratsMask" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="cgTitle">
      <h3 id="cgTitle">完成啦，太棒了！🎉</h3>
      <p>你已按步骤完成：认识误区 → 接近聚焦 → 正确聚焦并点燃。</p>
      <div class="actions">
        <button class="btn primary" id="okBtn">好的</button>
      </div>
    </div>
  </div>

  <div class="explain">
    <h2>为什么冰块能取火？</h2>
    <ul>
      <li>冰块近似凸透镜，会把阳光会聚成光斑；光斑越小，能量越集中。</li>
      <li>当光斑最小且对准火绒，保持约 10 秒可点燃。</li>
    </ul>
  </div>

<script>
/* 全局状态 */
let freeMode=false, autoMode=false, autoLock=false;
let steps={cur:1, done:[false,false,false]};
let ignite=false;
let interacted=false;
let hold1=0, hold2=0;
const dtFixed=1/60;

const FOCUS_R=1/7;
const DELTA_FOCUS=0.03, DELTA_BIG=0.09, DELTA_MID_MIN=0.035, DELTA_MID_MAX=0.060;
const HOLD_S1=0.9, HOLD_S2=0.9;
let congratsTimer=null;

(function(){
  /* DOM */
  const stage=document.getElementById('stage');
  const sun=document.getElementById('sun');
  const lens=document.getElementById('lens');
  const lensShadow=document.getElementById('lensShadow');
  const hotspot=document.getElementById('hotspot');
  const grass=document.getElementById('grass');
  const grassBox=document.getElementById('grassBox');
  const timer=document.getElementById('timer');

  const taskStep=document.getElementById('taskStep');
  const taskText=document.getElementById('taskText');
  const taskHint=document.getElementById('taskHint');
  const dots=[document.getElementById('dot1'),document.getElementById('dot2'),document.getElementById('dot3')];

  const btnReset=document.getElementById('resetBtn');
  const btnAuto=document.getElementById('autoDemoBtn');
  const btnFree=document.getElementById('freeBtn');

  const congratsMask=document.getElementById('congratsMask');
  const okBtn=document.getElementById('okBtn');

  /* 场景量 */
  let isDragging=false, isFocused=false, countdown=null, remaining=10;
  let SUN_POS, GRASS_POS, k, b;

  function computeStatic(){
    const s=sun.getBoundingClientRect(), g=grassBox.getBoundingClientRect();
    return { SUN:{x:s.left+s.width/2, y:s.top+s.height/2}, GRS:{x:g.left+g.width/2, y:g.top+g.height/2} };
  }
  function recalcLine(){
    const c=computeStatic(); SUN_POS=c.SUN; GRASS_POS=c.GRS;
    k=(GRASS_POS.y-SUN_POS.y)/(GRASS_POS.x-SUN_POS.x); b=SUN_POS.y - k*SUN_POS.x;
  }
  function setLensByDoc(cx,cy){
    const rect=stage.getBoundingClientRect();
    lens.style.left=(cx-rect.left-40)+'px'; lens.style.top=(cy-rect.top-20)+'px';
  }
  function initLens(){
    recalcLine();
    const x=SUN_POS.x + (GRASS_POS.x - SUN_POS.x)/3, y=k*x+b;
    setLensByDoc(x,y);
    isFocused=false; remaining=10; timer.textContent=remaining; timer.style.display='none';
    ignite=false; grass.innerHTML='🍂🍂🍂'; grass.style.filter='contrast(.5)';
    interacted=false; hold1=0; hold2=0;
    hideCongrats(); clearTimeout(congratsTimer); congratsTimer=null;
    // 初始化按钮文案
    updateFreeButton(false);
  }

  /* 拖拽 */
  lens.addEventListener('pointerdown',e=>{ isDragging=true; interacted=true; lens.setPointerCapture(e.pointerId); e.preventDefault(); if(autoMode) return; });
  document.addEventListener('pointermove',e=>{
    if(!isDragging || autoMode) return;
    const {clientX:mx, clientY:my}=e;
    const lx=((mx + k*my)-k*b)/(1+k*k);
    const minX=Math.min(SUN_POS.x,GRASS_POS.x), maxX=Math.max(SUN_POS.x,GRASS_POS.x);
    const cx=Math.max(minX,Math.min(maxX,lx)), cy=k*cx+b;
    setLensByDoc(cx,cy);
  });
  document.addEventListener('pointerup',()=>{ isDragging=false; });

  /* 倒计时与点燃 */
  function startCountdown(){
    timer.style.display='block'; timer.textContent=remaining;
    clearInterval(countdown);
    countdown=setInterval(()=>{ remaining--; timer.textContent=remaining; if(remaining<=0) completeCountdown(); },1000);
  }
  function stopCountdown(){ if(countdown){ clearInterval(countdown); countdown=null; timer.style.display='none'; } }
  function completeCountdown(){
    clearInterval(countdown); countdown=null; timer.style.display='none';
    grass.innerHTML='🔥🔥🔥'; grass.style.filter='none'; ignite=true;
    if(steps.cur===3){
      steps.done[2]=true; setStepUI();
      clearTimeout(congratsTimer);
      congratsTimer=setTimeout(showCongrats,2000); // 点燃后 2 秒弹窗
    }
  }

  /* 步骤 UI */
  function setStepUI(){
    dots.forEach((d,i)=>{ d.className='dot'; if(i<steps.cur-1)d.classList.add('done'); else if(i===steps.cur-1)d.classList.add('active'); });
    taskStep.textContent = `步骤 ${steps.cur} / 3`;
    if(steps.cur===1){ taskText.innerHTML='把<strong>冰块透镜</strong>移到一个<strong>光斑很大</strong>的位置。'; taskHint.textContent='提示：远离最佳焦点，光斑会变大。';}
    else if(steps.cur===2){ taskText.innerHTML='让光斑<strong>明显变小但不是最小</strong>。'; taskHint.textContent='提示：光斑半径介于“很大”和“最小”之间。';}
    else { taskText.innerHTML='把光斑<strong>缩到最小并对准</strong>火绒中心，保持 10 秒。'; taskHint.textContent='提示：出现倒计时即表示进入保持阶段。';}
  }
  function resetSteps(){ steps={cur:1,done:[false,false,false]}; setStepUI(); initLens(); stopCountdown(); }
  function nextStep(){ if(steps.cur<3){ steps.done[steps.cur-1]=true; steps.cur++; setStepUI(); } }
  /* ★ 新增：显式切换当前步骤（仅用于自动演示的文案同步） */
  function goStep(i){ steps.cur=i; setStepUI(); }

  /* 判定（仅当用户已交互，且非自由/自动） */
  function judge(ratio){
    const delta=Math.abs(ratio-FOCUS_R);

    // 聚焦热点与倒计时
    const rect=stage.getBoundingClientRect();
    isFocused = delta < DELTA_FOCUS;
    if(isFocused){
      hotspot.style.width='15px'; hotspot.style.height='15px';
      hotspot.style.left=(GRASS_POS.x-rect.left)+'px'; hotspot.style.top=(GRASS_POS.y-rect.top)+'px';
      hotspot.style.opacity=0.95;
      if(!ignite && !countdown){ startCountdown(); }
    }else{
      hotspot.style.opacity=0;
      if(!ignite){ stopCountdown(); remaining=10; }
    }

    if(!autoMode && !freeMode){
      if(steps.cur===1){
        if(interacted && delta >= DELTA_BIG){ hold1 += dtFixed; } else { hold1 = Math.max(0, hold1-0.08); }
        if(hold1 >= HOLD_S1){ hold1=0; nextStep(); }
      } else if(steps.cur===2){
        const inMid=(delta>DELTA_MID_MIN && delta<=DELTA_MID_MAX);
        if(interacted && inMid){ hold2 += dtFixed; } else { hold2 = Math.max(0, hold2-0.08); }
        if(hold2 >= HOLD_S2){ hold2=0; nextStep(); }
      } else if(steps.cur===3){
        if(ignite){ steps.done[2]=true; setStepUI(); /* 弹窗延迟在 completeCountdown 内处理 */ }
      }
    }
  }

  /* 每帧 */
  function frame(){
    recalcLine();
    const rect=stage.getBoundingClientRect();
    const cx = rect.left + parseFloat(lens.style.left) + 40;
    const cy = rect.top  + parseFloat(lens.style.top)  + 20;

    const total=Math.hypot(GRASS_POS.x-SUN_POS.x, GRASS_POS.y-SUN_POS.y);
    const d2g  =Math.hypot(GRASS_POS.x-cx, GRASS_POS.y-cy);
    const ratio=d2g/total;

    // 阴影
    const size=50 + 300*ratio;
    lensShadow.style.width=size+'px'; lensShadow.style.height=(size/2)+'px';
    lensShadow.style.left=(GRASS_POS.x-rect.left)+'px'; lensShadow.style.top=(GRASS_POS.y-rect.top)+'px';
    lensShadow.style.opacity=(0.8 - 0.3*ratio);

    judge(ratio);
    requestAnimationFrame(frame);
  }

  /* 等待工具 */
  const wait=(ms)=>new Promise(r=>setTimeout(r,ms));
  async function waitUntil(cond, timeoutMs){
    const start=performance.now();
    while(!cond()){
      if(performance.now()-start>timeoutMs) break;
      await wait(80);
    }
  }

  /* 自动演示：文案与动作逐段同步（其余不变） */
  function ratioToDocX(r){
    const t=1-Math.max(0,Math.min(1,r)); return SUN_POS.x + t*(GRASS_POS.x - SUN_POS.x);
  }
  function moveToRatio(r,ms){
    return new Promise(res=>{
      const start=performance.now(), xT=ratioToDocX(r), yT=k*xT + b;
      const rect=stage.getBoundingClientRect();
      const x0=rect.left + parseFloat(lens.style.left) + 40;
      const y0=rect.top  + parseFloat(lens.style.top)  + 20;
      const tick=now=>{
        const t=Math.min(1,(now-start)/ms);
        const ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
        const cx = x0 + (xT-x0)*ease, cy = y0 + (yT-y0)*ease;
        setLensByDoc(cx,cy);
        if(t<1 && autoMode) requestAnimationFrame(tick); else res();
      };
      requestAnimationFrame(tick);
    });
  }

  async function autoDemo(){
    if(freeMode || autoLock) return; autoLock=true;
    try{
      autoMode=true; interacted=true; lens.style.pointerEvents='none';
      resetSteps();

      /* Step 1：先同步文案 → 执行动作 → 等待真正通过 */
      goStep(1);
      await moveToRatio(FOCUS_R + DELTA_BIG + 0.02, 900);
      await waitUntil(()=>steps.cur>1, 4000);  // 等待判定推进

      /* Step 2：同步文案 → 执行动作 → 等待真正通过 */
      goStep(2);
      await moveToRatio(FOCUS_R + (DELTA_MID_MIN+DELTA_MID_MAX)/2, 900);
      await waitUntil(()=>steps.cur>2, 4000);

      /* Step 3：同步文案 → 执行动作 → 等待点燃（弹窗延迟在 completeCountdown 中处理） */
      goStep(3);
      await moveToRatio(FOCUS_R, 900);
      await waitUntil(()=>ignite, 12000);

      steps.done[2]=true; setStepUI();
    } finally{
      lens.style.pointerEvents='auto';
      autoMode=false; autoLock=false;
    }
  }

  /* 弹窗 */
  function showCongrats(){ congratsMask.style.display='grid'; congratsMask.setAttribute('aria-hidden','false'); }
  function hideCongrats(){ congratsMask.style.display='none'; congratsMask.setAttribute('aria-hidden','true'); }
  okBtn.onclick = ()=> hideCongrats();

  /* 自由模式切换（按钮文案切换保留） */
  function updateFreeButton(on){
    btnFree.textContent = on ? '退出自由模式' : '自由模式';
    btnFree.setAttribute('aria-pressed', on ? 'true' : 'false');
  }
  function setFree(on){
    freeMode = on;
    btnAuto.disabled = on;
    updateFreeButton(on);
    const card=document.getElementById('taskCard');
    card.style.opacity = on ? 0.25 : 1;
    card.style.filter  = on ? 'grayscale(.6)' : 'none';
  }

  /* 绑定 */
  btnReset.onclick=()=>{ if(autoMode) return; resetSteps(); };
  btnAuto.onclick =()=>{ if(freeMode) return; autoDemo(); };
  btnFree.onclick =()=> setFree(!freeMode);

  /* 启动 */
  setStepUI(); initLens(); requestAnimationFrame(frame);
  window.addEventListener('resize', initLens);
  window.addEventListener('scroll', recalcLine, {passive:true});
})();
</script>
</body>
</html>
