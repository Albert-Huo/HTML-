<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>望山跑死马</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum=1, viewport-fit=cover" />
<style>
  :root{--accent:#3ddc97;--warn:#ffb74d;--ink:#e9f2ff;--btn-bg:#4CAF50;--btn-bg-hover:#45a049;--btn-shadow:0 6px 16px rgba(0,0,0,.15);--btn-shadow-active:0 3px 10px rgba(0,0,0,.2)}
  *{box-sizing:border-box}html,body{margin:0;height:100%}
  body{min-height:100vh;background:#101114;color:#fff;display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-touch-callout:none;overscroll-behavior:none;padding-top:env(safe-area-inset-top)}

   /* 顶部彩带 */
  #spectrum{
    position: relative; width: 100%; max-width: 900px; height: 40px; border-radius: 10px; overflow: hidden;
    box-shadow: 0 0 15px rgba(255,255,255,0.15); background: #000;
    /* 恢复正常的间距，依靠 body 的 padding 来避让顶部 */
    margin: 0 0 12px;
    flex-shrink: 0;
  }
  #spectrum::before{
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    /* 流动彩光动画 */
    background: linear-gradient(90deg,
      #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000,
      #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000
    );
    background-size: 200% 100%;
    animation: flowRainbow 6s linear infinite;
  }
  @keyframes flowRainbow {
    0% { background-position: 0% 0; }
    100% { background-position: -100% 0; }
  }


  /* 步骤卡 */
  .task-card{width:100%;max-width:980px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center}
  .task-step{background:rgba(255,255,255,.15);border-radius:8px;padding:6px 10px;font-weight:700;white-space:nowrap}
  .task-text{line-height:1.55}.task-hint{color:#ffd54f;font-size:12px;opacity:.95}
  .progress-dots{display:flex;gap:6px}.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.25);outline:2px solid rgba(255,255,255,.15)}
  .dot.active{background:var(--warn)}.dot.done{background:var(--accent);outline-color:rgba(61,220,151,.5)}

  /* 舞台 */
  .animation-container{position:relative;overflow:hidden;width:100%;max-width:980px;height:60vh;max-height:560px;background:linear-gradient(#87CEEB 20%,#bde3ff 60%,#eaf7ff);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .cloud{position:absolute;font-size:30px;animation:floatCloud linear infinite;filter:drop-shadow(2px 2px 3px rgba(0,0,0,.2));z-index:0;pointer-events:none}
  @keyframes floatCloud{0%{transform:translateX(-120px)}100%{transform:translateX(calc(100vw + 100px))}}

  .mountain{position:absolute;left:50px;top:50%;transform:translateY(-50%);font-size:100px;filter:drop-shadow(5px 5px 5px rgba(0,0,0,.3));z-index:1}
  .horse{position:absolute;right:50px;top:50%;transform:translateY(-50%);font-size:60px;filter:drop-shadow(2px 2px 2px rgba(0,0,0,.3));z-index:1}
  .initial-horse{opacity:.3;transition:none}
  .moving-horse{transition:transform .1s linear}

  .perspective-svg{position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;pointer-events:none;z-index:2}
  .perspective-line{position:absolute;height:1px;background:rgba(255,0,0,.12);transform-origin:left center;z-index:2}

  /* 小短线 + 角标 */
  .angle-indicator{position:absolute;height:2px;width:24px;background:red;border-radius:2px;transform-origin:left center;display:none;z-index:3}
  .angle-label{position:absolute;color:red;font-size:12px;background:transparent;pointer-events:none;display:none;z-index:3}

  .center-label{position:absolute;left:50%;top:12px;transform:translateX(-50%);color:rgba(255,255,255,.9);font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3);display:none;z-index:3}

  .incanvas{position:absolute;right:10px;top:10px;z-index:4;display:flex;flex-direction:column;gap:8px;background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.15);border-radius:12px;padding:8px;backdrop-filter:blur(6px)}
  .btn{border:none;border-radius:10px;padding:9px 12px;color:#fff;background:var(--btn-bg);box-shadow:var(--btn-shadow);transition:.15s;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .btn:hover{background:var(--btn-bg-hover)}.btn:active,.btn.is-pressing{transform:translateY(1px) scale(.99);box-shadow:var(--btn-shadow-active)}
  .btn:disabled{opacity:.55;cursor:not-allowed}.ack{background:#007aff}

  .toolbar{width:100%;max-width:980px;margin:10px 0;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-start}
  .toolbar button{padding:10px 16px;background:#444;border:none;border-radius:10px;color:#fff;cursor:pointer;transition:.2s}
  .toolbar button:hover{background:#5a5a5a}.toolbar button:disabled{opacity:.5;cursor:not-allowed}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,.82);color:#fff;padding:10px 14px;border-radius:10px;opacity:0;pointer-events:none;transition:.25s;z-index:2000}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .checkmark{position:absolute;z-index:40;left:50%;top:20%;transform:translate(-50%,-50%) scale(.7);width:120px;height:120px;border-radius:50%;background:rgba(61,220,151,.12);border:3px solid var(--accent);display:none;align-items:center;justify-content:center;box-shadow:0 0 36px rgba(61,220,151,.42),inset 0 0 20px rgba(61,220,151,.22)}
  .checkmark.active{display:flex}.checkmark>div{width:60px;height:30px;border-left:8px solid var(--accent);border-bottom:8px solid var(--accent);transform:rotate(-45deg) translateY(-6px)}
  .modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1500}
  .modal{width:min(92vw,380px);background:#111;border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:18px 16px;text-align:center}
  .modal h3{margin:8px 0 6px;font-size:20px}.modal p{color:#cfd8dc;margin-top:0}
  .modal .ok{margin-top:12px;background:var(--accent);color:#081a12;font-weight:700;border:none;border-radius:10px;padding:10px 14px;cursor:pointer}

  .explain{width:100%;max-width:980px;margin:8px 0 16px;line-height:1.65;color:var(--ink)}
  .explain h2{margin:.2em 0 .4em;color:#9bd3ff;font-size:1.08em}
  @media (max-width:640px){.animation-container{height:58vh}.explain{font-size:.92em}}

/* CODEX_STANDARD_OPTIMIZATION_START 20260622 */
*,*::before,*::after{box-sizing:border-box}
:root{--codex-shell-max:980px;--codex-spectrum-height:24px;--codex-spectrum-mobile-height:20px;--codex-panel-line:rgba(255,255,255,.12);--codex-panel-bg:rgba(15,15,15,.55);--codex-card-bg:rgba(255,255,255,.08);--codex-accent:#3ddc97;--codex-warn:#ffb74d}
html{-webkit-text-size-adjust:100%}
body{letter-spacing:0;overflow-x:hidden}
button,input,select,textarea{font:inherit}
button,.button,.kbtn,.quizBtn,.mode-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#spectrum{position:relative;width:100%;max-width:var(--codex-shell-max);height:var(--codex-spectrum-height);border-radius:10px;overflow:hidden;box-shadow:0 0 15px rgba(255,255,255,.12);margin:0 0 12px;background:#050505;flex-shrink:0}
#spectrum::before{content:"";position:absolute;inset:0;border-radius:inherit;background-image:linear-gradient(90deg,#ff4c4c 0%,#ff9a3d 5.5%,#f7e94c 11%,#54e86d 17%,#40e0d0 24%,#4aa3ff 31%,#8757ff 38%,#ec5cff 44%,#ff4c4c 50%,#ff9a3d 55.5%,#f7e94c 61%,#54e86d 67%,#40e0d0 74%,#4aa3ff 81%,#8757ff 88%,#ec5cff 94%,#ff4c4c 100%);background-size:200% 100%;background-repeat:repeat;filter:saturate(1.18) brightness(1.04);opacity:.96;animation:codexSpectrumFlow 8s linear infinite}
@keyframes codexSpectrumFlow{0%{background-position:0 0}100%{background-position:-100% 0}}
.task-card,.taskCard{width:100%;max-width:var(--codex-shell-max);border-radius:12px;border:1px solid var(--codex-panel-line);background:var(--codex-card-bg);display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;backdrop-filter:blur(6px)}
.task-step,.stepBadge{display:inline-flex;align-items:center;justify-content:center;width:max-content;max-width:100%;border-radius:8px;padding:6px 10px;background:rgba(255,255,255,.16);border:0;color:#fff;font-weight:800;white-space:nowrap;line-height:1.2}
.task-text,.taskText,.taskMain{min-width:0;line-height:1.55}
.task-hint,.taskGoal,.taskHint{color:#ffd54f;font-size:12px;line-height:1.45;opacity:.95}
.progress-dots,.dots{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.dot{width:10px;height:10px;border-radius:50%;outline:2px solid rgba(255,255,255,.12)}
.dot.active,.dot.on{background:var(--codex-warn)}
.dot.done{background:var(--codex-accent);outline-color:rgba(61,220,151,.45)}
.mode-strip,.modePill,.mode-pill{border:2px solid transparent;border-radius:999px;background:linear-gradient(rgba(6,10,14,.94),rgba(6,10,14,.94)) padding-box,linear-gradient(90deg,#35ff73,#4bd8ff,#6c5cff,#ff4fc3,#ffd166,#35ff73,#4bd8ff) border-box;background-size:100% 100%,240% 100%;box-shadow:0 0 16px rgba(75,216,255,.18),inset 0 0 10px rgba(255,255,255,.06);color:#fff;font-weight:900;white-space:nowrap;animation:codexModeRibbonFlow 5s linear infinite}
@keyframes codexModeRibbonFlow{0%{background-position:0 0,0 0}100%{background-position:0 0,-240% 0}}
.helpBtn,.help-btn,.hint-lamp{display:inline-grid;place-items:center;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#ffd54f;line-height:1;font-size:16px;font-weight:900;box-shadow:none}
.toolbar{width:100%;max-width:var(--codex-shell-max);gap:8px}
.toolbar button{border-radius:8px;min-width:0}
.explanation{width:100%;max-width:var(--codex-shell-max);line-height:1.66}
canvas,svg,img{max-width:100%}
#stage,#labArea,.lab,.simulation-area,.container{max-width:100%}
.overlay-panel,.panel,.control-panel,.controls-panel,.controlPanel{max-width:calc(100% - 24px)}
.codex-auto-task{margin-bottom:10px}
@media(max-width:720px){
  body{padding:8px}
  #spectrum{height:var(--codex-spectrum-mobile-height);margin-bottom:10px;border-radius:10px}
  .task-card,.taskCard{grid-template-columns:1fr;align-items:start;gap:7px;padding:12px 14px}
  .task-step,.stepBadge{font-size:16px}
  .task-text,.taskText{font-size:14px}
  .progress-dots,.dots{justify-content:flex-start}
  #stage,#labArea,.lab{min-height:430px}
  .overlay-panel{left:12px!important;right:12px!important;width:auto!important;max-height:42%;overflow:auto}
  .toolbar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:8px;padding:6px;border:1px solid rgba(255,255,255,.08);border-radius:11px;background:rgba(255,255,255,.035)}
  .toolbar button{padding:8px 6px;font-size:12px;font-weight:800;background:rgba(255,255,255,.075)}
  .explanation{font-size:14px}
}

@media(max-width:720px){
  html,body{box-sizing:border-box} body{width:100vw!important;max-width:100vw;margin:0!important;padding:8px!important;overflow-x:hidden}
  #spectrum,.task-card,.taskCard,.toolbar,.explanation,.container{width:calc(100vw - 16px)!important;max-width:calc(100vw - 16px)!important;margin-left:auto;margin-right:auto}
  #stage,#labArea,.lab,#stageWrap,.simulation-area{max-width:calc(100vw - 16px)!important}
  .explanation h1,.explanation h2,.explanation h3,.explanation p,.explanation ul,.explanation ol,.explanation li{width:auto!important;max-width:100%!important}
  .explanation ul,.explanation ol{padding-left:1.2em}
}

@media(max-width:720px){
  .app,.wrapper,.wrap,.main,.page,#container{width:calc(100vw - 16px)!important;max-width:calc(100vw - 16px)!important;margin-left:auto!important;margin-right:auto!important}
  #container,#container h1,#container h2,#container h3,#container .controls,#container #animation,#container svg,#container #elevator,#container #elevatorFloor{width:100%!important;max-width:100%!important}
  .container{padding:14px!important}
  .container > *,.container .explanation,.container .control-panel,.container .simulation-area{width:100%!important;max-width:100%!important;margin-left:0!important;margin-right:0!important}
  .dogWin,.dogCanvas,.miniNote{width:100%!important;max-width:100%!important}
  .xn-topbar{height:var(--codex-spectrum-mobile-height)!important;border-radius:10px}
  .xn-stepcard{grid-template-columns:1fr!important;gap:7px!important}
}

@media(max-width:720px){
  .page{padding-left:8px!important;padding-right:8px!important}
  .page > #spectrum,.page > .task-card,.page > .toolbar{width:100%!important;max-width:100%!important}
  .toolbar button,.xn-toolbar button{width:auto!important;max-width:100%!important}
  .dogWin{width:calc(100vw - 32px)!important;max-width:calc(100vw - 32px)!important}
  #info{width:calc(100vw - 16px)!important;left:8px!important;right:auto!important}
}
@media(prefers-reduced-motion:reduce){#spectrum::before,.mode-strip,.modePill,.mode-pill{animation:none}}
/* CODEX_STANDARD_OPTIMIZATION_END */

</style>

<body>
  <div id="spectrum"></div>

  <div class="task-card" id="taskCard">
    <div class="task-step" id="taskStep">步骤 1 / 3</div>
    <div class="task-text">
      <div id="taskText">点击右上角<strong>开始演示</strong>，观察马前进后屏幕出现的红线与黄色扇形。</div>
      <div class="task-hint" id="taskHint">提示：这是原动画的第一段位移（约 1/7 距离）。</div>
    </div>
    <div class="progress-dots"><span class="dot active" id="dot1"></span><span class="dot" id="dot2"></span><span class="dot" id="dot3"></span></div>
  </div>

  <div class="animation-container" id="stage" aria-label="望山跑死马 场景">
    <div class="cloud" style="top:15%; animation-duration:70s;">☁️</div>
    <div class="cloud" style="top:25%; animation-duration:50s;">☁️</div>
    <div class="cloud" style="top:13%; animation-duration:78s;">☁️</div>
    <div class="cloud" style="top:27%; animation-duration:25s;">☁️</div>
    <div class="cloud" style="top:20%; animation-duration:35s;">☁️</div>
    <div class="cloud" style="top:18%; animation-duration:62s;">☁️</div>
    <div class="cloud" style="top:22%; animation-duration:55s;">☁️</div>

    <div class="mountain">🏔️</div>
    <div class="horse initial-horse">🏇</div>
    <div class="horse moving-horse">🏇</div>

    <svg class="perspective-svg initial-svg" style="display:none"><polygon fill="rgba(255,255,0,0.12)" points="0,0 0,0 0,0"></polygon></svg>
    <svg class="perspective-svg current-svg" style="display:none"><polygon fill="rgba(255,255,0,0.12)" points="0,0 0,0 0,0"></polygon></svg>
    <div class="perspective-line initial-top-line"></div>
    <div class="perspective-line initial-bottom-line"></div>
    <div class="perspective-line current-top-line"></div>
    <div class="perspective-line current-bottom-line"></div>

    <div class="angle-indicator initial-angle-indicator"></div>
    <div class="angle-indicator current-angle-indicator"></div>
    <div class="angle-label initial-angle">α</div>
    <div class="angle-label current-angle">β</div>
    <div class="center-label">α≈β</div>

    <div class="incanvas">
      <button class="btn" id="startBtn">开始演示</button>
      <button class="btn" id="resetBtn">重置演示</button>
      <button class="btn ack" id="ackBtn" style="display:none">我看到了 α≈β</button>
    </div>

    <div class="checkmark" id="checkmark"><div></div></div>
  </div>

  <div class="toolbar">
    <button id="stepResetBtn">步骤重置</button>
    <button id="autoBtn">自动演示</button>
    <button id="freeBtn">自由模式</button>
  </div>

  <div class="modal-mask" id="doneMask" role="dialog" aria-modal="true">
    <div class="modal">
      <h3>完成，你真棒！🎉</h3>
      <p>“望山跑死马”的错觉源于远处目标的<strong>角大小变化很慢</strong>，接近后突然变化很快。</p>
      <button class="ok" id="okBtn">好的</button>
    </div>
  </div>
  <div class="toast" id="toast">再试一试：请按步骤完成当前指令</div>

  <div class="explain">
    <h2>原理小结</h2>
    <ul>
      <li><b>近大远小：</b>远处山成像很小，在人眼中，视角变化很慢。马跑了很久，但山的大小在人眼中几乎不变，以为可以快速靠近（让山在人眼中的视角快速变大），但难以实现。</li>
    </ul>
  </div>

<script>
/* 工具 */
const $=s=>document.querySelector(s);const toast=$("#toast");const checkmark=$("#checkmark");const doneMask=$("#doneMask");
const showToast=t=>{toast.textContent=t||'再试一试';toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1200)}
const showCheck=()=>{checkmark.classList.add('active');setTimeout(()=>checkmark.classList.remove('active'),520)}
$("#okBtn").onclick=()=>doneMask.style.display='none';

/* 原动画元素 */
const horse=document.querySelector('.moving-horse');
const mountain=document.querySelector('.mountain');
const container=document.querySelector('.animation-container');
const initialHorseEl=document.querySelector('.initial-horse');
const initialSvg=document.querySelector('.initial-svg');
const currentSvg=document.querySelector('.current-svg');
const initialTopLine=document.querySelector('.initial-top-line');
const initialBottomLine=document.querySelector('.initial-bottom-line');
const currentTopLine=document.querySelector('.current-top-line');
const currentBottomLine=document.querySelector('.current-bottom-line');
const initialAngleIndicator=document.querySelector('.initial-angle-indicator');
const currentAngleIndicator=document.querySelector('.current-angle-indicator');
const initialAngleLabel=document.querySelector('.initial-angle');
const currentAngleLabel=document.querySelector('.current-angle');
const centerLabel=document.querySelector('.center-label');

let isAnimating=false,totalDistance=0,moveDistance=0;

/* 视点（骑手头部大致位置） */
const EYE_X_RATIO=0.62, EYE_Y_RATIO=0.36;
function eyeOf(el,contRect){const r=el.getBoundingClientRect();return {x:r.left+r.width*EYE_X_RATIO-contRect.left,y:r.top+r.height*EYE_Y_RATIO-contRect.top};}

/* 计算/重置/启动 */
function calculateDistances(){const m=mountain.getBoundingClientRect(),h=horse.getBoundingClientRect();totalDistance=Math.abs(m.left-(h.left+h.width/2));moveDistance=totalDistance/7;}
function resetVisualsOnly(){
  [initialTopLine,initialBottomLine,currentTopLine,currentBottomLine].forEach(el=>el.style.width='0px');
  [initialSvg,currentSvg].forEach(svg=>{const p=svg.querySelector('polygon');p.setAttribute('points','0,0 0,0 0,0');svg.style.display='none';});
  [initialAngleIndicator,currentAngleIndicator,initialAngleLabel,currentAngleLabel,centerLabel].forEach(el=>el.style.display='none');
}
function resetAnimation(){isAnimating=false;horse.style.transform='translateY(-50%)';resetVisualsOnly();calculateDistances();}
function startAnimation(){
  if(isAnimating)return;resetVisualsOnly();isAnimating=true;let x=0;
  (function anim(){ if(x<moveDistance){x+=0.5;horse.style.transform=`translateY(-50%) translateX(-${x}px)`;requestAnimationFrame(anim);} else{isAnimating=false;showPerspective();} })();
}

/* 线条/扇形绘制 */
function updatePerspectiveLines(eyeX,eyeY,mLeft,mTop,mBottom,topLine,bottomLine){
  const dxT=mLeft-eyeX,dyT=mTop-eyeY,dxB=mLeft-eyeX,dyB=mBottom-eyeY;
  const dT=Math.hypot(dxT,dyT),dB=Math.hypot(dxB,dyB),aT=Math.atan2(dyT,dxT)*180/Math.PI,aB=Math.atan2(dyB,dxB)*180/Math.PI;
  topLine.style.left=`${eyeX}px`;topLine.style.top=`${eyeY}px`;topLine.style.width=`${dT}px`;topLine.style.transform=`rotate(${aT}deg)`;
  bottomLine.style.left=`${eyeX}px`;bottomLine.style.top=`${eyeY}px`;bottomLine.style.width=`${dB}px`;bottomLine.style.transform=`rotate(${aB}deg)`;
}
function updatePerspectivePolygon(svg,eyeX,eyeY,mLeft,mTop,mBottom){svg.querySelector('polygon').setAttribute('points',`${eyeX},${eyeY} ${mLeft},${mTop} ${mLeft},${mBottom}`)}
function avgAngle(a,b){return Math.atan2(Math.sin(a)+Math.sin(b),Math.cos(a)+Math.cos(b));}

/* === 关键：按你的指令旋转120°，角标在“另一端点” === */
function placeRotatedIndicator(ind,label,eyeX,eyeY,mLeft,mTop,mBottom){
  // 两射线角度 → 角平分角
  const aT=Math.atan2(mTop-eyeY,    mLeft-eyeX);
  const aB=Math.atan2(mBottom-eyeY, mLeft-eyeX);
  let aMid=avgAngle(aT,aB);
  // 逆时针旋转 120°
  aMid += Math.PI * 2/3; // 120° = 2π/3

  // 短线长度自适应
  const L=Math.max(18,Math.min(28,container.clientWidth*0.02||22));

  // 绘制短线（左端点为圆心）
  ind.style.display='block';
  ind.style.left=`${eyeX}px`; ind.style.top=`${eyeY}px`;
  ind.style.transform=`rotate(${aMid*180/Math.PI}deg)`;
  ind.style.width=`${L}px`;

  // 角标放在“另一端点”（右端点）
  const endX=eyeX + Math.cos(aMid)*L;
  const endY=eyeY + Math.sin(aMid)*L;
  label.style.display='block';
  label.style.left=`${endX - 6}px`;   // 轻微微调居中
  label.style.top =`${endY - 10}px`;
}

function showPerspective(){
  const m=mountain.getBoundingClientRect(),h=horse.getBoundingClientRect(),c=container.getBoundingClientRect(),ih=initialHorseEl.getBoundingClientRect();
  const mLeft=m.left+m.width/2 - c.left, rawTop=m.top - c.top, rawBottom=m.bottom - c.top, h2=(rawBottom-rawTop)/2;
  const adjBottom=rawBottom - h2/3, adjTop=rawTop + h2/2 + h2*0.05;

  const eye0=eyeOf(initialHorseEl,c);
  const eye1=eyeOf(horse,c);

  updatePerspectiveLines(eye0.x,eye0.y,mLeft,adjTop,adjBottom,initialTopLine,initialBottomLine);
  updatePerspectiveLines(eye1.x,eye1.y,mLeft,adjTop,adjBottom,currentTopLine,currentBottomLine);
  updatePerspectivePolygon(initialSvg,eye0.x,eye0.y,mLeft,adjTop,adjBottom);
  updatePerspectivePolygon(currentSvg,eye1.x,eye1.y,mLeft,adjTop,adjBottom);
  initialSvg.style.display='block'; currentSvg.style.display='block';

  // 按指令：短线整体逆时针120°，角标在另一端点
  placeRotatedIndicator(initialAngleIndicator,initialAngleLabel,eye0.x,eye0.y,mLeft,adjTop,adjBottom);
  placeRotatedIndicator(currentAngleIndicator,currentAngleLabel,eye1.x,eye1.y,mLeft,adjTop,adjBottom);

  centerLabel.style.display='block';
  reportAction('perspective_shown');
}

/* 步骤引擎（与前版一致） */
const steps=[
  {text:'点击右上角<strong>开始演示</strong>，观察马前进后屏幕出现的红线与黄色扇形。',hint:'这是原动画的第一段位移（约 1/7 距离）。',expect:'start_then_perspective',pass:p=>p.perspective===true},
  {text:'出现 α、β 与黄色扇形后，点击<strong>“我看到了 α≈β”</strong>。',hint:'确认你注意到 α 与 β 很接近 → 前半程看起来“变化不大”。',expect:'ack',pass:p=>p.ack===true},
  {text:'再点一次<strong>开始演示</strong>，第二次体验“还要走很久”的感觉（自动完成）。',hint:'原动画再次执行同样位移，完成后自动通过。',expect:'start_then_perspective2',pass:p=>p.perspective2===true},
];
let cur=0,free=false,auto=false,completed=false;
const dots=[$('#dot1'),$('#dot2'),$('#dot3')];
function setStepUI(i){i=Math.max(0,Math.min(i,steps.length-1));$('#taskStep').textContent=`步骤 ${i+1} / ${steps.length}`;$('#taskText').innerHTML=steps[i].text;$('#taskHint').textContent=steps[i].hint;dots.forEach((d,k)=>d.className='dot'+(k<i?' done':k===i?' active':''))}
function nextStep(){dots[cur].classList.remove('active');dots[cur].classList.add('done');cur++;if(cur>=steps.length){completed=true;doneMask.style.display='flex';return;}dots[cur].classList.add('active');setStepUI(cur)}
function reportAction(type){if(free||auto||completed)return;const s=steps[cur];if(!s)return;let ok=false,pass=false;
  if(s.expect==='start_then_perspective' && type==='perspective_shown'){ok=true;pass=s.pass({perspective:true});}
  else if(s.expect==='ack' && type==='ack'){ok=true;pass=s.pass({ack:true});}
  else if(s.expect==='start_then_perspective2' && type==='perspective_shown'){ok=true;pass=s.pass({perspective2:true});}
  if(!ok)return;if(pass){showCheck();setTimeout(nextStep,520);}
}

/* 按钮/模式 */
function bindTap(el,handler){let last=0;const P='is-pressing';const on=()=>el.classList.add(P);const off=()=>el.classList.remove(P);
  el.addEventListener('pointerdown',e=>{if(e.pointerType==='mouse'&&e.button!==0)return;on();handler(e);last=Date.now()},{passive:true});
  el.addEventListener('pointerup',off,{passive:true});el.addEventListener('pointerleave',off,{passive:true});
  el.addEventListener('click',e=>{if(Date.now()-last<50)return;handler(e)},{passive:true});
}
const startBtn=$("#startBtn"),resetBtn=$("#resetBtn"),ackBtn=$("#ackBtn");
const stepResetBtn=$("#stepResetBtn"),autoBtn=$("#autoBtn"),freeBtn=$("#freeBtn");
function enterFree(on){free=on;freeBtn.textContent=on?'退出自由模式':'自由模式';autoBtn.disabled=on;const card=$("#taskCard");card.style.opacity=on?.25:1;card.style.filter=on?'grayscale(.6)':'none'}
function hardReset(){cur=0;completed=false;auto=false;dots.forEach((d,i)=>d.className='dot'+(i===0?' active':''));setStepUI(0);resetAnimation();ackBtn.style.display='none';checkmark.classList.remove('active');toast.classList.remove('show');doneMask.style.display='none'}
function guardStartAllowed(){return free||cur===0||cur===2}

bindTap(startBtn,()=>{if(completed){showToast('已完成，点“步骤重置”可再来一次');return;} if(!guardStartAllowed()){showToast('本步骤不需要“开始演示”');return;} startAnimation(); if(cur===0){ackBtn.style.display='block';}});
bindTap(resetBtn,()=>{resetAnimation();if(!free)showToast('已重置演示（不影响步骤进度）')});
bindTap(ackBtn,()=>{if(free){showToast('自由模式下无需确认');return;} if(cur!==1){showToast('请按步骤进行');return;} reportAction('ack');ackBtn.style.display='none';});
bindTap(stepResetBtn,()=>{if(auto)return;hardReset();});
bindTap(freeBtn,()=>enterFree(!free));
bindTap(autoBtn,async()=>{if(free||auto)return;auto=true;hardReset();startAnimation();
  const waitShow=()=>new Promise(r=>{const t=setInterval(()=>{if(initialSvg.style.display==='block'&&currentSvg.style.display==='block'){clearInterval(t);r();}},60);});
  await waitShow();reportAction('perspective_shown');await new Promise(r=>setTimeout(r,600));
  reportAction('ack');await new Promise(r=>setTimeout(r,600));startAnimation();await waitShow();reportAction('perspective_shown');auto=false;});

/* 初始化 */
document.addEventListener('DOMContentLoaded',()=>{hardReset();document.querySelectorAll('.cloud').forEach((c,i)=>{c.style.left='-80px';c.style.animationDelay=`-${i*3}s`;});setTimeout(()=>{try{window.scrollTo({top:0,left:0,behavior:'instant'});}catch{window.scrollTo(0,0);}},0);});
window.addEventListener('resize',()=>{if(!isAnimating)resetAnimation();});
</script>
